                  {Object.keys(reviewMetrics.typeCounts || {}).length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 8 }}>Детализация по типам</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        {Object.entries(reviewMetrics.typeCounts).sort((a, b) => b[1] - a[1]).map(([typeId, count]) => {
                          const typeMeta = eventTypes.find(item => item.id === typeId) || { label: typeId, icon: "📌" };
                          return <div key={typeId} style={{ fontSize: T.body, color: C.text }}>{typeMeta.icon} {typeMeta.label} — <span style={{ fontWeight: 700 }}>{count}</span></div>;
                        })}
                      </div>
                    </div>
                  )}
                  {(reviewMetrics.recentEvents || []).length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 8 }}>Последние события</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        {reviewMetrics.recentEvents.map(event => (
                          <div key={event.id} style={{ fontSize: T.body, color: C.text }}>{formatDate(event.date)} — {event.title}{event.factionName ? ` (${event.factionName})` : ""}</div>
                        ))}
                      </div>
                    </div>
                  )}
                  {(reviewMetrics.topReasons || []).length > 0 && (
                    <div>
                      <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 8 }}>Топ оснований</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        {reviewMetrics.topReasons.map((item, index) => (
                          <div key={item.reason} style={{ fontSize: T.body, color: C.text }}>{index + 1}. {item.reason} — <span style={{ fontWeight: 700 }}>{item.count}</span></div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14 }}>
              <div>
                <label style={S.label}>Коэффициент</label>
                <select style={S.select} value={reviewForm.coefficient} onChange={e => setReviewForm(prev => ({ ...prev, coefficient: e.target.value }))}>
                  {REPORT_COEFFICIENT_OPTIONS.map(value => <option key={value} value={value}>{formatCoefficient(value)}</option>)}
                </select>
              </div>
              <div>
                <label style={S.label}>Доп. премия за награды (₽)</label>
                <input style={S.input} type="number" min="0" step="1" value={reviewForm.extraAmount} onChange={e => setReviewForm(prev => ({ ...prev, extraAmount: e.target.value }))} />
              </div>
            </div>

            <div>
              <label style={S.label}>Комментарий к премии</label>
              <textarea style={S.textarea} value={reviewForm.comment} onChange={e => setReviewForm(prev => ({ ...prev, comment: e.target.value }))} placeholder="Комментарий для итогового решения" />
            </div>

            <div>
              <label style={S.label}>Комментарий при возврате</label>
              <textarea style={S.textarea} value={reviewForm.returnComment} onChange={e => setReviewForm(prev => ({ ...prev, returnComment: e.target.value }))} placeholder="Укажите, что нужно доработать" />
            </div>

            <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
              <div style={{ fontSize: T.meta, color: C.textMuted }}>Итоговая премия после решения Генпрокуратуры</div>
              <div style={{ fontSize: T.heading, color: C.gold, fontWeight: 700, marginTop: 6 }}>
                {formatCurrency(calculateReportBonusAmount(selectedReport.baseAmount || getReportBaseAmount(selectedReport), reviewForm.coefficient, reviewForm.extraAmount))}
              </div>
            </div>

            <div className="btn-row" style={S.row}>
              <button className="btn-hover" style={btn("success")} onClick={approveReport}>Утвердить премию</button>
              <button className="btn-hover" style={btn("danger")} onClick={returnForRevision}>Вернуть на доработку</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function PersonnelCasesBlock({ userId }) {
  const [cases, setCases] = useState([]);
  const [loading, setLoading] = useState(false);
  useEffect(() => {
    if (!userId) { setCases([]); return; }
    setLoading(true);
    apiRequest("cases.list", { userId, tab: "all" })
      .then(res => setCases(Array.isArray(res.items) ? res.items : []))
      .catch(() => setCases([]))
      .finally(() => setLoading(false));
  }, [userId]);
  if (!userId) return null;
  const activeCases = cases.filter(c => !["archive", "completed"].includes(c.status));
  return (
    <div style={{ background: C.bgInput, border: `1px solid ${C.border}`, borderRadius: 14, padding: 18 }}>
      <div style={{ ...S.cardTitle, marginBottom: 12 }}>Обращения / жалобы в работе</div>
      {loading ? (
        <div style={{ fontSize: T.body, color: C.textMuted }}>Загрузка...</div>
      ) : activeCases.length === 0 ? (
        <div style={{ fontSize: T.body, color: C.textMuted }}>Нет активных обращений или жалоб.</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {activeCases.map(c => {
            const statusMeta = CASE_STATUSES?.[c.status] || { label: c.status, color: C.textMuted };
            const isCreator = c.createdBy === userId;
            const isAssigned = c.assignedStaffId === userId;
            const isSupervisor = c.supervisorId === userId;
            const roleLabels = [isCreator && "автор", isAssigned && "исполнитель", isSupervisor && "прокурор"].filter(Boolean).join(", ");
            return (
              <div key={c.id} style={{ background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 14px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", gap: 8, alignItems: "center" }}>
                  <div style={{ fontSize: T.body, color: C.text }}>
                    <span style={{ fontWeight: 700 }}>{c.regNumber}</span>
                    {" — "}
                    <span style={{ color: statusMeta.color || C.textMuted }}>{statusMeta.label || c.status}</span>
                    {roleLabels && <span style={{ fontSize: T.meta, color: C.textDim, marginLeft: 8 }}>({roleLabels})</span>}
                  </div>
                  <div style={{ fontSize: T.meta, color: C.textMuted, whiteSpace: "nowrap" }}>{c.caseType === "appeal" ? "Обращение" : "Жалоба"}</div>
                </div>
                {c.applicantName && <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>Заявитель: {c.applicantName}</div>}
                {c.deadline && <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 2 }}>Срок: {formatDate(c.deadline)}</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════════ PAGE: PERSONNEL SUMMARY ═══════════════ */
function PagePersonnelSummary({ currentUser, users, reports, bonuses, positions, classRanks, medals, setUsers, setReports, setBonuses, addAudit, isPreviewMode, activityEvents, factions, activitySettings }) {
  const allPositions = Object.values(positions || {}).flat();
  const assignableRoles = getAssignableRoles(currentUser);
  const assignableSubjects = getAssignableSubjects(currentUser);
  const permissionLevel = getUserPermissionLevel(currentUser);
  const isBossRole = currentUser?.role === "BOSS";
  const canEditProfiles = typeof setUsers === "function" && (permissionLevel >= 2 || isBossRole) && !isPreviewMode;
  const canDismissProfiles = canEditProfiles && typeof setReports === "function" && typeof setBonuses === "function";
  const activeUsers = users
    .filter(user => !user.blocked && (permissionLevel >= 2 || user.subject === currentUser?.subject))
    .sort((left, right) => {
      const surnameDelta = (left.surname || "").localeCompare(right.surname || "", "ru");
      if (surnameDelta !== 0) return surnameDelta;
      return (left.name || "").localeCompare(right.name || "", "ru");
    });

  const [selectedUser, setSelectedUser] = useState(null);
  const [revealedPassword, setRevealedPassword] = useState("");
  const [passwordBusy, setPasswordBusy] = useState(false);
  const [passwordError, setPasswordError] = useState("");
  const [profileNotice, setProfileNotice] = useState("");
  const [showDismissConfirm, setShowDismissConfirm] = useState(false);

  useEffect(() => {
    setRevealedPassword("");
    setPasswordBusy(false);
    setPasswordError("");
    setProfileNotice("");
    setShowDismissConfirm(false);
  }, [selectedUser?.id]);

  const openProfile = (user) => setSelectedUser(normalizeUserRecord(user));
  const closeProfile = () => setSelectedUser(null);

  const toggleSelectedMedal = (medalId) => setSelectedUser(prev => prev ? normalizeUserRecord({
    ...prev,
    medalIds: (prev.medalIds || []).includes(medalId)
      ? prev.medalIds.filter(id => id !== medalId)
      : [...(prev.medalIds || []), medalId],
  }) : prev);

  const revealPassword = async () => {
    if (!selectedUser?.id) return;
    setPasswordBusy(true);
    setPasswordError("");
    try {
      const response = await apiRequest("user-password", { userId: selectedUser.id });
      setRevealedPassword(response.password || "");
    } catch (e) {
      setPasswordError(e.message || "Не удалось получить пароль");
    } finally {
      setPasswordBusy(false);
    }
  };

  const updateSelectedRole = (nextRole) => {
    setSelectedUser(prev => {
      if (!prev) return prev;
      const nextPositionOptions = positions?.[nextRole] || [];
      const nextSubject = nextRole === "FEDERAL"
        ? GENERAL_SUBJECT
        : (prev.subject === GENERAL_SUBJECT ? (assignableSubjects[0] || SUBJECTS[0]) : prev.subject);
      return normalizeUserRecord({
        ...prev,
        role: nextRole,
        subject: nextSubject,
        positionId: nextPositionOptions.some(item => item.id === prev.positionId) ? prev.positionId : "",
      });
    });
  };

  const saveProfile = () => {
    if (!selectedUser) return;
    if (!canEditProfiles) {
      setProfileNotice(isPreviewMode ? "В режиме просмотра редактирование отключено." : "Редактирование недоступно для вашей роли.");
      return;
    }
    if (!hasSystemAdminAccess(currentUser) && selectedUser.isSystemAdmin) {
      setProfileNotice("Профиль администратора можно редактировать только из-под ADMIN.");
      return;
    }
    if (!(selectedUser.surname || "").trim() || !(selectedUser.name || "").trim()) {
      setProfileNotice("Заполните имя и фамилию сотрудника.");
      return;
    }
    const normalizedUser = normalizeUserRecord({
      ...selectedUser,
      subject: selectedUser.role === "FEDERAL" ? GENERAL_SUBJECT : selectedUser.subject,
      isSystemAdmin: hasSystemAdminAccess(currentUser) ? Boolean(selectedUser.isSystemAdmin) : false,
      isTester: hasSystemAdminAccess(currentUser) ? Boolean(selectedUser.isTester) : Boolean(selectedUser.isTester),
    });
    setUsers(users.map(user => user.id === normalizedUser.id ? normalizedUser : user));
    if (typeof addAudit === "function") {
      addAudit(`Профиль сотрудника обновлён: ${getUserFullName(normalizedUser)}`, currentUser?.id || null);
    }
    setSelectedUser(normalizedUser);
    setProfileNotice("Личное дело сохранено.");
    return;
    setProfileNotice("Профиль сохранён.");
  };

  const canManageSystemAdminFlag = hasSystemAdminAccess(currentUser);
  const selectedPositionOptions = selectedUser ? (positions?.[selectedUser.role] || []) : [];
  const selectedProfileMeta = selectedUser ? getExtendedCabinetProfileMeta(selectedUser, positions, classRanks, medals) : null;
  const selectedReports = selectedUser
    ? reports
      .filter(report => report.userId === selectedUser.id && isOperationalReport(report))
      .sort((left, right) => new Date(getNotificationEventDate(right) || 0) - new Date(getNotificationEventDate(left) || 0))
    : [];
  const selectedApprovedBonuses = selectedUser
    ? bonuses.filter(item => item.userId === selectedUser.id && item.status === "approved")
    : [];
  const selectedTotalBonus = selectedApprovedBonuses.reduce((sum, item) => sum + Number(item.amount || 0), 0);
  const canEditSelectedUser = canEditProfiles && !!selectedUser && (canManageSystemAdminFlag || !selectedUser.isSystemAdmin) && (!isBossRole || (selectedUser.subject === currentUser?.subject && !["BOSS", "FEDERAL"].includes(selectedUser.role)));
  const canDismissSelectedUser = canDismissProfiles
    && !!selectedUser
    && selectedUser.id !== currentUser?.id
    && (canManageSystemAdminFlag || !selectedUser.isSystemAdmin)
    && (!isBossRole || (selectedUser.subject === currentUser?.subject && selectedUser.role !== "FEDERAL"));
  const selectedSubjectOptions = selectedUser && selectedUser.role === "FEDERAL"
    ? [GENERAL_SUBJECT]
    : assignableSubjects.filter(subject => subject !== GENERAL_SUBJECT);

  const dismissSelectedUser = () => {
    if (!selectedUser || !canDismissSelectedUser) return;
    const targetId = selectedUser.id;
    const fullName = getUserFullName(selectedUser);
    const removedReports = reports.filter(report => report.userId === targetId).length;
    const removedBonuses = bonuses.filter(item => item.userId === targetId).length;
    setUsers(users.filter(user => user.id !== targetId));
    setReports(reports.filter(report => report.userId !== targetId));
    setBonuses(bonuses.filter(item => item.userId !== targetId));
    if (typeof addAudit === "function") {
      addAudit(`Сотрудник уволен и удалён из базы: ${fullName}. Удалено отчётов: ${removedReports}, премий: ${removedBonuses}.`, currentUser?.id || null);
    }
    setShowDismissConfirm(false);
    setSelectedUser(null);
  };

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Пофамильная сводка</h1>
      <p style={S.pageSubtitle}>Детализированная информация по каждому сотруднику с быстрым переходом в профиль и историю отчётов.</p>

      <div className="resp-card" style={S.card}>
        <div className="responsive-table-wrap">
        <table style={S.table}>
          <thead>
            <tr>
              <th style={S.th}>ФИО</th>
              <th style={S.th}>Должность</th>
              <th style={S.th}>Субъект</th>
              <th style={S.th}>Роль</th>
              <th style={S.th}>Отчётов</th>
              <th style={S.th}>Последний отчёт</th>
              <th style={S.th}>Премий (₽)</th>
            </tr>
          </thead>
          <tbody>
            {activeUsers.map(user => {
              const userReports = reports.filter(report => report.userId === user.id && isOperationalReport(report));
              const latestReport = getLatestReportDate(userReports);
              const totalBonus = bonuses
                .filter(item => item.userId === user.id && item.status === "approved")
                .reduce((sum, item) => sum + Number(item.amount || 0), 0);
              const positionMeta = allPositions.find(position => position.id === user.positionId);
              const classRankTitle = getDirectoryItemTitleById(classRanks, user.classRankId, "");

              return (
                <tr key={user.id} className="row-hover">
                  <td data-label="ФИО" style={S.td}>
                    <button
                      type="button"
                      onClick={() => openProfile(user)}
                      style={{ background: "none", border: "none", padding: 0, margin: 0, color: C.text, fontSize: T.bodyStrong, fontWeight: 700, cursor: "pointer", textAlign: "left" }}
                    >
                      {getUserFullName(user)}

/* ═══════════════ PAGE: ORDERS ═══════════════ */
function PageNotifications({ notifications, onNavigate, onRefresh, refreshing, lastSyncAt, onDismiss }) {
  const summary = getNotificationSummary(notifications);
  const [dismissedIds, setDismissedIds] = useState(() => {
    try { return JSON.parse(localStorage.getItem("femida_notif_read") || "[]"); } catch { return []; }
  });
  const markRead = (id) => {
    setDismissedIds(prev => {
      const next = [...new Set([...prev, id])];
      try { localStorage.setItem("femida_notif_read", JSON.stringify(next.slice(-200))); } catch {}
      return next;
    });
  };
  const allItems = useMemo(() => {
    const ordered = ["critical", "warning", "info"];
    return ordered.flatMap(priority => {
      const meta = getNotificationPriorityMeta(priority);
      return (notifications || []).filter(n => n.priority === priority).map(n => ({ ...n, meta, isRead: dismissedIds.includes(n.id) }));
    });
  }, [notifications, dismissedIds]);
  const pg = usePagination(allItems, 15);

  return (
    <div className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16, flexWrap: "wrap" }}>
        <div>
          <h1 className="resp-page-title" style={S.pageTitle}>Уведомления</h1>
          <p style={S.pageSubtitle}>Центр событий по отчётам, премиям, регистрационным заявкам и системным предупреждениям.</p>
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 10 }}>
          <button className="btn-hover" style={{ ...btn("ghost"), opacity: refreshing ? 0.7 : 1 }} onClick={onRefresh} disabled={refreshing}>
            {refreshing ? "Обновляем..." : "Обновить"}
          </button>
          <div style={{ fontSize: T.meta, color: C.textMuted }}>Последнее обновление: {lastSyncAt ? formatDateTime(lastSyncAt) : "—"}</div>
        </div>
      </div>

      <div className="stat-row" style={{ ...S.row, marginBottom: 18 }}>
        <StatBox value={summary.critical} label="Критичных" color={C.danger} />
        <StatBox value={summary.warning} label="Требуют внимания" color={C.warning} />
        <StatBox value={summary.info} label="Информационных" color={C.blue} />
      </div>

      {allItems.length === 0 ? (
        typeof EmptyState === "function"
          ? <EmptyState icon="🔔" title="Очередь пуста" description="Сейчас нет уведомлений, требующих вашего внимания." />
          : <div className="resp-card" style={S.card}><div style={S.cardTitle}>Очередь пуста</div><div style={{ fontSize: T.body, color: C.textMuted }}>Сейчас нет уведомлений, требующих вашего внимания.</div></div>
      ) : (
        <div style={S.card}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {pg.paged.map(item => (
              <div key={item.id} style={{
                background: item.isRead ? C.bgCard : C.bgInput,
                border: `1px solid ${item.isRead ? C.border + "66" : C.border}`,
                borderRadius: 12, padding: 18,
                borderLeft: `4px solid ${item.meta.color}`,
                opacity: item.isRead ? 0.7 : 1,
                transition: "opacity 0.3s",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", gap: 12, flexWrap: "wrap", alignItems: "center", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <span style={badge(item.meta.color)}>{item.meta.label}</span>
                    {!item.isRead && <span style={{ width: 8, height: 8, borderRadius: "50%", background: item.meta.color, display: "inline-block" }} title="Новое" />}
                    {item.scope && <span style={S.tag}>{item.scope}</span>}
                  </div>
                  <div style={{ fontSize: T.meta, color: C.textMuted }}>{item.date ? formatDateTime(item.date) : "Без даты"}</div>
                </div>
                <div style={{ fontSize: T.bodyStrong, color: C.text, fontWeight: 700, marginBottom: 8 }}>{item.title}</div>
                <div style={{ fontSize: T.body, color: C.textDim, lineHeight: 1.55 }}>{item.text}</div>
                <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
                  <button className="btn-hover" style={btn("ghost")} onClick={() => { markRead(item.id); onNavigate(item.actionId); }}>
                    {item.actionLabel || "Открыть"}
                  </button>
                  {onDismiss && !item.isRead ? (
                    <button className="btn-hover" style={btn("subtle")} onClick={() => { markRead(item.id); onDismiss(item.id); }}>
                      Ознакомлен
                    </button>
                  ) : null}
                </div>
              </div>
            ))}
          </div>
          <Pagination page={pg.page} totalPages={pg.totalPages} onChange={pg.setPage} total={pg.total} />
        </div>
      )}
    </div>
  );
}

  const [editingItem, setEditingItem] = useState(null);
  const addPosition=(role)=>{if(!newTitle.trim())return;const next={...positions,[role]:[...(positions[role]||[]),{id:generateId(),title:newTitle.trim()}]};setPositions(next);setNewTitle("");};
  const removePosition=(role,id)=>{const next={...positions,[role]:positions[role].filter(p=>p.id!==id)};setPositions(next);};
  const addClassRank=()=>{if(!newClassRankTitle.trim())return;setClassRanks([...(classRanks||[]),{id:generateId(),title:newClassRankTitle.trim()}]);setNewClassRankTitle("");};
  const removeClassRank=(id)=>setClassRanks((classRanks||[]).filter(rank=>rank.id!==id));
  const addMedal=()=>{if(!newMedalTitle.trim())return;setMedals([...(medals||[]),{id:generateId(),title:newMedalTitle.trim()}]);setNewMedalTitle("");};
  const removeMedal=(id)=>setMedals((medals||[]).filter(medal=>medal.id!==id));
  const startEditItem = (payload) => setEditingItem({ ...payload, value: payload.title });
  const cancelEditItem = () => setEditingItem(null);
  const saveEditItem = () => {
    const title = editingItem?.value?.trim();
    if (!editingItem || !title) return;
    if (editingItem.type === "position") {
      const next = {
        ...positions,
        [editingItem.role]: (positions?.[editingItem.role] || []).map(item => item.id === editingItem.id ? { ...item, title } : item),
      };
      setPositions(next);
    } else if (editingItem.type === "classRank") {
      setClassRanks((classRanks || []).map(item => item.id === editingItem.id ? { ...item, title } : item));
    } else if (editingItem.type === "medal") {
      setMedals((medals || []).map(item => item.id === editingItem.id ? { ...item, title } : item));
    }
    setEditingItem(null);
  };
  const isEditingItem = (type, id, role = null) => editingItem?.type === type && editingItem?.id === id && (role === null || editingItem?.role === role);
  const directoryItemStyle = {display:"flex",alignItems:"center",gap:8,padding:"8px 14px",background:C.bgInput,borderRadius:8,fontSize:T.body,color:C.text};
  const iconActionStyle = {cursor:"pointer",color:C.textMuted,fontSize:T.body,lineHeight:1,padding:"0 2px",userSelect:"none"};
  const compactActionStyle = { ...btn("ghost"), padding: "7px 10px", fontSize: T.meta };
  const renderDirectoryItem = ({ key, title, onEdit, onDelete, editing, editValue, onEditChange, onSave, onCancel }) => (
    <div key={key} style={{ ...directoryItemStyle, flexWrap: "wrap" }}>
      {editing ? (
        <>
          <input
            style={{ ...S.input, minWidth: 220, height: 38, padding: "8px 12px" }}
            value={editValue}
            onChange={onEditChange}
            onKeyDown={e => {
              if (e.key === "Enter") onSave();
              if (e.key === "Escape") onCancel();
            }}
            autoFocus
          />
          <button type="button" className="btn-hover" style={compactActionStyle} onClick={onSave}>Сохранить</button>
          <button type="button" className="btn-hover" style={compactActionStyle} onClick={onCancel}>Отмена</button>
        </>
      ) : (
        <>
          <span>{title}</span>
          <span onClick={onEdit} title="Редактировать" style={iconActionStyle}>✎</span>
          <span onClick={onDelete} title="Удалить" style={iconActionStyle}>✕</span>
        </>
      )}
    </div>
  );

  return(
    <div className={embedded ? "" : "fade-in"}>
      {!embedded && <><h1 className="resp-page-title" style={S.pageTitle}>Должности</h1><p style={S.pageSubtitle}>Управление должностями для каждого уровня доступа</p></>}
      <div className="resp-card" style={{ ...S.card, borderLeft: `3px solid ${C.blue}` }}>
        <div style={{ fontSize: T.body, color: C.textMuted, lineHeight: 1.6 }}>
          Системный администратор теперь назначается как дополнительная функция в профиле сотрудника. В справочнике должностей остаются только фактические должности прокуратуры.
        </div>
      </div>
      {MANAGED_ROLE_OPTIONS.map(role=>(
        <div key={role} style={{...S.card,borderLeft:`3px solid ${role==="FEDERAL"?C.gold:role==="BOSS"?C.accentLight:C.blue}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={S.cardTitle}><RoleBadge role={role}/> <span style={{marginLeft:8}}>Должности</span></div>
            <button className="btn-hover" style={btn("ghost")} onClick={()=>setEditRole(editRole===role?null:role)}>{editRole===role?"Скрыть":"+ Добавить"}</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{(positions[role]||[]).map(p=>(
            renderDirectoryItem({
              key: p.id,
              title: p.title,
              editing: isEditingItem("position", p.id, role),
              editValue: editingItem?.value || "",
              onEditChange: e => setEditingItem(prev => ({ ...prev, value: e.target.value })),
              onSave: saveEditItem,
              onCancel: cancelEditItem,
              onEdit: () => startEditItem({ type: "position", role, id: p.id, title: p.title }),
              onDelete: () => setConfirmDelete({role,position:p}),
            })
          ))}</div>
          {editRole===role&&(<div style={{display:"flex",gap:8,marginTop:12}}><input style={{...S.input,flex:1}} value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="Название должности" onKeyDown={e=>e.key==="Enter"&&addPosition(role)}/><button className="btn-hover" style={btn("gold")} onClick={()=>addPosition(role)}>Добавить</button></div>)}
        </div>
      ))}
      <div style={{...S.card,borderLeft:`3px solid ${C.accentLight}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={S.cardTitle}>Классные чины</div>
          <button className="btn-hover" style={btn("ghost")} onClick={()=>setShowClassRanksForm(prev=>!prev)}>{showClassRanksForm?"Скрыть":"+ Добавить"}</button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{(classRanks||[]).map(rank=>(
          renderDirectoryItem({
            key: rank.id,
            title: rank.title,
            editing: isEditingItem("classRank", rank.id),
            editValue: editingItem?.value || "",
            onEditChange: e => setEditingItem(prev => ({ ...prev, value: e.target.value })),
            onSave: saveEditItem,
            onCancel: cancelEditItem,
            onEdit: () => startEditItem({ type: "classRank", id: rank.id, title: rank.title }),
            onDelete: () => setConfirmDelete({type:"classRank",item:rank}),
          })
        ))}</div>
        {showClassRanksForm&&(<div style={{display:"flex",gap:8,marginTop:12}}><input style={{...S.input,flex:1}} value={newClassRankTitle} onChange={e=>setNewClassRankTitle(e.target.value)} placeholder="Название классного чина" onKeyDown={e=>e.key==="Enter"&&addClassRank()}/><button className="btn-hover" style={btn("gold")} onClick={addClassRank}>Добавить</button></div>)}
      </div>
      <div style={{...S.card,borderLeft:`3px solid ${C.gold}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={S.cardTitle}>Медали</div>
          <button className="btn-hover" style={btn("ghost")} onClick={()=>setShowMedalsForm(prev=>!prev)}>{showMedalsForm?"Скрыть":"+ Добавить"}</button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{(medals||[]).map(medal=>(
          renderDirectoryItem({
            key: medal.id,
            title: medal.title,
            editing: isEditingItem("medal", medal.id),
            editValue: editingItem?.value || "",
            onEditChange: e => setEditingItem(prev => ({ ...prev, value: e.target.value })),
            onSave: saveEditItem,
            onCancel: cancelEditItem,
            onEdit: () => startEditItem({ type: "medal", id: medal.id, title: medal.title }),
            onDelete: () => setConfirmDelete({type:"medal",item:medal}),
          })
        ))}</div>
        {showMedalsForm&&(<div style={{display:"flex",gap:8,marginTop:12}}><input style={{...S.input,flex:1}} value={newMedalTitle} onChange={e=>setNewMedalTitle(e.target.value)} placeholder="Название медали" onKeyDown={e=>e.key==="Enter"&&addMedal()}/><button className="btn-hover" style={btn("gold")} onClick={addMedal}>Добавить</button></div>)}
      </div>
      {confirmDelete&&(<Modal onClose={()=>setConfirmDelete(null)} maxWidth={540}><div style={S.cardTitle}>{confirmDelete.type==="classRank"?"Удалить классный чин?":confirmDelete.type==="medal"?"Удалить медаль?":"Удалить должность?"}</div><div style={{display:"flex",flexDirection:"column",gap:14,marginTop:12}}><div style={{padding:"14px 16px",background:C.bgInput,borderRadius:8,color:C.text,fontSize:T.body}}>{confirmDelete.type==="classRank" ? <>Классный чин <span style={{color:C.gold,fontWeight:700}}>{confirmDelete.item.title}</span> будет удалён из справочника. Это действие нельзя отменить.</> : confirmDelete.type==="medal" ? <>Медаль <span style={{color:C.gold,fontWeight:700}}>{confirmDelete.item.title}</span> будет удалена из справочника. Это действие нельзя отменить.</> : <>Должность <span style={{color:C.gold,fontWeight:700}}>{confirmDelete.position.title}</span> будет удалена из роли <span style={{color:C.text,fontWeight:700}}>{ROLE_LABELS[confirmDelete.role] || confirmDelete.role}</span>. Это действие нельзя отменить.</>}</div><div style={S.row}><button className="btn-hover btn-row" style={btn("danger")} onClick={()=>{if(confirmDelete.type==="classRank")removeClassRank(confirmDelete.item.id);else if(confirmDelete.type==="medal")removeMedal(confirmDelete.item.id);else removePosition(confirmDelete.role,confirmDelete.position.id);setConfirmDelete(null);}}>Удалить</button></div></div></Modal>)}
    </div>
  );
}

/* ═══════════════ PAGE: CRITERIA ═══════════════ */
function PageFactions({ factions, setFactions, embedded = false }) {
  const [name, setName] = useState("");
  const [editingFaction, setEditingFaction] = useState(null);
  const activeFactions = (factions || []).filter(item => item.active !== false);
  const addFaction = () => {
    const trimmed = name.trim();
    if (!trimmed) return;
    const exists = (factions || []).some(item => item.name.toLowerCase() === trimmed.toLowerCase());
    if (exists) return;
    setFactions([...(factions || []), { id: generateId(), name: trimmed, active: true }]);
    setName("");
  };
  const toggleFaction = (factionId) => {
    setFactions((factions || []).map(item => item.id === factionId ? { ...item, active: item.active === false ? true : false } : item));
  };
  const removeFaction = (factionId) => {
    setFactions((factions || []).filter(item => item.id !== factionId));
  };
  const startEditFaction = (item) => {
    setEditingFaction({ id: item.id, value: item.name });
  };
  const cancelEditFaction = () => {
    setEditingFaction(null);
  };
  const saveEditFaction = () => {
    const trimmed = editingFaction?.value?.trim();
    if (!editingFaction || !trimmed) return;
    const exists = (factions || []).some(item => item.id !== editingFaction.id && item.name.toLowerCase() === trimmed.toLowerCase());
    if (exists) return;
    setFactions((factions || []).map(item => item.id === editingFaction.id ? { ...item, name: trimmed } : item));
    setEditingFaction(null);
  };

  return (
    <div className={embedded ? "" : "fade-in"}>
      {!embedded && (
        <>
          <h1 className="resp-page-title" style={S.pageTitle}>Фракции</h1>
          <p style={S.pageSubtitle}>Справочник организаций для событий и аналитики.</p>
        </>
      )}
      <div className="stat-row" style={{ ...S.row, marginBottom: 16 }}>
        <StatBox value={activeFactions.length} label="Активных фракций" color={C.success} />
        <StatBox value={(factions || []).length} label="Всего в справочнике" color={C.blue} />
      </div>
      <div className="resp-card" style={S.card}>
        <div style={S.cardTitle}>Добавить фракцию</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 12 }}>
          <input style={{ ...S.input, flex: "1 1 320px" }} value={name} onChange={e => setName(e.target.value)} placeholder="Название фракции" />
          <button className="btn-hover" style={btn("gold")} onClick={addFaction}>Добавить</button>
        </div>
      </div>
      <div className="resp-card" style={S.card}>
        <div style={S.cardTitle}>Список фракций</div>
        <div className="responsive-table-wrap">
        <table style={S.table}>
          <thead>
            <tr>
              <th style={S.th}>Название</th>
              <th style={S.th}>Статус</th>
              <th style={S.th}>Действия</th>
            </tr>
          </thead>
          <tbody>
            {(factions || []).map(item => (
              <tr key={item.id} className="row-hover">
                <td data-label="Название" style={{ ...S.td, color: C.text }}>
                  {editingFaction?.id === item.id ? (
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                      <input
                        style={{ ...S.input, minWidth: 240, height: 38, padding: "8px 12px" }}
                        value={editingFaction.value}
                        onChange={e => setEditingFaction(prev => ({ ...prev, value: e.target.value }))}
                        onKeyDown={e => {
                          if (e.key === "Enter") saveEditFaction();
                          if (e.key === "Escape") cancelEditFaction();
                        }}
                        autoFocus
                      />
                      <button className="btn-hover" style={{ ...btn("ghost"), padding: "7px 10px", fontSize: T.meta }} onClick={saveEditFaction}>Сохранить</button>
                      <button className="btn-hover" style={{ ...btn("ghost"), padding: "7px 10px", fontSize: T.meta }} onClick={cancelEditFaction}>Отмена</button>
                    </div>
                  ) : (
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span>{item.name}</span>
                      <span onClick={() => startEditFaction(item)} title="Редактировать" style={{ cursor: "pointer", color: C.textMuted, fontSize: T.body, lineHeight: 1, padding: "0 2px", userSelect: "none" }}>✎</span>
                    </div>
                  )}
                </td>
                <td data-label="Статус" style={S.td}><span style={badge(item.active === false ? C.textMuted : C.success)}>{item.active === false ? "Скрыта" : "Активна"}</span></td>
                <td data-label="Действия" style={S.td}>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button className="btn-hover" style={btn(item.active === false ? "success" : "ghost")} onClick={() => toggleFaction(item.id)}>
                      {item.active === false ? "Включить" : "Скрыть"}
                    </button>
                    <button className="btn-hover" style={btn("danger")} onClick={() => removeFaction(item.id)}>Удалить</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

function PageCriteria({ criteria, setCriteria, embedded = false }) {
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({role:"STAFF",name:"",description:""});
  const [confirmDelete,setConfirmDelete]=useState(null);
  const addCriteria=()=>{
    if(!form.name.trim()) return;
    setCriteria([...criteria,{id:generateId(),role:form.role,name:form.name.trim(),description:form.description.trim()}]);
    setForm({role:"STAFF",name:"",description:""});
    setShowAdd(false);
  };
  const removeCriteria=(id)=>{setCriteria(criteria.filter(c=>c.id!==id));};
  const groupedByRole = ["STAFF", "BOSS"].map(role => ({
    role,
    count: criteria.filter(c => (c.role || "STAFF") === role).length,
  }));

  return(
    <div className={embedded ? "" : "fade-in"}>
      {!embedded && <><h1 className="resp-page-title" style={S.pageTitle}>Критерии отчётности</h1><p style={S.pageSubtitle}>Настройка направлений ежемесячной отчётности по ролям</p></>}
      <div className="stat-row" style={{...S.row,marginBottom:16}}>
        <StatBox value={criteria.length} label="Критериев"/>
        {groupedByRole.map(item => <StatBox key={item.role} value={item.count} label={ROLE_LABELS[item.role]} color={item.count > 0 ? C.success : C.warning} />)}
      </div>
      <button className="btn-hover" style={{...btn("gold"),marginBottom:16}} onClick={()=>setShowAdd(true)}>+ Добавить критерий</button>
      <div className="responsive-table-wrap">
      <div className="resp-card" style={S.card}><table style={S.table}><thead><tr><th style={S.th}>Роль</th><th style={S.th}>Название</th><th style={S.th}>Описание</th><th style={S.th}>Действия</th></tr></thead>
        <tbody>{criteria.map(c=>(<tr key={c.id} className="row-hover"><td data-label="Роль" style={S.td}><RoleBadge role={c.role || "STAFF"}/></td><td data-label="Название" style={{...S.td,color:C.text,fontWeight:600}}>{c.name}</td><td data-label="Описание" style={S.td}>{c.description||"—"}</td><td data-label="Действия" style={S.td}><button className="btn-hover" style={btn("danger")} onClick={()=>setConfirmDelete(c)}>Удалить</button></td></tr>))}</tbody></table></div>
        </div>
      {showAdd&&(<Modal onClose={()=>setShowAdd(false)}><div style={S.cardTitle}>Новый критерий</div><div style={{display:"flex",flexDirection:"column",gap:12,marginTop:12}}>
        <div><label style={S.label}>Роль</label><select style={S.select} value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))}><option value="STAFF">STAFF</option><option value="SENIOR_STAFF">SENIOR_STAFF</option><option value="BOSS">BOSS</option></select></div>
        <div><label style={S.label}>Название</label><input style={S.input} value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
        <div><label style={S.label}>Описание</label><textarea style={S.textarea} value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/></div>
        <div style={S.row}><button className="btn-hover btn-row" style={btn("gold")} onClick={addCriteria}>Создать</button></div>
      </div></Modal>)}
      {confirmDelete&&(<Modal onClose={()=>setConfirmDelete(null)} maxWidth={560}><div style={S.cardTitle}>Удалить критерий отчётности?</div><div style={{display:"flex",flexDirection:"column",gap:14,marginTop:12}}><div style={{padding:"14px 16px",background:C.bgInput,borderRadius:8,color:C.text,fontSize:T.body}}>Критерий <span style={{color:C.gold,fontWeight:700}}>{confirmDelete.name}</span> для роли <span style={{color:C.text,fontWeight:700}}>{ROLE_LABELS[confirmDelete.role || "STAFF"] || confirmDelete.role || "STAFF"}</span> будет удалён. Это действие нельзя отменить.</div><div style={S.row}><button className="btn-hover btn-row" style={btn("danger")} onClick={()=>{removeCriteria(confirmDelete.id);setConfirmDelete(null);}}>Удалить</button></div></div></Modal>)}
    </div>
  );
}

    reportDeadlineDay: String(bonusSettings.reportDeadlineDay || DEFAULT_BONUS_SETTINGS.reportDeadlineDay),

    setForm({
      reportDeadlineDay: String(bonusSettings.reportDeadlineDay || DEFAULT_BONUS_SETTINGS.reportDeadlineDay),

        <StatBox value={formatCurrency(REPORT_BASE_AMOUNTS.FEDERAL)} label="База FEDERAL" color={C.gold} />

      <div className="resp-card" style={S.card}><div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{padding:"14px 16px",background:C.bgInput,borderRadius:8}}>

          <div style={{fontSize:T.body,color:C.textDim,marginTop:6}}>BOSS: отчёт → Генеральная прокуратура.</div>

          <div style={{fontSize:T.bodyStrong,color:C.text,marginBottom:12}}>Дедлайн месячного отчёта</div>

              <label style={S.label}>День месяца</label>
              <input style={S.input} type="number" min="1" max="31" step="1" value={form.reportDeadlineDay} onChange={e=>setForm(prev=>({...prev,reportDeadlineDay:e.target.value.replace(/[^\d]/g, "")}))} />

              <label style={S.label}>Время</label>

          <div style={{fontSize:T.bodyStrong,color:C.text,marginBottom:8}}>Премирование</div>
          <div style={{fontSize:T.body,color:C.textDim}}>Коэффициент задаётся в диапазоне от 0x до 2x с шагом 0.25x.</div>
          <div style={{fontSize:T.body,color:C.textDim,marginTop:6}}>При наличии наград можно добавить отдельную дополнительную премию и комментарий.</div>
          <div style={{fontSize:T.body,color:C.textDim,marginTop:6}}>Финальное решение и право возврата на доработку находятся у Генеральной прокуратуры.</div>
        </div>

}

/* ═══════════════ PAGE: MAINTENANCE ═══════════════ */
function PageMaintenance({ users, reports, bonuses, setReports, setBonuses, auditLog, setAuditLog, bonusSettings, setBonusSettings, addAudit, embedded = false }) {
  const [confirmAction,setConfirmAction]=useState(null);
  const [confirmPassword, setConfirmPassword] = useState("");
  const [confirmPasswordError, setConfirmPasswordError] = useState("");
  const [confirmPasswordBusy, setConfirmPasswordBusy] = useState(false);
  const [maintenanceNotice, setMaintenanceNotice] = useState({ text: "", tone: "success" });
  const [scheduleForm, setScheduleForm] = useState({
    scheduledAt: toDateTimeLocalValue(bonusSettings.maintenanceScheduledAt),
    announcement: bonusSettings.maintenanceAnnouncement || "",
  });
  const maintenanceNoticeTimerRef = useRef(null);
  const maintenanceStatus = useMemo(() => getMaintenanceStatus(bonusSettings), [bonusSettings]);
  useEffect(() => {
    setScheduleForm({
      scheduledAt: toDateTimeLocalValue(bonusSettings.maintenanceScheduledAt),
      announcement: bonusSettings.maintenanceAnnouncement || "",
    });
  }, [bonusSettings.maintenanceScheduledAt, bonusSettings.maintenanceAnnouncement]);
  useEffect(() => () => {
    if (maintenanceNoticeTimerRef.current) clearTimeout(maintenanceNoticeTimerRef.current);
  }, []);
  const showMaintenanceNotice = (text, tone = "success") => {
    setMaintenanceNotice({ text, tone });
    if (maintenanceNoticeTimerRef.current) clearTimeout(maintenanceNoticeTimerRef.current);
    maintenanceNoticeTimerRef.current = window.setTimeout(() => setMaintenanceNotice({ text: "", tone: "success" }), 3200);
  };
  const resetDangerConfirm = () => {
    if (confirmPasswordBusy) return;
    setConfirmAction(null);
    setConfirmPassword("");
    setConfirmPasswordError("");
  };
  const openDangerConfirm = (actionId) => {
    setConfirmAction(actionId);
    setConfirmPassword("");
    setConfirmPasswordError("");
  };
  const doAction=(action)=>{
    if(action==="clearReports"){setReports([]);}
    if(action==="clearBonuses"){setBonuses([]);}
    if(action==="clearAudit"){setAuditLog([]);}
    if(action==="resetAll"){setReports([]);setBonuses([]);setAuditLog([]);}
    setConfirmAction(null);
    setConfirmPassword("");
    setConfirmPasswordError("");
  };
  const toggleMaintenanceMode = () => {
    const nextEnabled = !bonusSettings.maintenanceEnabled;
    setBonusSettings(sanitizeBonusSettings({
      ...bonusSettings,
      maintenanceEnabled: nextEnabled,
      maintenanceGif: bonusSettings.maintenanceGif || "download.gif",
      maintenanceScheduledAt: "",
      maintenanceActivatedAt: nextEnabled ? new Date().toISOString() : "",
      maintenanceAnnouncement: scheduleForm.announcement.trim() || bonusSettings.maintenanceAnnouncement || "",
    }, bonusSettings));
    setMaintenanceNotice(nextEnabled ? "Режим техработ включён на сайте." : "Режим техработ выключен.");
    if (addAudit) {
      addAudit(`Режим техработ ${nextEnabled ? "включён" : "выключен"} на сайте`);
    }
    window.setTimeout(() => setMaintenanceNotice(""), 2500);
  };
  const saveMaintenanceSchedule = () => {
    if (!scheduleForm.scheduledAt) {
      showMaintenanceNotice("Укажите дату и время запуска техработ.", "danger");
      return;
    }
    const scheduledDate = new Date(scheduleForm.scheduledAt);
    if (Number.isNaN(scheduledDate.getTime())) {
      showMaintenanceNotice("Не удалось распознать дату запуска техработ.", "danger");
      return;
    }
    const now = new Date();
    const shouldStartImmediately = scheduledDate.getTime() <= now.getTime();
    const announcement = scheduleForm.announcement.trim();
    setBonusSettings(sanitizeBonusSettings({
      ...bonusSettings,
      maintenanceEnabled: shouldStartImmediately,
      maintenanceGif: bonusSettings.maintenanceGif || "download.gif",
      maintenanceScheduledAt: shouldStartImmediately ? "" : scheduledDate.toISOString(),
      maintenanceAnnouncement: announcement,
      maintenanceActivatedAt: shouldStartImmediately ? now.toISOString() : "",
    }, bonusSettings));
    if (addAudit) {
      addAudit(
        shouldStartImmediately
          ? `Техработы запущены сразу при сохранении расписания${announcement ? `: ${announcement}` : ""}`
          : `Техработы запланированы на ${formatDateTime(scheduledDate)}${announcement ? `: ${announcement}` : ""}`
      );
    }
    showMaintenanceNotice(
      shouldStartImmediately
        ? "Указанное время уже наступило, техработы включены сразу."
        : `Техработы запланированы на ${formatDateTime(scheduledDate)}.`,
      shouldStartImmediately ? "warning" : "success"
    );
  };
  const clearMaintenanceSchedule = () => {
    const hasPlannedMaintenance = Boolean(bonusSettings.maintenanceScheduledAt || scheduleForm.scheduledAt || (!bonusSettings.maintenanceEnabled && scheduleForm.announcement.trim()));
    if (!hasPlannedMaintenance) {
      showMaintenanceNotice("Расписание техработ не задано.", "warning");
      return;
    }
    const next = sanitizeBonusSettings({
      ...bonusSettings,
      maintenanceScheduledAt: "",
      maintenanceAnnouncement: bonusSettings.maintenanceEnabled ? (bonusSettings.maintenanceAnnouncement || scheduleForm.announcement.trim()) : "",
    }, bonusSettings);
    setBonusSettings(next);
    setScheduleForm({ scheduledAt: "", announcement: next.maintenanceAnnouncement || "" });
    if (addAudit) addAudit("Расписание техработ очищено");
    showMaintenanceNotice("Запланированные техработы сняты с расписания.", "success");
  };
  const actions=[
    {id:"clearReports",label:"Очистить все отчёты",desc:`Удалить ${reports.length} отчётов`,color:C.warning},
    {id:"clearBonuses",label:"Очистить все премии",desc:`Удалить ${bonuses.length} записей о премиях`,color:C.warning},
    {id:"clearAudit",label:"Очистить журнал аудита",desc:`Удалить ${auditLog.length} записей`,color:C.warning},
    {id:"resetAll",label:"Полный сброс данных",desc:"Удалить все отчёты, премии и логи",color:C.danger},
  ];
  const currentDangerAction = actions.find(item => item.id === confirmAction) || null;
  const confirmDangerAction = async () => {
    if (!confirmAction || confirmPasswordBusy) return;
    if (!confirmPassword.trim()) {
      setConfirmPasswordError("Введите служебный пароль.");
      return;
    }
    setConfirmPasswordBusy(true);
    setConfirmPasswordError("");
    try {
      await apiRequest("verify-maintenance-action-password", { password: confirmPassword.trim() });
      doAction(confirmAction);
    } catch (error) {
      setConfirmPasswordError(error.message || "Не удалось подтвердить действие.");
    } finally {
      setConfirmPasswordBusy(false);
    }
  };
  const maintenanceNoticeText = typeof maintenanceNotice === "string" ? maintenanceNotice : (maintenanceNotice?.text || "");
  const maintenanceNoticeTone = typeof maintenanceNotice === "string" ? "success" : (maintenanceNotice?.tone || "success");
  const maintenanceNoticeColor = maintenanceNoticeTone === "danger" ? C.danger : maintenanceNoticeTone === "warning" ? C.warning : C.success;
  const maintenanceStatusColor = maintenanceStatus.isActive ? C.warning : maintenanceStatus.isPlanned ? C.blue : C.success;
  return(
    <div className={embedded ? "" : "fade-in"}>
      {!embedded && <><h1 className="resp-page-title" style={S.pageTitle}>Техработы</h1><p style={S.pageSubtitle}>Обслуживание системы и управление данными</p></>}
      <div className="stat-row" style={{...S.row,marginBottom:16}}><StatBox value={users.length} label="Пользователей"/><StatBox value={reports.length} label="Отчётов" color={C.blue}/><StatBox value={bonuses.length} label="Премий" color={C.gold}/><StatBox value={auditLog.length} label="Записей аудита" color={C.accentLight}/></div>
      {maintenanceNoticeText && <div style={{ padding: "12px 16px", background: `${maintenanceNoticeColor}22`, border: `1px solid ${maintenanceNoticeColor}44`, borderRadius: 8, color: maintenanceNoticeColor, fontSize: T.body, marginBottom: 18 }}>{maintenanceNoticeText}</div>}
      <div className="resp-card" style={{ ...S.card, borderLeft: `3px solid ${maintenanceStatusColor}` }}>
        <div style={S.cardTitle}>Режим техработ на сайте</div>
        <div className="resp-grid resp-grid-2col" style={{ display: "grid", gridTemplateColumns: "minmax(0, 1.2fr) minmax(220px, 0.8fr)", gap: 18, alignItems: "center" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ fontSize: T.body, color: C.text }}>
              Статус: <span style={{ color: maintenanceStatus.isActive ? C.warning : maintenanceStatus.isPlanned ? C.blueLight : C.success, fontWeight: 700 }}>{maintenanceStatus.isActive ? "включён" : maintenanceStatus.isPlanned ? "запланирован" : "выключен"}</span>
            </div>
            {maintenanceStatus.isPlanned && maintenanceStatus.scheduledAt && (
              <div style={{ fontSize: T.body, color: C.textDim }}>
                Автозапуск: <span style={{ color: C.text }}>{formatDateTime(maintenanceStatus.scheduledAt)}</span>
              </div>
            )}
            {maintenanceStatus.isActive && maintenanceStatus.activatedAt && (
              <div style={{ fontSize: T.body, color: C.textDim }}>
                Активирован: <span style={{ color: C.text }}>{formatDateTime(maintenanceStatus.activatedAt)}</span>
              </div>
            )}
            <div style={{ fontSize: T.body, color: C.textDim }}>
          При включении техработ пользователи увидят отдельную страницу обслуживания. Системный администратор и пользователи с флагом «Тестер» сохранят доступ к системе для управления и проверки режима.
            </div>
            <div style={{ fontSize: T.meta, color: C.textMuted }}>
              GIF для страницы техработ: <span style={{ color: C.gold }}>{bonusSettings.maintenanceGif || "download.gif"}</span>
            </div>
            <div style={S.row}>
              <button className="btn-hover" style={btn(bonusSettings.maintenanceEnabled ? "danger" : "gold")} onClick={toggleMaintenanceMode}>
                {bonusSettings.maintenanceEnabled ? "Выключить техработы" : "Включить техработы"}
              </button>
            </div>
          </div>
          <div style={{ background: C.bgInput, border: `1px solid ${C.border}`, borderRadius: 12, padding: 12, display: "flex", justifyContent: "center", alignItems: "center", minHeight: 220 }}>
            <img src={bonusSettings.maintenanceGif || "download.gif"} alt="Техработы" style={{ maxWidth: "100%", maxHeight: 240, objectFit: "contain", borderRadius: 10 }} />
          </div>
        </div>
      </div>
      <div className="resp-card" style={S.card}>
        <div style={S.cardTitle}>Планирование техработ</div>
        <div style={{ fontSize: T.body, color: C.textDim, marginBottom: 16 }}>
          Укажите дату запуска и текст объявления. После сохранения все пользователи увидят уведомление в системе, а страница входа покажет предупреждение до начала работ.
        </div>
        <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 16 }}>
          <div>
            <label style={S.label}>Дата и время запуска</label>
            <input type="datetime-local" style={S.input} value={scheduleForm.scheduledAt} onChange={e => setScheduleForm(prev => ({ ...prev, scheduledAt: e.target.value }))} />
          </div>
          <div>
            <label style={S.label}>Текст уведомления</label>
            <textarea style={S.textarea} value={scheduleForm.announcement} onChange={e => setScheduleForm(prev => ({ ...prev, announcement: e.target.value }))} placeholder="Например: обновляем систему премирования, ожидайте завершения техработ." />
          </div>
        </div>
        {maintenanceStatus.isPlanned && maintenanceStatus.scheduledAt && (
          <div style={{ marginTop: 14, padding: "12px 14px", background: C.blue + "16", border: `1px solid ${C.blue}33`, borderRadius: 10, color: C.blueLight, fontSize: T.body }}>
            Ближайший автозапуск: {formatDateTime(maintenanceStatus.scheduledAt)}.
          </div>
        )}
        <div className="btn-row" style={{ ...S.row, marginTop: 16 }}>
          <button className="btn-hover" style={btn("gold")} onClick={saveMaintenanceSchedule}>Сохранить расписание</button>
          <button className="btn-hover" style={btn("ghost")} onClick={clearMaintenanceSchedule}>Очистить расписание</button>
        </div>
      </div>
      <div className="resp-card" style={S.card}><div style={S.cardTitle}>Действия</div><div style={{display:"flex",flexDirection:"column",gap:10}}>
        {actions.map(a=>(<div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",background:C.bgInput,borderRadius:8,gap:16}}>
          <div><div style={{fontSize:T.body,color:C.text}}>{a.label}</div><div style={{fontSize:T.meta,color:C.textMuted}}>{a.desc}</div></div>
          <button className="btn-hover" style={btn("danger")} onClick={()=>openDangerConfirm(a.id)}>Выполнить</button>
        </div>))}
      </div></div>
      {confirmAction&&(<Modal onClose={resetDangerConfirm} maxWidth={560}><div style={S.cardTitle}>Служебное подтверждение</div><div style={{display:"flex",flexDirection:"column",gap:14,marginTop:14}}><div style={{color:C.text,fontSize:T.bodyStrong}}>{currentDangerAction?.label || "Опасное действие"}</div><div style={{color:C.textDim,fontSize:T.body,lineHeight:1.6}}>Для выполнения этого действия введите служебный пароль. Действие необратимо.</div><input type="password" style={S.input} value={confirmPassword} onChange={e=>{setConfirmPassword(e.target.value); if(confirmPasswordError) setConfirmPasswordError("");}} placeholder="Служебный пароль" autoFocus />{confirmPasswordError&&<div style={{color:C.dangerLight,fontSize:T.meta}}>{confirmPasswordError}</div>}<div style={S.row}><button className="btn-hover btn-row" style={btn("danger")} onClick={confirmDangerAction} disabled={confirmPasswordBusy}>{confirmPasswordBusy?"Проверка...":"Подтвердить удаление"}</button></div></div></Modal>)}
    </div>
  );
}

function PageAdminPanel({
  currentUser,
  users,
  registrationRequests,
  reports,
  bonuses,
  factions,
  positions,
  classRanks,
  medals,
  criteria,
  bonusSettings,
  auditLog,
  setRegistrationRequests,
  setUsers,
  setUsersManaged,
  setFactions,
  setPositions,
  setClassRanks,
  setMedals,
  setCriteria,
  setBonusSettings,
  setReports,
  setBonuses,
  setAuditLog,
  addAudit,
  initialSection,
  onSectionChange,
}) {
  const resolvedInitialSection = getAdminPanelSection(initialSection).id;
  const [activeSection, setActiveSection] = useState(resolvedInitialSection);
  const pendingRequests = registrationRequests.filter(request => request.status === "pending").length;
  const activeUsers = users.filter(user => !user.blocked).length;
  const factionsCount = (factions || []).length;
  const positionsCount = Object.values(positions || {}).reduce((sum, items) => sum + (items?.length || 0), 0);
  const criteriaCount = (criteria || []).length;
  const returnedReports = reports.filter(report => ["returned_boss", "returned_author"].includes(getReportStatusValue(report))).length;

  const jumpToSection = (sectionId, behavior = "smooth") => {
    const resolvedSection = getAdminPanelSection(sectionId).id;
    setActiveSection(resolvedSection);
    if (typeof onSectionChange === "function") onSectionChange(resolvedSection);
    const target = document.getElementById(`admin-section-${resolvedSection}`);
    if (target) {
      target.scrollIntoView({ behavior, block: "start" });
    }
  };

  useEffect(() => {
    const nextSection = getAdminPanelSection(initialSection).id;
    setActiveSection(nextSection);
    if (typeof onSectionChange === "function") onSectionChange(nextSection);
    if (!initialSection) return;
    const frame = window.requestAnimationFrame(() => {
      const target = document.getElementById(`admin-section-${nextSection}`);
      if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    return () => window.cancelAnimationFrame(frame);
  }, [initialSection, onSectionChange]);

  const sectionStyles = (sectionId) => {
    const section = ADMIN_PANEL_SECTIONS.find(s => s.id === sectionId);
    const isDanger = sectionId === "maintenance";
    const sectionColor = section?.color || C.border;
    return {
      marginBottom: 32,
      padding: isDanger ? "18px 20px 8px" : "12px 0 0 16px",
      borderRadius: isDanger ? 18 : 0,
      border: isDanger ? `1px solid ${C.danger}44` : "none",
      borderLeft: isDanger ? undefined : `4px solid ${sectionColor}44`,
      background: isDanger ? `${C.danger}10` : "transparent",
      scrollMarginTop: 80,
    };
  };

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Администрирование</h1>
      <p style={S.pageSubtitle}>Единая операционная панель системного администратора с быстрым доступом к пользователям, заявкам и настройкам.</p>

      <div className="stat-row" style={{ ...S.row, marginBottom: 18 }}>
        <StatBox value={pendingRequests} label="Заявок в очереди" color={pendingRequests > 0 ? C.warning : C.success} />
        <StatBox value={activeUsers} label="Активных пользователей" color={C.blue} />
        <StatBox value={factionsCount} label="Фракций" color={C.blueLight || C.blue} />
        <StatBox value={positionsCount} label="Должностей" color={C.gold} />
        <StatBox value={criteriaCount} label="Критериев" color={C.accentLight} />
        <StatBox value={auditLog.length} label="Событий аудита" color={C.blue} />
        <StatBox value={returnedReports} label="Отчётов на доработке" color={returnedReports > 0 ? C.danger : C.success} />
      </div>

      <div className="resp-card admin-sticky-nav" style={{ ...S.card, marginBottom: 24, position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {ADMIN_PANEL_SECTIONS.map(section => (
            <button
              key={section.id}
              className="btn-hover"
              style={{ ...btn(activeSection === section.id ? "gold" : "ghost"), padding: "8px 14px", fontSize: T.meta }}
              onClick={() => jumpToSection(section.id)}
            >
              {section.icon ? <span style={{ marginRight: 4 }}>{section.icon}</span> : null}{section.label}
            </button>
          ))}
        </div>
      </div>

      {ADMIN_PANEL_SECTIONS.map(section => (
        <section key={section.id} id={`admin-section-${section.id}`} style={sectionStyles(section.id)}>
          <div style={{ marginBottom: 14 }}>
            <div style={{ ...S.cardTitle, color: section.id === "maintenance" ? C.dangerLight : C.text }}>{section.icon ? <span style={{ marginRight: 8 }}>{section.icon}</span> : null}{section.label}</div>
            <div style={{ fontSize: T.body, color: C.textMuted, marginTop: 6 }}>{section.description}</div>
          </div>

          {section.id === "registration-requests" && (
            <PageRegistrationRequests
              currentUser={currentUser}
              users={users}
              registrationRequests={registrationRequests}
              setRegistrationRequests={setRegistrationRequests}
              setUsers={setUsers}
              positions={positions}
              addAudit={addAudit}
              embedded
            />
          )}

          {section.id === "users" && (
            <PageUsers
              currentUser={currentUser}
              users={users}
              registrationRequests={registrationRequests}
              setUsers={setUsersManaged}
              positions={positions}
              classRanks={classRanks}
              medals={medals}
              reports={reports}
              bonuses={bonuses}
              setReports={setReports}
              setBonuses={setBonuses}
              addAudit={addAudit}
              embedded
            />
          )}

          {section.id === "factions" && (
            <PageFactions factions={factions} setFactions={setFactions} embedded />
          )}

          {section.id === "positions" && (
            <PagePositions positions={positions} setPositions={setPositions} classRanks={classRanks} setClassRanks={setClassRanks} medals={medals} setMedals={setMedals} embedded />
          )}

          {section.id === "criteria" && (
            <PageCriteria criteria={criteria} setCriteria={setCriteria} embedded />
          )}

          {section.id === "bonus-settings" && (
            <PageBonusSettings bonusSettings={bonusSettings} setBonusSettings={setBonusSettings} embedded />
          )}

          {section.id === "audit-log" && (
            <PageAdminAuditLog auditLog={auditLog} users={users} />
          )}

          {section.id === "notifications-admin" && (
            <PageAdminNotifications users={users} addAudit={addAudit} />
          )}

          {section.id === "maintenance" && (
            <PageMaintenance
              users={users}
              reports={reports}
              bonuses={bonuses}
              setReports={setReports}

/* ═══════════════ ADMIN: AUDIT LOG ═══════════════ */
function PageAdminAuditLog({ auditLog, users }) {
  const [search, setSearch] = useState("");
  const [userFilter, setUserFilter] = useState("");
  const filtered = useMemo(() => {
    const reversed = [...auditLog].reverse();
    return reversed.filter(entry => {
      if (userFilter && entry.userId !== userFilter) return false;
      if (search.trim()) {
        const q = search.trim().toLowerCase();
        if (!(entry.action || "").toLowerCase().includes(q)) return false;
      }
      return true;
    });
  }, [auditLog, search, userFilter]);
  const pg = usePagination(filtered, 20);
  const uniqueUserIds = useMemo(() => [...new Set(auditLog.map(e => e.userId).filter(Boolean))], [auditLog]);
  const getUserName = (uid) => { const u = (users || []).find(u => u.id === uid); return u ? `${u.surname || ""} ${u.name || ""}`.trim() || u.login || uid : uid || "—"; };
  const doExport = () => exportToCsv("audit-log.csv", ["Дата", "Пользователь", "Действие"], filtered.map(e => [formatDateTime(e.date), getUserName(e.userId), e.action]));

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 200px auto", gap: 10, marginBottom: 14, alignItems: "center" }}>
        <input style={S.input} placeholder="Поиск по действиям..." value={search} onChange={e => setSearch(e.target.value)} />
        <select style={S.select} value={userFilter} onChange={e => setUserFilter(e.target.value)}>
          <option value="">Все пользователи</option>
          {uniqueUserIds.map(uid => <option key={uid} value={uid}>{getUserName(uid)}</option>)}
        </select>
        <button className="btn-hover" style={{ ...btn("ghost"), padding: "10px 14px" }} onClick={doExport}>Экспорт CSV</button>
      </div>
      <div style={{ color: C.textMuted, fontSize: T.meta, marginBottom: 10 }}>Найдено: {filtered.length} из {auditLog.length}</div>
      {filtered.length === 0 ? <div style={{ color: C.textMuted }}>Записей не найдено.</div> : (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {pg.paged.map((entry, i) => (
            <div key={`${entry.date}-${i}`} style={{ padding: "10px 14px", background: C.bgInput, borderRadius: 8, display: "flex", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
              <div style={{ flex: 1 }}>
                <div style={{ color: C.textDim, fontSize: T.body }}>{entry.action}</div>
                <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 4 }}>{getUserName(entry.userId)}</div>
              </div>
              <span style={{ color: C.textMuted, whiteSpace: "nowrap", fontSize: T.meta }}>{formatDateTime(entry.date)}</span>
            </div>
          ))}
        </div>
      )}
      {pg.totalPages > 1 ? <Pagination page={pg.page} totalPages={pg.totalPages} onChange={pg.setPage} /> : null}
    </div>
  );
}

/* ═══════════════ ADMIN: NOTIFICATIONS ═══════════════ */
function PageAdminNotifications({ users, addAudit }) {
  const [broadcastForm, setBroadcastForm] = useState({ title: "", body: "", priority: "info", recipientFilter: "all", recipientRole: "", recipientUserId: "" });
  const [sending, setSending] = useState(false);
  const [clearing, setClearing] = useState(false);
  const [result, setResult] = useState("");
  const [stats, setStats] = useState(null);

  const loadStats = useCallback(async () => {
    try {
      const resp = await apiRequestWithParams("checks.notifications.stats", {});
      if (resp.stats) setStats(resp.stats);
    } catch (e) { /* ignore */ }
  }, []);

  useEffect(() => { loadStats(); }, [loadStats]);

  const handleBroadcast = async () => {
    if (!broadcastForm.title.trim() || !broadcastForm.body.trim()) return;
    setSending(true);
    setResult("");
    try {
      const resp = await apiRequestWithParams("checks.notifications.broadcast", {}, {
        title: broadcastForm.title.trim(),
        body: broadcastForm.body.trim(),
        priority: broadcastForm.priority,
        recipientFilter: broadcastForm.recipientFilter,
        recipientRole: broadcastForm.recipientRole,
        recipientUserId: broadcastForm.recipientUserId,
      });
      setResult(resp.ok ? `Отправлено: ${resp.count || 0} уведомлений` : (resp.error || "Ошибка"));
      if (resp.ok) {
        setBroadcastForm(prev => ({ ...prev, title: "", body: "" }));
        addAudit("Массовая рассылка уведомлений: " + broadcastForm.title.trim());
        loadStats();
      }
    } catch (e) { setResult("Ошибка сети"); }
    setSending(false);
  };

  const handleClearRead = async () => {
    setClearing(true);
    try {
      await apiRequestWithParams("checks.notifications.clear-read", {});
      addAudit("Очистка прочитанных уведомлений");
      loadStats();
    } catch (e) { /* ignore */ }
    setClearing(false);
  };

  return (
    <div style={{ display: "grid", gap: 20 }}>
      {stats ? (
        <div className="stat-row" style={{ ...S.row, marginBottom: 0 }}>
          <StatBox value={stats.total || 0} label="Всего уведомлений" color={C.blue} />
          <StatBox value={stats.unread || 0} label="Непрочитанных" color={C.warning} />
          <StatBox value={stats.read || 0} label="Прочитанных" color={C.success} />
        </div>
      ) : null}

      <div style={{ background: C.bgInput, border: `1px solid ${C.border}`, borderRadius: 14, padding: 18 }}>
        <div style={S.cardTitle}>Массовая рассылка</div>
        <div style={{ display: "grid", gap: 12, marginTop: 12 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 160px", gap: 12 }}>
            <div>
              <label style={S.label}>Заголовок</label>
              <input style={S.input} value={broadcastForm.title} onChange={e => setBroadcastForm(prev => ({ ...prev, title: e.target.value }))} placeholder="Тема уведомления" />
            </div>
            <div>
              <label style={S.label}>Приоритет</label>
              <select style={S.select} value={broadcastForm.priority} onChange={e => setBroadcastForm(prev => ({ ...prev, priority: e.target.value }))}>
                <option value="info">Информация</option>
                <option value="warning">Внимание</option>
                <option value="critical">Критичное</option>
              </select>
            </div>
          </div>
          <div>
            <label style={S.label}>Текст уведомления</label>
            <textarea style={S.textarea} value={broadcastForm.body} onChange={e => setBroadcastForm(prev => ({ ...prev, body: e.target.value }))} placeholder="Содержание..." />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "160px 1fr", gap: 12 }}>
            <div>
              <label style={S.label}>Получатели</label>
              <select style={S.select} value={broadcastForm.recipientFilter} onChange={e => setBroadcastForm(prev => ({ ...prev, recipientFilter: e.target.value }))}>
                <option value="all">Все пользователи</option>
                <option value="role">По роли</option>
                <option value="user">Конкретный</option>
              </select>
            </div>
            {broadcastForm.recipientFilter === "role" ? (
              <div>
                <label style={S.label}>Роль</label>
                <select style={S.select} value={broadcastForm.recipientRole} onChange={e => setBroadcastForm(prev => ({ ...prev, recipientRole: e.target.value }))}>
                  <option value="">Выберите роль</option>
                  <option value="STAFF">STAFF</option>
                  <option value="BOSS">BOSS</option>
                  <option value="FEDERAL">FEDERAL</option>
                  <option value="ADMIN">ADMIN</option>
                </select>
              </div>
            ) : null}
            {broadcastForm.recipientFilter === "user" ? (
              <div>
                <label style={S.label}>Пользователь</label>
                <select style={S.select} value={broadcastForm.recipientUserId} onChange={e => setBroadcastForm(prev => ({ ...prev, recipientUserId: e.target.value }))}>
                  <option value="">Выберите</option>
                  {(users || []).filter(u => !u.blocked).map(u => <option key={u.id} value={u.id}>{u.surname} {u.name} ({u.role})</option>)}
                </select>
              </div>
            ) : null}
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
            <button className="btn-hover" style={btn("gold")} onClick={handleBroadcast} disabled={sending || !broadcastForm.title.trim() || !broadcastForm.body.trim()}>
              {sending ? "Отправка..." : "Отправить"}
            </button>
            {result ? <span style={{ color: result.startsWith("Отправлено") ? C.success : C.danger, fontSize: T.meta }}>{result}</span> : null}
          </div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 10 }}>
        <button className="btn-hover" style={btn("subtle")} onClick={handleClearRead} disabled={clearing}>
          {clearing ? "Очистка..." : "Очистить прочитанные"}
        </button>
        <button className="btn-hover" style={btn("ghost")} onClick={loadStats}>Обновить статистику</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
