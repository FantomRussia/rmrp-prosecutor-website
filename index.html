function canAccessChecksModule(user, checksMeta = DEFAULT_CHECKS_META, positions = DEFAULT_POSITIONS) {
  if (!user) return false;
  const enabledSubjects = checksMeta?.settings?.enabledSubjects || DEFAULT_CHECKS_META.settings.enabledSubjects;
  if (hasSystemAdminAccess(user) || user.role === "FEDERAL") return true;
  if ((user.role === "BOSS" || user.role === "SENIOR_STAFF") && enabledSubjects.includes(user.subject)) return true;
  if (user.isPreviewUser) return false;
  return Boolean(checksMeta?.availableForCurrentUser || checksMeta?.permissions?.canAccessModule);
}

function canAccessCasesModule(user, checksMeta = DEFAULT_CHECKS_META) {
  if (!user) return false;
  const enabledSubjects = checksMeta?.settings?.enabledSubjects || DEFAULT_CHECKS_META.settings.enabledSubjects;
  if (hasSystemAdminAccess(user)) return true;
  if (user.role === "FEDERAL") return true;
  if (user.role === "USP" && enabledSubjects.includes(user.subject)) return true;
  if (user.role === "BOSS" && enabledSubjects.includes(user.subject)) return true;
  if (user.role === "SENIOR_STAFF" && enabledSubjects.includes(user.subject)) return true;
  if (user.role === "STAFF" && enabledSubjects.includes(user.subject)) return true;
  return false;
}

function getNavItemsForUser(user, activitySettings = DEFAULT_ACTIVITY_SETTINGS, checksMeta = DEFAULT_CHECKS_META, positions = DEFAULT_POSITIONS) {
  if (isPendingApprovalUser(user)) {
    return [NAV_ITEMS.STAFF[0]];
  }
  let baseItems = [...(NAV_ITEMS[user?.role] || NAV_ITEMS.STAFF)];
  if (isPilotUser(user, activitySettings)) {
    const pilotLabelOverrides = {
      "my-report": "Журнал деятельности",
      analytics: "Аналитика",
    };
    const pilotOrder = {
      "my-cabinet": 0,
      "my-report": 1,
      "my-bonus": 2,
      "subject-control": 3,
      analytics: 6,
      "registration-requests": 8,
      users: 9,
    };
    baseItems.forEach(item => {
      if (pilotLabelOverrides[item.id]) {
        item.label = pilotLabelOverrides[item.id];
      }
      if (item.id === "subject-control" && user?.role === "BOSS") {
        item.label = "Премирование";
      }
    });
    baseItems.sort((left, right) => (pilotOrder[left.id] ?? 100) - (pilotOrder[right.id] ?? 100));
  }
  if (canAccessChecksModule(user, checksMeta, positions)) {
    const checksItem = { id: "checks", label: "Проверки", icon: "🛡" };
    if (!baseItems.some(item => item.id === "checks")) {
      const anchorIndex = baseItems.findIndex(item => item.id === "analytics");
      baseItems = [...baseItems];
      baseItems.splice(anchorIndex >= 0 ? anchorIndex + 1 : baseItems.length, 0, checksItem);
    }
  }
  if (canAccessCasesModule(user, checksMeta)) {
    const casesItem = { id: "cases", label: "Жалобы", icon: "📨" };
    if (!baseItems.some(item => item.id === "cases")) {
      const anchorIndex = baseItems.findIndex(item => item.id === "checks");
      baseItems = [...baseItems];
      baseItems.splice(anchorIndex >= 0 ? anchorIndex + 1 : baseItems.length, 0, casesItem);
    }
  }
  {
    const calendarItem = { id: "calendar", label: "Календарь", icon: "📅" };
    if (!baseItems.some(item => item.id === "calendar")) {
      const anchorIndex = baseItems.findIndex(item => item.id === "home");
      baseItems = [...baseItems];
      baseItems.splice(anchorIndex >= 0 ? anchorIndex + 1 : 1, 0, calendarItem);
    }
  }
  if (!hasSystemAdminAccess(user)) return baseItems;
  const seen = new Set(baseItems.map(item => item.id));
  for (const item of NAV_ITEMS.ADMIN) {
    if (seen.has(item.id)) continue;
    baseItems.push(item);
    seen.add(item.id);
  }
  return baseItems;
}

function isPageAvailableForUser(user, pageId, activitySettings = DEFAULT_ACTIVITY_SETTINGS, checksMeta = DEFAULT_CHECKS_META, positions = DEFAULT_POSITIONS) {
  if (pageId === "notifications") return true;
  const allowedPages = getNavItemsForUser(user, activitySettings, checksMeta, positions);
  return allowedPages.some(item => item.id === pageId) || (hasSystemAdminAccess(user) && ADMIN_PANEL_SECTION_IDS.includes(pageId));
}

function formatDate(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function formatDateTime(d) {
  if (!d) return "—";
  // Данные хранятся в МСК — добавляем суффикс чтобы Date не интерпретировал как локальное
  const str = String(d).includes("+") || String(d).includes("Z") ? d : d.replace(" ", "T") + "+03:00";
  const date = new Date(str);
  if (isNaN(date.getTime())) return String(d);
  return date.toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit", timeZone: "Europe/Moscow" });
}

function formatDateInputValue(value) {
  if (!value) return "";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "";
  const pad = (part) => String(part).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
}

function toDateTimeLocalValue(value) {
  if (!value) return "";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "";
  const pad = (part) => String(part).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function getMaintenanceScheduleDate(settings) {
  const rawValue = settings?.maintenanceScheduledAt;
  if (!rawValue) return null;
  const parsed = new Date(rawValue);
  return Number.isNaN(parsed.getTime()) ? null : parsed;
}

function getMaintenanceStatus(settings, now = new Date()) {
  const scheduledAt = getMaintenanceScheduleDate(settings);
  const activatedAt = settings?.maintenanceActivatedAt ? new Date(settings.maintenanceActivatedAt) : null;
  const safeActivatedAt = activatedAt && !Number.isNaN(activatedAt.getTime()) ? activatedAt : null;
  const announcement = (settings?.maintenanceAnnouncement || "").trim();
  const isActive = Boolean(settings?.maintenanceEnabled);
  const isPlanned = !isActive && !!scheduledAt && scheduledAt.getTime() > now.getTime();
  const msUntilStart = scheduledAt ? scheduledAt.getTime() - now.getTime() : null;
  return { isActive, isPlanned, scheduledAt, activatedAt: safeActivatedAt, announcement, msUntilStart };
}

  const deadlineTime = typeof settings?.reportDeadlineTime === "string" && /^\d{2}:\d{2}$/.test(settings.reportDeadlineTime)
    ? settings.reportDeadlineTime
    : fallback.reportDeadlineTime;
  const maintenanceGif = typeof settings?.maintenanceGif === "string" && settings.maintenanceGif.trim()
    ? settings.maintenanceGif.trim()
    : fallback.maintenanceGif;
  const maintenanceScheduledAt = typeof settings?.maintenanceScheduledAt === "string" && settings.maintenanceScheduledAt.trim()

    : "";

    : "";
  const maintenanceActivatedAt = typeof settings?.maintenanceActivatedAt === "string" && settings.maintenanceActivatedAt.trim()
    ? settings.maintenanceActivatedAt.trim()
    : "";
  return {
    baseAmount: Number(settings?.baseAmount ?? fallback.baseAmount),
    maxMultiplier: Number(settings?.maxMultiplier ?? fallback.maxMultiplier),
    approvalRequired: settings?.approvalRequired ?? fallback.approvalRequired,
    payPeriod: settings?.payPeriod || fallback.payPeriod,
    reportDeadlineDay: parsedDeadlineDay,
    reportDeadlineTime: deadlineTime,
    maintenanceEnabled: Boolean(settings?.maintenanceEnabled),

  const personRecord = typeMeta.kind === "person" ? {
    targetFullName: (source.personRecord?.targetFullName || "").trim(),
    targetId: (source.personRecord?.targetId || "").trim(),
    targetPosition: (source.personRecord?.targetPosition || "").trim(),

  const visitRecord = typeMeta.kind === "visit" ? {

  const typeMeta = getActivityTypeMeta(event?.type, activitySettings);
  if (isVisitActivityEvent(event, activitySettings)) {
    return `${typeMeta.label}: ${event?.visitRecord?.topic || "Без темы"}`;
  }
  if (typeMeta.kind === "news") {
    return `${typeMeta.label}: ${event?.newsRecord?.headline || "Без заголовка"}`;
  }
  if (typeMeta.kind === "duty") {
    const from = event?.dutyRecord?.dutyTimeFrom || "?";
    const to = event?.dutyRecord?.dutyTimeTo || "?";
    return `${typeMeta.label}: ${from} — ${to}`;
  }
  const target = event?.personRecord?.targetFullName || event?.personRecord?.targetId || "Без лица";
  return `${typeMeta.label}: ${target}`;
}

function getActivityEventSummary(event, factions, users, activitySettings = DEFAULT_ACTIVITY_SETTINGS) {
  const typeMeta = getActivityTypeMeta(event?.type, activitySettings);
  const factionName = getFactionNameById(factions, event?.factionId);
  if (isVisitActivityEvent(event, activitySettings)) {
    const participantNames = getActivityParticipantIds(event)
      .map(userId => getUserFullName((users || []).find(item => item.id === userId)))
      .filter(Boolean)
      .join(", ");
    return {
      typeLabel: typeMeta.label,
      factionName,
      primary: event?.visitRecord?.topic || "Тема не указана",
      secondary: participantNames || "Участники не выбраны",
      reason: event?.visitRecord?.description || "—",
    };
  }
  if (typeMeta.kind === "news") {
    return {
      typeLabel: typeMeta.label,
      factionName,
      primary: event?.newsRecord?.headline || "Без заголовка",
      secondary: "",
      reason: event?.newsRecord?.body || "—",
    };
  }
  if (typeMeta.kind === "duty") {
    const from = event?.dutyRecord?.dutyTimeFrom || "?";
    const to = event?.dutyRecord?.dutyTimeTo || "?";
    const hasScreenshots = (event?.dutyRecord?.screenshotStart || event?.dutyRecord?.screenshotEnd) ? "Скриншоты приложены" : "Скриншоты не приложены";
    return {
      typeLabel: typeMeta.label,
      factionName,
      primary: `Дежурство с ${from} по ${to}`,
      secondary: hasScreenshots,
      reason: event?.dutyRecord?.description || "—",
    };
  }
  return {
    typeLabel: typeMeta.label,
    factionName,
    primary: event?.personRecord?.targetFullName || "Без ФИО",
    secondary: `${event?.personRecord?.targetPosition || "Звание/должность не указаны"} • ID ${event?.personRecord?.targetId || "—"}`,
    reason: event?.personRecord?.reason || "—",
  };
}

function getActivityEventsForUser(events, user, periodKey = null, activitySettings = DEFAULT_ACTIVITY_SETTINGS) {
  return (events || [])
    .filter(event => isPilotActivityEvent(event, activitySettings))
    .filter(event => {
      if (!user) return false;
      if (isVisitActivityEvent(event, activitySettings)) {
        return getActivityParticipantIds(event).includes(user.id) || event.authorUserId === user.id;
      }
      return event.authorUserId === user.id;
    })
    .filter(event => !periodKey || getReportPeriodKey(getActivityEventDate(event)) === periodKey)
    .sort((a, b) => new Date(getActivityEventDate(b) || 0) - new Date(getActivityEventDate(a) || 0));
}

function buildPilotMetricsSnapshot(user, activityEvents, factions, periodKey, activitySettings = DEFAULT_ACTIVITY_SETTINGS) {
  const relevantEvents = getActivityEventsForUser(activityEvents, user, periodKey, activitySettings);
  const typeCounts = {};
  const reasons = {};
  const uniquePersons = new Set();
  const uniqueFactions = new Set();
  let visitsCount = 0;
  let closedCases = 0;
  let eventsWithoutLinks = 0;

  relevantEvents.forEach(event => {
    if (isInternalActivityEvent(event, activitySettings)) return;
    typeCounts[event.type] = (typeCounts[event.type] || 0) + 1;
    if (!event.links || event.links.length === 0) eventsWithoutLinks += 1;
    if (event.factionId) uniqueFactions.add(event.factionId);
    if (isVisitActivityEvent(event, activitySettings)) {
      visitsCount += 1;
      return;
    }
    if (event.type === "decision") closedCases += 1;
    const personKey = `${event.factionId || "nofaction"}::${event?.personRecord?.targetId || event?.personRecord?.targetFullName || event.id}`;
    uniquePersons.add(personKey);
    const reasonKey = (event?.personRecord?.reason || "").trim();
    if (reasonKey) reasons[reasonKey] = (reasons[reasonKey] || 0) + 1;
  });

  const topReasons = Object.entries(reasons)
    .sort((left, right) => right[1] - left[1])
    .slice(0, 3)
    .map(([reason, count]) => ({ reason, count }));

  return {
    periodKey,
    totalEvents: relevantEvents.length,
    closedCases,
    visitsCount,
    uniquePersons: uniquePersons.size,
    uniqueFactions: uniqueFactions.size,
    eventsWithoutLinks,
    typeCounts,
    topReasons,
    recentEvents: relevantEvents.slice(0, 5).map(event => ({
      id: event.id,
      title: getActivityEventTitle(event, factions, activitySettings),
      date: getActivityEventDate(event),
      factionName: getFactionNameById(factions, event.factionId),
    })),
  };
}

function getPerformanceReviewStatusMeta(review) {
  return PERFORMANCE_REVIEW_STATUS[review?.status] || PERFORMANCE_REVIEW_STATUS.pending_federal;
}

function findPerformanceReviewForUser(reviews, userId, periodKey, subject) {
  return (reviews || []).find(review =>
    review.userId === userId
    && review.periodKey === periodKey
    && review.subject === subject
    && review.source === "activity_events"
  ) || null;
}

function upsertPerformanceReview(reviews, nextReview) {
  return upsertItemById(reviews, normalizePerformanceReview(nextReview));
}

function getPeriodDateFromKey(periodKey) {
  const safeKey = String(periodKey || getReportPeriodKey(new Date()));
  const value = new Date(`${safeKey}-01T12:00:00`);
  return Number.isNaN(value.getTime()) ? new Date() : value;
}

function getPeriodLabelFromKey(periodKey) {
  return getReportPeriodLabel(getPeriodDateFromKey(periodKey));
}

function formatMonthInputValue(periodKey) {
  return /^[0-9]{4}-[0-9]{2}$/.test(String(periodKey || "")) ? String(periodKey) : getReportPeriodKey(new Date());
}

function normalizePilotSubjectScope(subjectOrSubjects, activitySettings = DEFAULT_ACTIVITY_SETTINGS) {
  const raw = Array.isArray(subjectOrSubjects)
    ? subjectOrSubjects
    : subjectOrSubjects
      ? [subjectOrSubjects]
      : (activitySettings?.pilotSubjects || DEFAULT_ACTIVITY_SETTINGS.pilotSubjects);
  return Array.from(new Set(raw.filter(subject => isPilotSubject(subject, activitySettings))));
}

function getPilotScopeSubjects(user, activitySettings = DEFAULT_ACTIVITY_SETTINGS) {
  if (user?.role === "BOSS" && isPilotUser(user, activitySettings)) return [user.subject];
  if (user?.role === "STAFF" && isPilotUser(user, activitySettings)) return [user.subject];
  return normalizePilotSubjectScope(null, activitySettings);
}

function getPilotSubjectUsers(users, subjectOrSubjects = null, activitySettings = DEFAULT_ACTIVITY_SETTINGS) {
  const scope = normalizePilotSubjectScope(subjectOrSubjects, activitySettings);
  return (users || []).filter(item => !item.blocked && scope.includes(item.subject) && ["STAFF", "BOSS"].includes(item.role));
}

function getPilotEventsForPeriod(activityEvents, periodKey, activitySettings = DEFAULT_ACTIVITY_SETTINGS, subjectScope = null) {
  const scope = subjectScope ? normalizePilotSubjectScope(subjectScope, activitySettings) : null;
  return (activityEvents || [])
    .filter(event => isPilotActivityEvent(event, activitySettings))
    .filter(event => !scope || scope.includes(event.authorSubject))
    .filter(event => !periodKey || getReportPeriodKey(getActivityEventDate(event)) === periodKey);
}

function getPilotVisibleEventsForUser(user, activityEvents, periodKey, activitySettings = DEFAULT_ACTIVITY_SETTINGS, subjectFilter = "") {
  const periodEvents = getPilotEventsForPeriod(activityEvents, periodKey, activitySettings);
  if (!user) return [];
  // FEDERAL и ADMIN видят все записи (с фильтром по субъекту если выбран)
  if (user.role === "FEDERAL" || hasSystemAdminAccess(user)) {
    const filtered = subjectFilter ? periodEvents.filter(event => event.authorSubject === subjectFilter) : periodEvents;
    return filtered.sort((a, b) => new Date(getActivityEventDate(b) || 0) - new Date(getActivityEventDate(a) || 0));
  }
  if (((user.role === "BOSS" || user.role === "SENIOR_STAFF") && isPilotUser(user, activitySettings)) || user.role === "USP") {
    return periodEvents
      .filter(event => event.authorSubject === user.subject)
      .sort((a, b) => new Date(getActivityEventDate(b) || 0) - new Date(getActivityEventDate(a) || 0));
  }
  return getActivityEventsForUser(activityEvents, user, periodKey, activitySettings);
}

function createDefaultPilotActivityForm(user, factions, activitySettings = DEFAULT_ACTIVITY_SETTINGS, event = null) {
  const source = event ? normalizeActivityEvent(event, activitySettings) : null;
  const activeFaction = (factions || []).find(item => item.active !== false) || factions?.[0] || null;
  const typeMeta = source ? getActivityTypeMeta(source.type, activitySettings) : ((activitySettings?.eventTypes || DEFAULT_ACTIVITY_EVENT_TYPES)[0] || DEFAULT_ACTIVITY_EVENT_TYPES[0]);
  const eventDate = source ? formatDateInputValue(getActivityEventDate(source)) : formatDateInputValue(new Date());
  return {
    type: source?.type || typeMeta.id,
    eventDate,
    factionId: source?.factionId || activeFaction?.id || "",
    links: source?.links?.length ? [...source.links] : [""],
    targetFullName: source?.personRecord?.targetFullName || "",
    targetId: source?.personRecord?.targetId || "",
    targetPosition: source?.personRecord?.targetPosition || "",
    reason: source?.personRecord?.reason || "",
    decisionOutcome: source?.personRecord?.decisionOutcome || "punishment",
    measureLabel: source?.personRecord?.measureLabel || "",
    includeInDossier: source?.personRecord?.includeInDossier !== false,
    topic: source?.visitRecord?.topic || "",
    participantUserIds: source?.visitRecord?.participantUserIds?.length ? [...source.visitRecord.participantUserIds] : [user?.id].filter(Boolean),
    description: source?.visitRecord?.description || "",
    // news fields
    headline: source?.newsRecord?.headline || "",
    newsBody: source?.newsRecord?.body || "",
    // duty fields
    dutyTimeFrom: source?.dutyRecord?.dutyTimeFrom || "",
    dutyTimeTo: source?.dutyRecord?.dutyTimeTo || "",
    screenshotStart: source?.dutyRecord?.screenshotStart || "",
    screenshotEnd: source?.dutyRecord?.screenshotEnd || "",
    dutyDescription: source?.dutyRecord?.description || "",
  };
}

function isValidTargetId(value) {
  return /^\d{2,3}-\d{3}$/.test((value || "").trim());
}

function formatTargetIdInput(raw) {
  const digits = (raw || "").replace(/[^\d]/g, "").slice(0, 6);
  if (digits.length <= 3) return digits;
  if (digits.length <= 5) return digits.slice(0, 2) + "-" + digits.slice(2);
  return digits.slice(0, 3) + "-" + digits.slice(3, 6);
}

function findDuplicatePersonInFaction(activityEvents, factionId, targetId, targetFullName, currentEventId, activitySettings) {
  const events = (activityEvents || []).filter(e =>
    isPilotActivityEvent(e, activitySettings) &&
    isPersonActivityEvent(e, activitySettings) &&
    e.factionId === factionId &&
    e.id !== currentEventId
  );
  const trimId = (targetId || "").trim();
  const trimName = (targetFullName || "").trim().toLowerCase();
  if (!trimId && !trimName) return null;
  for (const event of events) {
    const eId = (event?.personRecord?.targetId || "").trim();
    const eName = (event?.personRecord?.targetFullName || "").trim().toLowerCase();
    if (trimId && eId === trimId && trimName && eName !== trimName) {
      return { type: "id_match", existingName: event.personRecord.targetFullName, existingId: eId };
    }
    if (trimName && eName === trimName && trimId && eId !== trimId) {
      return { type: "name_match", existingName: event.personRecord.targetFullName, existingId: eId };
    }
  }
  return null;
}

function sanitizePilotLinks(links) {
  const cleaned = (Array.isArray(links) ? links : [])
    .map(link => String(link || "").trim());
  return cleaned.length ? cleaned : [""];
}

function buildPilotActivityPayload({ form, user, editingEvent, activitySettings }) {
  const typeMeta = getActivityTypeMeta(form.type, activitySettings);
  const now = new Date().toISOString();
  const links = sanitizePilotLinks(form.links).filter(Boolean);
  const baseEvent = {
    ...(editingEvent || {}),
    id: editingEvent?.id || generateId(),
    type: typeMeta.id,
    eventDate: new Date(`${form.eventDate || formatDateInputValue(new Date())}T12:00:00`).toISOString(),
    authorUserId: editingEvent?.authorUserId || user.id,
    authorRole: editingEvent?.authorRole || user.role,
    authorSubject: editingEvent?.authorSubject || form.authorSubject || user.subject,
    factionId: form.factionId,
    links,
    createdAt: editingEvent?.createdAt || now,
    updatedAt: now,
    updatedBy: user.id,
  };

  if (typeMeta.kind === "visit") {
    return normalizeActivityEvent({
      ...baseEvent,
      personRecord: null,
      visitRecord: {
        topic: form.topic,
        participantUserIds: Array.from(new Set((form.participantUserIds || []).filter(Boolean))),
        description: form.description,
      },
    }, activitySettings);
  }

  if (typeMeta.kind === "news") {
    return normalizeActivityEvent({
      ...baseEvent,
      personRecord: null,
      visitRecord: null,
      newsRecord: {
        headline: form.headline,
        body: form.newsBody,
      },
    }, activitySettings);
  }

  if (typeMeta.kind === "duty") {
    return normalizeActivityEvent({
      ...baseEvent,
      personRecord: null,
      visitRecord: null,
      dutyRecord: {
        dutyTimeFrom: form.dutyTimeFrom,
        dutyTimeTo: form.dutyTimeTo,
        screenshotStart: form.screenshotStart,
        screenshotEnd: form.screenshotEnd,
        description: form.dutyDescription,
      },
    }, activitySettings);
  }

  return normalizeActivityEvent({
    ...baseEvent,
    visitRecord: null,
    personRecord: {
      targetFullName: form.targetFullName,
      targetId: form.targetId,
      targetPosition: form.targetPosition,
      reason: form.reason,
      decisionOutcome: form.decisionOutcome,
      measureLabel: form.measureLabel,
      includeInDossier: form.includeInDossier !== false,
    },
  }, activitySettings);
}

function validatePilotActivityForm(form, typeMeta, activitySettings = DEFAULT_ACTIVITY_SETTINGS) {
  if (!form.eventDate) return "Укажите дату события.";
  if (!form.factionId) return "Выберите фракцию или организацию.";
  const hasLinks = sanitizePilotLinks(form.links).some(link => link.trim());
  if (activitySettings?.requireEvidenceLinks && !hasLinks) return "Добавьте минимум одно доказательство: ссылку или скриншот.";

  if (typeMeta.kind === "visit") {
    if (!form.topic.trim()) return "Укажите тему официального визита.";
    if (!(form.participantUserIds || []).length) return "Выберите минимум одного участника от прокуратуры.";
    if (!form.description.trim()) return "Заполните описание или цель мероприятия.";
    return "";
  }

  if (typeMeta.kind === "news") {
    if (!form.headline.trim()) return "Укажите заголовок новости.";
    return "";
  }

  if (typeMeta.kind === "duty") {
    if (!form.dutyTimeFrom) return "Укажите время начала дежурства.";
    if (!form.dutyTimeTo) return "Укажите время окончания дежурства.";
    return "";
  }

  if (!form.targetFullName.trim()) return "Укажите ФИО лица, в отношении которого внесено событие.";
  if (!form.targetId.trim()) return "Укажите ID лица.";
  if (!isValidTargetId(form.targetId)) return "ID должен быть в формате 000-000 или 00-000.";
  if (!form.targetPosition.trim()) return "Укажите звание или должность лица.";
  if (!form.reason.trim()) return "Укажите причину события.";
  if (form.type === "decision") {
    if (!form.decisionOutcome) return "Выберите исход вынесенного решения.";
    if (!form.measureLabel.trim()) return "Укажите меру наказания или текст освобождения.";
  }
  if (form.type === "disciplinary" && !form.measureLabel.trim()) {
    return "Укажите конкретный вид дисциплинарного взыскания.";
  }
  return "";
}

function getPilotPersonDossierEvents(activityEvents, factionId, targetId, activitySettings = DEFAULT_ACTIVITY_SETTINGS) {
  return (activityEvents || [])
    .filter(event => isPilotActivityEvent(event, activitySettings))
    .filter(event => isPersonActivityEvent(event, activitySettings))
    .filter(event => event.factionId === factionId)
    .filter(event => String(event?.personRecord?.targetId || "") === String(targetId || ""))
    .filter(event => !(event.type === "warning" && event?.personRecord?.includeInDossier === false))
    .sort((a, b) => new Date(getActivityEventDate(b) || 0) - new Date(getActivityEventDate(a) || 0));
}

function getPilotFactionStats(activityEvents, factions, activitySettings = DEFAULT_ACTIVITY_SETTINGS, periodKey = null, subjectScope = null) {
  const relevantEvents = getPilotEventsForPeriod(activityEvents, periodKey, activitySettings, subjectScope);
  return (factions || [])
    .filter(item => item.active !== false || relevantEvents.some(event => event.factionId === item.id))
    .map(faction => {
      const factionEvents = relevantEvents.filter(event => event.factionId === faction.id);
      const uniquePersons = new Set();
      const reasons = {};
      let visits = 0;
      let closedCases = 0;

      factionEvents.filter(event => !isInternalActivityEvent(event, activitySettings)).forEach(event => {
        if (isVisitActivityEvent(event, activitySettings)) {
          visits += 1;
          return;
        }
        if (event.type === "decision") closedCases += 1;
        const targetKey = `${event?.personRecord?.targetId || ""}::${event?.personRecord?.targetFullName || ""}`;
        if (targetKey !== "::") uniquePersons.add(targetKey);
        const reason = (event?.personRecord?.reason || "").trim();
        if (reason) reasons[reason] = (reasons[reason] || 0) + 1;
      });

      const topReasonEntry = Object.entries(reasons).sort((left, right) => right[1] - left[1])[0] || null;
      return {
        faction,
        totalEvents: factionEvents.length,
        uniquePersons: uniquePersons.size,
        visits,
        closedCases,
        topReason: topReasonEntry ? { reason: topReasonEntry[0], count: topReasonEntry[1] } : null,
      };
    })
    .filter(item => item.totalEvents > 0 || item.faction.active !== false);
}

function getPilotFactionPersonRows(events, activitySettings = DEFAULT_ACTIVITY_SETTINGS) {
  const records = {};
  (Array.isArray(events) ? events : [])
    .filter(event => isPersonActivityEvent(event, activitySettings))
    .filter(event => !(event.type === "warning" && event?.personRecord?.includeInDossier === false))
    .forEach(event => {
      const key = `${event?.personRecord?.targetId || ""}::${event?.personRecord?.targetFullName || ""}`;
      if (!records[key]) {
        records[key] = {
          targetId: event?.personRecord?.targetId || "",
          fullName: event?.personRecord?.targetFullName || "Без ФИО",
          position: event?.personRecord?.targetPosition || "—",
          count: 0,
          lastReason: "",
          lastEventDate: null,
        };
      }
      records[key].count += 1;
      records[key].lastReason = event?.personRecord?.reason || records[key].lastReason;
      const eventDate = getActivityEventDate(event);
      if (!records[key].lastEventDate || new Date(eventDate || 0) > new Date(records[key].lastEventDate || 0)) {
        records[key].lastEventDate = eventDate;
      }
    });

  return Object.values(records).sort((left, right) => {
    if (right.count !== left.count) return right.count - left.count;
    return new Date(right.lastEventDate || 0) - new Date(left.lastEventDate || 0);
  });
}

function getPilotFactionSummaryRows(activityEvents, factions, periodKey, activitySettings = DEFAULT_ACTIVITY_SETTINGS, subjectScope = null) {
  const relevantEvents = getPilotEventsForPeriod(activityEvents, periodKey, activitySettings, subjectScope);
  const eventTypes = activitySettings?.eventTypes || DEFAULT_ACTIVITY_EVENT_TYPES;

  return (factions || [])
    .filter(item => item.active !== false || relevantEvents.some(event => event.factionId === item.id))
    .map(faction => {
      const factionEvents = relevantEvents.filter(event => event.factionId === faction.id);
      const uniquePersons = new Set();
      const reasons = {};
      const typeCounts = Object.fromEntries(eventTypes.map(item => [item.id, 0]));
      let visits = 0;
      let closedCases = 0;
      let lastActivityAt = null;

      factionEvents.forEach(event => {
        const eventDate = getActivityEventDate(event);
        if (!lastActivityAt || new Date(eventDate || 0) > new Date(lastActivityAt || 0)) {
          lastActivityAt = eventDate;
        }
        if (isInternalActivityEvent(event, activitySettings)) return;
        typeCounts[event.type] = (typeCounts[event.type] || 0) + 1;
        if (isVisitActivityEvent(event, activitySettings)) {
          visits += 1;
          return;
        }
        if (event.type === "decision") closedCases += 1;
        const targetKey = `${event.factionId || "nofaction"}::${event?.personRecord?.targetId || event?.personRecord?.targetFullName || event.id}`;
        if (!targetKey.endsWith("::")) uniquePersons.add(targetKey);
        const reason = (event?.personRecord?.reason || "").trim();
        if (reason) reasons[reason] = (reasons[reason] || 0) + 1;
      });

      const topReasonEntry = Object.entries(reasons).sort((left, right) => right[1] - left[1])[0] || null;
      return {
        faction,
        totalEvents: factionEvents.length,
        uniquePersons: uniquePersons.size,
        closedCases,
        visits,
        typeCounts,
        topReason: topReasonEntry ? { reason: topReasonEntry[0], count: topReasonEntry[1] } : null,
        lastActivityAt,
      };
    })
    .sort((left, right) => {
      if (right.totalEvents !== left.totalEvents) return right.totalEvents - left.totalEvents;
      return left.faction.name.localeCompare(right.faction.name, "ru");
    });
}

function getPilotFactionDetail(activityEvents, factionId, periodKey, users, activitySettings = DEFAULT_ACTIVITY_SETTINGS, subjectScope = null) {
  const events = getPilotEventsForPeriod(activityEvents, periodKey, activitySettings, subjectScope)
    .filter(event => event.factionId === factionId)
    .sort((a, b) => new Date(getActivityEventDate(b) || 0) - new Date(getActivityEventDate(a) || 0));
  const people = getPilotFactionPersonRows(events, activitySettings);
  const authorIds = Array.from(new Set(events.map(event => event.authorUserId).filter(Boolean)));
  const authors = authorIds
    .map(authorId => (users || []).find(item => item.id === authorId))
    .filter(Boolean)
    .sort((left, right) => getUserFullName(left).localeCompare(getUserFullName(right), "ru"));

  return {
    events,
    people,
    authors,
  };
}

function getPilotLegacySubjectSummary(users, reports, bonuses, excludedSubjects = DEFAULT_ACTIVITY_SETTINGS.pilotSubjects) {
  const scope = SUBJECTS.filter(subject => !excludedSubjects.includes(subject));
  return scope.map(subject => {
    const subjectUsers = (users || []).filter(user => !user.blocked && user.subject === subject);
    const subjectReports = (reports || []).filter(report => {
      if (!isOperationalReport(report)) return false;
      const reportUser = subjectUsers.find(item => item.id === report.userId);
      return Boolean(reportUser);
    });
    const activeIds = getActiveUserIds(users);
    const approvedBonuses = (bonuses || []).filter(item => item.subject === subject && item.status === "approved" && activeIds.has(item.userId));
    return {
      subject,
      users: subjectUsers.length,
      reports: subjectReports.length,
      bonuses: approvedBonuses.reduce((sum, item) => sum + Number(item.amount || 0), 0),
    };
  });
}

function getPilotReviewDisplayAmount(review) {
  if (!review) return 0;
  const source = review.federalReview || review.bossReview || {};
  return calculateReportBonusAmount(review.baseAmount || 0, source.coefficient, source.extraAmount);
}

function getPilotReviewQueueItems({ users, activityEvents, performanceReviews, factions, activitySettings, periodKey, subjectScope = null }) {
  const scope = normalizePilotSubjectScope(subjectScope, activitySettings);
  const pilotUsers = getPilotSubjectUsers(users, scope, activitySettings);
  const staffReviews = (performanceReviews || [])
    .filter(review => scope.includes(review.subject) && review.periodKey === periodKey && review.status === "pending_federal")
    .map(review => {
      const targetUser = pilotUsers.find(user => user.id === review.userId);
      return targetUser ? {
        id: review.id,
        kind: "review",
        user: targetUser,
        review,
        metricsSnapshot: review.metricsSnapshot && Object.keys(review.metricsSnapshot).length
          ? review.metricsSnapshot
          : buildPilotMetricsSnapshot(targetUser, activityEvents, factions, periodKey, activitySettings),
      } : null;
    })
    .filter(Boolean);

  const bossCandidates = pilotUsers
    .filter(item => item.role === "BOSS")
    .map(targetUser => {
      const review = findPerformanceReviewForUser(performanceReviews, targetUser.id, periodKey, targetUser.subject);
      if (review?.status === "approved") return null;
      const metricsSnapshot = review?.metricsSnapshot && Object.keys(review.metricsSnapshot).length
        ? review.metricsSnapshot
        : buildPilotMetricsSnapshot(targetUser, activityEvents, factions, periodKey, activitySettings);
      return {
        id: review?.id || `boss-direct-${targetUser.id}-${periodKey}`,
        kind: "boss_direct",
        user: targetUser,
        review: review || null,
        metricsSnapshot,
      };
    })
    .filter(Boolean);

  const deduped = [...staffReviews];
  bossCandidates.forEach(candidate => {
    if (!deduped.some(item => item.user.id === candidate.user.id)) deduped.push(candidate);
  });
  return deduped;
}

function mergeLegacyPositions(serverPositions, legacyPositions) {
  const base = normalizePositionsMap(serverPositions || {}, serverPositions || DEFAULT_POSITIONS);
  let mergedCount = 0;

  for (const [role, items] of Object.entries(legacyPositions || {})) {
    if (!MANAGED_ROLE_OPTIONS.includes(role)) continue;
    const serverItems = Array.isArray(base[role]) ? [...base[role]] : [];
    const knownKeys = new Set(serverItems.map(item => `${item.id}::${item.title}`));
    const knownTitles = new Set(serverItems.map(item => (item.title || "").trim().toLowerCase()));

    for (const item of items || []) {
      if (!item || !item.id || !item.title) continue;
      const key = `${item.id}::${item.title}`;
      const normalizedTitle = item.title.trim().toLowerCase();
      if (knownKeys.has(key) || knownTitles.has(normalizedTitle)) continue;
      serverItems.push({ id: item.id, title: item.title });
      knownKeys.add(key);
      knownTitles.add(normalizedTitle);
      mergedCount += 1;
    }

    base[role] = serverItems;
  }

  return { positions: base, mergedCount };
}

let __csrfToken = "";

async function apiRequest(action, payload) {
  const options = {
    method: payload === undefined ? "GET" : "POST",
    credentials: "same-origin",
    headers: {},
  };
  if (payload !== undefined) {
    options.headers["Content-Type"] = "application/json";
    if (__csrfToken) {
      options.headers["X-CSRF-Token"] = __csrfToken;
    }
    options.body = JSON.stringify(payload);
  }
  const response = await fetch(`${API_URL}?action=${encodeURIComponent(action)}`, options);
  const text = await response.text();
  const data = parseApiJsonResponse(response, text);
  if (data.csrfToken) {
    __csrfToken = data.csrfToken;
  }
  if (!response.ok || data.ok === false) {
    throw new Error(data.error || `Server error (${response.status})`);
  }
  return data;
}

function parseApiJsonResponse(response, text) {
  const normalizedText =
    typeof text === "string" ? text.replace(/^\uFEFF/, "").trim() : "";
  if (!normalizedText) {
    return {};
  }
  try {
    return JSON.parse(normalizedText);
  } catch {
    const contentType = response?.headers?.get?.("content-type") || "unknown";
    const preview = normalizedText.slice(0, 160).replace(/\s+/g, " ");
    throw new Error(
      `Unexpected server response (${response?.status || "?"}, ${contentType}): ${preview}`
    );
  }
}

function buildApiActionUrl(action, params = {}) {
  const url = new URL(API_URL, window.location.href);
  url.searchParams.set("action", action);
  Object.entries(params || {}).forEach(([key, value]) => {
    if (value === undefined || value === null || value === "") return;
    url.searchParams.set(key, String(value));
  });
  return url.toString();
}

async function apiRequestWithParams(action, params = {}, payload) {
  const options = {
    method: payload === undefined ? "GET" : "POST",
    credentials: "same-origin",
    headers: {},
  };
  if (payload !== undefined) {
    options.headers["Content-Type"] = "application/json";
    if (__csrfToken) {
      options.headers["X-CSRF-Token"] = __csrfToken;
    }
    options.body = JSON.stringify(payload);
  }
  const response = await fetch(buildApiActionUrl(action, params), options);
  const text = await response.text();
  const data = parseApiJsonResponse(response, text);
  if (data.csrfToken) {
    __csrfToken = data.csrfToken;
  }
  if (!response.ok || data.ok === false) {
    throw new Error(data.error || `Server error (${response.status})`);
  }
  return data;
}

function isLoginBusy(users, registrationRequests, login, excludeRequestId = null) {
  const normalized = normalizeLogin(login);
  if (!normalized) return false;
  const existsInUsers = users.some(u => normalizeLogin(u.login) === normalized);
  const existsInRequests = registrationRequests.some(r => r.id !== excludeRequestId && r.status === "pending" && normalizeLogin(r.login) === normalized);

function getRequestRoutingInfo(request, users) {
  const isFederalRole = ["FEDERAL", "ADMIN"].includes(request.requestedRole);
  const isGeneralSubject = request.requestedSubject === GENERAL_SUBJECT;
  if (!isFederalRole && !isGeneralSubject) {
    const boss = users.find(u => u.role === "BOSS" && u.subject === request.requestedSubject && !u.blocked);
    if (boss) return { type: "boss", subject: request.requestedSubject, fallback: false };
    return { type: "federal", subject: null, fallback: true };
  }
  return { type: "federal", subject: null, fallback: false };
}

function canReviewRequest(currentUser, request, users) {
  if (!currentUser || request.status !== "pending") return false;
  if (hasSystemAdminAccess(currentUser)) return true;
  const route = getRequestRoutingInfo(request, users);
  if (currentUser.role === "BOSS") return route.type === "boss" && route.subject === currentUser.subject;
  if (currentUser.role === "FEDERAL") return route.type === "federal";
  return false;
}

  if (currentUser.role === "BOSS") return ["STAFF", "SENIOR_STAFF", "BOSS"];

  return (users || []).filter(user => {
    if (user.blocked || user.role !== role) return false;
    if (["FEDERAL", "ADMIN"].includes(role)) return true;
    return user.subject === resolvedSubject;
  });
}

function buildPreviewUser({ role, subject, userId }, users, positions) {
  if (!role) return null;
  const resolvedSubject = getPreviewSubjectForRole(role, subject);
  const candidates = getPreviewCandidates(users, role, resolvedSubject);
  const selected = candidates.find(user => user.id === userId) || candidates[0] || null;
  if (selected) {
    return {
      ...selected,
      previewSource: "existing",
      previewSubject: resolvedSubject,
      isPreviewUser: true,
    };

  const fallbackPosition = (positions?.[role] || [])[0];
  const fallbackName = role === "BOSS" ? "Прокурор" : role === "FEDERAL" ? "Федеральный сотрудник" : "Сотрудник";
  return {
    id: `preview_${role}_${resolvedSubject}`,
    login: `preview_${role.toLowerCase()}`,
    password: "",
    surname: "Просмотр",
    name: fallbackName,
    subject: resolvedSubject,
    role,
    blocked: false,
    createdAt: new Date().toISOString(),
    positionId: fallbackPosition?.id || null,
    classRankId: "",
    medalIds: [],

function getCriteriaForRole(criteria, role) {

  if (roleSpecific.length > 0) return roleSpecific;
  return (criteria || []).filter(item => !item.role);
}

function getReportEntries(report) {
  if (Array.isArray(report?.entries)) {
    return report.entries
      .map(entry => {
        const textContent = (entry?.content || "").toString().trim();
        const parsedQuantity = Number.isFinite(Number(entry?.quantity)) ? Math.max(0, Math.round(Number(entry.quantity))) : null;
        const quantityFromContent = /^\d+$/.test(textContent) ? Number(textContent) : 0;
        const quantity = parsedQuantity !== null ? parsedQuantity : quantityFromContent;
        const rawLinks = Array.isArray(entry?.links) ? entry.links : [];
        const links = quantity > 0
          ? Array.from({ length: quantity }, (_, index) => (rawLinks[index] || "").toString().trim())
          : rawLinks.map(link => (link || "").toString().trim()).filter(Boolean);
        return {
          criteriaId: entry?.criteriaId,
          name: entry?.name || "",
          content: textContent,
          quantity,
          links,
          role: entry?.role,
        };
      })
      .filter(entry => entry.criteriaId && (entry.quantity > 0 || entry.content || entry.links.some(Boolean)));
  }
  if (Array.isArray(report?.scores)) {
    return report.scores
      .filter(item => Number(item?.value || 0) > 0)
      .map(item => ({
        criteriaId: item.criteriaId,
        name: item.name,
        content: String(item.value),
        quantity: Math.max(0, Math.round(Number(item.value || 0))),
        links: [],
        role: item.role,
      }));
  }
  return [];
}

function getReportFilledCount(report) {
  return getReportEntries(report).filter(item => item.quantity > 0 || (item?.content || "").toString().trim() !== "" || (item?.links || []).some(Boolean)).length;
}

function getReportTotalQuantity(report) {
  return getReportEntries(report).reduce((sum, item) => sum + Math.max(0, Number(item?.quantity || 0)), 0);
}

function getLatestReportDate(reports) {
  if (!reports || reports.length === 0) return null;
  return reports
    .map(item => item.date)
    .filter(Boolean)
    .sort((a, b) => new Date(b) - new Date(a))[0] || null;
}

function formatCurrency(value) {
  return `${Number(value || 0).toLocaleString("ru-RU")}₽`;
}

function formatCoefficient(value) {
  return `${clampReportCoefficient(value).toFixed(2).replace(/\.00$/, "").replace(/(\.\d)0$/, "$1")}x`;
}

function parseMoneyValue(value) {
  const parsed = Number(value || 0);
  if (!Number.isFinite(parsed)) return 0;
  return Math.max(0, Math.round(parsed));
}

function clampReportCoefficient(value) {
  const parsed = Number(value || 0);
  if (!Number.isFinite(parsed)) return 0;
  return Math.max(0, Math.min(2, Math.round(parsed * 4) / 4));
}

function getReportBaseAmount(roleOrReport) {
  const role = typeof roleOrReport === "string" ? roleOrReport : (roleOrReport?.authorRole || roleOrReport?.role);
  return REPORT_BASE_AMOUNTS[role] || 0;
}

function calculateReportBonusAmount(baseAmount, coefficient, extraAmount = 0) {
  return Math.round(parseMoneyValue(baseAmount) * clampReportCoefficient(coefficient) + parseMoneyValue(extraAmount));
}

function normalizeReportDraft(draft, baseAmount) {
  const coefficient = clampReportCoefficient(draft?.coefficient);
  const extraAmount = parseMoneyValue(draft?.extraAmount);
  const comment = (draft?.comment || "").trim();
  return {
    coefficient,
    extraAmount,
    comment,
    totalAmount: calculateReportBonusAmount(baseAmount, coefficient, extraAmount),
  };
}

function getReportStatusValue(report) {

}

function getReportStatusMeta(report) {

function isSubjectProsecutorUser(user, positions = DEFAULT_POSITIONS) {
  return Boolean(user) && user.role === "BOSS" && isSubjectProsecutorPositionId(user.positionId, positions);
}

function requiresSubjectPayoutTrackingForUser(user, positions = DEFAULT_POSITIONS) {
  if (!user) return false;
  if (user.subject === GENERAL_SUBJECT) return false;
  if (user.role === "STAFF") return true;
  return user.role === "BOSS" && !isSubjectProsecutorPositionId(user.positionId, positions);
}

function requiresSubjectPayoutTrackingForBonus(bonus, users = [], positions = DEFAULT_POSITIONS) {
  if (!bonus) return false;
  if (bonus?.payoutTracking === true) return true;
  const subject = String(bonus?.subject || "").trim();
  if (!subject || subject === GENERAL_SUBJECT) return false;
  if (bonus?.source === "federal_request") return true;
  const targetUser = (users || []).find(item => item.id === bonus?.userId) || null;
  return requiresSubjectPayoutTrackingForUser(targetUser, positions);
}

function getEffectiveBonusPayoutStatus(bonus, users = [], positions = DEFAULT_POSITIONS) {
  if (!requiresSubjectPayoutTrackingForBonus(bonus, users, positions)) return "not_required";
  const storedStatus = String(bonus?.payoutStatus || "").trim();
  if (["awaiting_subject_dispatch", "pending_subject_payout", "reported"].includes(storedStatus)) {
    return storedStatus;
  }
  return "awaiting_subject_dispatch";
}

function isBonusPayoutTracked(bonus, users = [], positions = DEFAULT_POSITIONS) {
  return requiresSubjectPayoutTrackingForBonus(bonus, users, positions);
}

function isBonusAwaitingSubjectDispatch(bonus, users = [], positions = DEFAULT_POSITIONS) {
  return getEffectiveBonusPayoutStatus(bonus, users, positions) === "awaiting_subject_dispatch";
}

function isBonusReadyForSubjectPayout(bonus, users = [], positions = DEFAULT_POSITIONS) {
  return ["pending_subject_payout", "reported"].includes(getEffectiveBonusPayoutStatus(bonus, users, positions));
}

function isBonusPayoutReported(bonus, users = [], positions = DEFAULT_POSITIONS) {
  return getEffectiveBonusPayoutStatus(bonus, users, positions) === "reported";
}

function getBonusPayoutStatusMeta(bonus, users = [], positions = DEFAULT_POSITIONS) {
  if (!isBonusPayoutTracked(bonus, users, positions)) {
    return { label: "Выплата без отчёта", color: "#8ea5c7" };
  }
  if (isBonusAwaitingSubjectDispatch(bonus, users, positions)) {
    return { label: "Ожидает направления в субъект", color: C.blue };
  }
  if (isBonusPayoutReported(bonus, users, positions)) {
    return { label: "Выплата подтверждена", color: "#2f9e8f" };
  }
  return { label: "Ожидает выплату субъектом", color: "#d69a2d" };
}

function getTrackedPayoutBonusesForSubject(user, bonuses, users = [], positions = DEFAULT_POSITIONS) {
  if (!isSubjectProsecutorUser(user, positions)) return [];
  return (bonuses || [])
    .filter(bonus => bonus?.status === "approved")
    .filter(bonus => isBonusPayoutTracked(bonus, users, positions))
    .filter(bonus => isBonusReadyForSubjectPayout(bonus, users, positions))
    .filter(bonus => bonus.subject === user.subject)
    .sort((left, right) => new Date(right.date || 0) - new Date(left.date || 0));
}

function EvidenceProofInput({ label, value, onChange, disabled = false, placeholder }) {
  const fileInputRef = useRef(null);
  const [busy, setBusy] = useState(false);
  const [uploadError, setUploadError] = useState("");

  const handleFileChange = async (event) => {
    const file = event.target.files?.[0];
    event.target.value = "";
    if (!file) return;
    setBusy(true);
    setUploadError("");
    try {
      const response = await uploadEvidenceProof({ file });
      onChange(response.url);
    } catch (error) {
      setUploadError(error.message || "Не удалось загрузить скриншот");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      <label style={{ ...S.label, marginBottom: 0 }}>{label}</label>
      <input
        style={S.input}
        value={value}
        onChange={e => onChange(e.target.value)}
        placeholder={placeholder}
        disabled={disabled || busy}
      />
      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <button className="btn-hover" type="button" style={btn("ghost")} onClick={() => fileInputRef.current?.click()} disabled={disabled || busy}>
          {busy ? "Загрузка..." : "Загрузить скриншот"}
        </button>
        <input
          ref={fileInputRef}
          type="file"
          accept="image/png,image/jpeg,image/webp"
          style={{ display: "none" }}
          onChange={handleFileChange}
          disabled={disabled || busy}
        />
        <span style={{ fontSize: T.meta, color: C.textMuted }}>Можно вставить ссылку или загрузить скриншот.</span>
      </div>
      {value && (
        <a href={value} target="_blank" rel="noreferrer" style={{ color: C.blueLight || C.blue, fontSize: T.meta, textDecoration: "underline" }}>
          {isEvidenceScreenshot(value) ? "Открыть загруженный скриншот" : "Открыть ссылку"}

      )}
      {uploadError && <div style={{ fontSize: T.meta, color: C.dangerLight }}>{uploadError}</div>}
    </div>
  );
}

function getEvidenceAssetUrl(value) {
  const source = String(value || "").trim();
  if (!source) return "";
  if (/^(?:https?:)?\/\//i.test(source) || source.startsWith("/") || source.startsWith("data:") || source.startsWith("blob:")) {
    return source;
  }
  return `/${source.replace(/^\/+/, "")}`;
}

function getReportPeriodKey(input) {
  const date = input instanceof Date ? input : new Date(input || Date.now());
  if (Number.isNaN(date.getTime())) return getReportPeriodKey(new Date());
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
}

function getReportPeriodLabel(input) {
  const date = input instanceof Date ? input : new Date(input || Date.now());
  if (Number.isNaN(date.getTime())) return getReportPeriodLabel(new Date());
  const label = date.toLocaleDateString("ru-RU", { month: "long", year: "numeric" });
  return label.charAt(0).toUpperCase() + label.slice(1);
}

function getReportStoredPeriodKey(report) {
  return report?.periodKey || getReportPeriodKey(report?.submittedAt || report?.date || Date.now());
}

function getReportStoredPeriodLabel(report) {
  return report?.periodLabel || getReportPeriodLabel(report?.submittedAt || report?.date || Date.now());
}

function isGeneralProsecutorUser(user) {
  return user?.role === "FEDERAL" && user?.positionId === GENERAL_PROSECUTOR_POSITION_ID;
}

function isFederalBonusRequest(report) {
  return report?.submissionKind === "federal_bonus";
}

function isOperationalReport(report) {
  return !isFederalBonusRequest(report);
}

function getReportDeadlineDate(periodKeyOrDate, settings) {
  const date = typeof periodKeyOrDate === "string"
    ? new Date(`${periodKeyOrDate}-01T12:00:00`)
    : new Date(periodKeyOrDate || Date.now());
  const safeDate = Number.isNaN(date.getTime()) ? new Date() : date;
  const [hours, minutes] = String(settings?.reportDeadlineTime || DEFAULT_BONUS_SETTINGS.reportDeadlineTime).split(":").map(value => Number(value || 0));
  const deadlineDay = Math.max(1, Math.min(31, Number(settings?.reportDeadlineDay || DEFAULT_BONUS_SETTINGS.reportDeadlineDay)));
  const year = safeDate.getFullYear();
  const month = safeDate.getMonth();
  const monthLastDay = new Date(year, month + 1, 0).getDate();
  return new Date(year, month, Math.min(deadlineDay, monthLastDay), hours || 0, minutes || 0, 59, 999);
}

function isReportDeadlineOpen(periodKeyOrDate, settings, now = new Date()) {
  return now.getTime() <= getReportDeadlineDate(periodKeyOrDate, settings).getTime();
}

function canAuthorEditReport(report, settings, now = new Date()) {
  if (!report) return isReportDeadlineOpen(now, settings, now);
  if (getReportStatusValue(report) === "approved") return false;
  return isReportDeadlineOpen(getReportStoredPeriodKey(report), settings, now);
}

function normalizeReportFormEntry(entry) {
  const quantity = Math.max(0, Math.round(Number(entry?.quantity || 0)));
  const sourceLinks = Array.isArray(entry?.links) ? entry.links : [];
  return {
    quantity: quantity > 0 ? String(quantity) : "",
    links: Array.from({ length: quantity }, (_, index) => (sourceLinks[index] || "").toString()),
  };
}

function adjustReportLinksToQuantity(links, quantity) {
  const safeQuantity = Math.max(0, Math.round(Number(quantity || 0)));
  const source = Array.isArray(links) ? links : [];
  return Array.from({ length: safeQuantity }, (_, index) => (source[index] || "").toString());
}

function buildReportFormState(reportEntries) {
  const nextForm = {};
  (reportEntries || []).forEach(entry => {
    nextForm[entry.criteriaId] = normalizeReportFormEntry(entry);
  });
  return nextForm;
}

function buildStructuredReportEntries(criteriaList, form, role, { requireLinks = false } = {}) {
  const errors = [];
  const entries = (criteriaList || []).map(criteriaItem => {
    const source = form?.[criteriaItem.id] || {};
    const quantity = Math.max(0, Math.round(Number(source.quantity || 0)));
    const links = adjustReportLinksToQuantity(source.links, quantity).map(link => link.trim());
    if (requireLinks && quantity > 0 && links.some(link => !link)) {
      errors.push(`Заполните доказательства для пункта «${criteriaItem.name}»: по одной ссылке или одному скриншоту на каждое выполнение.`);
    }
    if (quantity <= 0) return null;
    return {
      criteriaId: criteriaItem.id,
      name: criteriaItem.name,
      quantity,
      links,
      content: String(quantity),
      role: criteriaItem.role || role,
    };
  }).filter(Boolean);
  return { entries, errors };
}

function hasActiveBossForSubject(users, subject) {
  return (users || []).some(item => item.role === "BOSS" && item.subject === subject && !item.blocked);
}

function getInitialReportStatus(user, users) {
  if (user.role === "STAFF" && hasActiveBossForSubject(users, user.subject)) return "pending_boss";
  return "pending_federal";
}

function getFederalReturnStatus(report) {
  if ((report?.authorRole || "STAFF") === "STAFF" && report?.bossReview) return "returned_boss";
  return "returned_author";
}

function getReportBonusDraft(report) {
  const baseAmount = parseMoneyValue(report?.baseAmount || getReportBaseAmount(report));
  return normalizeReportDraft(report?.bonusDraft || report?.bossReview || report?.federalReview || {}, baseAmount);
}

function upsertItemById(items, nextItem) {
  const list = Array.isArray(items) ? items : [];
  const existingIndex = list.findIndex(item => item.id === nextItem.id);
  if (existingIndex === -1) return [...list, nextItem];
  return list.map(item => item.id === nextItem.id ? nextItem : item);
}

function getUserFullName(user) {
  return user ? `${user.surname} ${user.name}` : "—";
}
function getActiveUserIds(users) {
  const set = new Set();
  (users || []).forEach(u => { if (u && !u.blocked) set.add(u.id); });
  return set;
}
function filterBonusesActiveUsers(bonuses, users) {
  const active = getActiveUserIds(users);
  return (bonuses || []).filter(b => active.has(b.userId));
}

function canBossReviewReport(report, currentUser) {
  return currentUser?.role === "BOSS"
    && ["pending_boss", "returned_boss"].includes(getReportStatusValue(report))
    && report?.subject === currentUser.subject
    && ["STAFF", "SENIOR_STAFF", "USP"].includes(report?.authorRole || "STAFF");
}

function canFederalReviewReport(report, currentUser) {
  if (getReportStatusValue(report) !== "pending_federal") return false;
  if (isFederalBonusRequest(report)) {
    return hasSystemAdminAccess(currentUser) || isGeneralProsecutorUser(currentUser);
  }
  return currentUser?.role === "FEDERAL" || hasSystemAdminAccess(currentUser);
}

    document.body.classList.remove("dark-theme");

function Modal({ children, onClose, maxWidth = 560, persistent = false, title = "" }) {
  const contentRef = useRef(null);
  useEffect(() => {
    if (contentRef.current) {
      const first = contentRef.current.querySelector("input, select, textarea, button:not([aria-label='Закрыть'])");
      if (first) setTimeout(() => first.focus(), 50);
    }
  }, []);
  useEffect(() => {
    if (!onClose) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);
  return (
    <div role="dialog" aria-modal="true" aria-label={title || "\u0414\u0438\u0430\u043B\u043E\u0433"} style={{ position: "fixed", inset: 0, background: C.overlay, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999 }} onClick={persistent ? undefined : onClose}>
      <div ref={contentRef} className="fade-in modal-content" style={{ background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 12, padding: 32, width: "92%", maxWidth, maxHeight: "85vh", overflowY: "auto", boxShadow: `0 24px 60px ${C.overlay}`, position: "relative" }} onClick={e => e.stopPropagation()}>
        {onClose && <button onClick={onClose} aria-label="\u0417\u0430\u043A\u0440\u044B\u0442\u044C" style={{ position: "absolute", top: 12, right: 12, background: "none", border: "none", color: C.textMuted, fontSize: 22, cursor: "pointer", padding: "4px 8px", lineHeight: 1, zIndex: 1 }}>✕</button>}
        {children}
      </div>
    </div>
  );
}

function usePagination(items, perPage = 30) {
  const [page, setPage] = useState(1);
  const total = Array.isArray(items) ? items.length : 0;
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  const safePage = Math.min(page, totalPages);
  const paged = Array.isArray(items) ? items.slice((safePage - 1) * perPage, safePage * perPage) : [];
  useEffect(() => { if (page > totalPages) setPage(totalPages); }, [total]);
  return { page: safePage, totalPages, paged, setPage, total };
}

function Pagination({ page, totalPages, onChange, total }) {
  if (totalPages <= 1) return null;
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, marginTop: 12, flexWrap: "wrap" }}>
      <button className="btn-hover" style={{ ...btn("ghost"), padding: "6px 14px", fontSize: 14, minHeight: 36 }} disabled={page <= 1} onClick={() => onChange(page - 1)}>← Назад</button>
      <span style={{ color: C.textMuted, fontSize: T.meta }}>{page} / {totalPages}{total != null ? ` (${total})` : ""}</span>
      <button className="btn-hover" style={{ ...btn("ghost"), padding: "6px 14px", fontSize: 14, minHeight: 36 }} disabled={page >= totalPages} onClick={() => onChange(page + 1)}>Далее →</button>
    </div>
  );
}

function exportToCsv(filename, headers, rows) {
  const escape = (val) => { const s = String(val ?? "").replace(/"/g, '""'); return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s}"` : s; };
  const lines = [headers.map(escape).join(","), ...rows.map(row => row.map(escape).join(","))];
  const bom = "\uFEFF";
  const blob = new Blob([bom + lines.join("\n")], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function ChartCanvas({ type, data, options, height = 300 }) {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);
  const containerRef = React.useRef(null);
  const [effectiveHeight, setEffectiveHeight] = React.useState(height);
  const dataJson = JSON.stringify(data);
  React.useEffect(() => {
    const updateHeight = () => {
      const w = window.innerWidth;
      setEffectiveHeight(w < 480 ? Math.min(height, 200) : w < 768 ? Math.min(height, 250) : height);
    };
    updateHeight();
    window.addEventListener("resize", updateHeight);
    return () => window.removeEventListener("resize", updateHeight);
  }, [height]);
  React.useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext("2d");
    chartRef.current = new Chart(ctx, { type, data: JSON.parse(dataJson), options });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [type, dataJson]);
  return <div ref={containerRef} style={{ position: "relative", height: effectiveHeight }}><canvas ref={canvasRef} /></div>;
}
