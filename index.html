   ═══════════════════════════════════════════ */
function App() {
  const [themeKey, setThemeKey] = useState(() => getStoredTheme());
  const toggleTheme = useCallback(() => {
    setThemeKey(prev => {
      const next = prev === "dark" ? "light" : "dark";
      setStoredTheme(next);
      applyTheme(next);
      return next;
    });
  }, []);
  const themeCtx = useMemo(() => ({ theme: themeKey, toggleTheme }), [themeKey, toggleTheme]);

  const [currentUser, setCurrentUser] = useState(null);
  const [checksMeta, setChecksMeta] = useState(() => DEFAULT_CHECKS_META);
  const [casesMeta, setCasesMeta] = useState(() => DEFAULT_CASES_META);
  const previewNoticeTimerRef = useRef(null);
  const pilotLandingHandledRef = useRef(false);
  const syncNoticeTimerRef = useRef(null);
  const bootstrapInFlightRef = useRef(false);
  const [users, setUsersRaw] = useState(() => createDefaultState().users);
  const [registrationRequests, setRegistrationRequestsRaw] = useState(() => createDefaultState().registrationRequests);
  const [reports, setReportsRaw] = useState(() => createDefaultState().reports);
  const [bonuses, setBonusesRaw] = useState(() => createDefaultState().bonuses);
  const [activityEvents, setActivityEventsRaw] = useState(() => createDefaultState().activityEvents);
  const [factions, setFactionsRaw] = useState(() => createDefaultState().factions);
  const [performanceReviews, setPerformanceReviewsRaw] = useState(() => createDefaultState().performanceReviews);
  const [activitySettings, setActivitySettingsRaw] = useState(() => createDefaultState().activitySettings);
  const [positions, setPositionsRaw] = useState(() => normalizePositionsMap(createDefaultState().positions));
  const [classRanks, setClassRanksRaw] = useState(() => createDefaultState().classRanks);
  const [medals, setMedalsRaw] = useState(() => createDefaultState().medals);
  const [criteria, setCriteriaRaw] = useState(() => createDefaultState().criteria);
  const [bonusSettings, setBonusSettingsRaw] = useState(() => createDefaultState().bonusSettings);
  const [auditLog, setAuditLogRaw] = useState(() => createDefaultState().auditLog);
  const [activePage, setActivePageRaw] = useState("my-cabinet");
  const skipNextPushRef = useRef(false);
  const setActivePage = useCallback((pageId) => {
    setActivePageRaw((prev) => {
      if (prev !== pageId && !skipNextPushRef.current) {
        try { window.history.pushState({ page: pageId }, "", ""); } catch (e) {}
      }
      skipNextPushRef.current = false;
      return pageId;
    });
  }, []);
  useEffect(() => {
    try { window.history.replaceState({ page: "home" }, "", ""); } catch (e) {}
    const onPopState = (e) => {
      const pg = e.state?.page || "home";
      skipNextPushRef.current = true;
      setActivePageRaw(pg);
    };
    window.addEventListener("popstate", onPopState);
    return () => window.removeEventListener("popstate", onPopState);
  }, []);
  const [adminPanelSection, setAdminPanelSection] = useState(ADMIN_PANEL_SECTIONS[0].id);
  const [maintenanceAdminEntry, setMaintenanceAdminEntry] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [previewRole, setPreviewRole] = useState("");
  const [previewSubject, setPreviewSubject] = useState(SUBJECTS[0]);
  const [previewUserId, setPreviewUserId] = useState("");
  const [previewPanelCollapsed, setPreviewPanelCollapsed] = useState(false);
  const [previewNotice, setPreviewNotice] = useState("");
  const [serverReady, setServerReady] = useState(false);
  const [serverError, setServerError] = useState("");
  const [syncError, setSyncError] = useState("");
  const [syncNotice, setSyncNotice] = useState("");
  const [lastServerSyncAt, setLastServerSyncAt] = useState(null);
  const [refreshingServer, setRefreshingServer] = useState(false);

  useEffect(() => () => {
    if (previewNoticeTimerRef.current) clearTimeout(previewNoticeTimerRef.current);
    if (syncNoticeTimerRef.current) clearTimeout(syncNoticeTimerRef.current);
  }, []);

  // Swipe to open/close sidebar on mobile
  useSwipe(
    useCallback(() => setSidebarOpen(true), []),
    useCallback(() => setSidebarOpen(false), [])
  );

  // Scroll position management
  const prevPageRef = useRef(activePage);
  useEffect(() => {
    if (prevPageRef.current !== activePage) {
      saveScrollPosition(prevPageRef.current);
      prevPageRef.current = activePage;
      restoreScrollPosition(activePage);
    }
  }, [activePage]);

  // Global hotkeys
  useHotkey("escape", () => setSidebarOpen(false), []);
  useHotkey("ctrl+k", () => {
    const searchInput = document.querySelector('input[type="text"][placeholder*="\u041F\u043E\u0438\u0441\u043A"]');
    if (searchInput) searchInput.focus();
  }, []);

  const showSyncNotice = useCallback((message, timeoutMs = 3200) => {
    setSyncNotice(message);
    if (syncNoticeTimerRef.current) clearTimeout(syncNoticeTimerRef.current);
    if (timeoutMs > 0) {
      syncNoticeTimerRef.current = setTimeout(() => setSyncNotice(""), timeoutMs);
    }
  }, []);

  const applyStateSnapshot = useCallback((snapshot) => {
    const next = normalizeStateShape(snapshot);
    setUsersRaw(next.users);
    setRegistrationRequestsRaw(next.registrationRequests);
    setReportsRaw(next.reports);
    setBonusesRaw(next.bonuses);
    setActivityEventsRaw(next.activityEvents);
    setFactionsRaw(next.factions);
    setPerformanceReviewsRaw(next.performanceReviews);
    setActivitySettingsRaw(next.activitySettings);
    setPositionsRaw(next.positions);
    setClassRanksRaw(next.classRanks);
    setMedalsRaw(next.medals);
    setCriteriaRaw(next.criteria);
    setBonusSettingsRaw(next.bonusSettings);
    setAuditLogRaw(next.auditLog);
  }, []);

  const persistRemoteKey = useCallback(async (key, value) => {
    saveData(key, value);
    try {
      setSyncError("");
      await apiRequest("save", { key, value });
    } catch (e) {
      console.error("save failed", key, e);
      setSyncError(e.message || "Не удалось сохранить изменения в MySQL");
    }
  }, []);

  const maybeImportLegacyState = useCallback(async (payload) => {
    const shouldTryImport =
      payload?.meta?.freshlySeeded &&
      hasSystemAdminAccess(payload?.currentUser) &&
      localStorage.getItem(LEGACY_MIGRATION_FLAG) !== "1";

    if (!shouldTryImport) return payload.state;

    const legacyState = getLegacyStateSnapshot();
    if (!hasMeaningfulLegacyData(legacyState)) {
      localStorage.setItem(LEGACY_MIGRATION_FLAG, "1");
      return payload.state;
    }

    const mergedLegacyState = {
      ...legacyState,
      auditLog: [...(legacyState.auditLog || []), ...(payload.state?.auditLog || [])],
    };

    const imported = await apiRequest("bulk-save", { state: mergedLegacyState });
    localStorage.setItem(LEGACY_MIGRATION_FLAG, "1");
    showSyncNotice("Локальные данные перенесены в общую базу MySQL.");
    return imported.state;
  }, [showSyncNotice]);

  const maybeRecoverLegacyPositions = useCallback(async (user, stateSnapshot) => {
    if (!user || !hasSystemAdminAccess(user)) return stateSnapshot;
    if (localStorage.getItem(LEGACY_POSITIONS_RECOVERY_FLAG) === "1") return stateSnapshot;

    const legacyPositions = loadData("positions", null);
    if (!legacyPositions || typeof legacyPositions !== "object") {
      localStorage.setItem(LEGACY_POSITIONS_RECOVERY_FLAG, "1");
      return stateSnapshot;
    }

    const merged = mergeLegacyPositions(stateSnapshot.positions, legacyPositions);
    localStorage.setItem(LEGACY_POSITIONS_RECOVERY_FLAG, "1");
    if (merged.mergedCount === 0) return stateSnapshot;

    await apiRequest("save", { key: "positions", value: merged.positions });
    showSyncNotice(`Восстановлены локальные должности: ${merged.mergedCount}.`);
    return { ...stateSnapshot, positions: merged.positions };
  }, [showSyncNotice]);

  const bootstrapApp = useCallback(async ({ background = false, notifyOnSuccess = false } = {}) => {
    if (bootstrapInFlightRef.current) return false;
    bootstrapInFlightRef.current = true;
    if (background) {
      setRefreshingServer(true);
      setSyncError("");
    } else {
      setServerReady(false);
      setServerError("");
    }
    try {
      const response = await apiRequest("bootstrap");
      let nextState = response.state;
      if (response.authenticated && response.currentUser) {
        try {
          nextState = await maybeImportLegacyState(response);
          nextState = await maybeRecoverLegacyPositions(response.currentUser, nextState);
        } catch (e) {
          setSyncError(e.message || "Не удалось импортировать локальные данные");
        }
        applyStateSnapshot(nextState);
        setChecksMeta(normalizeChecksMeta(response.checksMeta));
        setCasesMeta(normalizeCasesMeta(response.casesMeta));
        setCurrentUser(normalizeUserRecord(response.currentUser));
      } else {
        // Try auto-login from saved credentials
        let autoLogged = false;
        try {
          const saved = JSON.parse(localStorage.getItem("prok_autologin") || "null");
          if (saved?.login && saved?.password) {
            const authPayload = await apiRequest("login", { login: saved.login, password: saved.password });
            if (authPayload?.authenticated && authPayload?.currentUser) {
              let autoState = authPayload.state;
              try {
                autoState = await maybeImportLegacyState(authPayload);
                autoState = await maybeRecoverLegacyPositions(authPayload.currentUser, autoState);
              } catch (e) {}
              applyStateSnapshot(autoState);
              setChecksMeta(normalizeChecksMeta(authPayload.checksMeta));
              setCasesMeta(normalizeCasesMeta(authPayload.casesMeta));
              setCurrentUser(normalizeUserRecord(authPayload.currentUser));
              autoLogged = true;
            }
          }
        } catch (e) {
          try { localStorage.removeItem("prok_autologin"); } catch (ex) {}
        }
        if (!autoLogged) {
          applyStateSnapshot(nextState);
          setChecksMeta(normalizeChecksMeta(response.checksMeta));
          setCasesMeta(normalizeCasesMeta(response.casesMeta));
          setCurrentUser(null);
        }
      }
      setLastServerSyncAt(new Date().toISOString());
      if (background && notifyOnSuccess) {
        showSyncNotice("Состояние обновлено с сервера.");
      }
      return true;
    } catch (e) {
      if (background) {
        setSyncError(e.message || "Не удалось обновить состояние из MySQL");
        return false;
      }
      setServerError(e.message || "Не удалось подключиться к базе данных");
      return false;
    } finally {
      bootstrapInFlightRef.current = false;
      if (background) {
        setRefreshingServer(false);
      } else {
        setServerReady(true);
      }
    }
  }, [applyStateSnapshot, maybeImportLegacyState, maybeRecoverLegacyPositions, showSyncNotice]);

  useEffect(() => {
    void bootstrapApp();
  }, [bootstrapApp]);

  useEffect(() => {
    if (!serverReady) return undefined;
    const timerId = setInterval(() => {
      void bootstrapApp({ background: true });
    }, 60000);
    return () => clearInterval(timerId);
  }, [serverReady, currentUser?.id, bootstrapApp]);

  const setUsers = useCallback((value) => {
    const next = typeof value === "function" ? value(users) : value;
    setUsersRaw(next);
    if (currentUser) {
      const refreshedCurrentUser = next.find(u => u.id === currentUser.id);
      if (refreshedCurrentUser) {
        const { password, ...safeUser } = refreshedCurrentUser;
        setCurrentUser(normalizeUserRecord(safeUser));
      }
    }
    void persistRemoteKey("users", next);
  }, [users, currentUser, persistRemoteKey]);

  const setRegistrationRequests = useCallback((value) => {
    const next = typeof value === "function" ? value(registrationRequests) : value;
    setRegistrationRequestsRaw(next);
    void persistRemoteKey("registrationRequests", next);
  }, [registrationRequests, persistRemoteKey]);

  const setReports = useCallback((value) => {
    const next = typeof value === "function" ? value(reports) : value;
    setReportsRaw(next);
    void persistRemoteKey("reports", next);
  }, [reports, persistRemoteKey]);

  const setBonuses = useCallback((value) => {
    const next = typeof value === "function" ? value(bonuses) : value;
    setBonusesRaw(next);
    void persistRemoteKey("bonuses", next);
  }, [bonuses, persistRemoteKey]);

  const setActivityEvents = useCallback((value) => {
    const next = normalizeActivityEventList(typeof value === "function" ? value(activityEvents) : value, activitySettings);
    setActivityEventsRaw(next);
    void persistRemoteKey("activityEvents", next);
  }, [activityEvents, activitySettings, persistRemoteKey]);

  const setFactions = useCallback((value) => {
    const next = normalizeFactionList(typeof value === "function" ? value(factions) : value, factions);
    setFactionsRaw(next);
    void persistRemoteKey("factions", next);
  }, [factions, persistRemoteKey]);

  const setPerformanceReviews = useCallback((value) => {
    const next = normalizePerformanceReviewList(typeof value === "function" ? value(performanceReviews) : value);
    setPerformanceReviewsRaw(next);
    void persistRemoteKey("performanceReviews", next);
  }, [performanceReviews, persistRemoteKey]);

  const setActivitySettings = useCallback((value) => {
    const next = normalizeActivitySettings(typeof value === "function" ? value(activitySettings) : value, activitySettings);
    setActivitySettingsRaw(next);
    void persistRemoteKey("activitySettings", next);
  }, [activitySettings, persistRemoteKey]);

  const setPositions = useCallback((value) => {
    const next = normalizePositionsMap(typeof value === "function" ? value(positions) : value, positions);
    setPositionsRaw(next);
    void persistRemoteKey("positions", next);
  }, [positions, persistRemoteKey]);

  const setClassRanks = useCallback((value) => {
    const next = normalizeDirectoryList(typeof value === "function" ? value(classRanks) : value, classRanks);
    setClassRanksRaw(next);
    void persistRemoteKey("classRanks", next);

                      setPreviewRole(nextRole);
                      if (!nextRole) {
                        setPreviewUserId("");
                        setPreviewNotice("");
                        return;
                      }
                      if (nextRole === "FEDERAL") {
                        setPreviewSubject(GENERAL_SUBJECT);
                      } else if (previewSubject === GENERAL_SUBJECT) {
                        setPreviewSubject(SUBJECTS[0]);
                      }
                    }}
                  >
                    <option value="">Отключен</option>
                    {previewRoleOptions.map(role => <option key={role} value={role}>{ROLE_LABELS[role]}</option>)}
                  </select>
                </div>

                {previewRole && ["STAFF", "SENIOR_STAFF", "USP", "BOSS"].includes(previewRole) && (
                  <div>
                    <label style={S.label}>Субъект</label>
                    <select style={S.select} value={previewSubject} onChange={e => setPreviewSubject(e.target.value)}>
                      {SUBJECTS.map(subject => <option key={subject} value={subject}>{subject}</option>)}
                    </select>
                  </div>
                )}

                {previewRole && (
                  <div>
                    <label style={S.label}>Профиль</label>
                    <select style={S.select} value={previewUserId} onChange={e => setPreviewUserId(e.target.value)}>
                      <option value="">Автовыбор</option>
                      {previewCandidates.map(candidate => {
                        const position = allPositions.find(item => item.id === candidate.positionId);
                        const suffix = position ? ` — ${position.title}` : "";
                        return <option key={candidate.id} value={candidate.id}>{getUserFullName(candidate)}{suffix}</option>;
                      })}
                    </select>
                    {previewCandidates.length === 0 && (
                      <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 6 }}>
                        Подходящий пользователь не найден. Будет открыт тестовый профиль.
                      </div>
                    )}
                  </div>
                )}

                {isPreviewMode && (
                  <div style={{ padding: "10px 12px", borderRadius: 10, background: C.activeNav, border: `1px solid ${C.blue}55` }}>
                    <div style={{ fontSize: T.body, color: C.text, fontWeight: 700 }}>{ROLE_LABELS[effectiveUser.role]}</div>
                    <div style={{ fontSize: T.meta, color: C.blueLight, marginTop: 4 }}>{getUserFullName(effectiveUser)}</div>
                    <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>
                      {effectiveUserPosition ? effectiveUserPosition.title : effectiveUser.role} • {effectiveUser.subject}
                    </div>
                    {effectiveUser.previewSource === "synthetic" && (
                      <div style={{ fontSize: T.meta, color: C.warning, marginTop: 6 }}>
                        Тестовый профиль без реального пользователя.
                      </div>
                    )}
                  </div>
                )}
              </>
            )}
          </div>
        )}

        <div style={{ flex: 1, minHeight: 0, padding: "10px 0 18px", overflowY: "auto" }}>
          {navItems.map(item => {
            const active = activePage === item.id;
            const notificationCount = item.id === "notifications" ? notificationSummary.total : 0;
            return (
              <div
                key={item.id}
                className={`nav-item${active ? " nav-active" : ""}`}
                onClick={() => {
                  if (item.id === "admin-panel" && isAdminSession) {
                    openSessionAdminPanel();
                    return;
                  }
                  setActivePage(item.id);
                  setSidebarOpen(false);
                }}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 18px", cursor: "pointer", fontSize: T.body, color: active ? C.gold : C.textDim, borderLeft: "3px solid transparent", transition: "all 0.2s", letterSpacing: 0.5 }}>
                <span>{item.icon}</span>
                <span style={{ flex: 1 }}>{item.label}</span>
                {notificationCount > 0 && <span style={{ ...badge(notificationTone), fontSize: 11 }}>{notificationCount}</span>}
              </div>
            );
          })}
        </div>

        <div style={{ padding: "14px 18px", borderTop: `1px solid ${C.border}` }}>
          <button className="btn-hover" onClick={handleLogout} style={{ ...btn("crimson"), width: "100%" }}>Выйти из системы</button>
        </div>
      </div>

      {/* Main content */}
      <div className="app-main" style={{ marginLeft: 280, flex: 1, padding: "32px 36px", minHeight: "100vh" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
          <div style={{ fontSize: T.meta, color: C.textMuted }}>
            Последнее обновление: {lastServerSyncAt ? formatDateTime(lastServerSyncAt) : "—"}
          </div>
          {!isPendingApprovalSession && (
            <button
              className="btn-hover"
              onClick={() => { setActivePage("notifications"); setSidebarOpen(false); }}
              style={{ ...btn(activePage === "notifications" ? "gold" : "ghost"), display: "inline-flex", alignItems: "center", gap: 10, padding: "10px 16px" }}
            >
              <span style={{ fontSize: 18, lineHeight: 1 }}>🔔</span>
              <span>Уведомления</span>
              {notificationSummary.total > 0 && <span style={{ ...badge(activePage === "notifications" ? C.text : notificationTone), fontSize: 11 }}>{notificationSummary.total}</span>}
            </button>
          )}
        </div>
        {syncNotice && <div style={{ padding: "10px 14px", background: C.success + "22", border: `1px solid ${C.success}44`, borderRadius: 8, color: C.success, fontSize: T.body, marginBottom: 16 }}>{syncNotice}</div>}
        {syncError && <div style={{ padding: "10px 14px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body, marginBottom: 16 }}>{syncError}</div>}
        {isPendingApprovalSession && (
          <div style={{ padding: "12px 14px", background: C.warning + "18", border: `1px solid ${C.warning}44`, borderRadius: 8, color: C.warning, fontSize: T.body, marginBottom: 16 }}>
            Доступ к рабочим разделам откроется после одобрения заявки. Повторный вход не потребуется.
          </div>
        )}
        {isPreviewMode && (
          <div style={{ padding: "12px 14px", background: C.blue + "18", border: `1px solid ${C.blue}44`, borderRadius: 8, color: C.blueLight, fontSize: T.body, marginBottom: 16 }}>
            Режим просмотра: {ROLE_LABELS[effectiveUser.role]} • {effectiveUser.subject}. Изменения в этом режиме отключены.
          </div>
        )}
        {previewNotice && <div style={{ padding: "10px 14px", background: C.warning + "22", border: `1px solid ${C.warning}44`, borderRadius: 8, color: C.warning, fontSize: T.body, marginBottom: 16 }}>{previewNotice}</div>}
        {maintenanceStatus.isPlanned && maintenanceStatus.scheduledAt && (
          <div style={{ padding: "12px 14px", background: `${maintenanceStatus.msUntilStart !== null && maintenanceStatus.msUntilStart <= 24 * 60 * 60 * 1000 ? C.warning : C.blue}18`, border: `1px solid ${maintenanceStatus.msUntilStart !== null && maintenanceStatus.msUntilStart <= 24 * 60 * 60 * 1000 ? C.warning : C.blue}44`, borderRadius: 8, color: maintenanceStatus.msUntilStart !== null && maintenanceStatus.msUntilStart <= 24 * 60 * 60 * 1000 ? C.warning : C.blueLight, fontSize: T.body, marginBottom: 16 }}>
            <div style={{ fontSize: T.bodyStrong, color: C.text, marginBottom: 6 }}>Запланированы техработы</div>
            <div>Начало: {formatDateTime(maintenanceStatus.scheduledAt)}.</div>
            {maintenanceStatus.announcement && <div style={{ marginTop: 6, color: C.textDim }}>{maintenanceStatus.announcement}</div>}
          </div>
        )}
        {maintenanceStatus.isActive && hasSystemAdminAccess(currentUser) && (
          <div style={{ padding: "12px 14px", background: C.warning + "18", border: `1px solid ${C.warning}44`, borderRadius: 8, color: C.warning, fontSize: T.body, marginBottom: 16 }}>
            <div style={{ fontSize: T.bodyStrong, color: C.text, marginBottom: 6 }}>Техработы сейчас включены</div>
            <div>Публичная часть сайта ограничена до отключения режима.</div>
            {maintenanceStatus.announcement && <div style={{ marginTop: 6, color: C.textDim }}>{maintenanceStatus.announcement}</div>}
          </div>
        )}
        <div className="page-transition" key={activePage}>
        {renderPage()}
        </div>
        <div className="app-footer-disclaimer no-print">
          © 2026 ЕИАС «Фемида». Все данные носят игровой характер и не имеют юридической силы.
        </div>
      </div>
    </div>
    </ThemeContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
