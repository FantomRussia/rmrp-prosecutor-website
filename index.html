function getNotificationSummary(notifications) {
  return (notifications || []).reduce((summary, item) => {
    const key = item?.priority || "info";
    summary[key] = (summary[key] || 0) + 1;
    summary.total += 1;
    return summary;
  }, { critical: 0, warning: 0, info: 0, total: 0 });
}

function getNotificationSortTime(item) {
  const value = item?.date ? new Date(item.date) : null;
  return value && !Number.isNaN(value.getTime()) ? value.getTime() : 0;
}

function getNotificationEventDate(report) {
  return report?.returnedAt || report?.approvedAt || report?.updatedAt || report?.savedAt || report?.submittedAt || report?.date || null;
}

function sortNotifications(items) {
  return [...(items || [])].sort((left, right) => {
    const priorityDelta = (NOTIFICATION_PRIORITY_ORDER[left.priority] ?? 99) - (NOTIFICATION_PRIORITY_ORDER[right.priority] ?? 99);
    if (priorityDelta !== 0) return priorityDelta;
    return getNotificationSortTime(right) - getNotificationSortTime(left);
  });
}

function getNotificationsForUser({ user, users, reports, bonuses, activityEvents, factions, performanceReviews, activitySettings, registrationRequests, bonusSettings, auditLog, positions, criteria, calendarEvents }) {
  if (!user) return [];
  if (isPendingApprovalUser(user)) {
    return [{
      id: `registration-pending-${user.pendingRequestId || user.id}`,
      type: "registration_pending",
      priority: "info",
      title: "Заявка на регистрацию ожидает одобрения",
      text: "Вы уже вошли в систему. Доступ к рабочим разделам откроется сразу после одобрения заявки.",
      date: user.pendingRequestCreatedAt || user.createdAt || null,
      actionId: "home",
      scope: user.subject || "",
      actionLabel: "Главная",
    }];
  }

  const notifications = [];
  const now = new Date();
  const currentPeriodKey = getReportPeriodKey(now);
  const currentPeriodLabel = getReportPeriodLabel(now);
  const currentDeadline = getReportDeadlineDate(currentPeriodKey, bonusSettings);
  const hoursUntilDeadline = Math.round((currentDeadline.getTime() - now.getTime()) / 3600000);
  const deadlineReminderWindowHours = 7 * 24;
  const showDeadlineSubmissionReminder = hoursUntilDeadline <= deadlineReminderWindowHours;
  const currentPeriodScope = currentPeriodLabel;
  const ownRecords = (reports || []).filter(item => item.userId === user.id).sort((a, b) => new Date(b.date) - new Date(a.date));
  const ownOperationalReports = ownRecords.filter(isOperationalReport);
  const currentReport = ownOperationalReports.find(item => getReportStoredPeriodKey(item) === currentPeriodKey) || null;
  const currentReportStatus = currentReport ? getReportStatusValue(currentReport) : "";
  const currentFederalRequest = ownRecords.find(item => isFederalBonusRequest(item) && getReportStoredPeriodKey(item) === currentPeriodKey) || null;
  const currentFederalStatus = currentFederalRequest ? getReportStatusValue(currentFederalRequest) : "";
  const userBonuses = (bonuses || []).filter(item => item.userId === user.id).sort((a, b) => new Date(b.date) - new Date(a.date));
  const latestBonus = userBonuses[0] || null;
  const latestBonusIsRecent = latestBonus
    ? Math.abs(now.getTime() - new Date(latestBonus.date || 0).getTime()) <= 45 * 24 * 60 * 60 * 1000
    : false;
  const pendingBossQueue = (reports || []).filter(report => canBossReviewReport(report, user));
  const pendingFederalQueue = (reports || []).filter(report => canFederalReviewReport(report, user));
  const pendingOwnRequests = (registrationRequests || []).filter(request => canReviewRequest(user, request, users));
  const pendingAllRequests = (registrationRequests || []).filter(request => request.status === "pending");
  const returnedReports = (reports || []).filter(report => ["returned_boss", "returned_author"].includes(getReportStatusValue(report)));
  const maintenanceStatus = getMaintenanceStatus(bonusSettings, now);
  const pushNotification = (item) => {
    notifications.push({
      scope: item.scope || "",
      actionLabel: item.actionLabel || getNotificationActionLabel(item.actionId),
      ...item,
    });
  };

  if (maintenanceStatus.isPlanned && maintenanceStatus.scheduledAt) {
    const hoursUntilMaintenance = Math.round((maintenanceStatus.scheduledAt.getTime() - now.getTime()) / 3600000);
    pushNotification({
      id: `maintenance-planned-${maintenanceStatus.scheduledAt.toISOString()}`,
      type: "maintenance_planned",
      priority: hoursUntilMaintenance <= 6 ? "critical" : hoursUntilMaintenance <= 24 ? "warning" : "info",
      title: "Запланированы техработы на сайте",
      text: `${maintenanceStatus.announcement ? `${maintenanceStatus.announcement} ` : ""}Начало: ${formatDateTime(maintenanceStatus.scheduledAt)}.`,
      date: maintenanceStatus.scheduledAt.toISOString(),
      actionId: hasSystemAdminAccess(user) ? "admin-panel" : "notifications",
      scope: "Система",
    });
  }

  if (maintenanceStatus.isActive && hasSystemAdminAccess(user)) {
    pushNotification({
      id: `maintenance-active-${maintenanceStatus.activatedAt?.toISOString?.() || currentPeriodKey}`,
      type: "maintenance_mode",
      priority: "warning",
      title: "Техработы включены",
      text: maintenanceStatus.announcement || "Публичная часть сайта ограничена до отключения режима техработ.",
      date: (maintenanceStatus.activatedAt || now).toISOString(),
      actionId: "admin-panel",
      scope: "Система",
    });
  }

  if (isPilotUser(user, activitySettings)) {
    const pilotMetrics = buildPilotMetricsSnapshot(user, activityEvents, factions, currentPeriodKey, activitySettings);
    const pilotReview = findPerformanceReviewForUser(performanceReviews, user.id, currentPeriodKey, user.subject);
    if (pilotMetrics.eventsWithoutLinks > 0) {
      pushNotification({
        id: `pilot-links-${user.id}-${currentPeriodKey}`,
        type: "pilot_links",
        priority: "warning",
        title: "Есть события без доказательств",
        text: `Без ссылки или скриншота осталось ${pilotMetrics.eventsWithoutLinks} материал(а/ов).`,
        date: now.toISOString(),
        actionId: "my-report",
        scope: currentPeriodScope,
      });
    }
    if (pilotReview?.status === "returned_boss") {
      pushNotification({
        id: `pilot-review-returned-${pilotReview.id}`,
        type: "pilot_review_returned",
        priority: "critical",
        title: user.role === "BOSS" ? "Премия возвращена на доработку" : "Коэффициент возвращён на доработку",
        text: pilotReview.returnComment || "Федеральный уровень вернул решение на корректировку.",
        date: pilotReview.returnedAt || pilotReview.updatedAt,
        actionId: user.role === "BOSS" ? "my-bonus" : "subject-control",
        scope: currentPeriodScope,
      });
    } else if (pilotReview?.status === "pending_federal") {
      pushNotification({
        id: `pilot-review-pending-${pilotReview.id}`,
        type: "pilot_review_pending",
        priority: "info",
        title: "Коэффициент уже на федеральном утверждении",
        text: `Текущая расчётная сумма: ${formatCurrency(getPilotReviewDisplayAmount(pilotReview))}.`,
        date: pilotReview.updatedAt,
        actionId: "my-bonus",
        scope: currentPeriodScope,
      });
    } else if (pilotReview?.status === "approved") {
      pushNotification({
        id: `pilot-review-approved-${pilotReview.id}`,
        type: "pilot_review_approved",
        priority: "info",
        title: "Премия утверждена",
        text: `Сумма: ${formatCurrency(getPilotReviewDisplayAmount(pilotReview))}.`,
        date: pilotReview.approvedAt || pilotReview.updatedAt,
        actionId: "my-bonus",
        scope: currentPeriodScope,
      });
    }
    if (user.role === "BOSS") {
      const subjectQueue = getPilotReviewQueueItems({ users, activityEvents, performanceReviews, factions, activitySettings, periodKey: currentPeriodKey, subjectScope: [user.subject] }).filter(item => item.user.role === "BOSS" || item.user.role === "STAFF");
      const actionableQueue = subjectQueue.filter(item => item.user.role === "STAFF");
      if (actionableQueue.length > 0) {
        pushNotification({
          id: `pilot-subject-control-${user.id}-${currentPeriodKey}`,
          type: "pilot_subject_control",
          priority: "warning",
          title: `По сотрудникам ждут решения ${actionableQueue.length} материал(а/ов)`,
          text: "Откройте контроль субъекта и назначьте коэффициенты по автостатистике.",
          date: now.toISOString(),
          actionId: "subject-control",
          scope: user.subject,
        });
      }
    }
    // Уведомления о назначенных событиях в календаре
    if (Array.isArray(calendarEvents)) {
      const now = new Date();
      const upcoming48h = new Date(now.getTime() + 48 * 3600000);
      calendarEvents.forEach(ev => {
        if (ev.entityType !== "manual" || ev.isOwner) return;
        const start = new Date(ev.startsAt);
        if (start < now || start > upcoming48h) return;
        pushNotification({
          id: `calendar-assigned-${ev.entityId}`,
          type: "calendar_assigned",
          priority: "info",
          title: "Назначено событие: " + (ev.title || "Без названия"),
          text: "Начало: " + start.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" }),
          date: ev.startsAt,
          actionId: "calendar",
          scope: "Календарь",
        });
      });
    }
    return sortNotifications(notifications);
  }

  if ((user.role === "FEDERAL" || hasSystemAdminAccess(user)) && canViewPilotAnalytics(user, activitySettings)) {
    const pilotQueue = getPilotReviewQueueItems({ users, activityEvents, performanceReviews, factions, activitySettings, periodKey: currentPeriodKey, subjectScope: activitySettings?.pilotSubjects });
    if (pilotQueue.length > 0 && showDeadlineSubmissionReminder) {
      pushNotification({
        id: `pilot-federal-queue-${currentPeriodKey}`,
        type: "pilot_federal_queue",
        priority: "warning",
        title: `${getPilotSubjectsLabel(activitySettings?.pilotSubjects)}: ${pilotQueue.length} решени(й/я) на финальном утверждении`,
        text: "В очереди есть коэффициенты STAFF и прямые решения по BOSS на основе событийной статистики.",
        date: now.toISOString(),
        actionId: "bonus-approval",
        scope: getPilotSubjectsLabel(activitySettings?.pilotSubjects),
      });
    }
  }

  if (user.role === "STAFF") {
    if (!currentReport && showDeadlineSubmissionReminder) {
      pushNotification({
        id: `staff-report-missing-${user.id}-${currentPeriodKey}`,
        type: "report_missing",
        priority: hoursUntilDeadline <= 0 ? "critical" : "warning",
        title: `Отчёт за ${currentPeriodLabel.toLowerCase()} не подан`,
        text: hoursUntilDeadline <= 0
          ? `Дедлайн истёк ${formatDateTime(currentDeadline)}. Отчёт отсутствует.`
          : hoursUntilDeadline <= 72
            ? `До дедлайна осталось около ${Math.max(hoursUntilDeadline, 0)} ч. Отправьте отчёт до ${formatDateTime(currentDeadline)}.`
            : `Текущий отчётный период открыт до ${formatDateTime(currentDeadline)}.`,
        date: currentDeadline.toISOString(),
        actionId: "my-report",
        scope: currentPeriodScope,
      });
    } else if (currentReportStatus === "draft" && showDeadlineSubmissionReminder) {
      pushNotification({
        id: `staff-report-draft-${currentReport.id}`,
        type: "report_draft",
        priority: hoursUntilDeadline <= 0 ? "critical" : "warning",
        title: "Черновик отчёта не отправлен",
        text: hoursUntilDeadline <= 0
          ? `Срок редактирования истёк ${formatDateTime(currentDeadline)}. Черновик так и не был отправлен.`
          : hoursUntilDeadline <= 72
            ? `До дедлайна осталось около ${Math.max(hoursUntilDeadline, 0)} ч. Завершите и отправьте отчёт.`
            : "Черновик сохранён, но ещё не направлен на согласование.",
        date: currentDeadline.toISOString(),
        actionId: "my-report",
        scope: currentPeriodScope,
      });
    }

    if (currentReportStatus === "returned_author") {
      pushNotification({
        id: `staff-report-returned-${currentReport.id}`,
        type: "report_returned",
        priority: "critical",
        title: "Отчёт возвращён на доработку",
        text: currentReport.returnComment || `Исправьте материал и отправьте заново до ${formatDateTime(currentDeadline)}.`,
        date: currentReport.returnedAt || getNotificationEventDate(currentReport),
        actionId: "my-report",
        scope: currentPeriodScope,
      });
    }

    if (currentReport && ["pending_boss", "pending_federal"].includes(currentReportStatus)) {
      pushNotification({
        id: `staff-report-pending-${currentReport.id}`,
        type: "report_pending",
        priority: "info",
        title: "Отчёт находится на согласовании",
        text: `Текущий статус: ${getReportStatusMeta(currentReport).label}. Проверяйте движение премии в личном разделе.`,
        date: getNotificationEventDate(currentReport),
        actionId: "my-bonus",
        scope: currentPeriodScope,
      });
    }

    if (latestBonusIsRecent && latestBonus?.status === "approved") {
      pushNotification({
        id: `staff-bonus-approved-${latestBonus.id}`,
        type: "bonus_approved",
        priority: "info",
        title: "Премия утверждена",
        text: `К выплате утверждено ${formatCurrency(latestBonus.amount)}.`,
        date: latestBonus.date,
        actionId: "my-bonus",
        scope: latestBonus.subject || user.subject,
      });
    } else if (latestBonusIsRecent && latestBonus?.status === "rejected") {
      pushNotification({
        id: `staff-bonus-rejected-${latestBonus.id}`,
        type: "bonus_rejected",
        priority: "warning",
        title: "Премия отклонена",
        text: latestBonus.comment || "По последней выплате принято отрицательное решение.",
        date: latestBonus.date,
        actionId: "my-bonus",
        scope: latestBonus.subject || user.subject,
      });
    }
  }

  if (user.role === "BOSS") {
    if (pendingBossQueue.length > 0) {
      pushNotification({
        id: `boss-queue-${user.id}-${currentPeriodKey}`,
        type: "approval_queue",
        priority: "warning",
        title: `На рассмотрении ${pendingBossQueue.length} отчёт(ов)`,
        text: `Материалы сотрудников субъекта ${user.subject} ждут вашего решения.`,
        date: pendingBossQueue.reduce((latest, item) => {
          const nextDate = getNotificationEventDate(item);
          return !latest || new Date(nextDate || 0) > new Date(latest || 0) ? nextDate : latest;
        }, null),
        actionId: "subject-control",
        scope: user.subject,
      });
    }

    if (pendingOwnRequests.length > 0) {
      pushNotification({
        id: `boss-requests-${user.id}`,
        type: "registration_requests",
        priority: "warning",
        title: `Новые заявки на регистрацию: ${pendingOwnRequests.length}`,
        text: `По субъекту ${user.subject} ожидают рассмотрения новые заявки на доступ.`,
        date: pendingOwnRequests.reduce((latest, item) => !latest || new Date(item.createdAt || 0) > new Date(latest || 0) ? item.createdAt : latest, null),
        actionId: "registration-requests",
        scope: user.subject,
      });
    }

    if (!currentReport && showDeadlineSubmissionReminder) {
      pushNotification({
        id: `boss-report-missing-${user.id}-${currentPeriodKey}`,
        type: "personal_report_missing",
        priority: hoursUntilDeadline <= 0 ? "critical" : "warning",
        title: `Личный отчёт за ${currentPeriodLabel.toLowerCase()} не подан`,
        text: hoursUntilDeadline <= 0
          ? `Дедлайн истёк ${formatDateTime(currentDeadline)}.`
          : `Личный отчёт руководителя доступен до ${formatDateTime(currentDeadline)}.`,
        date: currentDeadline.toISOString(),
        actionId: "my-report",
        scope: currentPeriodScope,
      });
    } else if (currentReportStatus === "draft" && showDeadlineSubmissionReminder) {
      pushNotification({
        id: `boss-report-draft-${currentReport.id}`,
        type: "personal_report_draft",
        priority: hoursUntilDeadline <= 0 ? "critical" : "warning",
        title: "Личный отчёт сохранён как черновик",
        text: hoursUntilDeadline <= 0
          ? "Черновик не был отправлен до закрытия периода."
          : `Отправьте личный отчёт до ${formatDateTime(currentDeadline)}.`,
        date: currentDeadline.toISOString(),
        actionId: "my-report",
        scope: currentPeriodScope,
      });
    }

    if (currentReportStatus === "returned_author") {
      pushNotification({
        id: `boss-report-returned-${currentReport.id}`,
        type: "personal_report_returned",
        priority: "critical",
        title: "Личный отчёт возвращён на доработку",
        text: currentReport.returnComment || "Исправьте отчёт и отправьте его заново.",
        date: currentReport.returnedAt || getNotificationEventDate(currentReport),
        actionId: "my-report",
        scope: currentPeriodScope,
      });
    }

    if (currentReportStatus === "pending_federal") {
      pushNotification({
        id: `boss-report-federal-${currentReport.id}`,
        type: "personal_report_forwarded",
        priority: "info",
        title: "Личный отчёт направлен в Генпрокуратуру",
        text: "Материал ожидает финального решения федерального уровня.",
        date: getNotificationEventDate(currentReport),
        actionId: "my-bonus",
        scope: currentPeriodScope,
      });
    }

    const forwardedReports = (reports || []).filter(report =>
      report.subject === user.subject
      && report.authorRole === "STAFF"
      && getReportStoredPeriodKey(report) === currentPeriodKey
      && ["pending_federal", "approved"].includes(getReportStatusValue(report))
    );
    if (forwardedReports.length > 0) {
      pushNotification({
        id: `boss-forwarded-${user.id}-${currentPeriodKey}`,
        type: "reports_forwarded",
        priority: "info",
        title: `В Генпрокуратуру уже передано ${forwardedReports.length} материал(ов)`,
        text: `Часть материалов по субъекту ${user.subject} уже ушла на финальное решение.`,
        date: forwardedReports.reduce((latest, item) => {
          const nextDate = getNotificationEventDate(item);
          return !latest || new Date(nextDate || 0) > new Date(latest || 0) ? nextDate : latest;
        }, null),
        actionId: "subject-control",
        scope: user.subject,
      });
    }
  }

  if (user.role === "FEDERAL") {
    if (pendingFederalQueue.length > 0 && showDeadlineSubmissionReminder) {
      pushNotification({
        id: `federal-queue-${user.id}-${currentPeriodKey}`,
        type: "federal_approval_queue",
        priority: "warning",
        title: `Очередь на финальное утверждение: ${pendingFederalQueue.length}`,
        text: "В очереди есть отчёты и премии, ожидающие решения Генпрокуратуры.",
        date: pendingFederalQueue.reduce((latest, item) => {
          const nextDate = getNotificationEventDate(item);
          return !latest || new Date(nextDate || 0) > new Date(latest || 0) ? nextDate : latest;
        }, null),
        actionId: "bonus-approval",
        scope: "Генеральная прокуратура",
      });
    }

    if (pendingOwnRequests.length > 0 && !hasSystemAdminAccess(user)) {
      pushNotification({
        id: `federal-requests-${user.id}`,
        type: "federal_registration_requests",
        priority: "warning",
        title: `Федеральные заявки на регистрацию: ${pendingOwnRequests.length}`,
        text: "В очереди есть заявки, которые должен видеть федеральный уровень.",
        date: pendingOwnRequests.reduce((latest, item) => !latest || new Date(item.createdAt || 0) > new Date(latest || 0) ? item.createdAt : latest, null),
        actionId: "registration-requests",
        scope: "Генеральная прокуратура",
      });
    }

    if (!isGeneralProsecutorUser(user)) {
      if (!currentFederalRequest && showDeadlineSubmissionReminder) {
        pushNotification({
          id: `federal-self-missing-${user.id}-${currentPeriodKey}`,
          type: "self_bonus_missing",
          priority: "warning",
          title: `Федеральная премия за ${currentPeriodLabel.toLowerCase()} не подана`,
          text: "Оформите личную заявку и выберите субъект премирования.",
          date: now.toISOString(),
          actionId: "my-bonus",
          scope: currentPeriodScope,
        });
      } else if (currentFederalStatus === "returned_author") {
        pushNotification({
          id: `federal-self-returned-${currentFederalRequest.id}`,
          type: "self_bonus_returned",
          priority: "critical",
          title: "Федеральная заявка возвращена на доработку",
          text: currentFederalRequest.returnComment || "Исправьте заявку и отправьте её заново.",
          date: currentFederalRequest.returnedAt || getNotificationEventDate(currentFederalRequest),
          actionId: "my-bonus",
          scope: currentFederalRequest.bonusTargetSubject || currentPeriodScope,
        });
      } else if (currentFederalStatus === "pending_federal") {
        pushNotification({
          id: `federal-self-pending-${currentFederalRequest.id}`,
          type: "self_bonus_pending",
          priority: "info",
          title: "Личная федеральная заявка уже на утверждении",
          text: `Субъект премии: ${currentFederalRequest.bonusTargetSubject || "не указан"}.`,
          date: getNotificationEventDate(currentFederalRequest),
          actionId: "my-bonus",
          scope: currentFederalRequest.bonusTargetSubject || currentPeriodScope,
        });
      }
    }
  }

  if (hasSystemAdminAccess(user)) {
    if (pendingAllRequests.length > 0) {
      pushNotification({
        id: `admin-requests-${currentPeriodKey}`,
        type: "all_registration_requests",
        priority: "warning",
        title: `Заявки на регистрацию ждут решения: ${pendingAllRequests.length}`,
        text: "В системе есть необработанные заявки на доступ.",
        date: pendingAllRequests.reduce((latest, item) => !latest || new Date(item.createdAt || 0) > new Date(latest || 0) ? item.createdAt : latest, null),
        actionId: "admin-panel",
        scope: "Система",
      });
    }

    if (pendingFederalQueue.length > 0 && showDeadlineSubmissionReminder) {
      pushNotification({
        id: `admin-bonus-queue-${currentPeriodKey}`,
        type: "premium_approval_queue",
        priority: "warning",
        title: `Очередь премий и отчётов: ${pendingFederalQueue.length}`,
        text: "Есть материалы, ожидающие финального решения.",
        date: pendingFederalQueue.reduce((latest, item) => {
          const nextDate = getNotificationEventDate(item);
          return !latest || new Date(nextDate || 0) > new Date(latest || 0) ? nextDate : latest;
        }, null),
        actionId: "bonus-approval",
        scope: "Система",
      });
    }

    if (returnedReports.length > 0) {
      pushNotification({
        id: `admin-returned-${currentPeriodKey}`,
        type: "returned_reports",
        priority: "info",
        title: `На доработке находится ${returnedReports.length} материал(ов)`,
        text: "В очередях есть отчёты или заявки, возвращённые авторам и руководителям.",
        date: returnedReports.reduce((latest, item) => {
          const nextDate = item.returnedAt || getNotificationEventDate(item);
          return !latest || new Date(nextDate || 0) > new Date(latest || 0) ? nextDate : latest;
        }, null),
        actionId: "bonus-approval",
        scope: "Система",
      });
    }

    const positionRolesWithoutItems = MANAGED_ROLE_OPTIONS.filter(role => !((positions?.[role]) || []).length);
    const criteriaRoles = new Set(((criteria) || []).map(item => item.role || "STAFF"));
    const missingCriteriaRoles = ["STAFF", "BOSS"].filter(role => !criteriaRoles.has(role));
    if (positionRolesWithoutItems.length > 0 || missingCriteriaRoles.length > 0) {
      const chunks = [];
      if (positionRolesWithoutItems.length > 0) chunks.push(`пустые должности: ${positionRolesWithoutItems.join(", ")}`);
      if (missingCriteriaRoles.length > 0) chunks.push(`нет критериев: ${missingCriteriaRoles.join(", ")}`);
      pushNotification({
        id: `admin-reference-warning-${currentPeriodKey}`,
        type: "reference_warning",
        priority: "warning",
        title: "Требуется внимание к системным справочникам",
        text: chunks.join(" • "),
        date: now.toISOString(),
        actionId: "admin-panel",
        scope: "Система",
      });
    }
  }

  // Уведомления о назначенных событиях в календаре (для FEDERAL/admin)
  if (Array.isArray(calendarEvents)) {
    const upcoming48h = new Date(now.getTime() + 48 * 3600000);
    calendarEvents.forEach(ev => {
      if (ev.entityType !== "manual" || ev.isOwner) return;
      const start = new Date(ev.startsAt);
      if (start < now || start > upcoming48h) return;
      pushNotification({
        id: `calendar-assigned-${ev.entityId}`,
        type: "calendar_assigned",
        priority: "info",
        title: "Назначено событие: " + (ev.title || "Без названия"),
        text: "Начало: " + start.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" }),
        date: ev.startsAt,
        actionId: "calendar",
        scope: "Календарь",
      });
    });
  }

  return sortNotifications(notifications);
}

function getCabinetRecentActivity({ user, reports, bonuses, auditLog }) {
  if (!user) return [];
  if (hasSystemAdminAccess(user)) {
    const keywords = ["заяв", "прем", "отч", "утвержд", "возвращ", "одобр", "отклон", "техработ", "пользоват"];
    return (auditLog || [])
      .filter(entry => {
        const action = String(entry?.action || "").toLowerCase();
        return entry?.userId === user.id || keywords.some(keyword => action.includes(keyword));
      })
      .slice(-7)
      .reverse()
      .map(entry => ({
        type: "audit",
        date: entry.date,
        title: "Системное событие",
        text: entry.action,
      }));
  }

  const ownRecords = (reports || []).filter(item => item.userId === user.id);
  const ownBonuses = (bonuses || []).filter(item => item.userId === user.id);
  const reportEvents = ownRecords
    .filter(isOperationalReport)
    .map(report => {
      const status = getReportStatusMeta(report);
      const draft = getReportBonusDraft(report);
      const amountText = draft.totalAmount > 0 ? ` • ${formatCurrency(draft.totalAmount)}` : "";
      const returnText = report.returnComment ? ` • ${report.returnComment}` : "";
      return {
        type: "report",
        date: report.date,
        title: `Отчёт за ${getReportStoredPeriodLabel(report).toLowerCase()}`,
        text: `${status.label}${amountText}${returnText}`,
      };
    });
  const federalEvents = ownRecords
    .filter(isFederalBonusRequest)
    .map(report => {
      const status = getReportStatusMeta(report);
      const draft = getReportBonusDraft(report);
      const subjectText = report.bonusTargetSubject ? ` • ${report.bonusTargetSubject}` : "";
      const amountText = draft.totalAmount > 0 ? ` • ${formatCurrency(draft.totalAmount)}` : "";
      const returnText = report.returnComment ? ` • ${report.returnComment}` : "";
      return {
        type: "bonus",
        date: report.date,
        title: `Федеральная заявка за ${getReportStoredPeriodLabel(report).toLowerCase()}`,
        text: `${status.label}${subjectText}${amountText}${returnText}`,
      };
    });
  const bonusEvents = ownBonuses.map(bonus => ({
    type: "bonus",
    date: bonus.date,
    title: "Премия",
    text: `${formatCurrency(bonus.amount)} • ${bonus.status === "approved" ? "утверждена" : bonus.status === "rejected" ? "отклонена" : "на согласовании"}`,
  }));

  return [...reportEvents, ...federalEvents, ...bonusEvents]
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, 7);
}

function getCabinetSummaryCards({ user, users, registrationRequests, reports, bonuses, bonusSettings }) {
  if (!user) return [];
  const currentPeriodKey = getReportPeriodKey(new Date());
  const currentPeriodLabel = getReportPeriodLabel(new Date());
  const currentDeadline = getReportDeadlineDate(currentPeriodKey, bonusSettings);
  const deadlineOpen = isReportDeadlineOpen(currentPeriodKey, bonusSettings);
  const ownRecords = (reports || []).filter(item => item.userId === user.id);
  const currentReport = ownRecords.find(item => isOperationalReport(item) && getReportStoredPeriodKey(item) === currentPeriodKey) || null;
  const currentFederalRequest = ownRecords.find(item => isFederalBonusRequest(item) && getReportStoredPeriodKey(item) === currentPeriodKey) || null;
  const approvedBonuses = (bonuses || []).filter(item => item.userId === user.id && item.status === "approved");
  const approvedBonusTotal = approvedBonuses.reduce((sum, item) => sum + Number(item.amount || 0), 0);
  const pendingBossQueue = (reports || []).filter(report => canBossReviewReport(report, user)).length;
  const pendingFederalQueue = (reports || []).filter(report => canFederalReviewReport(report, user)).length;
  const pendingOwnRequests = (registrationRequests || []).filter(request => canReviewRequest(user, request, users)).length;
  const pendingAllRequests = (registrationRequests || []).filter(request => request.status === "pending").length;
  const activeUsers = (users || []).filter(item => !item.blocked);
  const activeSubjects = SUBJECTS.filter(subject => activeUsers.some(item => item.subject === subject)).length;

  if (user.role === "STAFF") {
    const statusMeta = currentReport ? getReportStatusMeta(currentReport) : null;
    const currentDraft = currentReport ? getReportBonusDraft(currentReport) : null;
    return [
      { label: `Отчёт за ${currentPeriodLabel.toLowerCase()}`, value: currentReport ? statusMeta.label : "Не подан", tone: currentReport ? statusMeta.color : C.warning, hint: currentReport?.returnComment || "Статус текущего отчётного периода." },
      { label: "Дедлайн редактирования", value: formatDateTime(currentDeadline), tone: deadlineOpen ? C.blue : C.danger, hint: deadlineOpen ? "Правки и дозаполнение ещё доступны." : "Срок подачи или редактирования истёк." },
      { label: "Премия за период", value: currentDraft?.totalAmount > 0 ? formatCurrency(currentDraft.totalAmount) : (currentReport ? "Без расчёта" : "Ожидает отчёта"), tone: currentDraft?.totalAmount > 0 ? C.gold : C.textMuted, hint: currentReport ? `Статус: ${statusMeta.label}` : "Расчёт появится после отправки отчёта." },
      { label: "Утверждённых премий", value: approvedBonuses.length, tone: C.success, hint: approvedBonuses.length > 0 ? `Итого получено ${formatCurrency(approvedBonusTotal)}.` : "Пока нет выплаченных премий." },
    ];
  }

  if (user.role === "BOSS") {
    const statusMeta = currentReport ? getReportStatusMeta(currentReport) : null;
    const currentDraft = currentReport ? getReportBonusDraft(currentReport) : null;
    return [
      { label: `Мой отчёт за ${currentPeriodLabel.toLowerCase()}`, value: currentReport ? statusMeta.label : "Не подан", tone: currentReport ? statusMeta.color : C.warning, hint: `Дедлайн: ${formatDateTime(currentDeadline)}` },
      { label: "Очередь отчётов", value: pendingBossQueue, tone: C.warning, hint: `Материалы сотрудников ${user.subject}, ожидающие решения.` },
      { label: "Заявки на регистрацию", value: pendingOwnRequests, tone: C.blue, hint: `Неразобранные заявки в субъекте ${user.subject}.` },
      { label: "Моя премия", value: currentDraft?.totalAmount > 0 ? formatCurrency(currentDraft.totalAmount) : (currentReport ? statusMeta.label : "Ожидает отчёта"), tone: currentDraft?.totalAmount > 0 ? C.gold : C.textMuted, hint: approvedBonuses.length > 0 ? `Утверждено премий: ${approvedBonuses.length}.` : "Пока без утверждённых выплат." },
    ];
  }

  if (user.role === "FEDERAL") {
    const requestMeta = currentFederalRequest ? getReportStatusMeta(currentFederalRequest) : null;
    const requestDraft = currentFederalRequest ? getReportBonusDraft(currentFederalRequest) : null;
    return [
      { label: `Моя премия за ${currentPeriodLabel.toLowerCase()}`, value: isGeneralProsecutorUser(user) ? "Недоступна" : (requestDraft?.totalAmount > 0 ? formatCurrency(requestDraft.totalAmount) : (currentFederalRequest ? requestMeta.label : "Не подана")), tone: isGeneralProsecutorUser(user) ? C.textMuted : (requestDraft?.totalAmount > 0 ? C.gold : (currentFederalRequest ? requestMeta.color : C.warning)), hint: isGeneralProsecutorUser(user) ? "Генеральный прокурор утверждает премии, но не подаёт их." : (currentFederalRequest?.bonusTargetSubject ? `Субъект: ${currentFederalRequest.bonusTargetSubject}` : "Личная заявка на федеральную премию.") },
      { label: "Очередь на утверждение", value: pendingFederalQueue, tone: C.warning, hint: "Отчёты и премии, ожидающие решения Генпрокуратуры." },
      { label: "Федеральные заявки", value: pendingOwnRequests, tone: C.blue, hint: "Заявки на регистрацию и резервные согласования." },
      { label: "Сеть субъектов", value: `${activeSubjects} / ${activeUsers.length}`, tone: C.gold, hint: "Субъектов / активных сотрудников в обзоре." },
    ];
  }

  const blockedUsers = (users || []).filter(item => item.blocked).length;
  return [
    { label: "Заявки на регистрацию", value: pendingAllRequests, tone: C.warning, hint: "Общая очередь на доступ в систему." },
    { label: "Очередь премий", value: pendingFederalQueue, tone: C.blue, hint: "Материалы, ожидающие финального утверждения." },
    { label: "Пользователи", value: activeUsers.length, tone: C.success, hint: `Всего: ${(users || []).length} • Заблокировано: ${blockedUsers}` },
    { label: "Состояние панели", value: bonusSettings?.maintenanceEnabled ? "Техработы включены" : "Рабочий режим", tone: bonusSettings?.maintenanceEnabled ? C.danger : C.gold, hint: `Разделов администрирования: ${ADMIN_PANEL_SECTIONS.length}` },
  ];
}

function getCabinetHighlight({ user, users, registrationRequests, reports, bonusSettings }) {
  if (!user) return null;
  const currentPeriodKey = getReportPeriodKey(new Date());
  const currentPeriodLabel = getReportPeriodLabel(new Date());
  const currentDeadline = getReportDeadlineDate(currentPeriodKey, bonusSettings);
  const ownRecords = (reports || []).filter(item => item.userId === user.id);
  const currentReport = ownRecords.find(item => isOperationalReport(item) && getReportStoredPeriodKey(item) === currentPeriodKey) || null;
  const currentFederalRequest = ownRecords.find(item => isFederalBonusRequest(item) && getReportStoredPeriodKey(item) === currentPeriodKey) || null;
  const pendingBossQueue = (reports || []).filter(report => canBossReviewReport(report, user)).length;
  const pendingFederalQueue = (reports || []).filter(report => canFederalReviewReport(report, user)).length;
  const pendingOwnRequests = (registrationRequests || []).filter(request => canReviewRequest(user, request, users)).length;
  const pendingAllRequests = (registrationRequests || []).filter(request => request.status === "pending").length;

  if (user.role === "STAFF") {
    if (!currentReport) {
      return {
        title: `Отчёт за ${currentPeriodLabel.toLowerCase()} ещё не подан`,
        text: `До ${formatDateTime(currentDeadline)} можно сохранить черновик и отправить материал на согласование.`,
        color: C.warning,
        actionId: "my-report",
        actionLabel: "Открыть отчёт",
      };
    }
    const status = getReportStatusValue(currentReport);
    const statusMeta = getReportStatusMeta(currentReport);
    if (status === "returned_author") {
      return {
        title: "Отчёт возвращён на доработку",
        text: currentReport.returnComment || `Исправьте материал до ${formatDateTime(currentDeadline)} и отправьте заново.`,
        color: C.danger,
        actionId: "my-report",
        actionLabel: "Исправить",
      };
    }
    if (["pending_boss", "pending_federal"].includes(status)) {
      return {
        title: "Отчёт находится на согласовании",
        text: `Текущий статус: ${statusMeta.label}. Проверяйте движение премии в личном разделе.`,
        color: statusMeta.color,
        actionId: "my-bonus",
        actionLabel: "Смотреть премию",
      };
    }
    return {
      title: "Текущий период закрыт",
      text: "Отчёт утверждён и больше не требует правок.",
      color: C.success,
      actionId: "my-bonus",
      actionLabel: "История премий",
    };
  }

  if (user.role === "BOSS") {
    if (pendingBossQueue > 0) {
      return {
        title: `На вас ожидает ${pendingBossQueue} материал(а/ов)`,
        text: `Просмотрите отчёты сотрудников ${user.subject} и назначьте премии.`,
        color: C.warning,
        actionId: "subject-control",
        actionLabel: "Открыть очередь",
      };
    }
    if (pendingOwnRequests > 0) {
      return {
        title: "Есть новые заявки на регистрацию",
        text: `По субъекту ${user.subject} ожидают рассмотрения ${pendingOwnRequests} заявки.`,
        color: C.blue,
        actionId: "registration-requests",
        actionLabel: "Разобрать заявки",
      };
    }
    if (!currentReport) {
      return {
        title: `Ваш отчёт за ${currentPeriodLabel.toLowerCase()} ещё не подан`,
        text: `Личный отчёт руководителя доступен до ${formatDateTime(currentDeadline)}.`,
        color: C.warning,
        actionId: "my-report",
        actionLabel: "Открыть отчёт",
      };
    }
    return {
      title: "На этот момент нет ручных согласований",
      text: "Можно проверить свой отчёт, премию или перейти к составу субъекта.",
      color: C.success,
      actionId: "users",
      actionLabel: "Открыть пользователей",
    };
  }

  if (user.role === "FEDERAL") {
    if (pendingFederalQueue > 0) {
      return {
        title: `На утверждении ${pendingFederalQueue} материал(а/ов)`,
        text: "В очереди есть отчёты, премии и федеральные заявки, ожидающие решения.",
        color: C.warning,
        actionId: "bonus-approval",
        actionLabel: "Открыть очередь",
      };
    }
    if (!isGeneralProsecutorUser(user) && !currentFederalRequest) {
      return {
        title: `Федеральная премия за ${currentPeriodLabel.toLowerCase()} ещё не подана`,
        text: "Оформите заявку и укажите субъект, на который будет начислена премия.",
        color: C.blue,
        actionId: "my-bonus",
        actionLabel: "Подать заявку",
      };
    }
    if (pendingOwnRequests > 0) {
      return {
        title: "Есть федеральные заявки на регистрацию",
        text: `На рассмотрении находится ${pendingOwnRequests} заявки.`,
        color: C.accentLight,
        actionId: "registration-requests",
        actionLabel: "Перейти к заявкам",
      };
    }
    return {
      title: "Федеральный контур работает в штатном режиме",
      text: "Очередь премий пуста. Можно перейти к аналитике и составу системы.",
      color: C.success,
      actionId: "analytics",
      actionLabel: "Открыть аналитику",
    };
  }

  if (bonusSettings?.maintenanceEnabled) {
    return {
      title: "На сайте включены техработы",
      text: "Пользователи видят экран техработ. При необходимости отключите режим в панели.",
      color: C.danger,
      actionId: "admin-panel",
      actionLabel: "Открыть администрирование",
    };
  }
  if (pendingAllRequests > 0) {
    return {
      title: `${pendingAllRequests} заявки на регистрацию ждут решения`,
      text: "Разберите очередь доступа в единой панели администрирования.",
      color: C.warning,
      actionId: "admin-panel",
      actionLabel: "Открыть панель",
    };
  }
  if (pendingFederalQueue > 0) {
    return {
      title: `${pendingFederalQueue} материал(а/ов) находятся в очереди`,
      text: "В очереди есть премии и отчёты, ожидающие финального утверждения.",
      color: C.blue,
      actionId: "bonus-approval",
      actionLabel: "Открыть утверждение",
    };
  }
  return {
    title: "Система работает в штатном режиме",
    text: "Основные очереди пусты. Можно перейти к администрированию или аудиту.",
    color: C.success,
    actionId: "admin-panel",
    actionLabel: "Открыть панель",
  };
}

function PasswordChangeCard({ isPreviewMode = false }) {
  const [currentPassword, setCurrentPassword] = useState("");
  const [nextPassword, setNextPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");

  const resetMessages = () => {
    setError("");
    setSuccess("");
  };

  const handleSubmit = async () => {
    if (isPreviewMode) {
      setError("В режиме просмотра смена пароля недоступна.");
      setSuccess("");
      return;
    }
    if (!currentPassword || !nextPassword || !confirmPassword) {
      setError("Заполните все поля для смены пароля.");
      setSuccess("");
      return;
    }
    if (nextPassword.trim().length < 4) {
      setError("Новый пароль должен содержать минимум 4 символа.");
      setSuccess("");
      return;
    }
    if (nextPassword !== confirmPassword) {
      setError("Подтверждение пароля не совпадает.");
      setSuccess("");
      return;
    }
    setBusy(true);
    try {
      await apiRequest("change-password", {
        currentPassword,
        newPassword: nextPassword,
      });
      setCurrentPassword("");
      setNextPassword("");
      setConfirmPassword("");
      setError("");
      setSuccess("Пароль успешно изменён.");
    } catch (e) {
      setError(e.message || "Не удалось изменить пароль");
      setSuccess("");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="resp-card" style={{ ...S.card, height: "100%" }}>
      <div style={S.cardTitle}>Безопасность</div>
      <div style={{ fontSize: T.body, color: C.textDim, lineHeight: 1.5, marginBottom: 16 }}>
        Здесь можно сменить пароль от аккаунта. Если вы забыли пароль, обратитесь в Discord <span style={{ color: C.gold, fontWeight: 700 }}>fantomrussia</span>.
      </div>
      {success && <div style={{ padding: "10px 14px", background: C.success + "22", border: `1px solid ${C.success}44`, borderRadius: 8, color: C.success, fontSize: T.body, marginBottom: 14 }}>{success}</div>}
      {error && <div style={{ padding: "10px 14px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body, marginBottom: 14 }}>{error}</div>}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <div>
          <label style={S.label}>Текущий пароль</label>
          <input
            style={S.input}
            type="password"
            value={currentPassword}
            onChange={e => { setCurrentPassword(e.target.value); resetMessages(); }}
            placeholder="Введите текущий пароль"
            disabled={isPreviewMode || busy}
          />
        </div>
        <div>
          <label style={S.label}>Новый пароль</label>
          <input
            style={S.input}
            type="password"
            value={nextPassword}
            onChange={e => { setNextPassword(e.target.value); resetMessages(); }}
            placeholder="Минимум 4 символа"
            disabled={isPreviewMode || busy}
          />
        </div>
        <div>
          <label style={S.label}>Подтвердите новый пароль</label>
          <input
            style={S.input}
            type="password"
            value={confirmPassword}
            onChange={e => { setConfirmPassword(e.target.value); resetMessages(); }}
            placeholder="Повторите новый пароль"
            onKeyDown={e => e.key === "Enter" && !busy && handleSubmit()}
            disabled={isPreviewMode || busy}
          />
        </div>
      </div>
      <button className="btn-hover" style={{ ...btn("gold"), marginTop: 18 }} onClick={handleSubmit} disabled={isPreviewMode || busy}>
        {busy ? "Сохраняем..." : "Изменить пароль"}
      </button>
    </div>
  );
}

function SubjectPayoutReportingCard({ user, sessionUser, users, bonuses, setBonuses, positions, isPreviewMode = false }) {
  const trackedBonuses = useMemo(() => getTrackedPayoutBonusesForSubject(user, bonuses, users, positions), [user, bonuses, users, positions]);
  const pendingBonuses = useMemo(() => trackedBonuses.filter(bonus => !isBonusPayoutReported(bonus, users, positions)), [trackedBonuses, users, positions]);
  const reportedBonuses = useMemo(() => trackedBonuses.filter(bonus => isBonusPayoutReported(bonus, users, positions)), [trackedBonuses, users, positions]);
  const [selectedBonus, setSelectedBonus] = useState(null);
  const [proofFile, setProofFile] = useState(null);
  const [comment, setComment] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [success, setSuccess] = useState("");

  useEffect(() => {
    if (!selectedBonus) {
      setProofFile(null);
      setComment("");
      setError("");
      setBusy(false);
    }
  }, [selectedBonus?.id]);

  if (!isSubjectProsecutorUser(user, positions)) return null;

  const openReportModal = (bonus) => {
    setSelectedBonus(bonus);
    setComment(bonus?.payoutComment || "");
    setProofFile(null);
    setError("");
    setSuccess("");
  };

  const closeReportModal = () => {
    setSelectedBonus(null);
    setProofFile(null);
    setComment("");
    setError("");
  };

  const submitPayoutReport = async () => {
    if (isPreviewMode) {
      setError("В режиме просмотра загрузка подтверждения выплаты отключена.");
      return;
    }
    if (!selectedBonus?.id) return;
    if (!proofFile) {
      setError("Выберите файл со скриншотом перевода.");
      return;
    }
    setBusy(true);
    setError("");
    try {
      const response = await uploadBonusPayoutProof({
        bonusId: selectedBonus.id,
        comment: comment.trim(),
        file: proofFile,
      });
      setBonuses(prev => upsertItemById(prev, response.bonus));
      setSuccess("Подтверждение выплаты загружено.");
      closeReportModal();
    } catch (e) {
      setError(e.message || "Не удалось загрузить подтверждение выплаты");
    } finally {
      setBusy(false);
    }
  };

  const getUserPosition = (targetUser) => getPositionMetaById(positions, targetUser?.positionId)?.title || "—";

  return (
    <>
      <div className="resp-card" style={{ ...S.card, marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "flex-start", flexWrap: "wrap", marginBottom: 14 }}>
          <div>
            <div style={S.cardTitle}>Отчёт о выплате премий субъектом</div>
            <div style={{ fontSize: T.body, color: C.textDim, marginTop: 6 }}>
              После того как Генеральная прокуратура направит премию в субъект, прокурор субъекта передаёт её подчинённому и загружает отдельный скриншот перевода по каждому сотруднику.
            </div>
          </div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <span style={badge(pendingBonuses.length ? C.warning : C.success)}>{pendingBonuses.length} ожидают отчёт</span>
            <span style={badge(C.blue)}>{reportedBonuses.length} подтверждено</span>
          </div>
        </div>

        {success && <div style={{ padding: "10px 14px", background: C.success + "22", border: `1px solid ${C.success}44`, borderRadius: 8, color: C.success, fontSize: T.body, marginBottom: 16 }}>{success}</div>}

        <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12, marginBottom: 16 }}>
          <div style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
            <div style={{ fontSize: T.meta, color: C.textMuted }}>Всего к распределению</div>
            <div style={{ fontSize: T.title, color: C.gold, fontWeight: 700, marginTop: 6 }}>{formatCurrency(trackedBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0))}</div>
          </div>
          <div style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
            <div style={{ fontSize: T.meta, color: C.textMuted }}>Нужно отчитаться</div>
            <div style={{ fontSize: T.title, color: C.warning, fontWeight: 700, marginTop: 6 }}>{formatCurrency(pendingBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0))}</div>
          </div>
          <div style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
            <div style={{ fontSize: T.meta, color: C.textMuted }}>Уже подтверждено</div>
            <div style={{ fontSize: T.title, color: C.success, fontWeight: 700, marginTop: 6 }}>{formatCurrency(reportedBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0))}</div>
          </div>
        </div>

        {trackedBonuses.length === 0 ? (
          <div style={{ color: C.textMuted, fontSize: T.body }}>По вашему субъекту пока нет утверждённых премий, которые нужно распределить и подтвердить скриншотом.</div>
        ) : (
          <div className="responsive-table-wrap">
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>Сотрудник</th>
                <th style={S.th}>Должность</th>
                <th style={S.th}>Сумма</th>
                <th style={S.th}>Статус</th>
                <th style={S.th}>Дата утверждения</th>
                <th style={S.th}>Подтверждение</th>
              </tr>
            </thead>
            <tbody>
              {trackedBonuses.map(bonus => {
                const targetUser = users.find(item => item.id === bonus.userId);
                const payoutStatus = getBonusPayoutStatusMeta(bonus, users, positions);
                return (
                  <tr key={bonus.id} className="row-hover">
                    <td data-label="Сотрудник" style={{ ...S.td, color: C.text }}>{targetUser ? getUserFullName(targetUser) : "Пользователь удалён"}</td>
                    <td data-label="Должность" style={S.td}>{getUserPosition(targetUser)}</td>
                    <td data-label="Сумма" style={{ ...S.td, color: C.gold, fontWeight: 700 }}>{formatCurrency(bonus.amount)}</td>
                    <td data-label="Статус" style={S.td}><span style={badge(payoutStatus.color)}>{payoutStatus.label}</span></td>
                    <td data-label="Дата утверждения" style={S.td}>{formatDateTime(bonus.date)}</td>
                    <td data-label="Подтверждение" style={S.td}>
                      {isBonusPayoutReported(bonus, users, positions) ? (
                        <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "flex-start" }}>
                          <a href={bonus.payoutProofUrl} target="_blank" rel="noreferrer" style={{ color: C.blueLight || C.blue, textDecoration: "none" }}>Открыть скриншот</a>
                          <span style={{ color: C.textMuted, fontSize: T.meta }}>{bonus.payoutReportedAt ? formatDateTime(bonus.payoutReportedAt) : "—"}</span>
                        </div>
                      ) : (
                        <button className="btn-hover" style={btn("gold")} onClick={() => openReportModal(bonus)}>Загрузить скриншот</button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          </div>
        )}
      </div>

      {selectedBonus && (
        <Modal onClose={closeReportModal} maxWidth={720}>
          <div style={S.cardTitle}>Подтверждение выплаты премии</div>
          {error && <div style={{ padding: "10px 14px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body, marginTop: 12 }}>{error}</div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 16, marginTop: 16 }}>
            <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
              {(() => {
                const targetUser = users.find(item => item.id === selectedBonus.userId);
                return (
                  <>
                    <div style={{ fontSize: T.bodyStrong, color: C.text, fontWeight: 700 }}>{targetUser ? getUserFullName(targetUser) : "Пользователь удалён"}</div>
                    <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 6 }}>Сумма к выплате: {formatCurrency(selectedBonus.amount)}</div>
                    <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>Должность: {getUserPosition(targetUser)}</div>
                  </>
                );
              })()}
            </div>

            <div>
              <label style={S.label}>Скриншот перевода</label>
              <input style={S.input} type="file" accept="image/png,image/jpeg,image/webp" onChange={e => setProofFile(e.target.files?.[0] || null)} />
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 6 }}>Поддерживаются PNG, JPG, WEBP.</div>
            </div>

            <div>
              <label style={S.label}>Комментарий</label>
              <textarea style={S.textarea} value={comment} onChange={e => setComment(e.target.value)} placeholder="Необязательный комментарий к переводу" />
            </div>

            <div className="btn-row" style={S.row}>
              <button className="btn-hover" style={{ ...btn("gold"), opacity: busy ? 0.7 : 1 }} onClick={submitPayoutReport} disabled={busy}>{busy ? "Загрузка..." : "Подтвердить выплату"}</button>
            </div>
          </div>
        </Modal>
      )}
    </>
  );
}

function TelegramPostWidget({ channel, postId }) {
  const containerRef = useRef(null);

  useEffect(() => {
    if (!containerRef.current || !channel || !postId) return;
    containerRef.current.innerHTML = "";
    const script = document.createElement("script");
    script.async = true;
    script.src = "https://telegram.org/js/telegram-widget.js?22";
    script.setAttribute("data-telegram-post", `${channel}/${postId}`);
    script.setAttribute("data-width", "100%");
    script.setAttribute("data-userpic", "false");
    script.setAttribute("data-dark", "1");
    containerRef.current.appendChild(script);
    return () => {
      if (containerRef.current) containerRef.current.innerHTML = "";
    };
  }, [channel, postId]);

  return <div ref={containerRef} style={{ minHeight: 120 }} />;
}

  const [openedPost, setOpenedPost] = useState(null);

  useEffect(() => {
    let cancelled = false;
    const loadFeed = async () => {
      try {
        const response = await fetch(`${API_URL}?action=telegram-feed&channel=${encodeURIComponent(channel)}&limit=${encodeURIComponent(String(limit))}`, { credentials: "same-origin" });
        const payload = await response.json();
        if (!response.ok || payload.ok === false) {
          throw new Error(payload.error || `Ошибка Telegram (${response.status})`);
        }
        if (!cancelled) {
          setFeed({
            loading: false,
            error: "",
            posts: Array.isArray(payload.posts) ? payload.posts : [],
            channelUrl: payload.channelUrl || `https://t.me/${channel}`,
          });
        }
      } catch (e) {
        if (!cancelled) {
          setFeed(prev => ({
            ...prev,
            loading: false,
            error: e.message || "Не удалось загрузить Telegram-канал",

      }

    loadFeed();

      {feed.loading ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

const HOME_CALENDAR_WEEKDAYS = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

function capitalizeFirstLetter(value) {
  if (!value) return "";
  return value.charAt(0).toUpperCase() + value.slice(1);
}

function buildHomeMonthCalendar(baseDate = new Date()) {
  const year = baseDate.getFullYear();
  const month = baseDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const previousMonthDays = new Date(year, month, 0).getDate();
  const leadingDays = (firstDay.getDay() + 6) % 7;
  const totalCells = Math.ceil((leadingDays + daysInMonth) / 7) * 7;
  const todayKey = `${baseDate.getFullYear()}-${baseDate.getMonth()}-${baseDate.getDate()}`;
  const cells = [];

  for (let index = 0; index < totalCells; index += 1) {
    const dayOffset = index - leadingDays;
    const cellDate = new Date(year, month, dayOffset + 1);
    const isCurrentMonth = dayOffset >= 0 && dayOffset < daysInMonth;
    const dateKey = `${cellDate.getFullYear()}-${cellDate.getMonth()}-${cellDate.getDate()}`;
    cells.push({
      key: `${dateKey}-${index}`,
      dateKey,
      day: isCurrentMonth ? dayOffset + 1 : (dayOffset < 0 ? previousMonthDays + dayOffset + 1 : dayOffset - daysInMonth + 1),
      isCurrentMonth,
      isToday: dateKey === todayKey,
      isWeekend: [0, 6].includes(cellDate.getDay()),
    });
  }

  return {
    monthLabel: capitalizeFirstLetter(baseDate.toLocaleDateString("ru-RU", { month: "long", year: "numeric" })),
    todayLabel: baseDate.toLocaleDateString("ru-RU", { day: "2-digit", month: "long" }),
    cells,
  };
}

function HomeMonthCalendarCard({ user, checksMeta, onNavigate }) {
  const calendar = useMemo(() => buildHomeMonthCalendar(new Date()), []);
  const calendarEvents = Array.isArray(checksMeta?.calendarEvents) ? checksMeta.calendarEvents : [];
  const eventMap = useMemo(() => {
    const map = new Map();
    calendarEvents.forEach(event => {
      if (!event?.startsAt) return;
      const date = new Date(event.startsAt);
      if (Number.isNaN(date.getTime())) return;
      const key = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
      const bucket = map.get(key) || [];
      bucket.push(event);
      map.set(key, bucket);
    });
    return map;
  }, [calendarEvents]);
  const monthEvents = useMemo(
    () => calendarEvents
      .filter(event => {
        if (!event?.startsAt) return false;
        const date = new Date(event.startsAt);
        return !Number.isNaN(date.getTime())
          && date.getFullYear() === new Date().getFullYear()
          && date.getMonth() === new Date().getMonth();
      })
      .sort((left, right) => new Date(left.startsAt) - new Date(right.startsAt)),
    [calendarEvents]
  );

  return (
    <div
      style={{
        ...S.card,
        marginBottom: 0,
        padding: 18,
        background: `linear-gradient(180deg, ${C.bgCard} 0%, ${C.bgInput} 100%)`,
        boxShadow: `0 18px 36px ${C.overlay}`,
      }}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, marginBottom: 14 }}>
        <div>
          <div style={{ ...S.cardTitle, marginBottom: 6 }}>Календарь месяца</div>
          <div style={{ fontSize: T.body, color: C.textDim }}>{calendar.monthLabel}</div>
        </div>
        <div style={{ ...badge(C.blueLight), textTransform: "none", letterSpacing: 0.3 }}>{user.subject}</div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, minmax(0, 1fr))", gap: 8 }}>
        {HOME_CALENDAR_WEEKDAYS.map(day => (
          <div key={day} style={{ fontSize: T.meta, color: C.textMuted, textAlign: "center", textTransform: "uppercase", letterSpacing: 0.8, paddingBottom: 4 }}>
            {day}
          </div>
        ))}
        {calendar.cells.map(cell => (
          (() => {
            const cellEvents = eventMap.get(cell.dateKey) || [];
            return (
          <div
            key={cell.key}
            style={{
              minHeight: 58,
              borderRadius: 12,
              border: `1px solid ${cell.isToday ? C.gold : cell.isWeekend ? `${C.blue}44` : C.border}`,
              background: cell.isToday
                ? `${C.gold}18`
                : cell.isCurrentMonth
                  ? (cell.isWeekend ? `${C.blue}12` : C.bg)
                  : `${C.bgSidebar}b0`,
              color: cell.isCurrentMonth ? C.text : C.textMuted,
              display: "flex",
              flexDirection: "column",
              alignItems: "stretch",
              justifyContent: "space-between",
              padding: "8px 10px",
              fontSize: T.bodyStrong,
              fontWeight: cell.isToday ? 700 : 600,
              boxShadow: cell.isToday ? `0 0 0 1px ${C.gold}33 inset` : "none",
              gap: 6,
            }}
          >
            <div style={{ display: "flex", justifyContent: "flex-end" }}>{cell.day}</div>
            <div style={{ display: "flex", justifyContent: "flex-start", gap: 4, flexWrap: "wrap", minHeight: 10 }}>
              {cellEvents.slice(0, 3).map(event => (
                <span
                  key={event.id}
                  title={`${event.title || "Событие"} • ${formatDateTime(event.startsAt)}`}
                  style={{
                    width: 7,
                    height: 7,
                    borderRadius: 999,
                    background: event.entityType === "check" ? C.gold : event.entityType === "case" ? C.success : C.blue,
                    boxShadow: `0 0 0 1px ${C.overlay}`,
                    display: "inline-block",
                  }}
                />
              ))}
              {cellEvents.length > 3 ? (
                <span style={{ fontSize: 10, color: C.textMuted, lineHeight: "7px" }}>+{cellEvents.length - 3}</span>
              ) : null}
            </div>
          </div>
            );
          })()
        ))}
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", gap: 10, flexWrap: "wrap", marginTop: 14, fontSize: T.meta, color: C.textMuted }}>
        <span>Сегодня: <span style={{ color: C.text }}>{calendar.todayLabel}</span></span>
        <span>Событий в месяце: <span style={{ color: C.text }}>{monthEvents.length}</span></span>
      </div>

      <div style={{ marginTop: 14, display: "grid", gap: 8 }}>
        <div style={{ fontSize: T.meta, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.8 }}>Ближайшие события</div>
        {monthEvents.length === 0 ? (

        ) : (

              key={event.id}

              }}

                  {event.statusLabel || (event.entityType === "check" ? "Проверка" : event.entityType === "case" ? "Жалоба" : "Событие")}
                </span>
              </div>
              <div style={{ marginTop: 6, fontSize: T.meta, color: C.textMuted }}>
                {formatDateTime(event.startsAt)}
                {event.description ? ` • ${event.description}` : ""}
              </div>
            </button>
          ))
        )}
      </div>
    </div>
  );
}

function PasswordStrengthBar({ password }) {
  const len = (password || "").length;
  const score = len === 0 ? 0 : len < 4 ? 1 : len < 6 ? 2 : len < 8 ? 3 : 4;
  const labels = ["", "Слабый", "Средний", "Хороший", "Надёжный"];
  const colors = ["", C.danger, C.warning, C.blue, C.success];
  if (score === 0) return null;
  return (
    <div style={{ marginTop: 6 }}>
      <div style={{ display: "flex", gap: 3, marginBottom: 4 }}>
        {[1,2,3,4].map(i => (
          <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i <= score ? colors[score] : C.bgInput, transition: "background 0.3s" }} />
        ))}
      </div>
      <div style={{ fontSize: 11, color: colors[score] }}>{labels[score]}</div>
    </div>
  );
}

function UserAvatar({ user, size = 44 }) {

  const hue = hash % 360;
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: `hsl(${hue}, 45%, 35%)`,
      display: "flex", alignItems: "center", justifyContent: "center",

      border: `2px solid hsl(${hue}, 45%, 50%)`,
    }}>
      {initials || "?"}
    </div>
  );
}

function AuthScreen({ onAuth, positions, bonusSettings }) {
  const [mode, setMode] = useState("login");

    MANAGED_ROLE_OPTIONS.includes(role) ? (items || []).map(item => ({ id: item.id, role, title: item.title })) : []
  ));
  const initialForm = { login: "", password: "", subject: SUBJECTS[0], positionId: "", comment: "" };
  const [form, setForm] = useState(initialForm);
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");
  const [busy, setBusy] = useState(false);
  const maintenanceStatus = getMaintenanceStatus(bonusSettings);
  const maintenanceTone = maintenanceStatus.msUntilStart !== null && maintenanceStatus.msUntilStart <= 24 * 60 * 60 * 1000 ? C.warning : C.blue;

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const handleLogin = async () => {
    if (!form.login.trim() || !form.password.trim()) { setError("Укажите логин и пароль"); return; }
    setBusy(true);
    try {
      const authPayload = await apiRequest("login", { login: form.login, password: form.password });
      setError("");
      setSuccess("");
      try { localStorage.setItem("prok_autologin", JSON.stringify({ login: form.login, password: form.password })); } catch (e) {}
      await onAuth(authPayload);
    } catch (e) {
      setError(e.message || "Не удалось выполнить вход");
    } finally {
      setBusy(false);
    }
  };

  const handleRegister = async () => {
    if (!form.login || !form.password || !form.subject || !form.positionId) { setError("Заполните все обязательные поля"); return; }
    const fullName = form.login.trim();
    const fioParts = fullName.split(/\s+/).filter(Boolean);

    if (form.password.trim().length < 4) { setError("Пароль должен содержать минимум 4 символа"); return; }
    setBusy(true);
    try {
      const response = await apiRequest("submit-registration", {
        login: fullName,
        password: form.password,
        subject: form.subject,
        positionId: form.positionId,
        comment: form.comment.trim(),
      });
      setError("");
      setSuccess("");
      await onAuth(response);

            src="Group_13388_1.png"
            alt="Эмблема ЕИАС «Фемида»"
            style={{ width: 228, maxWidth: "52vw", height: "auto", margin: "0 auto 12px", display: "block", borderRadius: 22, filter: `drop-shadow(0 12px 28px ${C.overlay})` }}
          />
          <div style={{ fontSize: T.bodyStrong, letterSpacing: 5, color: C.gold, textTransform: "uppercase", marginBottom: 6, fontFamily: F.heading }}>ЕИАС «Фемида»</div>
        </div>

          </div>
        </div>
      </div>
    );
  }

  const myRecords = reports.filter(r => r.userId === user.id).sort((a, b) => new Date(b.date) - new Date(a.date));
  const myReports = myRecords.filter(isOperationalReport);
  const myFederalBonusRequests = myRecords.filter(isFederalBonusRequest);
  const myBonuses = bonuses.filter(b => b.userId === user.id).sort((a, b) => new Date(b.date) - new Date(a.date));
  const subjectUsers = users.filter(u => u.subject === user.subject && !u.blocked).length;
  const pendingForBoss = reports.filter(report => canBossReviewReport(report, user)).length;
  const pendingForFederal = reports.filter(report => canFederalReviewReport(report, user)).length;
  const ownActiveReports = myReports.filter(report => !["approved", "draft"].includes(getReportStatusValue(report))).length;
  const ownFederalBonusRequests = myFederalBonusRequests.filter(report => !["approved", "draft"].includes(getReportStatusValue(report))).length;

  const now = new Date();
  const monthReports = myReports.filter(report => {
    const date = new Date(report.date);
    return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
  });

  const pendingLabel = user.role === "BOSS"
    ? "Требуют решения BOSS"
    : user.role === "FEDERAL" && !isGeneralProsecutorUser(user)
      ? "Моих премий на согласовании"
    : getUserPermissionLevel(user) >= 2
      ? "Очередь Генпрокуратуры"
      : "Отчётов на согласовании";
  const pendingValue = user.role === "BOSS"
    ? pendingForBoss
    : user.role === "FEDERAL" && !isGeneralProsecutorUser(user)
      ? ownFederalBonusRequests
    : getUserPermissionLevel(user) >= 2
      ? pendingForFederal
      : ownActiveReports;
  const showHomeCalendar = isPilotSubject(user.subject, activitySettings) || user.subject === GENERAL_SUBJECT || user.role === "FEDERAL" || hasSystemAdminAccess(user);

  const events = [
    ...myReports.slice(-4).map(report => {
      const status = getReportStatusMeta(report);
      const draft = getReportBonusDraft(report);
      const amountText = draft.totalAmount > 0 ? ` • ${formatCurrency(draft.totalAmount)}` : "";
      const returnText = report.returnComment ? ` • ${report.returnComment}` : "";
      return {
        type: "report",
        date: report.date,
        text: `Отчёт: ${status.label}${amountText}${returnText}`,
      };
    }),
    ...myFederalBonusRequests.slice(-3).map(report => {
      const status = getReportStatusMeta(report);
      const draft = getReportBonusDraft(report);
      const amountText = draft.totalAmount > 0 ? ` • ${formatCurrency(draft.totalAmount)}` : "";
      const subjectText = report.bonusTargetSubject ? ` • ${report.bonusTargetSubject}` : "";
      const returnText = report.returnComment ? ` • ${report.returnComment}` : "";
      return {
        type: "bonus",
        date: report.date,
        text: `Заявка на премию: ${status.label}${subjectText}${amountText}${returnText}`,
      };
    }),
    ...myBonuses.slice(-3).map(bonus => ({
      type: "bonus",
      date: bonus.date,
      text: `Премия: ${formatCurrency(bonus.amount)} • ${bonus.status === "approved" ? "утверждена" : bonus.status === "rejected" ? "отклонена" : "на согласовании"}`,
    })),
  ].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Добро пожаловать, {user.name} {user.surname}</h1>
      <p style={S.pageSubtitle}>Панель управления • {user.subject} • {formatDate(new Date())}</p>
      <div className="stat-row" style={{ ...S.row, marginBottom: 20 }}>
        <StatBox value={monthReports.length} label="Отчётов за месяц" />
        <StatBox value={myBonuses.filter(b => b.status === "approved").length} label="Утверждённых премий" color={C.success} />
        {getUserPermissionLevel(user) >= 1 && <StatBox value={subjectUsers} label={`Сотрудников (${user.subject})`} color={C.blue} />}
        <StatBox value={pendingValue} label={pendingLabel} color={C.warning} />
      </div>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 18, alignItems: "flex-start", marginBottom: 18 }}>
        <div style={{ flex: "1 1 620px", minWidth: 320 }}>
          <div className="resp-card" style={S.card}>
            <div style={S.cardTitle}>Последние события</div>
            {events.length === 0 ? (
              <div style={{ color: C.textMuted, fontSize: T.body }}>Пока нет событий. Начните с подачи первого отчёта.</div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {events.map((event, index) => (
                  <div key={index} style={{ padding: "10px 14px", background: C.bgInput, borderRadius: 8, fontSize: T.body, color: C.textDim, display: "flex", justifyContent: "space-between", gap: 12 }}>
                    <span>{event.type === "report" ? "📋" : "💰"} {event.text}</span>
                    <span style={{ color: C.textMuted }}>{formatDate(event.date)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Calendar moved to dedicated page */}

          {getUserPermissionLevel(user) >= 2 && (
            <div className="resp-card" style={{ ...S.card, marginBottom: 0 }}>
              <div style={S.cardTitle}>Обзор субъектов</div>
              <div style={S.row}>
                {SUBJECTS.map(subject => {
                  const subjectUsersCount = users.filter(item => item.subject === subject && !item.blocked).length;
                  const subjectReports = reports.filter(report => {
                    if (!isOperationalReport(report)) return false;
                    const reportUser = users.find(item => item.id === report.userId);
                    return reportUser && reportUser.subject === subject;
                  }).length;
                  return (
                    <div key={subject} style={{ ...S.statBox, minWidth: 180 }}>
                      <div style={{ fontSize: T.bodyStrong, color: C.gold, fontWeight: 700, marginBottom: 8 }}>{subject}</div>
                      <div style={{ fontSize: T.meta, color: C.textDim }}>Сотрудников: {subjectUsersCount}</div>
                      <div style={{ fontSize: T.meta, color: C.textDim }}>Отчётов: {subjectReports}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
        <div style={{ flex: "0 1 360px", minWidth: 300, display: "flex", flexDirection: "column", gap: 18 }}>
          <TelegramChannelFeed limit={1} compact />
        </div>
      </div>
    </div>
  );
}

                <div style={{ fontSize: T.bodyStrong, color: C.text, marginTop: 8, fontWeight: 700 }}>{profile.subject}</div>

              <div style={{ background: C.bgInput, border: `1px solid ${C.border}`, borderRadius: 10, padding: "14px 16px" }}>
                <div style={{ fontSize: T.meta, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>В системе с</div>
                <div style={{ fontSize: T.bodyStrong, color: C.text, marginTop: 8, fontWeight: 700 }}>{profile.createdAt ? formatDate(profile.createdAt) : "—"}</div>

              <div style={{ background: C.bgInput, border: `1px solid ${C.border}`, borderRadius: 10, padding: "14px 16px" }}>
                <div style={{ fontSize: T.meta, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Классный чин</div>
                <div style={{ fontSize: T.bodyStrong, color: C.text, marginTop: 8, fontWeight: 700 }}>{profile.classRankTitle}</div>
              </div>
            </div>
            <div className="cabinet-medals-block" style={{ marginTop: 16, background: C.bgInput, border: `1px solid ${C.border}`, borderRadius: 10, padding: "14px 16px" }}>
              <div style={{ fontSize: T.meta, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Медали</div>
              {profile.medalTitles.length ? (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {profile.medalTitles.map(title => <span key={title} style={{ ...badge(C.gold), textTransform: "none", letterSpacing: 0.3 }}>{title}</span>)}
                </div>
              ) : (
                <div style={{ fontSize: T.body, color: C.textMuted }}>Награды пока не назначены.</div>
              )}

          </div>

          {highlight && (
            <div style={{ flex: "0 1 340px", minWidth: 280, background: `${highlight.color}12`, border: `1px solid ${highlight.color}55`, borderRadius: 12, padding: 22, boxShadow: `0 18px 36px ${C.overlay}` }}>
              <div style={{ fontSize: T.meta, color: highlight.color, letterSpacing: 1.4, textTransform: "uppercase", marginBottom: 10 }}>Актуально сейчас</div>
              <div style={{ fontSize: T.title, color: C.text, fontWeight: 700, fontFamily: F.heading, lineHeight: 1.15 }}>{highlight.title}</div>
              <div style={{ fontSize: T.body, color: C.textDim, marginTop: 12, lineHeight: 1.5 }}>{highlight.text}</div>
              {highlight.actionId && (
                <button className="btn-hover" style={{ ...btn("ghost"), marginTop: 18, borderColor: `${highlight.color}66`, color: C.text }} onClick={() => onNavigate(highlight.actionId)}>
                  {highlight.actionLabel || "Открыть"}

      </div>

      <div style={{ ...S.row, marginBottom: 18 }}>
        {summaryCards.map((item, index) => <CabinetSummaryCard key={`${item.label}-${index}`} item={item} />)}

      <div style={{ marginBottom: 18, maxWidth: "50%", margin: "0 auto 18px" }}>

      </div>

      <div style={{ ...S.row, alignItems: "stretch", marginBottom: 18 }}>

          <div className="resp-card" style={{ ...S.card, height: "100%" }}>
            <div style={S.cardTitle}>Рабочая зона</div>
            <div style={{ fontSize: T.body, color: C.textDim, marginBottom: 16 }}>Быстрые переходы к разделам, которыми вы пользуетесь чаще всего.</div>
            <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14 }}>

        </div>
      </div>

      <div style={{ ...S.row, alignItems: "stretch", marginBottom: 18 }}>
        <div style={{ flex: "1 1 420px", minWidth: 280 }}>

      </div>

      <div id="cabinet-bonus-block" style={{ marginBottom: 18 }}>
        <PageMyBonus
          user={user}
          sessionUser={sessionUser}
          users={users}
          reports={reports}
          bonuses={bonuses}
          setReports={setReports}
          setBonuses={setBonuses}
          positions={positions}
          addAudit={addAudit}
          performanceReviews={performanceReviews}
          activityEvents={activityEvents}

      <div className="resp-card" style={S.card}>

        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {activity.map((item, index) => <CabinetActivityItem key={`${item.type}-${item.date}-${index}`} item={item} />)}
