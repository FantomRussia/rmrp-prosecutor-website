  );
}

/* ═══════════════ PAGE: MY REPORT ═══════════════ */
function PagePilotActivityJournal({ user, users, activityEvents, setActivityEvents, factions, activitySettings, addAudit }) {
  const isFederalOrAdmin = user.role === "FEDERAL" || hasSystemAdminAccess(user);
  const isUSP = user.role === "USP";
  const canDelete = canDeleteActivityEvent(user);
  const pilotSubjects = activitySettings?.pilotSubjects || DEFAULT_ACTIVITY_SETTINGS.pilotSubjects;
  const currentPeriodKey = getReportPeriodKey(new Date());
  const [periodKey, setPeriodKey] = useState(currentPeriodKey);
  const [editingEventId, setEditingEventId] = useState(null);
  const [form, setForm] = useState(() => createDefaultPilotActivityForm(user, factions, activitySettings));
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");
  const [subjectFilter, setSubjectFilter] = useState(isFederalOrAdmin ? "" : user.subject);
  const visibleEvents = useMemo(() => getPilotVisibleEventsForUser(user, activityEvents, periodKey, activitySettings, isFederalOrAdmin ? subjectFilter : ""), [user, activityEvents, periodKey, activitySettings, subjectFilter, isFederalOrAdmin]);
  const metricsSubject = isFederalOrAdmin ? subjectFilter : user.subject;
  const metrics = useMemo(() => buildPilotMetricsSnapshot(
    metricsSubject ? { ...user, subject: metricsSubject, role: "BOSS" } : user,
    activityEvents, factions, periodKey, activitySettings
  ), [user, metricsSubject, activityEvents, factions, periodKey, activitySettings]);
  const participantCandidates = useMemo(() => getPilotSubjectUsers(users, isFederalOrAdmin ? (form.authorSubject || pilotSubjects[0]) : user.subject), [users, user.subject, isFederalOrAdmin, form.authorSubject, pilotSubjects]);
  const editingEvent = useMemo(() => (activityEvents || []).find(event => event.id === editingEventId) || null, [activityEvents, editingEventId]);
  const typeMeta = getActivityTypeMeta(form.type, activitySettings);
  const updateForm = (key, value) => setForm(prev => ({ ...prev, [key]: value }));
  const updateLink = (index, value) => setForm(prev => {
    const nextLinks = sanitizePilotLinks(prev.links);
    nextLinks[index] = value;
    return { ...prev, links: nextLinks };
  });
  const addLinkField = () => setForm(prev => ({ ...prev, links: [...sanitizePilotLinks(prev.links), ""] }));
  const removeLinkField = (index) => setForm(prev => {
    const nextLinks = sanitizePilotLinks(prev.links).filter((_, currentIndex) => currentIndex !== index);
    return { ...prev, links: nextLinks.length ? nextLinks : [""] };
  });
  const toggleParticipant = (userId) => setForm(prev => ({
    ...prev,
    participantUserIds: (prev.participantUserIds || []).includes(userId)
      ? prev.participantUserIds.filter(item => item !== userId)
      : [...(prev.participantUserIds || []), userId],
  }));
  const resetForm = useCallback(() => {
    setEditingEventId(null);
    setForm(createDefaultPilotActivityForm(user, factions, activitySettings));
    setError("");
  }, [user, factions, activitySettings]);

  const openEditor = (event) => {
    if (!canEditActivityEvent(user, event, activitySettings)) return;
    setEditingEventId(event.id);
    setForm(createDefaultPilotActivityForm(user, factions, activitySettings, event));
    setError("");
    setSuccess("");
  };

  const saveEvent = () => {
    const validationError = validatePilotActivityForm(form, typeMeta, activitySettings);
    if (validationError) {
      setError(validationError);
      return;
    }
    const nextEvent = buildPilotActivityPayload({ form, user, editingEvent, activitySettings });
    const nextItems = editingEvent ? activityEvents.map(item => item.id === nextEvent.id ? nextEvent : item) : [...activityEvents, nextEvent];
    setActivityEvents(nextItems);
    addAudit(
      editingEvent ? `Событие деятельности обновлено: ${getActivityEventTitle(nextEvent, factions, activitySettings)}` : `Событие деятельности добавлено: ${getActivityEventTitle(nextEvent, factions, activitySettings)}`,
      user.id
    );
    setSuccess(editingEvent ? "Запись обновлена." : "Запись сохранена.");
    setTimeout(() => setSuccess(""), 3200);
    resetForm();
  };

  const deleteEvent = async (eventId) => {
    const confirmed = await showConfirm("Удалить эту запись из журнала?", { danger: true, confirmLabel: "Удалить" }); if (!confirmed) return;
    const event = activityEvents.find(e => e.id === eventId);
    if (event) {
      setActivityEvents(activityEvents.filter(e => e.id !== eventId));
      addAudit(`Событие деятельности удалено: ${getActivityEventTitle(event, factions, activitySettings)}`, user.id);
      setSuccess("Запись удалена.");
      setTimeout(() => setSuccess(""), 3200);
    }
  };

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Журнал деятельности</h1>
      <p style={S.pageSubtitle}>{isFederalOrAdmin ? "Генеральная прокуратура" : `${user.subject}`} • фиксация задержаний, решений, взысканий, штрафов и официальных визитов</p>
      {isFederalOrAdmin && (
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
          <label style={{ ...S.label, margin: 0, whiteSpace: "nowrap" }}>Субъект:</label>
          <select style={{ ...S.select, minWidth: 200 }} value={subjectFilter} onChange={e => setSubjectFilter(e.target.value)}>
            <option value="">Все субъекты</option>
            {pilotSubjects.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
      )}
      {success && <div style={{ padding: "12px 16px", background: C.success + "22", border: `1px solid ${C.success}44`, borderRadius: 8, color: C.success, fontSize: T.body, marginBottom: 18 }}>{success}</div>}
      {error && <div style={{ padding: "12px 16px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body, marginBottom: 18 }}>{error}</div>}

      <div className="stat-row" style={{ ...S.row, marginBottom: 16 }}>
        <StatBox value={metrics.totalEvents} label="Записей за месяц" color={C.blue} />
        <StatBox value={metrics.closedCases} label="Вынесено решений" color={C.success} />
        <StatBox value={metrics.uniquePersons} label="Лиц в производстве" color={C.gold} />
        <StatBox value={metrics.eventsWithoutLinks} label="Без доказательств" color={metrics.eventsWithoutLinks > 0 ? C.warning : C.textMuted} />
      </div>

      <div className="resp-card" style={{ ...S.card, marginBottom: 18 }}>
        <div style={S.cardTitle}>{editingEvent ? "Редактирование записи" : "Новая запись"}</div>
        <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14 }}>
          {isFederalOrAdmin && (
            <div>
              <label style={S.label}>Субъект записи</label>
              <select style={S.select} value={form.authorSubject || pilotSubjects[0]} onChange={e => updateForm("authorSubject", e.target.value)}>
                {pilotSubjects.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
          )}
          <div>
            <label style={S.label}>Тип события</label>
            <select style={S.select} value={form.type} onChange={e => setForm(prev => ({ ...createDefaultPilotActivityForm(user, factions, activitySettings), type: e.target.value, eventDate: prev.eventDate, factionId: prev.factionId, authorSubject: prev.authorSubject }))}>
              {(activitySettings?.eventTypes || DEFAULT_ACTIVITY_EVENT_TYPES).map(item => <option key={item.id} value={item.id}>{item.label}</option>)}
            </select>
          </div>
          <div>
            <label style={S.label}>Дата</label>
            <input style={S.input} type="date" value={form.eventDate} onChange={e => updateForm("eventDate", e.target.value)} />
          </div>
          <div>
            <label style={S.label}>Фракция / организация</label>
            <select style={S.select} value={form.factionId} onChange={e => updateForm("factionId", e.target.value)}>
              <option value="">Выберите фракцию</option>
              {(factions || []).map(item => <option key={item.id} value={item.id}>{item.name}{item.active === false ? " (скрыта)" : ""}</option>)}
            </select>
          </div>
        </div>

        {typeMeta.kind === "person" && (
          <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 14, marginTop: 16 }}>
            <div><label style={S.label}>ФИО</label><input style={S.input} value={form.targetFullName} onChange={e => updateForm("targetFullName", e.target.value)} placeholder="Фамилия Имя Отчество" /></div>
            <div><label style={S.label}>ID</label><input style={S.input} value={form.targetId} onChange={e => updateForm("targetId", formatTargetIdInput(e.target.value))} placeholder="000-000" maxLength={7} />{form.targetId && !isValidTargetId(form.targetId) && <div style={{ color: C.warning, fontSize: T.meta, marginTop: 4 }}>Формат: 000-000 или 00-000</div>}</div>
            <div><label style={S.label}>Звание / Должность</label><input style={S.input} value={form.targetPosition} onChange={e => updateForm("targetPosition", e.target.value)} placeholder="Звание или должность лица" /></div>
            {(() => { const dup = findDuplicatePersonInFaction(activityEvents, form.factionId, form.targetId, form.targetFullName, editingEvent?.id, activitySettings); return dup ? <div style={{ gridColumn: "1 / -1", padding: "10px 14px", background: C.warning + "18", border: `1px solid ${C.warning}44`, borderRadius: 8, color: C.warning, fontSize: T.body }}>{dup.type === "id_match" ? `В этой организации уже есть лицо с ID ${dup.existingId} под именем «${dup.existingName}». Если ФИО изменилось — подтвердите сохранение.` : `В этой организации уже есть «${dup.existingName}» с ID ${dup.existingId}. Если ID изменился — подтвердите сохранение.`}</div> : null; })()}
            <div style={{ gridColumn: "1 / -1" }}><label style={S.label}>Причина</label><textarea style={S.textarea} value={form.reason} onChange={e => updateForm("reason", e.target.value)} placeholder="Причина задержания, взыскания, предупреждения или решения" /></div>
            {form.type === "decision" && (
              <>
                <div><label style={S.label}>Исход решения</label><select style={S.select} value={form.decisionOutcome} onChange={e => updateForm("decisionOutcome", e.target.value)}><option value="punishment">Наказание</option><option value="released">Освобождение</option></select></div>
                <div style={{ gridColumn: "span 2" }}><label style={S.label}>Мера / текст решения</label><input style={S.input} value={form.measureLabel} onChange={e => updateForm("measureLabel", e.target.value)} placeholder="Например: выговор, увольнение, освобождён" /></div>
              </>
            )}
            {form.type === "disciplinary" && <div style={{ gridColumn: "1 / -1" }}><label style={S.label}>Вид дисциплинарного взыскания</label><input style={S.input} value={form.measureLabel} onChange={e => updateForm("measureLabel", e.target.value)} placeholder="Например: строгий выговор" /></div>}
            {form.type === "warning" && <label style={{ display: "flex", alignItems: "center", gap: 10, color: C.text, fontSize: T.body, gridColumn: "1 / -1" }}><input type="checkbox" checked={form.includeInDossier !== false} onChange={e => updateForm("includeInDossier", e.target.checked)} />Вносить предупреждение в постоянное личное дело</label>}
          </div>
        )}
        {typeMeta.kind === "visit" && (
          <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 14, marginTop: 16 }}>
            <div style={{ gridColumn: "1 / -1" }}><label style={S.label}>Тема мероприятия</label><input style={S.input} value={form.topic} onChange={e => updateForm("topic", e.target.value)} placeholder="Тема лекции или визита" /></div>
            <div style={{ gridColumn: "1 / -1" }}>
              <label style={S.label}>Участники прокуратуры</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {participantCandidates.map(candidate => (
                  <label key={candidate.id} style={{ ...badge((form.participantUserIds || []).includes(candidate.id) ? C.gold : C.borderHover), cursor: "pointer", textTransform: "none", display: "inline-flex", alignItems: "center", gap: 8 }}>
                    <input type="checkbox" checked={(form.participantUserIds || []).includes(candidate.id)} onChange={() => toggleParticipant(candidate.id)} />
                    {getUserFullName(candidate)}
                  </label>
                ))}
              </div>
            </div>
            <div style={{ gridColumn: "1 / -1" }}><label style={S.label}>Описание / цель</label><textarea style={S.textarea} value={form.description} onChange={e => updateForm("description", e.target.value)} placeholder="Что проводили, для кого и с какой целью" /></div>
          </div>
        )}
        {typeMeta.kind === "news" && (
          <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "1fr", gap: 14, marginTop: 16 }}>
            <div><label style={S.label}>Заголовок новости</label><input style={S.input} value={form.headline} onChange={e => updateForm("headline", e.target.value)} placeholder="Заголовок" /></div>
            <div><label style={S.label}>Текст новости</label><textarea style={{ ...S.textarea, minHeight: 100 }} value={form.newsBody} onChange={e => updateForm("newsBody", e.target.value)} placeholder="Содержание новости" /></div>
          </div>
        )}
        {typeMeta.kind === "duty" && (
          <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 14, marginTop: 16 }}>
            <div><label style={S.label}>Время начала дежурства</label><input type="time" style={S.input} value={form.dutyTimeFrom} onChange={e => updateForm("dutyTimeFrom", e.target.value)} /></div>
            <div><label style={S.label}>Время окончания дежурства</label><input type="time" style={S.input} value={form.dutyTimeTo} onChange={e => updateForm("dutyTimeTo", e.target.value)} /></div>
            <div style={{ gridColumn: "1 / -1" }}>
              <label style={S.label}>Скриншот начала дежурства</label>
              {form.screenshotStart && <div style={{ marginBottom: 6 }}><a href={form.screenshotStart} target="_blank" rel="noopener"><img src={form.screenshotStart} alt="Начало" style={{ maxWidth: 200, maxHeight: 120, borderRadius: 8, border: `1px solid ${C.border}` }} /></a><button style={{ marginLeft: 8, background: "none", border: "none", color: C.danger, cursor: "pointer", fontSize: 14 }} onClick={() => updateForm("screenshotStart", "")}>✕</button></div>}
              <EvidenceProofInput label="" value={form.screenshotStart} onChange={v => updateForm("screenshotStart", v)} placeholder="Ссылка или загрузите скриншот начала" />
            </div>
            <div style={{ gridColumn: "1 / -1" }}>
              <label style={S.label}>Скриншот окончания дежурства</label>
              {form.screenshotEnd && <div style={{ marginBottom: 6 }}><a href={form.screenshotEnd} target="_blank" rel="noopener"><img src={form.screenshotEnd} alt="Конец" style={{ maxWidth: 200, maxHeight: 120, borderRadius: 8, border: `1px solid ${C.border}` }} /></a><button style={{ marginLeft: 8, background: "none", border: "none", color: C.danger, cursor: "pointer", fontSize: 14 }} onClick={() => updateForm("screenshotEnd", "")}>✕</button></div>}
              <EvidenceProofInput label="" value={form.screenshotEnd} onChange={v => updateForm("screenshotEnd", v)} placeholder="Ссылка или загрузите скриншот окончания" />
            </div>
            <div style={{ gridColumn: "1 / -1" }}><label style={S.label}>Описание / комментарий</label><textarea style={S.textarea} value={form.dutyDescription} onChange={e => updateForm("dutyDescription", e.target.value)} placeholder="Что происходило во время дежурства (необязательно)" /></div>
          </div>
        )}

        <div style={{ marginTop: 16 }}>
          <label style={S.label}>Доказательства</label>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {sanitizePilotLinks(form.links).map((link, index) => (
              <div key={`link-${index}`} style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
                <div style={{ flex: 1 }}>
                  <EvidenceProofInput
                    label={`Доказательство ${index + 1}`}
                    value={link}
                    onChange={(nextValue) => updateLink(index, nextValue)}
                    placeholder={`Укажите ссылку или загрузите скриншот №${index + 1}`}
                  />
                </div>
                <button className="btn-hover" style={btn("ghost")} onClick={() => removeLinkField(index)}>Убрать</button>
              </div>

            <div><button className="btn-hover" style={btn("ghost")} onClick={addLinkField}>Добавить доказательство</button></div>
          </div>
        </div>

        <div className="btn-row" style={{ ...S.row, marginTop: 18 }}>
          <button className="btn-hover" style={btn("gold")} onClick={saveEvent}>{editingEvent ? "Сохранить изменения" : "Сохранить запись"}</button>
        </div>
      </div>

      <div className="resp-card" style={S.card}>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "center", flexWrap: "wrap", marginBottom: 14 }}>
          <div style={S.cardTitle}>{isFederalOrAdmin ? "Все записи" : user.role === "BOSS" ? "Журнал субъекта" : "Мои записи"}</div>
          <input style={{ ...S.input, width: 180 }} type="month" value={formatMonthInputValue(periodKey)} onChange={e => setPeriodKey(formatMonthInputValue(e.target.value))} />
        </div>
        {visibleEvents.length === 0 ? (
          <div style={{ fontSize: T.body, color: C.textMuted }}>За выбранный месяц записей нет.</div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {visibleEvents.map(event => {
              const summary = getActivityEventSummary(event, factions, users, activitySettings);
              const typeEventMeta = getActivityTypeMeta(event.type, activitySettings);
              const author = users.find(item => item.id === event.authorUserId);
              return (
                <div key={event.id} style={{ padding: "14px 16px", background: C.bgInput, border: `1px solid ${C.border}`, borderRadius: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                    <div>
                      <div style={{ color: typeEventMeta.color || C.gold, fontSize: T.bodyStrong, fontWeight: 700 }}>{typeEventMeta.label}</div>
                      <div style={{ color: C.text, fontSize: T.body, marginTop: 6 }}>{summary.primary}</div>
                      <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 6 }}>{summary.factionName} • {summary.secondary}</div>
                      <div style={{ color: C.textDim, fontSize: T.body, marginTop: 8 }}>{summary.reason}</div>
                      <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 8 }}>Автор: {author ? getUserFullName(author) : "—"}{isFederalOrAdmin && event.authorSubject ? ` • ${event.authorSubject}` : ""} • {formatDateTime(getActivityEventDate(event))}</div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "flex-end" }}>
                      <span style={badge(event.links?.length ? C.success : C.warning)}>{event.links?.length || 0} доказательств</span>
                      {event.type === "warning" && event?.personRecord?.includeInDossier === false && <span style={badge(C.blue)}>Без внесения в досье</span>}
                      <div style={{ display: "flex", gap: 8 }}>
                        {canEditActivityEvent(user, event, activitySettings) && <button className="btn-hover" style={btn("ghost")} onClick={() => openEditor(event)}>Редактировать</button>}
                        {canDelete && (user.role !== "BOSS" || event.authorSubject === user.subject) && <button className="btn-hover" style={btn("danger")} onClick={() => deleteEvent(event.id)}>Удалить</button>}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

    </div>
  );
}

function PageMyReport({ user, users, reports, setReports, criteria, bonusSettings, addAudit, activityEvents, setActivityEvents, factions, activitySettings }) {
  if (isPilotUser(user, activitySettings) || user.role === "FEDERAL" || user.role === "USP" || hasSystemAdminAccess(user)) {
    return <PagePilotActivityJournal user={user} users={users} activityEvents={activityEvents} setActivityEvents={setActivityEvents} factions={factions} activitySettings={activitySettings} addAudit={addAudit} />;
  }
  const [form, setForm] = useState({});
  const [note, setNote] = useState("");
  const [success, setSuccess] = useState("");
  const [error, setError] = useState("");
  const [editingReportId, setEditingReportId] = useState(null);
  const myReports = reports.filter(r => r.userId === user.id).sort((a, b) => new Date(b.date) - new Date(a.date));
  const roleCriteria = getCriteriaForRole(criteria, user.role);
  const currentPeriodKey = getReportPeriodKey(new Date());
  const currentPeriodLabel = getReportPeriodLabel(new Date());
  const currentDeadline = getReportDeadlineDate(currentPeriodKey, bonusSettings);
  const currentPeriodReport = useMemo(
    () => myReports.find(report => getReportStoredPeriodKey(report) === currentPeriodKey) || null,
    [myReports, currentPeriodKey]
  );
  const activeReport = editingReportId ? myReports.find(report => report.id === editingReportId) || currentPeriodReport : currentPeriodReport;
  const deadlineOpen = isReportDeadlineOpen(currentPeriodKey, bonusSettings);
  const formLocked = activeReport ? !canAuthorEditReport(activeReport, bonusSettings) : !deadlineOpen;
  const activeStatus = activeReport ? getReportStatusValue(activeReport) : "";

  useEffect(() => {
    if (!currentPeriodReport) {
      setForm({});
      setNote("");
      setEditingReportId(null);
      return;
    }
    setForm(buildReportFormState(getReportEntries(currentPeriodReport)));
    setNote(currentPeriodReport.note || "");
    setEditingReportId(currentPeriodReport.id);
  }, [currentPeriodReport?.id]);

  const setQuantity = (criteriaId, rawValue) => {
    const safeValue = String(rawValue || "").replace(/[^\d]/g, "");
    const quantity = safeValue === "" ? 0 : Math.max(0, Math.round(Number(safeValue)));
    setForm(prev => ({
      ...prev,
      [criteriaId]: {
        quantity: safeValue,
        links: adjustReportLinksToQuantity(prev?.[criteriaId]?.links, quantity),
      },
    }));
  };

  const setLink = (criteriaId, index, value) => {
    setForm(prev => {
      const current = normalizeReportFormEntry(prev?.[criteriaId]);
      const nextLinks = [...current.links];
      nextLinks[index] = value;
      return {
        ...prev,
        [criteriaId]: {
          quantity: current.quantity,
          links: nextLinks,
        },
      };
    });
  };

  const openRevision = (report) => {
    setForm(buildReportFormState(getReportEntries(report)));
    setNote(report.note || "");
    setEditingReportId(report.id);
    setSuccess("");
    setError("");
  };

  const saveReport = (mode) => {
    const targetReport = activeReport && getReportStoredPeriodKey(activeReport) === currentPeriodKey ? activeReport : currentPeriodReport;
    const editable = targetReport ? canAuthorEditReport(targetReport, bonusSettings) : deadlineOpen;
    if (!editable) {
      setError(`Редактирование отчёта за ${currentPeriodLabel.toLowerCase()} закрыто. Дедлайн истёк ${formatDateTime(currentDeadline)}.`);
      return;
    }

    const { entries, errors } = buildStructuredReportEntries(roleCriteria, form, user.role, { requireLinks: mode === "submit" });
    if (errors.length > 0) {
      setError(errors[0]);
      return;
    }
    if (entries.length === 0 && !note.trim()) {
      setError("Укажите количество хотя бы по одному пункту или добавьте примечание.");
      return;
    }

    const now = new Date().toISOString();
    const nextStatus = mode === "draft" ? "draft" : getInitialReportStatus(user, users);
    const baseAmount = targetReport?.baseAmount || getReportBaseAmount(user.role);
    const nextReport = targetReport ? {
      ...targetReport,
      date: now,
      savedAt: now,
      submittedAt: mode === "submit" ? now : null,
      updatedAt: now,
      entries,
      note: note.trim(),
      status: nextStatus,
      periodKey: currentPeriodKey,
      periodLabel: currentPeriodLabel,
      subject: user.subject,
      authorRole: user.role,
      baseAmount,
      routeFallback: user.role === "STAFF" && !hasActiveBossForSubject(users, user.subject),
      bonusDraft: null,
      bossReview: null,
      federalReview: null,
      returnComment: "",
      returnedAt: null,
      returnedBy: null,
      approvedAt: null,
      approvedBy: null,
      approvedBonusId: null,
    } : {
      id: generateId(),
      userId: user.id,
      date: now,
      savedAt: now,
      submittedAt: mode === "submit" ? now : null,
      updatedAt: now,
      entries,
      note: note.trim(),
      subject: user.subject,
      authorRole: user.role,
      baseAmount,
      periodKey: currentPeriodKey,
      periodLabel: currentPeriodLabel,
      status: nextStatus,
      routeFallback: user.role === "STAFF" && !hasActiveBossForSubject(users, user.subject),
      bonusDraft: null,
      bossReview: null,
      federalReview: null,
      returnComment: "",
      returnedAt: null,
      returnedBy: null,
      approvedAt: null,
      approvedBy: null,
      approvedBonusId: null,
    };

    const nextReports = targetReport
      ? reports.map(item => item.id === nextReport.id ? nextReport : item)
      : [...reports, nextReport];
    setReports(nextReports);
    setEditingReportId(nextReport.id);
    setError("");
    addAudit(
      mode === "draft"
        ? `Черновик отчёта сохранён: ${user.surname} • ${currentPeriodLabel}`
        : targetReport
          ? `Отчёт обновлён и отправлен заново: ${user.surname} • ${currentPeriodLabel}`
          : `Отчёт подан: ${user.surname} • ${getReportStatusMeta(nextReport).label}`,
      user.id
    );
    setSuccess(mode === "draft"
      ? `Черновик за ${currentPeriodLabel.toLowerCase()} сохранён. Его можно редактировать до ${formatDateTime(currentDeadline)}.`
      : nextStatus === "pending_boss"
        ? "Отчёт сохранён и отправлен руководителю субъекта на рассмотрение."
        : "Отчёт сохранён и отправлен в Генеральную прокуратуру на рассмотрение.");
    setTimeout(() => setSuccess(""), 3500);
  };

  const draftButtonLabel = activeStatus === "draft" ? "Обновить черновик" : "Сохранить черновик";
  const submitButtonLabel = activeStatus && activeStatus !== "draft" ? "Сохранить и отправить заново" : "Отправить на согласование";

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Мой отчёт</h1>
      <p style={S.pageSubtitle}>Отчёт за {currentPeriodLabel.toLowerCase()}: укажите количество выполнений по каждому пункту и приложите по одному доказательству на каждое выполнение: ссылку или скриншот.</p>
      {success && <div style={{ padding: "12px 16px", background: C.success + "22", border: `1px solid ${C.success}44`, borderRadius: 8, color: C.success, fontSize: T.body, marginBottom: 18 }}>{success}</div>}
      {error && <div style={{ padding: "12px 16px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body, marginBottom: 18 }}>{error}</div>}
      {roleCriteria.length === 0 && <div style={{ padding: "12px 16px", background: C.warning + "22", border: `1px solid ${C.warning}44`, borderRadius: 8, color: C.warning, fontSize: T.body, marginBottom: 18 }}>Для вашей роли пока не настроены критерии отчётности.</div>}
      <div className="resp-card" style={{ ...S.card, display: "flex", flexDirection: "column", gap: 10 }}>
        <div style={S.cardTitle}>Период отчёта</div>
        <div style={{ fontSize: T.body, color: C.text }}>Текущий период: <span style={{ color: C.gold, fontWeight: 700 }}>{currentPeriodLabel}</span></div>
        <div style={{ fontSize: T.body, color: deadlineOpen ? C.textDim : C.dangerLight }}>
          Дедлайн редактирования: <span style={{ color: deadlineOpen ? C.blueLight : C.dangerLight, fontWeight: 700 }}>{formatDateTime(currentDeadline)}</span>
        </div>
        {currentPeriodReport && (
          <div style={{ fontSize: T.meta, color: C.textMuted }}>
            Текущий статус: <span style={{ color: getReportStatusMeta(currentPeriodReport).color }}>{getReportStatusMeta(currentPeriodReport).label}</span>
          </div>
        )}
        {!deadlineOpen && (
          <div style={{ fontSize: T.body, color: C.dangerLight }}>
            Дедлайн завершён. Изменения за этот месяц заблокированы.
          </div>
        )}
        {activeReport?.returnComment && (
          <div style={{ fontSize: T.body, color: C.warning }}>
            Комментарий по доработке: {activeReport.returnComment}
          </div>
        )}
      </div>

      <div className="resp-card" style={S.card}>
        <div style={S.cardTitle}>{currentPeriodReport ? "Отчёт за текущий месяц" : "Новый отчёт"}</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {roleCriteria.map(criteriaItem => {
            const entryState = normalizeReportFormEntry(form[criteriaItem.id]);
            const quantity = Math.max(0, Number(entryState.quantity || 0));
            return (
              <div key={criteriaItem.id} style={{ padding: "16px 18px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
                <label style={S.label}>{criteriaItem.name}</label>
                <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 12 }}>{criteriaItem.description}</div>
                <div>
                  <label style={{ ...S.label, marginBottom: 6 }}>Количество выполнений</label>
                  <input
                    style={S.input}
                    type="number"
                    min="0"
                    step="1"
                    value={entryState.quantity}
                    onChange={e => setQuantity(criteriaItem.id, e.target.value)}
                    placeholder="0"
                    disabled={formLocked}
                  />
                </div>
                {quantity > 0 ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 14 }}>
                    {entryState.links.map((link, index) => (
                      <div key={`${criteriaItem.id}-${index}`}>
                        <EvidenceProofInput
                          label={`Доказательство ${index + 1}`}
                          value={link}
                          onChange={(nextValue) => setLink(criteriaItem.id, index, nextValue)}
                          placeholder={`Укажите ссылку или загрузите скриншот по выполнению №${index + 1}`}
                          disabled={formLocked}
                        />
                      </div>
                    ))}
                  </div>
                ) : (
                  <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 10 }}>
                    Укажите количество больше нуля, и система добавит поле доказательства на каждое выполнение.
                  </div>
                )}
              </div>
            );
          })}

          <div>
            <label style={S.label}>Примечание</label>
            <textarea
              style={S.textarea}
              value={note}
              onChange={e => setNote(e.target.value)}
              placeholder="Дополнительная информация по отчёту"
              disabled={formLocked}
            />
          </div>

          <div className="btn-row" style={S.row}>
            <button className="btn-hover" style={{ ...btn("ghost"), opacity: formLocked || roleCriteria.length === 0 ? 0.6 : 1 }} onClick={() => saveReport("draft")} disabled={formLocked || roleCriteria.length === 0}>{draftButtonLabel}</button>
            <button className="btn-hover" style={{ ...btn("gold"), opacity: formLocked || roleCriteria.length === 0 ? 0.6 : 1 }} onClick={() => saveReport("submit")} disabled={formLocked || roleCriteria.length === 0}>{submitButtonLabel}</button>
          </div>
        </div>
      </div>

      <div className="resp-card" style={S.card}>
        <div style={S.cardTitle}>История отчётов</div>
        {myReports.length === 0 ? <div style={{ color: C.textMuted, fontSize: T.body }}>Отчётов пока нет</div> : (
          <div className="responsive-table-wrap">
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>Период</th>
                <th style={S.th}>Статус</th>
                <th style={S.th}>Объём</th>
                <th style={S.th}>Комментарий</th>
                <th style={S.th}>Действия</th>
              </tr>
            </thead>
            <tbody>{myReports.map(report => {
              const status = getReportStatusMeta(report);
              const draft = getReportBonusDraft(report);
              const totalQuantity = getReportTotalQuantity(report);
              const canEdit = canAuthorEditReport(report, bonusSettings);
              const comment = report.returnComment || report.note || draft.comment || "—";
              return (
                <tr key={report.id} className="row-hover">
                  <td data-label="Период" style={S.td}>
                    <div style={{ color: C.text }}>{getReportStoredPeriodLabel(report)}</div>
                    <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>{formatDateTime(report.savedAt || report.date)}</div>
                  </td>
                  <td data-label="Статус" style={S.td}><span style={badge(status.color)}>{status.label}</span></td>
                  <td data-label="Объём" style={S.td}>
                    <span style={{ color: C.gold, fontWeight: 700 }}>{totalQuantity}</span>
                    <span style={{ color: C.textMuted }}> ед. • {getReportFilledCount(report)} пункт.</span>
                  </td>
                  <td data-label="Комментарий" style={S.td}>{comment}</td>
                  <td data-label="Действия" style={S.td}>
                    {canEdit
                      ? <button className="btn-hover" style={btn("ghost")} onClick={() => openRevision(report)}>Открыть</button>
                      : (draft.totalAmount > 0 ? formatCurrency(draft.totalAmount) : "—")}
                  </td>
                </tr>
              );
            })}</tbody>
          </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════ PAGE: MY BONUS ═══════════════ */
function PagePilotMyBonus({ user, sessionUser, users, bonuses, setBonuses, positions, performanceReviews, activityEvents, factions, activitySettings, isPreviewMode, embedded = false }) {
  const [periodKey, setPeriodKey] = useState(getReportPeriodKey(new Date()));
  const metrics = useMemo(() => buildPilotMetricsSnapshot(user, activityEvents, factions, periodKey, activitySettings), [user, activityEvents, factions, periodKey, activitySettings]);
  const currentReview = useMemo(() => findPerformanceReviewForUser(performanceReviews, user.id, periodKey, user.subject), [performanceReviews, user, periodKey]);
  const history = useMemo(() => (performanceReviews || []).filter(review => review.userId === user.id && review.source === "activity_events").sort((left, right) => new Date(right.updatedAt || right.createdAt || 0) - new Date(left.updatedAt || left.createdAt || 0)), [performanceReviews, user.id]);
  const approvedBonuses = (bonuses || []).filter(item => item.userId === user.id && item.status === "approved").sort((left, right) => new Date(right.date || 0) - new Date(left.date || 0));
  const reviewStatus = currentReview ? getPerformanceReviewStatusMeta(currentReview) : { label: "Коэффициент ещё не назначен", color: C.warning };

  return (
    <div className={embedded ? "" : "fade-in"}>
      {embedded ? (
        <div style={{ marginBottom: 16 }}>
          <div style={S.cardTitle}>Моя премия</div>
          <div style={{ fontSize: T.body, color: C.textDim }}>{user.subject} • личный маршрут премирования по событиям месяца.</div>
        </div>
      ) : (
        <>
          <h1 className="resp-page-title" style={S.pageTitle}>Моя премия</h1>
          <p style={S.pageSubtitle}>{user.subject} • коэффициент формируется по событиям месяца, без отдельного месячного отчёта</p>
        </>
      )}

      <div className="stat-row" style={{ ...S.row, marginBottom: 16 }}>
        <StatBox value={currentReview ? formatCurrency(getPilotReviewDisplayAmount(currentReview)) : "—"} label="Текущая премия" color={currentReview ? C.gold : C.textMuted} />
      </div>


      <div className="resp-card" style={{ ...S.card, marginBottom: 18 }}>
        <div style={S.cardTitle}>Автостатистика периода</div>
        <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
          {Object.entries(metrics.typeCounts || {}).map(([type, count]) => {
            const typeMeta = getActivityTypeMeta(type, activitySettings);
            return <div key={type} style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}><div style={{ fontSize: T.meta, color: C.textMuted }}>{typeMeta.label}</div><div style={{ fontSize: T.heading, color: typeMeta.color || C.text, fontWeight: 700, marginTop: 8 }}>{count}</div></div>;
          })}
        </div>
      </div>

      <SubjectPayoutReportingCard
        user={user}
        sessionUser={sessionUser}
        users={users}
        bonuses={bonuses}
        setBonuses={setBonuses}
        positions={positions}
        isPreviewMode={isPreviewMode}
      />

      <div className="resp-card" style={S.card}>
        <div style={S.cardTitle}>История премирования</div>
        {history.length === 0 && approvedBonuses.length === 0 ? (
          <div style={{ color: C.textMuted, fontSize: T.body }}>Решения по коэффициенту пока не принимались.</div>
        ) : (
          <div className="responsive-table-wrap">
          <table style={S.table}>
            <thead><tr><th style={S.th}>Период</th><th style={S.th}>Статус</th><th style={S.th}>Сумма</th><th style={S.th}>Комментарий</th></tr></thead>
            <tbody>
              {history.map(review => {
                const statusMeta = getPerformanceReviewStatusMeta(review);
                const source = review.federalReview || review.bossReview || {};
                return <tr key={review.id} className="row-hover"><td data-label="Период" style={S.td}>{getPeriodLabelFromKey(review.periodKey)}</td><td data-label="Статус" style={S.td}><span style={badge(statusMeta.color)}>{statusMeta.label}</span></td><td data-label="Сумма" style={{ ...S.td, color: C.gold, fontWeight: 700 }}>{formatCurrency(getPilotReviewDisplayAmount(review))}</td><td data-label="Комментарий" style={S.td}>{review.returnComment || source.comment || "—"}</td></tr>;
              })}
              {approvedBonuses.map(bonus => {
                const payoutStatus = getBonusPayoutStatusMeta(bonus, users, positions);
                return <tr key={bonus.id} className="row-hover"><td data-label="Период" style={S.td}>{formatDate(bonus.date)}</td><td data-label="Статус" style={S.td}><span style={badge(payoutStatus.color)}>{payoutStatus.label}</span></td><td data-label="Сумма" style={{ ...S.td, color: C.gold, fontWeight: 700 }}>{formatCurrency(bonus.amount)}</td><td data-label="Комментарий" style={S.td}>{bonus.payoutComment || bonus.comment || "—"}</td></tr>;
              })}
            </tbody>
          </table>
          </div>
        )}
      </div>
    </div>
  );
}

function PageMyBonus({ user, sessionUser, users, reports, bonuses, setReports, setBonuses, positions, addAudit, performanceReviews, activityEvents, factions, activitySettings, isPreviewMode, embedded = false }) {
  if (isPilotUser(user, activitySettings)) {
    return <PagePilotMyBonus user={user} sessionUser={sessionUser} users={users} bonuses={bonuses} setBonuses={setBonuses} positions={positions} performanceReviews={performanceReviews} activityEvents={activityEvents} factions={factions} activitySettings={activitySettings} isPreviewMode={isPreviewMode} embedded={embedded} />;
  }
  const userBonuses = bonuses.filter(b => b.userId === user.id).sort((a, b) => new Date(b.date) - new Date(a.date));
  const approvedBonuses = userBonuses.filter(b => b.status === "approved");
  const canRequestFederalBonus = user.role === "FEDERAL" && !isGeneralProsecutorUser(user);
  const federalRequests = reports
    .filter(report => report.userId === user.id && isFederalBonusRequest(report))
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  const activeFederalRequests = federalRequests.filter(report => !["approved", "draft"].includes(getReportStatusValue(report)));
  const activeReports = reports
    .filter(report => report.userId === user.id && !["approved", "draft"].includes(getReportStatusValue(report)))
    .filter(isOperationalReport)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  const pendingCount = [...activeReports, ...activeFederalRequests].filter(report => ["pending_boss", "pending_federal"].includes(getReportStatusValue(report))).length;
  const returnedCount = [...activeReports, ...activeFederalRequests].filter(report => ["returned_boss", "returned_author"].includes(getReportStatusValue(report))).length;
  const currentPeriodKey = getReportPeriodKey(new Date());
  const currentPeriodLabel = getReportPeriodLabel(new Date());
  const currentFederalRequest = federalRequests.find(report => getReportStoredPeriodKey(report) === currentPeriodKey) || null;
  const [requestModalOpen, setRequestModalOpen] = useState(false);
  const [requestError, setRequestError] = useState("");
  const [requestSuccess, setRequestSuccess] = useState("");
  const [requestForm, setRequestForm] = useState({ targetSubject: SUBJECTS[0], coefficient: "0", extraAmount: "0", comment: "" });

  const openFederalRequestModal = (request = currentFederalRequest) => {
    const draft = request ? getReportBonusDraft(request) : normalizeReportDraft({}, getReportBaseAmount("FEDERAL"));
    setRequestForm({
      targetSubject: request?.bonusTargetSubject || SUBJECTS[0],
      coefficient: String(draft.coefficient),
      extraAmount: String(draft.extraAmount || 0),
      comment: draft.comment || "",
    });
    setRequestError("");
    setRequestSuccess("");
    setRequestModalOpen(true);
  };

  const closeFederalRequestModal = () => {
    setRequestModalOpen(false);
    setRequestError("");
  };

  const submitFederalRequest = () => {
    if (!canRequestFederalBonus || !setReports || !addAudit) return;
    if (!requestForm.targetSubject) {
      setRequestError("Выберите субъект, за который оформляется премия.");
      return;
    }
    if (currentFederalRequest && getReportStatusValue(currentFederalRequest) === "approved") {
      setRequestError(`За ${currentPeriodLabel.toLowerCase()} премия уже утверждена.`);
      return;
    }

    const now = new Date().toISOString();
    const proposal = normalizeReportDraft(requestForm, getReportBaseAmount("FEDERAL"));
    const nextRequest = currentFederalRequest ? {
      ...currentFederalRequest,
      date: now,
      savedAt: now,
      submittedAt: now,
      updatedAt: now,
      status: "pending_federal",
      subject: GENERAL_SUBJECT,
      bonusTargetSubject: requestForm.targetSubject,
      authorRole: "FEDERAL",
      baseAmount: getReportBaseAmount("FEDERAL"),
      periodKey: currentPeriodKey,
      periodLabel: currentPeriodLabel,
      note: "",
      entries: [],
      submissionKind: "federal_bonus",
      routeFallback: false,
      bonusDraft: { ...proposal, updatedAt: now, updatedBy: user.id },
      bossReview: null,
      federalReview: null,
      returnComment: "",
      returnedAt: null,
      returnedBy: null,
      approvedAt: null,
      approvedBy: null,
      approvedBonusId: null,
    } : {
      id: generateId(),
      userId: user.id,
      date: now,
      savedAt: now,
      submittedAt: now,
      updatedAt: now,
      status: "pending_federal",
      subject: GENERAL_SUBJECT,
      bonusTargetSubject: requestForm.targetSubject,
      authorRole: "FEDERAL",
      baseAmount: getReportBaseAmount("FEDERAL"),
      periodKey: currentPeriodKey,
      periodLabel: currentPeriodLabel,
      note: "",
      entries: [],
      submissionKind: "federal_bonus",
      routeFallback: false,
      bonusDraft: { ...proposal, updatedAt: now, updatedBy: user.id },
      bossReview: null,
      federalReview: null,
      returnComment: "",
      returnedAt: null,
      returnedBy: null,
      approvedAt: null,
      approvedBy: null,
      approvedBonusId: null,
    };

    const nextReports = currentFederalRequest
      ? reports.map(report => report.id === nextRequest.id ? nextRequest : report)
      : [...reports, nextRequest];
    setReports(nextReports);
    addAudit(
      currentFederalRequest
        ? `Федеральная заявка на премию обновлена: ${user.surname} • ${requestForm.targetSubject} • ${currentPeriodLabel}`
        : `Федеральная заявка на премию подана: ${user.surname} • ${requestForm.targetSubject} • ${currentPeriodLabel}`,
      user.id
    );
    setRequestSuccess("Заявка на премию направлена Генеральному прокурору на утверждение.");
    setRequestModalOpen(false);
  };

  const rows = [
    ...activeReports.map(report => {
      const status = getReportStatusMeta(report);
      const draft = getReportBonusDraft(report);
      const amountText = draft.totalAmount > 0 ? formatCurrency(draft.totalAmount) : "—";
      const fallbackComment = getReportStatusValue(report) === "pending_boss"
        ? "Ожидает назначения премии руководителем."
        : getReportStatusValue(report) === "pending_federal"
          ? "На рассмотрении Генеральной прокуратуры."
          : "Возвращён на доработку.";
      return {
        id: `report-${report.id}`,
        date: report.date,
        amount: amountText,
        status,
        comment: report.returnComment || draft.comment || fallbackComment,
      };
    }),
    ...activeFederalRequests.map(report => {
      const status = getReportStatusMeta(report);
      const draft = getReportBonusDraft(report);
      const fallbackComment = getReportStatusValue(report) === "pending_federal"
        ? "На рассмотрении Генерального прокурора."
        : "Возвращена на доработку.";
      return {
        id: `federal-${report.id}`,
        date: report.date,
        amount: draft.totalAmount > 0 ? formatCurrency(draft.totalAmount) : "—",
        status,
        comment: `${report.bonusTargetSubject || "Субъект не указан"} • ${report.returnComment || draft.comment || fallbackComment}`,
      };
    }),
    ...userBonuses.map(bonus => ({
      id: bonus.id,
      date: bonus.date,
      amount: formatCurrency(bonus.amount),
      status: bonus.status === "approved"
        ? getBonusPayoutStatusMeta(bonus, users, positions)
        : bonus.status === "rejected"
          ? { label: "Отклонена", color: C.danger }
          : { label: "На согласовании", color: C.warning },
      comment: bonus.payoutComment || bonus.comment || "—",
    })),
  ].sort((a, b) => new Date(b.date) - new Date(a.date));

  return (
    <div className={embedded ? "" : "fade-in"}>
      {embedded ? (
        <div style={{ marginBottom: 16 }}>
          <div style={S.cardTitle}>Моя премия</div>
          <div style={{ fontSize: T.body, color: C.textDim }}>
            {canRequestFederalBonus ? "Федеральная заявка на премию и история выплат доступны прямо в кабинете." : "Маршрут премирования и история выплат перенесены в личный кабинет."}
          </div>
        </div>
      ) : (
        <>
          <h1 className="resp-page-title" style={S.pageTitle}>Моя премия</h1>
          <p style={S.pageSubtitle}>{canRequestFederalBonus ? "Подача федеральной заявки на премию и итоговые выплаты." : "Путь премирования по вашим отчётам и итоговые выплаты"}</p>
        </>
      )}
      <div className="stat-row" style={S.row}>
        <StatBox value={formatCurrency(approvedBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0))} label="Итого получено" color={C.success} />
        <StatBox value={pendingCount} label="На согласовании" color={C.warning} />
        <StatBox value={returnedCount} label="Возвращено" color={C.danger} />
      </div>
      {canRequestFederalBonus && (
        <div className="resp-card" style={{ ...S.card, marginTop: 16 }}>
          <div style={S.cardTitle}>Федеральная премия за {currentPeriodLabel.toLowerCase()}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ fontSize: T.body, color: C.text }}>Базовая ставка: <span style={{ color: C.gold, fontWeight: 700 }}>{formatCurrency(getReportBaseAmount("FEDERAL"))}</span></div>
            <div style={{ fontSize: T.body, color: C.textDim }}>
              Сотрудник Генеральной прокуратуры не подаёт отчёт. Вместо него оформляется заявка на премию, которая уходит на утверждение Генеральному прокурору.
            </div>
            {currentFederalRequest && (
              <div style={{ fontSize: T.meta, color: C.textMuted }}>
                Текущий статус: <span style={{ color: getReportStatusMeta(currentFederalRequest).color }}>{getReportStatusMeta(currentFederalRequest).label}</span>
                {" • "}Субъект: {currentFederalRequest.bonusTargetSubject || "—"}
              </div>
            )}
            {requestSuccess && <div style={{ padding: "10px 14px", background: C.success + "22", border: `1px solid ${C.success}44`, borderRadius: 8, color: C.success, fontSize: T.body }}>{requestSuccess}</div>}
            <div className="btn-row" style={S.row}>
              {!currentFederalRequest && <button className="btn-hover" style={btn("gold")} onClick={() => openFederalRequestModal()}>Подать заявку на премию</button>}
              {currentFederalRequest && ["returned_author", "draft"].includes(getReportStatusValue(currentFederalRequest)) && (
                <button className="btn-hover" style={btn("gold")} onClick={() => openFederalRequestModal(currentFederalRequest)}>Исправить и отправить заново</button>
              )}
              {currentFederalRequest && getReportStatusValue(currentFederalRequest) === "pending_federal" && (
                <button className="btn-hover" style={{ ...btn("ghost"), opacity: 0.75 }} disabled>Ожидает Генерального прокурора</button>
              )}
              {currentFederalRequest && getReportStatusValue(currentFederalRequest) === "approved" && (
                <button className="btn-hover" style={{ ...btn("ghost"), opacity: 0.75 }} disabled>Премия за этот месяц утверждена</button>
              )}
            </div>
          </div>
        </div>
      )}

      <SubjectPayoutReportingCard
        user={user}
        sessionUser={sessionUser}
        users={users}
        bonuses={bonuses}
        setBonuses={setBonuses}
        positions={positions}
        isPreviewMode={isPreviewMode}
      />

      <div className="resp-card" style={{ ...S.card, marginTop: 16 }}>
        <div style={S.cardTitle}>История премирования</div>
        {rows.length === 0 ? <div style={{ color: C.textMuted, fontSize: T.body }}>Премии и маршруты согласования пока не появились</div> : (
          <div className="responsive-table-wrap">
          <table style={S.table}>
            <thead><tr><th style={S.th}>Дата</th><th style={S.th}>Сумма</th><th style={S.th}>Статус</th><th style={S.th}>Комментарий</th></tr></thead>
            <tbody>{rows.map(row => (
              <tr key={row.id} className="row-hover">
                <td data-label="Дата" style={S.td}>{formatDate(row.date)}</td>
                <td data-label="Сумма" style={{ ...S.td, fontWeight: 700, color: C.gold }}>{row.amount}</td>
                <td data-label="Статус" style={S.td}><span style={badge(row.status.color)}>{row.status.label}</span></td>
                <td data-label="Комментарий" style={S.td}>{row.comment}</td>
              </tr>
            ))}</tbody>
          </table>
          </div>
        )}
      </div>

      {canRequestFederalBonus && requestModalOpen && (
        <Modal onClose={closeFederalRequestModal} maxWidth={760}>
          <div style={S.cardTitle}>Заявка на премию Генеральной прокуратуры</div>
          {requestError && <div style={{ padding: "12px 16px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body, marginBottom: 16 }}>{requestError}</div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
              <div style={{ fontSize: T.bodyStrong, color: C.text, marginBottom: 8 }}>{user.surname} {user.name}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted }}>База федеральной премии: {formatCurrency(getReportBaseAmount("FEDERAL"))}</div>
            </div>

            <div>
              <label style={S.label}>Субъект для премирования</label>
              <select style={S.select} value={requestForm.targetSubject} onChange={e => setRequestForm(prev => ({ ...prev, targetSubject: e.target.value }))}>
                {SUBJECTS.map(subject => <option key={subject} value={subject}>{subject}</option>)}
              </select>
            </div>

            <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14 }}>
              <div>
                <label style={S.label}>Коэффициент</label>
                <select style={S.select} value={requestForm.coefficient} onChange={e => setRequestForm(prev => ({ ...prev, coefficient: e.target.value }))}>
                  {REPORT_COEFFICIENT_OPTIONS.map(value => <option key={value} value={value}>{formatCoefficient(value)}</option>)}
                </select>
              </div>
              <div>
                <label style={S.label}>Доп. премия за награды (₽)</label>
                <input style={S.input} type="number" min="0" step="1" value={requestForm.extraAmount} onChange={e => setRequestForm(prev => ({ ...prev, extraAmount: e.target.value }))} />
              </div>
            </div>

            <div>
              <label style={S.label}>Комментарий</label>
              <textarea style={S.textarea} value={requestForm.comment} onChange={e => setRequestForm(prev => ({ ...prev, comment: e.target.value }))} placeholder="Комментарий к заявке на премию" />
            </div>

            <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
              <div style={{ fontSize: T.meta, color: C.textMuted }}>Итоговая сумма заявки</div>
              <div style={{ fontSize: T.heading, color: C.gold, fontWeight: 700, marginTop: 6 }}>
                {formatCurrency(calculateReportBonusAmount(getReportBaseAmount("FEDERAL"), requestForm.coefficient, requestForm.extraAmount))}
              </div>
            </div>

            <div className="btn-row" style={S.row}>
              <button className="btn-hover" style={btn("gold")} onClick={submitFederalRequest}>Направить Генеральному прокурору</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ═══════════════ PAGE: CALENDAR ═══════════════ */
const CALENDAR_CATEGORIES = {
  meeting:  { label: "Совещание",  color: "#1d70d1" },
  deadline: { label: "Дедлайн",   color: "#d69a2d" },
  personal: { label: "Личное",    color: "#2f9e8f" },
  official: { label: "Служебное", color: "#0077b6" },
  news:     { label: "Новости",   color: "#4ea8de" },
  duty:     { label: "Дежурство", color: "#e67e22" },
  other:    { label: "Другое",    color: "#8ea5c7" },
};

function getCalendarEventColor(event) {
  if (event.entityType === "check") return C.gold;
  if (event.entityType === "case") return C.success;
  if (event.color && CALENDAR_CATEGORIES[event.color]) return CALENDAR_CATEGORIES[event.color].color;
  return C.blue;
}

function getCalendarEventTypeLabel(event) {
  if (event.entityType === "check") return "Проверка";
  if (event.entityType === "case") return "Жалоба";
  if (event.color && CALENDAR_CATEGORIES[event.color]) return CALENDAR_CATEGORIES[event.color].label;
  return event.statusLabel || "Событие";
}

function ChecksAwareCalendar({ events: propEvents, user, users: allUsers, onRefresh, onNavigate }) {
  const [currentMonth, setCurrentMonth] = useState(new Date());
  const [calendarEvents, setCalendarEvents] = useState(propEvents || []);
  const [selectedDay, setSelectedDay] = useState(null);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editingEvent, setEditingEvent] = useState(null);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  const monthParam = `${currentMonth.getFullYear()}-${String(currentMonth.getMonth() + 1).padStart(2, "0")}`;

  const loadEvents = useCallback(async () => {
    setBusy(true);
    try {
      const res = await apiRequestWithParams("checks.calendar.list", { month: monthParam });
      setCalendarEvents(res.items || []);
    } catch (e) {
      console.error("Calendar load error:", e);
      setError("Ошибка загрузки: " + (e.message || "неизвестная ошибка"));
      setCalendarEvents(propEvents || []);
    } finally {
      setBusy(false);
    }
  }, [monthParam]);

  useEffect(() => { loadEvents(); }, [loadEvents]);

  const calendar = buildHomeMonthCalendar(currentMonth);

  const eventMap = new Map();
  (calendarEvents || []).forEach(ev => {
    const d = ev.startsAt ? new Date(ev.startsAt) : null;
    if (!d || isNaN(d.getTime())) return;
    const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (!eventMap.has(key)) eventMap.set(key, []);
    eventMap.get(key).push(ev);
  });

  const prevMonth = () => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1));
  const nextMonth = () => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1));
  const goToday = () => setCurrentMonth(new Date());

  const dayEvents = selectedDay ? (eventMap.get(selectedDay) || []).sort((a, b) => (a.startsAt || "").localeCompare(b.startsAt || "")) : [];

  const canCreateEvent = true;
  const canManageEvent = (ev) => ev.entityType === "manual" && (ev.isOwner || hasSystemAdminAccess(user));

  const handleCreate = async (form) => {
    setBusy(true); setError("");
    try {
      await apiRequest("checks.calendar.create", form);
      await loadEvents();
      setShowForm(false);
    } catch (e) { setError(e.message || "Ошибка"); } finally { setBusy(false); }
  };

  const handleUpdate = async (form) => {
    setBusy(true); setError("");
    try {
      await apiRequest("checks.calendar.update", form);
      await loadEvents();
      setEditingEvent(null); setSelectedEvent(null);
    } catch (e) { setError(e.message || "Ошибка"); } finally { setBusy(false); }
  };

  const handleDelete = async (entityId) => {
    const confirmed = await showConfirm("Удалить событие?", { danger: true, confirmLabel: "Удалить" }); if (!confirmed) return;
    setBusy(true);
    try {
      await apiRequest("checks.calendar.delete", { entityId });
      await loadEvents();
      setSelectedEvent(null); setSelectedDay(null);
    } catch (e) { setError(e.message || "Ошибка"); } finally { setBusy(false); }
  };

  const formatMonthDate = (dateKey) => {
    if (!dateKey) return "";
    const [y, m, d] = dateKey.split("-");
    const date = new Date(+y, +m, +d);
    return date.toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" });
  };

  const formatTime = (iso) => {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    return d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", timeZone: "Europe/Moscow" });
  };

  return (
    <div className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
        <h1 className="resp-page-title" style={{ ...S.pageTitle, marginBottom: 0 }}>Календарь</h1>
        {canCreateEvent && (
          <button className="btn-hover" style={btn("gold")} onClick={() => { setShowForm(true); setEditingEvent(null); setError(""); }}>+ Событие</button>
        )}
      </div>

      {error && <div style={{ padding: "12px 16px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body, marginBottom: 14 }}>{error}</div>}

      {/* Month navigation */}
      <div className="resp-card" style={{ ...S.card, padding: 0 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px", borderBottom: `1px solid ${C.border}` }}>
          <button className="btn-hover" style={{ ...btn("ghost"), padding: "8px 14px" }} onClick={prevMonth}>◀</button>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: T.title, fontWeight: 700, color: C.text, fontFamily: F.heading, textTransform: "capitalize" }}>{calendar.monthLabel}</span>
            <button className="btn-hover" style={{ ...btn("ghost"), padding: "6px 12px", fontSize: T.meta }} onClick={goToday}>Сегодня</button>
          </div>
          <button className="btn-hover" style={{ ...btn("ghost"), padding: "8px 14px" }} onClick={nextMonth}>▶</button>
        </div>

        {/* Weekday headers */}
        <div className="calendar-grid" style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)" }}>
          {HOME_CALENDAR_WEEKDAYS.map(d => (
            <div key={d} style={{ padding: "8px 4px", textAlign: "center", fontSize: T.meta, color: C.textMuted, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, borderBottom: `1px solid ${C.border}` }}>{d}</div>
          ))}
        </div>

        {/* Day grid */}
        <div className="calendar-grid" style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)" }}>
          {calendar.cells.map(cell => {
            if (!cell.day) return <div key={cell.key} style={{ minHeight: 90, background: C.bg, borderBottom: `1px solid ${C.border}05` }} />;
            const cellEvents = eventMap.get(cell.dateKey) || [];
            const isSelected = selectedDay === cell.dateKey;
            return (
              <div
                key={cell.key}
                className="btn-hover"
                onClick={() => setSelectedDay(isSelected ? null : cell.dateKey)}
                style={{
                  minHeight: 90, padding: "6px 8px", cursor: "pointer", borderBottom: `1px solid ${C.border}22`,
                  background: isSelected ? C.activeNav : cell.isToday ? C.bgInput : "transparent",
                  opacity: cell.isCurrentMonth ? 1 : 0.35,
                  borderRight: `1px solid ${C.border}11`,
                }}
              >
                <div style={{ textAlign: "right", fontSize: T.meta, fontWeight: cell.isToday ? 800 : 500, color: cell.isToday ? C.goldLight : cell.isWeekend ? C.textMuted : C.textDim, marginBottom: 4 }}>
                  {cell.day}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                  {cellEvents.slice(0, 3).map(ev => (
                    <div key={ev.id} style={{ fontSize: 11, color: C.textDim, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", paddingLeft: 6, borderLeft: `2px solid ${getCalendarEventColor(ev)}` }} title={ev.title}>
                      {ev.title}
                    </div>
                  ))}
                  {cellEvents.length > 3 && <div style={{ fontSize: 10, color: C.textMuted, paddingLeft: 6 }}>+{cellEvents.length - 3}</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Day detail modal */}
      {selectedDay && (
        <Modal onClose={() => setSelectedDay(null)} maxWidth={480}>
          <h2 style={{ ...S.cardTitle, marginBottom: 16 }}>{formatMonthDate(selectedDay)}</h2>
          {dayEvents.length === 0 ? (
            <p style={{ color: C.textMuted }}>Нет событий в этот день</p>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {dayEvents.map(ev => (
                <div
                  key={ev.id}
                  className="btn-hover"
                  onClick={() => setSelectedEvent(ev)}
                  style={{ padding: "12px 14px", borderLeft: `3px solid ${getCalendarEventColor(ev)}`, background: C.bgInput, borderRadius: "0 8px 8px 0", cursor: "pointer" }}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                    <span style={{ color: C.text, fontWeight: 600, fontSize: T.body }}>{ev.title}</span>
                    <span style={{ ...badge(getCalendarEventColor(ev)), flexShrink: 0 }}>{getCalendarEventTypeLabel(ev)}</span>
                  </div>
                  <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>
                    {formatTime(ev.startsAt)}{ev.endsAt ? ` — ${formatTime(ev.endsAt)}` : ""}
                    {ev.description ? ` · ${ev.description.slice(0, 80)}` : ""}
                    {ev.targetUserId && (() => { const tu = (allUsers || []).find(u => u.id === ev.targetUserId); return tu ? ` · 👤 ${(tu.surname || "")} ${(tu.name || "")}` : ""; })()}
                    {ev.creatorUserId && (() => { const cu = (allUsers || []).find(u => u.id === ev.creatorUserId); return cu ? ` · ✏️ ${(cu.surname || "")} ${(cu.name || "")}` : ""; })()}
                  </div>
                </div>
              ))}
            </div>
          )}
        </Modal>
      )}

      {/* Event detail modal */}
      {selectedEvent && !editingEvent && (
        <Modal onClose={() => setSelectedEvent(null)} maxWidth={520}>
          <div style={{ borderLeft: `4px solid ${getCalendarEventColor(selectedEvent)}`, paddingLeft: 16, marginBottom: 20 }}>
            <h2 style={{ fontSize: T.title, fontWeight: 700, color: C.text, marginBottom: 4 }}>{selectedEvent.title}</h2>
            <span style={badge(getCalendarEventColor(selectedEvent))}>{getCalendarEventTypeLabel(selectedEvent)}</span>
          </div>
          <div style={{ display: "grid", gap: 12, marginBottom: 20 }}>
            <div><span style={{ color: C.textMuted, fontSize: T.meta }}>НАЧАЛО</span><div style={{ color: C.text }}>{formatDateTime(selectedEvent.startsAt)}</div></div>
            {selectedEvent.endsAt && <div><span style={{ color: C.textMuted, fontSize: T.meta }}>ОКОНЧАНИЕ</span><div style={{ color: C.text }}>{formatDateTime(selectedEvent.endsAt)}</div></div>}
            {selectedEvent.description && <div><span style={{ color: C.textMuted, fontSize: T.meta }}>ОПИСАНИЕ</span><div style={{ color: C.textDim }}>{selectedEvent.description}</div></div>}
            {selectedEvent.statusLabel && <div><span style={{ color: C.textMuted, fontSize: T.meta }}>СТАТУС</span><div style={{ color: C.textDim }}>{selectedEvent.statusLabel}</div></div>}
            {selectedEvent.targetUserId && selectedEvent.entityType === "manual" && (() => {
              const targetU = (allUsers || []).find(u => u.id === selectedEvent.targetUserId);
              return targetU ? <div><span style={{ color: C.textMuted, fontSize: T.meta }}>НАЗНАЧЕН</span><div style={{ color: C.text }}>{(targetU.surname || "") + " " + (targetU.name || "")}</div></div> : null;
            })()}
            {selectedEvent.creatorUserId && (() => {
              const creatorU = (allUsers || []).find(u => u.id === selectedEvent.creatorUserId);
              return creatorU ? <div><span style={{ color: C.textMuted, fontSize: T.meta }}>СОЗДАЛ</span><div style={{ color: C.text }}>{(creatorU.surname || "") + " " + (creatorU.name || "")}</div></div> : null;
            })()}
            {selectedEvent.visibility && selectedEvent.entityType === "manual" && (
              <div><span style={{ color: C.textMuted, fontSize: T.meta }}>ВИДИМОСТЬ</span><div style={{ color: C.textDim }}>{selectedEvent.visibility === "private" ? "Только мне" : selectedEvent.visibility === "subject" ? "Субъекту" : "Всем"}</div></div>
            )}
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {(selectedEvent.entityType === "check" || selectedEvent.entityType === "case") && onNavigate && (
              <button className="btn-hover" style={btn("gold")} onClick={() => { setSelectedEvent(null); setSelectedDay(null); onNavigate(selectedEvent.entityType === "check" ? "checks" : "cases"); }}>
                Перейти к {selectedEvent.entityType === "check" ? "проверке" : "жалобе"}
              </button>
            )}
            {canManageEvent(selectedEvent) && (
              <>
                <button className="btn-hover" style={btn("ghost")} onClick={() => { setEditingEvent(selectedEvent); setError(""); }}>Редактировать</button>
                <button className="btn-hover" style={btn("danger")} onClick={() => handleDelete(selectedEvent.entityId)} disabled={busy}>Удалить</button>
              </>
            )}
          </div>
        </Modal>
      )}

      {/* Create/Edit form modal */}
      {(showForm || editingEvent) && (
        <CalendarEventForm
          event={editingEvent}
          user={user}
          users={allUsers}
          defaultDate={selectedDay}
          busy={busy}
          error={error}
          onSave={editingEvent ? handleUpdate : handleCreate}
          onClose={() => { setShowForm(false); setEditingEvent(null); setError(""); }}
        />
      )}
    </div>
  );
}

function CalendarEventForm({ event, user, users, defaultDate, busy, error, onSave, onClose }) {
  const isEdit = !!event;
  const parseDefault = () => {
    if (isEdit && event.startsAt) {
      const d = new Date(event.startsAt);
      return d.toISOString().slice(0, 16);
    }
    if (defaultDate) {
      const [y, m, d] = defaultDate.split("-");
      return `${y}-${m.padStart(2, "0")}-${d.padStart(2, "0")}T09:00`;
    }
    const now = new Date();
    return now.toISOString().slice(0, 16);
  };
  const parseEndDefault = () => {
    if (isEdit && event.endsAt) {
      const d = new Date(event.endsAt);
      return d.toISOString().slice(0, 16);
    }
    return "";
  };

  const [title, setTitle] = useState(isEdit ? event.title || "" : "");
  const [description, setDescription] = useState(isEdit ? event.description || "" : "");
  const [startsAt, setStartsAt] = useState(parseDefault);
  const [endsAt, setEndsAt] = useState(parseEndDefault);
  const [color, setColor] = useState(isEdit ? event.color || "other" : "meeting");
  const [visibility, setVisibility] = useState(isEdit ? event.visibility || "private" : "private");
  const [targetUserId, setTargetUserId] = useState(isEdit ? event.targetUserId || "" : "");

  const canSetVisibility = hasSystemAdminAccess(user) || ["BOSS", "FEDERAL"].includes(user?.role);
  const canAssignToUser = canSetVisibility;
  const [assignSubjectFilter, setAssignSubjectFilter] = useState("");
  const allAssignableUsers = useMemo(() => {
    if (!canAssignToUser || !Array.isArray(users)) return [];
    return users.filter(u => u && !u.blocked && u.id !== user?.id).sort((a, b) => ((a.surname || "") + " " + (a.name || "")).localeCompare((b.surname || "") + " " + (b.name || ""), "ru"));
  }, [users, user, canAssignToUser]);
  const assignableUsers = useMemo(() => {
    if (!assignSubjectFilter) return allAssignableUsers;
    return allAssignableUsers.filter(u => u.subject === assignSubjectFilter);
  }, [allAssignableUsers, assignSubjectFilter]);
  const assignSubjects = useMemo(() => [...new Set(allAssignableUsers.map(u => u.subject).filter(Boolean))].sort(), [allAssignableUsers]);

  const handleSubmit = () => {
    if (!title.trim()) return;
    if (!startsAt) return;
    const payload = {
      title: title.trim(),
      description: description.trim(),
      startsAt: new Date(startsAt).toISOString(),
      endsAt: endsAt ? new Date(endsAt).toISOString() : "",
      color,
      visibility,
      targetUserId: targetUserId || "",
    };
    if (isEdit) payload.entityId = event.entityId;
    onSave(payload);
  };

  return (
    <Modal onClose={onClose} maxWidth={480} persistent>
      <h2 style={{ ...S.cardTitle, marginBottom: 20 }}>{isEdit ? "Редактирование события" : "Новое событие"}</h2>
      <div style={{ display: "grid", gap: 14 }}>
        <div>
          <label style={S.label}>Название *</label>
          <input style={S.input} value={title} onChange={e => setTitle(e.target.value)} placeholder="Название события" />
        </div>
        <div>
          <label style={S.label}>Описание</label>
          <textarea style={{ ...S.textarea, minHeight: 60 }} value={description} onChange={e => setDescription(e.target.value)} placeholder="Описание (необязательно)" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div>
            <label style={S.label}>Начало *</label>
            <input type="datetime-local" style={S.input} value={startsAt} onChange={e => setStartsAt(e.target.value)} />
          </div>
          <div>
            <label style={S.label}>Окончание</label>
            <input type="datetime-local" style={S.input} value={endsAt} onChange={e => setEndsAt(e.target.value)} />
          </div>
        </div>
        <div>
          <label style={S.label}>Категория</label>
          <select style={S.select} value={color} onChange={e => setColor(e.target.value)}>
            {Object.entries(CALENDAR_CATEGORIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>
        {canSetVisibility && (
          <div>
            <label style={S.label}>Видимость</label>
            <select style={S.select} value={visibility} onChange={e => setVisibility(e.target.value)}>
              <option value="private">Только мне</option>
              <option value="subject">Всем сотрудникам субъекта</option>
              <option value="all">Всем пользователям</option>
            </select>
          </div>
        )}
        {canAssignToUser && allAssignableUsers.length > 0 && (
          <div>
            <label style={S.label}>Назначить сотруднику</label>
            {assignSubjects.length > 1 && (
              <select style={{ ...S.select, marginBottom: 6 }} value={assignSubjectFilter} onChange={e => { setAssignSubjectFilter(e.target.value); setTargetUserId(""); }}>
                <option value="">Все субъекты</option>
                {assignSubjects.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            )}
            <select style={S.select} value={targetUserId} onChange={e => setTargetUserId(e.target.value)}>
              <option value="">— не назначать —</option>
              {assignableUsers.map(u => <option key={u.id} value={u.id}>{(u.surname || "") + " " + (u.name || "")} ({u.subject})</option>)}
            </select>
            <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>Событие появится в календаре выбранного сотрудника</div>
          </div>
        )}
        {error && <div style={{ color: C.dangerLight, fontSize: T.meta }}>{error}</div>}
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 4 }}>
          <button className="btn-hover" style={btn("gold")} onClick={handleSubmit} disabled={busy || !title.trim() || !startsAt}>{isEdit ? "Сохранить" : "Создать"}</button>
        </div>
      </div>
    </Modal>
  );
}

/* ═══════════════ PAGE: SUBJECT CONTROL ═══════════════ */
function PagePilotSubjectControl({ user, users, activityEvents, performanceReviews, setPerformanceReviews, factions, activitySettings, addAudit }) {
  const [periodKey, setPeriodKey] = useState(getReportPeriodKey(new Date()));
  const [selectedRow, setSelectedRow] = useState(null);
  const [reviewForm, setReviewForm] = useState({ coefficient: "0", extraAmount: "0", comment: "" });
  const subjectUsers = useMemo(() => getPilotSubjectUsers(users, user.subject, activitySettings), [users, user.subject, activitySettings]);
  const rows = useMemo(() => subjectUsers.map(targetUser => {
    const metrics = buildPilotMetricsSnapshot(targetUser, activityEvents, factions, periodKey, activitySettings);
    const review = findPerformanceReviewForUser(performanceReviews, targetUser.id, periodKey, targetUser.subject);
    return { user: targetUser, metrics, review };
  }).sort((left, right) => {
    if (left.user.role !== right.user.role) return left.user.role === "BOSS" ? -1 : 1;
    return right.metrics.closedCases - left.metrics.closedCases;
  }), [subjectUsers, activityEvents, factions, periodKey, activitySettings, performanceReviews]);

  const openReview = (row) => {
    if (row.user.id === user.id || row.user.role !== "STAFF") return;
    const source = row.review?.bossReview || {};
    setSelectedRow(row);
    setReviewForm({
      coefficient: String(source.coefficient ?? 0),
      extraAmount: String(source.extraAmount ?? 0),
      comment: source.comment || "",
    });
  };

  const closeReview = () => {
    setSelectedRow(null);
    setReviewForm({ coefficient: "0", extraAmount: "0", comment: "" });
  };

  const submitReview = () => {
    if (!selectedRow) return;
    const now = new Date().toISOString();
    const proposal = normalizeReportDraft(reviewForm, getReportBaseAmount(selectedRow.user.role));
    const nextReview = normalizePerformanceReview({
      ...selectedRow.review,
      id: selectedRow.review?.id || generateId(),
      userId: selectedRow.user.id,
      subject: selectedRow.user.subject,
      periodKey,
      source: "activity_events",
      metricsSnapshot: selectedRow.metrics,
      baseAmount: getReportBaseAmount(selectedRow.user.role),
      status: "pending_federal",
      bossReview: { ...proposal, reviewedAt: now, reviewedBy: user.id },
      federalReview: null,
      returnComment: "",
      returnedAt: null,
      returnedBy: null,
      approvedAt: null,
      approvedBy: null,
      updatedAt: now,
      createdAt: selectedRow.review?.createdAt || now,
    });
    setPerformanceReviews(prev => upsertPerformanceReview(prev, nextReview));
    addAudit(`Коэффициент назначен: ${getUserFullName(selectedRow.user)} • ${formatCoefficient(proposal.coefficient)} • ${formatCurrency(proposal.totalAmount)}`, user.id);
    closeReview();
  };

  const pendingCount = rows.filter(row => row.review?.status === "pending_federal").length;
  const activeCount = rows.filter(row => row.metrics.totalEvents > 0).length;

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Контроль субъекта: {user.subject}</h1>
