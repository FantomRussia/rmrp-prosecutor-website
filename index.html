      <p style={S.pageSubtitle}>{user.subject} • назначение коэффициентов по автоматической статистике месяца</p>
      <div className="stat-row" style={{ ...S.row, marginBottom: 16 }}>
        <StatBox value={rows.length} label="Сотрудников в сводке" color={C.blue} />
        <StatBox value={activeCount} label="С активностью в месяце" color={C.success} />
        <StatBox value={pendingCount} label="Уже направлено в ГП" color={C.warning} />
      </div>
      <div className="resp-card" style={{ ...S.card, marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "center", flexWrap: "wrap", marginBottom: 14 }}>
          <div style={S.cardTitle}>Месячная сводка сотрудников</div>
          <input style={{ ...S.input, width: 180 }} type="month" value={formatMonthInputValue(periodKey)} onChange={e => setPeriodKey(formatMonthInputValue(e.target.value))} />
        </div>
        <div className="responsive-table-wrap">
        <table style={S.table}>
          <thead><tr><th style={S.th}>Сотрудник</th><th style={S.th}>Роль</th><th style={S.th}>Вынесено решений</th><th style={S.th}>Событий</th><th style={S.th}>Фракций</th><th style={S.th}>Статус</th><th style={S.th}>Действие</th></tr></thead>
          <tbody>
            {rows.map(row => {
              const reviewMeta = row.review ? getPerformanceReviewStatusMeta(row.review) : null;
              const reviewAmount = row.review ? getPilotReviewDisplayAmount(row.review) : 0;
              return (
                <tr key={`${row.user.id}-${periodKey}`} className="row-hover">
                  <td data-label="Сотрудник" style={{ ...S.td, color: C.text }}>{getUserFullName(row.user)}</td>
                  <td data-label="Роль" style={S.td}><RoleBadge role={row.user.role} /></td>
                  <td data-label="Вынесено решений" style={{ ...S.td, color: C.success, fontWeight: 700 }}>{row.metrics.closedCases}</td>
                  <td data-label="Событий" style={S.td}>{row.metrics.totalEvents}</td>
                  <td data-label="Фракций" style={S.td}>{row.metrics.uniqueFactions}</td>
                  <td data-label="Статус" style={S.td}>{reviewMeta ? <span style={badge(reviewMeta.color)}>{reviewMeta.label}</span> : <span style={badge(C.textMuted)}>Не назначен</span>}</td>
                  <td data-label="Действие" style={S.td}>
                    {row.user.id === user.id || row.user.role === "BOSS"
                      ? <span style={{ color: C.textMuted, fontSize: T.meta }}>{row.review ? formatCurrency(reviewAmount) : "Решает ГП"}</span>
                      : <button className="btn-hover" style={btn("ghost")} onClick={() => openReview(row)}>{row.review ? "Изменить" : "Назначить"}</button>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>
      </div>

      {selectedRow && (
        <Modal onClose={closeReview} maxWidth={780}>
          <div style={S.cardTitle}>Коэффициент по сотруднику</div>
          <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
            <div style={{ color: C.text, fontSize: T.bodyStrong, fontWeight: 700 }}>{getUserFullName(selectedRow.user)}</div>
            <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 6 }}>Базовая ставка: {formatCurrency(getReportBaseAmount(selectedRow.user.role))}</div>
            <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 4 }}>Событий: {selectedRow.metrics.totalEvents} • Вынесено решений: {selectedRow.metrics.closedCases} • Лиц в производстве: {selectedRow.metrics.uniquePersons}</div>
          </div>
          <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14, marginTop: 16 }}>
            <div><label style={S.label}>Коэффициент</label><select style={S.select} value={reviewForm.coefficient} onChange={e => setReviewForm(prev => ({ ...prev, coefficient: e.target.value }))}>{REPORT_COEFFICIENT_OPTIONS.map(value => <option key={value} value={value}>{formatCoefficient(value)}</option>)}</select></div>
            <div><label style={S.label}>Доп. премия (₽)</label><input style={S.input} type="number" min="0" step="1" value={reviewForm.extraAmount} onChange={e => setReviewForm(prev => ({ ...prev, extraAmount: e.target.value }))} /></div>
          </div>
          <div style={{ marginTop: 16 }}>
            <label style={S.label}>Комментарий</label>
            <textarea style={S.textarea} value={reviewForm.comment} onChange={e => setReviewForm(prev => ({ ...prev, comment: e.target.value }))} placeholder="Комментарий к назначению коэффициента" />
          </div>
          <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}`, marginTop: 16 }}>
            <div style={{ fontSize: T.meta, color: C.textMuted }}>Итоговая сумма</div>
            <div style={{ fontSize: T.heading, color: C.gold, fontWeight: 700, marginTop: 6 }}>{formatCurrency(calculateReportBonusAmount(getReportBaseAmount(selectedRow.user.role), reviewForm.coefficient, reviewForm.extraAmount))}</div>
          </div>
          <div className="btn-row" style={{ ...S.row, marginTop: 18 }}>
            <button className="btn-hover" style={btn("gold")} onClick={submitReview}>Направить в Генпрокуратуру</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function PageSubjectControl({ user, users, reports, setReports, addAudit, activityEvents, performanceReviews, setPerformanceReviews, factions, activitySettings }) {
  if (isPilotUser(user, activitySettings) && user.role === "BOSS") {
    return <PagePilotSubjectControl user={user} users={users} activityEvents={activityEvents} performanceReviews={performanceReviews} setPerformanceReviews={setPerformanceReviews} factions={factions} activitySettings={activitySettings} addAudit={addAudit} />;
  }
  const subjectUsers = users.filter(item => item.subject === user.subject && !item.blocked);
  const queue = reports.filter(report => canBossReviewReport(report, user)).sort((a, b) => new Date(a.date) - new Date(b.date));
  const forwarded = reports.filter(report => report.subject === user.subject && ["STAFF", "SENIOR_STAFF", "USP"].includes(report.authorRole || "STAFF") && ["pending_federal", "approved"].includes(getReportStatusValue(report))).length;
  const [selectedReport, setSelectedReport] = useState(null);
  const [reviewForm, setReviewForm] = useState({ coefficient: "0", extraAmount: "0", comment: "" });

  const openReview = (report) => {
    const draft = getReportBonusDraft(report);
    setSelectedReport(report);
    setReviewForm({
      coefficient: String(draft.coefficient),
      extraAmount: String(draft.extraAmount || 0),
      comment: draft.comment || "",
    });
  };

  const closeReview = () => {
    setSelectedReport(null);
    setReviewForm({ coefficient: "0", extraAmount: "0", comment: "" });
  };

  const sendToFederal = () => {
    if (!selectedReport) return;
    const now = new Date().toISOString();
    const proposal = normalizeReportDraft(reviewForm, selectedReport.baseAmount || getReportBaseAmount(selectedReport));
    const nextReport = {
      ...selectedReport,
      status: "pending_federal",
      bonusDraft: { ...proposal, updatedAt: now, updatedBy: user.id },
      bossReview: { ...proposal, reviewedAt: now, reviewedBy: user.id },
      returnComment: "",
      returnedAt: null,
      returnedBy: null,
    };
    setReports(reports.map(report => report.id === nextReport.id ? nextReport : report));
    addAudit(`Отчёт направлен в Генпрокуратуру: ${getUserFullName(users.find(item => item.id === selectedReport.userId))} • ${formatCurrency(proposal.totalAmount)}`, user.id);
    closeReview();
  };

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Контроль субъекта: {user.subject}</h1>
      <p style={S.pageSubtitle}>Рассмотрение отчётов STAFF и назначение премии перед отправкой в Генеральную прокуратуру</p>
      <div className="stat-row" style={{ ...S.row, marginBottom: 16 }}>
        <StatBox value={subjectUsers.length} label="Сотрудников" />
        <StatBox value={queue.length} label="Очередь на решение" color={C.warning} />
        <StatBox value={forwarded} label="Уже в Генпрокуратуре" color={C.blue} />
      </div>
      <div className="resp-card" style={S.card}>
        <div style={S.cardTitle}>Отчёты STAFF на рассмотрении</div>
        {queue.length === 0 ? <div style={{ color: C.textMuted, fontSize: T.body }}>Новых отчётов на рассмотрении нет</div> : (
          <div className="responsive-table-wrap">
          <table style={S.table}>
            <thead><tr><th style={S.th}>Сотрудник</th><th style={S.th}>Дата</th><th style={S.th}>Объём</th><th style={S.th}>Статус</th><th style={S.th}>Комментарий</th><th style={S.th}>Действия</th></tr></thead>
            <tbody>{queue.map(report => {
              const reportUser = users.find(item => item.id === report.userId);
              const status = getReportStatusMeta(report);
              return (
                <tr key={report.id} className="row-hover">
                  <td data-label="Сотрудник" style={{ ...S.td, color: C.text }}>{getUserFullName(reportUser)}</td>
                  <td data-label="Дата" style={S.td}>{formatDate(report.date)}</td>
                  <td data-label="Объём" style={S.td}>{getReportTotalQuantity(report)} ед.</td>
                  <td data-label="Статус" style={S.td}><span style={badge(status.color)}>{status.label}</span></td>
                  <td data-label="Комментарий" style={S.td}>{report.returnComment || report.note || "—"}</td>
                  <td data-label="Действия" style={S.td}><button className="btn-hover" style={btn("ghost")} onClick={() => openReview(report)}>Назначить премию</button></td>
                </tr>
              );
            })}</tbody>
          </table>
          </div>
        )}
      </div>

      {selectedReport && (
        <Modal onClose={closeReview} maxWidth={760}>
          <div style={S.cardTitle}>Премирование по отчёту</div>
          {selectedReport.returnComment && (
            <div style={{ padding: "12px 16px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body, marginBottom: 16 }}>
              Возврат из Генеральной прокуратуры: {selectedReport.returnComment}
            </div>
          )}
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
              <div style={{ fontSize: T.bodyStrong, color: C.text, marginBottom: 8 }}>{getUserFullName(users.find(item => item.id === selectedReport.userId))}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted }}>Базовая ставка: {formatCurrency(selectedReport.baseAmount || getReportBaseAmount(selectedReport))}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>Примечание к отчёту: {selectedReport.note || "—"}</div>
            </div>

            <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
              <div style={{ fontSize: T.bodyStrong, color: C.gold, marginBottom: 10 }}>Содержание отчёта</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {getReportEntries(selectedReport).map(entry => <ReportEntryView key={`${selectedReport.id}-${entry.criteriaId}`} entry={entry} reportId={selectedReport.id} />)}
              </div>
            </div>

            {(() => {
              const bossReviewUser = users.find(item => item.id === selectedReport.userId);
              const bossReviewPeriodKey = selectedReport.periodKey || getReportPeriodKey(selectedReport.date);
              const bossReviewMetrics = buildPilotMetricsSnapshot(bossReviewUser, activityEvents, factions, bossReviewPeriodKey, activitySettings);
              const bossEventTypes = activitySettings?.eventTypes || DEFAULT_ACTIVITY_EVENT_TYPES;
              if (bossReviewMetrics.totalEvents === 0) return null;
              return (
                <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
                  <div style={{ fontSize: T.bodyStrong, color: C.gold, marginBottom: 12 }}>Активность сотрудника за период</div>
                  <div className="stat-row" style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
                    <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                      <div style={{ fontSize: T.title, fontWeight: 700, color: C.blue }}>{bossReviewMetrics.totalEvents}</div>
                      <div style={{ fontSize: T.meta, color: C.textMuted }}>Событий</div>
                    </div>
                    <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                      <div style={{ fontSize: T.title, fontWeight: 700, color: C.success }}>{bossReviewMetrics.closedCases}</div>
                      <div style={{ fontSize: T.meta, color: C.textMuted }}>Вынесено решений</div>
                    </div>
                    <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                      <div style={{ fontSize: T.title, fontWeight: 700, color: C.gold }}>{bossReviewMetrics.uniquePersons}</div>
                      <div style={{ fontSize: T.meta, color: C.textMuted }}>Лиц в производстве</div>
                    </div>
                    {bossReviewMetrics.visitsCount > 0 && (
                      <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                        <div style={{ fontSize: T.title, fontWeight: 700, color: C.blueLight || C.blue }}>{bossReviewMetrics.visitsCount}</div>
                        <div style={{ fontSize: T.meta, color: C.textMuted }}>Визитов</div>
                      </div>
                    )}
                  </div>
                  {Object.keys(bossReviewMetrics.typeCounts || {}).length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 8 }}>Детализация по типам</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        {Object.entries(bossReviewMetrics.typeCounts).sort((a, b) => b[1] - a[1]).map(([typeId, count]) => {
                          const typeMeta = bossEventTypes.find(item => item.id === typeId) || { label: typeId, icon: "📌" };
                          return <div key={typeId} style={{ fontSize: T.body, color: C.text }}>{typeMeta.icon} {typeMeta.label} — <span style={{ fontWeight: 700 }}>{count}</span></div>;
                        })}
                      </div>
                    </div>
                  )}
                  {(bossReviewMetrics.recentEvents || []).length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 8 }}>Последние события</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        {bossReviewMetrics.recentEvents.map(event => (
                          <div key={event.id} style={{ fontSize: T.body, color: C.text }}>{formatDate(event.date)} — {event.title}{event.factionName ? ` (${event.factionName})` : ""}</div>
                        ))}
                      </div>
                    </div>
                  )}
                  {(bossReviewMetrics.topReasons || []).length > 0 && (
                    <div>
                      <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 8 }}>Топ оснований</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        {bossReviewMetrics.topReasons.map((item, index) => (
                          <div key={item.reason} style={{ fontSize: T.body, color: C.text }}>{index + 1}. {item.reason} — <span style={{ fontWeight: 700 }}>{item.count}</span></div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14 }}>
              <div>
                <label style={S.label}>Коэффициент</label>
                <select style={S.select} value={reviewForm.coefficient} onChange={e => setReviewForm(prev => ({ ...prev, coefficient: e.target.value }))}>
                  {REPORT_COEFFICIENT_OPTIONS.map(value => <option key={value} value={value}>{formatCoefficient(value)}</option>)}
                </select>
              </div>
              <div>
                <label style={S.label}>Доп. премия за награды (₽)</label>
                <input style={S.input} type="number" min="0" step="1" value={reviewForm.extraAmount} onChange={e => setReviewForm(prev => ({ ...prev, extraAmount: e.target.value }))} />
              </div>
            </div>

            <div>
              <label style={S.label}>Комментарий</label>
              <textarea style={S.textarea} value={reviewForm.comment} onChange={e => setReviewForm(prev => ({ ...prev, comment: e.target.value }))} placeholder="Комментарий к назначению премии" />
            </div>

            <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
              <div style={{ fontSize: T.meta, color: C.textMuted }}>Итоговая премия</div>
              <div style={{ fontSize: T.heading, color: C.gold, fontWeight: 700, marginTop: 6 }}>
                {formatCurrency(calculateReportBonusAmount(selectedReport.baseAmount || getReportBaseAmount(selectedReport), reviewForm.coefficient, reviewForm.extraAmount))}
              </div>
            </div>

            <div className="btn-row" style={S.row}>
              <button className="btn-hover" style={btn("gold")} onClick={sendToFederal}>Направить в Генпрокуратуру</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ═══════════════ PAGE: PILOT FACTIONS SUMMARY ═══════════════ */
function PagePilotFactionsSummary({ user, sessionUser, users, activityEvents, setActivityEvents, factions, activitySettings, addAudit }) {
  const [periodKey, setPeriodKey] = useState(getReportPeriodKey(new Date()));
  const availableSubjects = useMemo(() => normalizePilotSubjectScope(
    user?.role === "BOSS" && isPilotUser(user, activitySettings) ? [user.subject] : null,
    activitySettings
  ), [user?.role, user?.subject, activitySettings]);
  const [subjectFilter, setSubjectFilter] = useState(availableSubjects[0] || "");
  const [selectedFactionId, setSelectedFactionId] = useState("");
  const [selectedPerson, setSelectedPerson] = useState(null);
  const [selectedEvidenceEvent, setSelectedEvidenceEvent] = useState(null);
  const [detailFilters, setDetailFilters] = useState({ type: "", authorUserId: "" });
  const deleteActor = hasSystemAdminAccess(sessionUser) ? sessionUser : user;
  const canDeleteEvents = canDeleteActivityEvent(deleteActor);
  const subjectScope = subjectFilter ? [subjectFilter] : availableSubjects;

  useEffect(() => {
    if (!availableSubjects.length) return;
    if (!availableSubjects.includes(subjectFilter)) {
      setSubjectFilter(availableSubjects[0]);
    }
  }, [availableSubjects, subjectFilter]);

  const summaryRows = useMemo(
    () => getPilotFactionSummaryRows(activityEvents, factions, periodKey, activitySettings, subjectScope),
    [activityEvents, factions, periodKey, activitySettings, subjectScope]
  );

  const pageSummary = useMemo(() => {
    const currentEvents = getPilotEventsForPeriod(activityEvents, periodKey, activitySettings, subjectScope);
    const analyticsEvents = currentEvents.filter(event => !isInternalActivityEvent(event, activitySettings));
    const uniquePersons = new Set();
    analyticsEvents
      .filter(event => isPersonActivityEvent(event, activitySettings))
      .forEach(event => {
        const key = `${event.factionId || "nofaction"}::${event?.personRecord?.targetId || event?.personRecord?.targetFullName || event.id}`;
        if (!key.endsWith("::")) uniquePersons.add(key);
      });
    return {
      totalEvents: analyticsEvents.length,
      closedCases: analyticsEvents.filter(event => event.type === "decision").length,
      uniquePersons: uniquePersons.size,
      visits: analyticsEvents.filter(event => isVisitActivityEvent(event, activitySettings)).length,
      activeFactions: summaryRows.filter(item => item.totalEvents > 0).length,
    };
  }, [activityEvents, periodKey, activitySettings, subjectScope, summaryRows]);

  const selectedFaction = useMemo(
    () => summaryRows.find(item => item.faction.id === selectedFactionId)?.faction || null,
    [summaryRows, selectedFactionId]
  );

  const selectedDetail = useMemo(
    () => selectedFactionId ? getPilotFactionDetail(activityEvents, selectedFactionId, periodKey, users, activitySettings, subjectScope) : null,
    [activityEvents, selectedFactionId, periodKey, users, activitySettings, subjectScope]
  );

  const filteredDetailEvents = useMemo(() => {
    if (!selectedDetail) return [];
    return selectedDetail.events.filter(event => !detailFilters.type || event.type === detailFilters.type)
      .filter(event => !detailFilters.authorUserId || event.authorUserId === detailFilters.authorUserId);
  }, [selectedDetail, detailFilters]);

  const selectedPersonEvents = useMemo(() => {
    if (!selectedPerson || !selectedFactionId) return [];
    return getPilotPersonDossierEvents(activityEvents, selectedFactionId, selectedPerson.targetId, activitySettings)
      .filter(event => getReportPeriodKey(getActivityEventDate(event)) === periodKey)
      .filter(event => !detailFilters.type || event.type === detailFilters.type)
      .filter(event => !detailFilters.authorUserId || event.authorUserId === detailFilters.authorUserId);
  }, [activityEvents, selectedFactionId, selectedPerson, activitySettings, periodKey, detailFilters]);

  const deleteEvent = useCallback(async (event) => {
    if (!canDeleteEvents) return;
    const confirmed = await showConfirm("Удалить событие из сводки фракций?", { danger: true, confirmLabel: "Удалить" }); if (!confirmed) return;
    setActivityEvents(activityEvents.filter(item => item.id !== event.id));
    addAudit(`Событие деятельности удалено: ${getActivityEventTitle(event, factions, activitySettings)}`, deleteActor?.id || user.id);
    setSelectedPerson(current => (current && String(current.targetId || "") === String(event?.personRecord?.targetId || "") ? null : current));
    setSelectedEvidenceEvent(current => current?.id === event.id ? null : current);
  }, [canDeleteEvents, setActivityEvents, activityEvents, addAudit, factions, activitySettings, deleteActor, user.id]);

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Сводка по фракциям</h1>
      <p style={S.pageSubtitle}>Сводка по фракциям субъекта из записей журнала деятельности всех сотрудников выбранного округа.</p>

      <div className="resp-card" style={{ ...S.card, marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <div>
            <div style={S.cardTitle}>Период анализа</div>
            <div style={{ color: C.textDim, fontSize: T.body, marginTop: 6 }}>По умолчанию открыт текущий месяц. Можно переключить период и заново посмотреть дисциплинарную картину по фракциям.</div>
          </div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            {availableSubjects.length > 1 && (
              <select style={{ ...S.select, width: 220 }} value={subjectFilter} onChange={e => setSubjectFilter(e.target.value)}>
                {availableSubjects.map(subject => <option key={subject} value={subject}>{subject}</option>)}
              </select>
            )}
            <input style={{ ...S.input, width: 200 }} type="month" value={formatMonthInputValue(periodKey)} onChange={e => setPeriodKey(formatMonthInputValue(e.target.value))} />
          </div>
        </div>
      </div>

      <div className="stat-row" style={{ ...S.row, marginBottom: 18 }}>
        <StatBox value={pageSummary.totalEvents} label="Всего записей" color={C.blue} />
        <StatBox value={pageSummary.closedCases} label="Вынесено решений" color={C.success} />
        <StatBox value={pageSummary.uniquePersons} label="Лиц в производстве" color={C.gold} />
        <StatBox value={pageSummary.visits} label="Официальных визитов" color={C.warning} />
        <StatBox value={pageSummary.activeFactions} label="Активных фракций" color={C.blueLight || C.blue} />
      </div>

      <div className="resp-card" style={S.card}>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "center", flexWrap: "wrap", marginBottom: 14 }}>
          <div>
            <div style={S.cardTitle}>Все фракции • {subjectFilter || getPilotSubjectsLabel(subjectScope)}</div>
            <div style={{ color: C.textMuted, fontSize: T.body, marginTop: 6 }}>Нажмите на фракцию, чтобы открыть подробности, список лиц и записи журнала за выбранный месяц.</div>
          </div>
          <div style={{ color: C.textMuted, fontSize: T.meta }}>Фракций в справочнике: {summaryRows.length}</div>
        </div>

        <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 14 }}>
          {summaryRows.map(row => (
            <button
              key={row.faction.id}
              className="btn-hover"
              onClick={() => {
                setSelectedFactionId(row.faction.id);
                setSelectedPerson(null);
                setDetailFilters({ type: "", authorUserId: "" });
              }}
              style={{ ...S.card, marginBottom: 0, textAlign: "left", cursor: "pointer" }}
            >
              <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "flex-start" }}>
                <div style={{ fontSize: T.bodyStrong, color: C.text, fontWeight: 700 }}>{row.faction.name}</div>
                <div style={{ ...badge(row.totalEvents > 0 ? C.gold : C.textMuted), fontSize: 11 }}>{row.totalEvents > 0 ? "Есть активность" : "Нет активности"}</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 8, marginTop: 12 }}>
                <div style={{ padding: "10px 12px", background: C.bgInput, borderRadius: 10 }}>
                  <div style={{ color: C.textMuted, fontSize: T.meta }}>Всего</div>
                  <div style={{ color: C.gold, fontSize: T.title, fontWeight: 700, marginTop: 4 }}>{row.totalEvents}</div>
                </div>
                <div style={{ padding: "10px 12px", background: C.bgInput, borderRadius: 10 }}>
                  <div style={{ color: C.textMuted, fontSize: T.meta }}>Лица</div>
                  <div style={{ color: C.text, fontSize: T.title, fontWeight: 700, marginTop: 4 }}>{row.uniquePersons}</div>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 10, marginTop: 12, fontSize: T.meta, color: C.textMuted }}>
                <div>Вынесено решений: <span style={{ color: C.success }}>{row.closedCases}</span></div>
                <div>Визитов: <span style={{ color: C.warning }}>{row.visits}</span></div>
                <div>Задержаний: <span style={{ color: C.text }}>{row.typeCounts.detention || 0}</span></div>
                <div>Штрафов: <span style={{ color: C.text }}>{row.typeCounts.fine || 0}</span></div>
                <div>Предупреждений: <span style={{ color: C.text }}>{row.typeCounts.warning || 0}</span></div>
                <div>Взысканий: <span style={{ color: C.text }}>{row.typeCounts.disciplinary || 0}</span></div>
              </div>
              <div style={{ color: C.textDim, fontSize: T.meta, marginTop: 10 }}>
                {row.topReason ? `Топ-причина: ${row.topReason.reason}` : "Причины за период не накоплены"}
              </div>
              <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 6 }}>
                Последняя активность: {row.lastActivityAt ? formatDateTime(row.lastActivityAt) : "—"}
              </div>
            </button>
          ))}
        </div>
      </div>

      {selectedFaction && selectedDetail && (
        <Modal onClose={() => { setSelectedFactionId(""); setSelectedPerson(null); setSelectedEvidenceEvent(null); }} maxWidth={1120}>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <div style={S.cardTitle}>Фракция: {selectedFaction.name}</div>
              <div style={{ color: C.textDim, fontSize: T.body, marginTop: 6 }}>Детальная сводка по записям журнала деятельности сотрудников выбранного субъекта за выбранный месяц.</div>
              <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 4 }}>Субъект: {subjectFilter || getPilotSubjectsLabel(subjectScope)}</div>
            </div>

            <div className="stat-row" style={{ ...S.row, marginBottom: 0 }}>
              <StatBox value={selectedDetail.events.length} label="Записей" color={C.blue} />
              <StatBox value={selectedDetail.people.length} label="Лиц в досье" color={C.gold} />
              <StatBox value={selectedDetail.events.filter(event => event.type === "decision").length} label="Вынесено решений" color={C.success} />
              <StatBox value={selectedDetail.events.filter(event => isVisitActivityEvent(event, activitySettings)).length} label="Визитов" color={C.warning} />
            </div>

            <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12 }}>
              <div>
                <label style={S.label}>Тип события</label>
                <select style={S.select} value={detailFilters.type} onChange={e => setDetailFilters(prev => ({ ...prev, type: e.target.value }))}>
                  <option value="">Все типы</option>
                  {(activitySettings?.eventTypes || DEFAULT_ACTIVITY_EVENT_TYPES).map(item => <option key={item.id} value={item.id}>{item.label}</option>)}
                </select>
              </div>
              <div>
                <label style={S.label}>Автор записи</label>
                <select style={S.select} value={detailFilters.authorUserId} onChange={e => setDetailFilters(prev => ({ ...prev, authorUserId: e.target.value }))}>
                  <option value="">Все авторы</option>
                  {selectedDetail.authors.map(author => <option key={author.id} value={author.id}>{getUserFullName(author)}</option>)}
                </select>
              </div>
            </div>

            <div className="resp-grid resp-grid-2col" style={{ display: "grid", gridTemplateColumns: "minmax(280px, 360px) minmax(0, 1fr)", gap: 16, alignItems: "start" }}>
              <div className="resp-card" style={{ ...S.card, marginBottom: 0 }}>
                <div style={S.cardTitle}>Лица во фракции</div>
                {selectedDetail.people.length === 0 ? (
                  <div style={{ color: C.textMuted, fontSize: T.body }}>По этой фракции пока нет накопленных личных дел.</div>
                ) : (
                  <div className="responsive-table-wrap">
                  <table style={S.table}>
                    <thead>
                      <tr>
                        <th style={S.th}>ФИО</th>
                        <th style={S.th}>ID</th>
                        <th style={S.th}>Событий</th>
                      </tr>
                    </thead>
                    <tbody>
                      {selectedDetail.people.map(person => (
                        <tr key={`${person.targetId}-${person.fullName}`} className="row-hover" onClick={() => setSelectedPerson(person)} style={{ cursor: "pointer" }}>
                          <td data-label="ФИО" style={{ ...S.td, color: C.text }}>{person.fullName}</td>
                          <td data-label="ID" style={S.td}>{person.targetId || "—"}</td>
                          <td data-label="Событий" style={{ ...S.td, color: C.gold }}>{person.count}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  </div>
                )}
              </div>

              <div className="resp-card" style={{ ...S.card, marginBottom: 0 }}>
                <div style={S.cardTitle}>Записи журнала по фракции</div>
                {filteredDetailEvents.length === 0 ? (
                  <div style={{ color: C.textMuted, fontSize: T.body }}>По выбранным фильтрам записей нет.</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {filteredDetailEvents.map(event => {
                      const summary = getActivityEventSummary(event, factions, users, activitySettings);
                      const author = users.find(item => item.id === event.authorUserId);
                      return (
                        <div key={event.id} className="row-hover" onClick={() => setSelectedEvidenceEvent(event)} style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}`, cursor: "pointer" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                            <div style={{ color: C.text }}>{getActivityEventTitle(event, factions, activitySettings)}</div>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", justifyContent: "flex-end" }}>
                              <div style={{ color: C.textMuted, fontSize: T.meta }}>{formatDateTime(getActivityEventDate(event))}</div>
                              {canDeleteEvents && <button className="btn-hover" style={btn("danger")} onClick={(clickEvent) => { clickEvent.stopPropagation(); deleteEvent(event); }}>Удалить</button>}
                            </div>
                          </div>
                          <div style={{ color: C.textDim, marginTop: 8 }}>{summary.reason}</div>
                          <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 8 }}>
                            Автор: {author ? getUserFullName(author) : "—"} • {summary.secondary}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>

            {selectedPerson && (
              <div className="resp-card" style={{ ...S.card, marginBottom: 0 }}>
                <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "center", flexWrap: "wrap", marginBottom: 10 }}>
                  <div>
                    <div style={S.cardTitle}>Личное дело: {selectedPerson.fullName}</div>
                    <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 4 }}>ID {selectedPerson.targetId || "—"} • {selectedPerson.position || "—"}</div>
                  </div>
                  <button className="btn-hover" style={btn("ghost")} onClick={() => setSelectedPerson(null)}>Скрыть дело</button>
                </div>
                {selectedPersonEvents.length === 0 ? (
                  <div style={{ color: C.textMuted, fontSize: T.body }}>По выбранным фильтрам записей по этому человеку нет.</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {selectedPersonEvents.map(event => {
                      const summary = getActivityEventSummary(event, factions, users, activitySettings);
                      const author = users.find(item => item.id === event.authorUserId);
                      return (
                        <div key={event.id} className="row-hover" onClick={() => setSelectedEvidenceEvent(event)} style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}`, cursor: "pointer" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                            <div style={{ color: C.text }}>{getActivityEventTitle(event, factions, activitySettings)}</div>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", justifyContent: "flex-end" }}>
                              <div style={{ color: C.textMuted, fontSize: T.meta }}>{formatDateTime(getActivityEventDate(event))}</div>
                              {canDeleteEvents && <button className="btn-hover" style={btn("danger")} onClick={(clickEvent) => { clickEvent.stopPropagation(); deleteEvent(event); }}>Удалить</button>}
                            </div>
                          </div>
                          <div style={{ color: C.textDim, marginTop: 8 }}>{summary.reason}</div>
                          <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 8 }}>
                            Автор: {author ? getUserFullName(author) : "—"} • {summary.secondary}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        </Modal>
      )}
      {selectedEvidenceEvent ? <PilotActivityEvidenceModal event={selectedEvidenceEvent} factions={factions} users={users} activitySettings={activitySettings} onClose={() => setSelectedEvidenceEvent(null)} /> : null}
    </div>
  );
}

/* ═══════════════ PAGE: ANALYTICS ═══════════════ */
function PagePilotAnalytics({ user, users, reports, bonuses, activityEvents, setActivityEvents, factions, activitySettings, addAudit }) {
  const [periodKey, setPeriodKey] = useState(getReportPeriodKey(new Date()));
  const availableSubjects = useMemo(() => getPilotScopeSubjects(user, activitySettings), [user, activitySettings]);
  const [subjectFilter, setSubjectFilter] = useState(availableSubjects[0] || "");
  const [selectedFactionId, setSelectedFactionId] = useState("");
  const [selectedPerson, setSelectedPerson] = useState(null);
  const [selectedEvidenceEvent, setSelectedEvidenceEvent] = useState(null);
  const [personFilters, setPersonFilters] = useState({ periodKey: "", type: "", authorUserId: "" });
  const [dossierTypeFilter, setDossierTypeFilter] = useState("");
  const [dossierSort, setDossierSort] = useState({ key: "count", dir: "desc" });
  const [dossierEditEvent, setDossierEditEvent] = useState(null);
  const [dossierEditForm, setDossierEditForm] = useState(null);
  const [dossierEditError, setDossierEditError] = useState("");

  const canDeleteEvents = canDeleteActivityEvent(user);
  const deleteAnalyticsEvent = useCallback(async (event) => {
    if (!canDeleteEvents) return;
    const confirmed = await showConfirm("Удалить эту запись из журнала?", { danger: true, confirmLabel: "Удалить" }); if (!confirmed) return;
    setActivityEvents(prev => (Array.isArray(prev) ? prev : []).filter(item => item.id !== event.id));
    if (typeof addAudit === "function") addAudit(`Событие деятельности удалено: ${getActivityEventTitle(event, factions, activitySettings)}`, user.id);
    setSelectedPerson(current => (current && String(current.targetId || "") === String(event?.personRecord?.targetId || "") ? null : current));
    setSelectedEvidenceEvent(current => current?.id === event.id ? null : current);
  }, [canDeleteEvents, setActivityEvents, addAudit, factions, activitySettings, user.id]);

  const openDossierEdit = useCallback((event) => {
    if (!event) return;
    setDossierEditEvent(event);
    setDossierEditForm(createDefaultPilotActivityForm(user, factions, activitySettings, event));
    setDossierEditError("");
  }, [user, factions, activitySettings]);

  useEffect(() => {
    if (dossierEditEvent) openDossierEdit(dossierEditEvent);
  }, []);

  const saveDossierEdit = useCallback(() => {
    if (!dossierEditEvent || !dossierEditForm || typeof setActivityEvents !== "function") return;
    const typeMeta = getActivityTypeMeta(dossierEditForm.type, activitySettings);
    const err = validatePilotActivityForm(dossierEditForm, typeMeta, activitySettings);
    if (err) { setDossierEditError(err); return; }
    const nextEvent = buildPilotActivityPayload({ form: dossierEditForm, user, editingEvent: dossierEditEvent, activitySettings });
    setActivityEvents(prev => (Array.isArray(prev) ? prev : []).map(item => item.id === nextEvent.id ? nextEvent : item));
    if (typeof addAudit === "function") addAudit(`Событие отредактировано из досье: ${getActivityEventTitle(nextEvent, factions, activitySettings)}`, user.id);
    setDossierEditEvent(null);
    setDossierEditForm(null);
    setDossierEditError("");
  }, [dossierEditEvent, dossierEditForm, user, activitySettings, factions, setActivityEvents, addAudit]);
  const subjectScope = (user?.role === "BOSS" || user?.role === "USP") ? [user.subject] : (subjectFilter ? [subjectFilter] : availableSubjects);

  useEffect(() => {
    if (!availableSubjects.length) return;
    if (!availableSubjects.includes(subjectFilter)) {
      setSubjectFilter(availableSubjects[0]);
    }
  }, [availableSubjects, subjectFilter]);

  const pilotUsers = useMemo(() => getPilotSubjectUsers(users, subjectScope, activitySettings), [users, subjectScope, activitySettings]);
  const pilotEvents = useMemo(() => getPilotEventsForPeriod(activityEvents, null, activitySettings, subjectScope), [activityEvents, activitySettings, subjectScope]);
  const currentEvents = useMemo(() => getPilotEventsForPeriod(activityEvents, periodKey, activitySettings, subjectScope), [activityEvents, periodKey, activitySettings, subjectScope]);
  const factionStats = useMemo(() => getPilotFactionStats(activityEvents, factions, activitySettings, periodKey, subjectScope), [activityEvents, factions, activitySettings, periodKey, subjectScope]);
  const byType = useMemo(() => (activitySettings?.eventTypes || DEFAULT_ACTIVITY_EVENT_TYPES).filter(t => !t.internal).map(typeMeta => ({
    ...typeMeta,
    count: currentEvents.filter(event => event.type === typeMeta.id).length,
  })), [activitySettings, currentEvents]);
  const employeeRows = useMemo(() => pilotUsers.map(targetUser => ({
    user: targetUser,
    metrics: buildPilotMetricsSnapshot(targetUser, activityEvents, factions, periodKey, activitySettings),
  })).sort((left, right) => right.metrics.closedCases - left.metrics.closedCases), [pilotUsers, activityEvents, factions, periodKey, activitySettings]);
  const dynamics = useMemo(() => Array.from({ length: 6 }, (_, index) => {
    const date = new Date();
    date.setMonth(date.getMonth() - index);
    const itemKey = getReportPeriodKey(date);
    const events = getPilotEventsForPeriod(activityEvents, itemKey, activitySettings, subjectScope);
    const analyticsEvents = events.filter(event => !isInternalActivityEvent(event, activitySettings));
    return {
      periodKey: itemKey,
      label: getPeriodLabelFromKey(itemKey),
      totalEvents: analyticsEvents.length,
      closedCases: analyticsEvents.filter(event => event.type === "decision").length,
    };
  }).reverse(), [activityEvents, activitySettings, subjectScope]);
  const legacySummary = useMemo(() => getPilotLegacySubjectSummary(users, reports, bonuses, activitySettings?.pilotSubjects || DEFAULT_ACTIVITY_SETTINGS.pilotSubjects), [users, reports, bonuses, activitySettings]);

  const selectedFaction = factions.find(item => item.id === selectedFactionId) || null;
  const factionDossierAllEvents = useMemo(() => {
    if (!selectedFactionId) return [];
    return pilotEvents
      .filter(event => event.factionId === selectedFactionId)
      .filter(event => {
        if (isVisitActivityEvent(event, activitySettings)) return true;
        if (isPersonActivityEvent(event, activitySettings)) {
          return !(event.type === "warning" && event?.personRecord?.includeInDossier === false);
        }
        return false;
      })
      .filter(event => !dossierTypeFilter || event.type === dossierTypeFilter)
      .sort((a, b) => new Date(getActivityEventDate(b) || 0) - new Date(getActivityEventDate(a) || 0));
  }, [selectedFactionId, pilotEvents, activitySettings, dossierTypeFilter]);

  const factionDossierPeople = useMemo(() => {
    if (!selectedFactionId) return [];
    const eventTypes = activitySettings?.eventTypes || DEFAULT_ACTIVITY_EVENT_TYPES;
    const records = {};
    factionDossierAllEvents
      .filter(event => isPersonActivityEvent(event, activitySettings))
      .forEach(event => {
        const key = `${event?.personRecord?.targetId || ""}::${event?.personRecord?.targetFullName || ""}`;
        if (!records[key]) {
          records[key] = {
            targetId: event?.personRecord?.targetId || "",
            fullName: event?.personRecord?.targetFullName || "Без ФИО",
            position: event?.personRecord?.targetPosition || "—",
            count: 0,
            lastReason: "",
            typeCounts: {},
            mainType: "",
            lastAuthorUserId: "",
          };
        }
        records[key].count += 1;
        records[key].typeCounts[event.type] = (records[key].typeCounts[event.type] || 0) + 1;
        records[key].lastReason = event?.personRecord?.reason || records[key].lastReason;
        records[key].lastAuthorUserId = event.authorUserId || records[key].lastAuthorUserId;
      });
    const result = Object.values(records);
    result.forEach(person => {
      const top = Object.entries(person.typeCounts).sort((a, b) => b[1] - a[1])[0];
      person.mainType = top ? top[0] : "";
      const meta = eventTypes.find(t => t.id === person.mainType);
      person.mainTypeLabel = meta ? meta.label : "—";
      person.mainTypeShortLabel = EVENT_TYPE_SHORT_LABELS[person.mainType] || (meta ? meta.label : "—");
      person.mainTypeIcon = meta ? meta.icon : "";
      const authorUser = users.find(u => u.id === person.lastAuthorUserId);
      person.authorName = authorUser ? getUserFullName(authorUser) : "—";
    });
    const { key, dir } = dossierSort;
    result.sort((a, b) => {
      let cmp = 0;
      if (key === "count") cmp = a.count - b.count;
      else if (key === "type") cmp = (a.mainTypeLabel || "").localeCompare(b.mainTypeLabel || "", "ru");
      else if (key === "fullName") cmp = (a.fullName || "").localeCompare(b.fullName || "", "ru");
      else if (key === "position") cmp = (a.position || "").localeCompare(b.position || "", "ru");
      else if (key === "authorName") cmp = (a.authorName || "").localeCompare(b.authorName || "", "ru");
      return dir === "desc" ? -cmp : cmp;
    });
    return result;
  }, [selectedFactionId, factionDossierAllEvents, activitySettings, dossierSort, users]);

  const factionDossierVisits = useMemo(() => {
    return factionDossierAllEvents.filter(event => isVisitActivityEvent(event, activitySettings));
  }, [factionDossierAllEvents, activitySettings]);

  const personDossierEvents = useMemo(() => {
    if (!selectedPerson || !selectedFactionId) return [];
    return getPilotPersonDossierEvents(activityEvents, selectedFactionId, selectedPerson.targetId, activitySettings)
      .filter(event => subjectScope.includes(event.authorSubject))
      .filter(event => !personFilters.periodKey || getReportPeriodKey(getActivityEventDate(event)) === personFilters.periodKey)
      .filter(event => !personFilters.type || event.type === personFilters.type)
      .filter(event => !personFilters.authorUserId || event.authorUserId === personFilters.authorUserId);
  }, [activityEvents, selectedFactionId, selectedPerson, activitySettings, personFilters, subjectScope]);

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Аналитика</h1>
      <p style={S.pageSubtitle}>{user?.role === "BOSS" ? user.subject : getPilotSubjectsLabel(subjectScope)} • дисциплинарная практика, фракции и личные дела</p>

      <div className="stat-row" style={{ ...S.row, marginBottom: 16 }}>
        <StatBox value={currentEvents.length} label="Событий в периоде" color={C.blue} />
        <StatBox value={currentEvents.filter(event => isVisitActivityEvent(event, activitySettings)).length} label="Официальных визитов" color={C.warning} />
      </div>

      <div className="resp-card" style={{ ...S.card, marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "center", flexWrap: "wrap", marginBottom: 14 }}>
          <div style={S.cardTitle}>Фракции и дисциплинарная картина</div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            {user?.role !== "BOSS" && user?.role !== "USP" && availableSubjects.length > 1 && (
              <select style={{ ...S.select, width: 220 }} value={subjectFilter} onChange={e => setSubjectFilter(e.target.value)}>
                {availableSubjects.map(subject => <option key={subject} value={subject}>{subject}</option>)}
              </select>
            )}
            <input style={{ ...S.input, width: 180 }} type="month" value={formatMonthInputValue(periodKey)} onChange={e => setPeriodKey(formatMonthInputValue(e.target.value))} />
          </div>
        </div>
        <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12 }}>
          {factionStats.map(item => (
            <button key={item.faction.id} className="btn-hover" style={{ ...S.card, marginBottom: 0, textAlign: "left", cursor: "pointer", display: "flex", flexDirection: "column", minHeight: 236 }} onClick={() => { setSelectedFactionId(item.faction.id); setSelectedPerson(null); setPersonFilters({ periodKey: "", type: "", authorUserId: "" }); setDossierTypeFilter(""); setDossierSort({ key: "count", dir: "desc" }); }}>
              <div style={{ fontSize: T.bodyStrong, color: C.text, fontWeight: 700, lineHeight: 1.35, minHeight: "2.7em", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{item.faction.name}</div>
              <div style={{ fontSize: T.title, color: C.gold, fontWeight: 700, marginTop: 8 }}>{item.totalEvents}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 6 }}>Лиц в производстве: {item.uniquePersons}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>Вынесено решений: {item.closedCases} • Визитов: {item.visits}</div>
              <div style={{ fontSize: T.meta, color: C.textDim, marginTop: 6, lineHeight: 1.45, minHeight: "2.9em", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{item.topReason ? `Топ-причина: ${item.topReason.reason}` : "Причины пока не накоплены"}</div>
            </button>
          ))}
        </div>
      </div>

      <div className="resp-card" style={{ ...S.card, marginBottom: 18 }}>
        <div style={S.cardTitle}>Нагрузка по типам событий</div>
        <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
          {byType.map(item => <div key={item.id} style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}><div style={{ fontSize: T.meta, color: C.textMuted }}>{item.label}</div><div style={{ fontSize: T.heading, color: item.color || C.text, fontWeight: 700, marginTop: 8 }}>{item.count}</div></div>)}
        </div>
      </div>

      {/* ═══ CHARTS SECTION ═══ */}
      {typeof Chart !== "undefined" && (() => {
        const chartCard = { ...S.card, flex: "1 1 480px", minWidth: 0 };
        const doughnutOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "right", labels: { color: CHART_THEME.textColor, padding: 10, font: { size: 11 }, boxWidth: 14 } } } };
        // Dynamics line chart data
        const dynamicsLineData = {
          labels: dynamics.map(d => d.label),
          datasets: [
            { label: "Событий", data: dynamics.map(d => d.totalEvents), borderColor: "#5bc0eb", backgroundColor: "#5bc0eb33", tension: 0.3, fill: true, pointRadius: 4 },
            { label: "Вынесено решений", data: dynamics.map(d => d.closedCases), borderColor: "#2f9e8f", backgroundColor: "#2f9e8f33", tension: 0.3, fill: true, pointRadius: 4 },
          ],
        };
        // By type doughnut data
        const typeFiltered = byType.filter(t => t.count > 0);
        const typeDoughnutData = typeFiltered.length > 0 ? {
          labels: typeFiltered.map(t => t.label),
          datasets: [{ data: typeFiltered.map(t => t.count), backgroundColor: typeFiltered.map(t => t.color || "#8ea5c7"), borderWidth: 0, hoverOffset: 6 }],
        } : null;
        // Factions bar data (top 10 by events)
        const topFactions = [...factionStats].sort((a, b) => b.totalEvents - a.totalEvents).slice(0, 10);
        const factionBarData = topFactions.length > 0 ? {
          labels: topFactions.map(f => f.faction.name.length > 16 ? f.faction.name.slice(0, 14) + "…" : f.faction.name),
          datasets: [
            { label: "Событий", data: topFactions.map(f => f.totalEvents), backgroundColor: "#5bc0eb", borderRadius: 4 },
            { label: "Фигурантов", data: topFactions.map(f => f.uniquePersons), backgroundColor: "#d69a2d", borderRadius: 4 },
            { label: "Визитов", data: topFactions.map(f => f.visits), backgroundColor: "#2f9e8f", borderRadius: 4 },
          ],
        } : null;
        // Employees bar data (top 10 by closed cases)
        const topEmployees = [...employeeRows].sort((a, b) => b.metrics.closedCases - a.metrics.closedCases).slice(0, 10).filter(e => e.metrics.closedCases > 0 || e.metrics.events > 0);
        const employeeBarData = topEmployees.length > 0 ? {
          labels: topEmployees.map(e => getUserFullName(e.user)),
          datasets: [
            { label: "Вынесено решений", data: topEmployees.map(e => e.metrics.closedCases), backgroundColor: "#2f9e8f", borderRadius: 4 },
            { label: "Событий", data: topEmployees.map(e => e.metrics.events), backgroundColor: "#63a4ff", borderRadius: 4 },
          ],
        } : null;
        return (
          <>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 18, marginBottom: 18 }}>
              <div className="resp-card" style={chartCard}>
                <div style={S.cardTitle}>Динамика по месяцам</div>
                <ChartCanvas type="line" data={dynamicsLineData} options={CHART_BASE_OPTIONS} height={300} />
              </div>
              <div className="resp-card" style={chartCard}>
                <div style={S.cardTitle}>Распределение по типам</div>
                {typeDoughnutData ? <ChartCanvas type="doughnut" data={typeDoughnutData} options={doughnutOpts} height={300} /> : <div style={{ color: C.textMuted, padding: 20 }}>Нет данных</div>}
              </div>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 18, marginBottom: 18 }}>
              <div className="resp-card" style={chartCard}>
                <div style={S.cardTitle}>Топ-10 фракций по событиям</div>
                {factionBarData ? <ChartCanvas type="bar" data={factionBarData} options={CHART_BASE_OPTIONS} height={300} /> : <div style={{ color: C.textMuted, padding: 20 }}>Нет данных</div>}
              </div>
              <div className="resp-card" style={chartCard}>
                <div style={S.cardTitle}>Нагрузка сотрудников</div>
                {employeeBarData ? <ChartCanvas type="bar" data={employeeBarData} options={{ ...CHART_BASE_OPTIONS, indexAxis: "y" }} height={300} /> : <div style={{ color: C.textMuted, padding: 20 }}>Нет данных</div>}
              </div>
            </div>
          </>
        );
      })()}

      {selectedFaction && (
        <Modal onClose={() => { setSelectedFactionId(""); setSelectedPerson(null); setSelectedEvidenceEvent(null); }} maxWidth={900}>
          <div style={S.cardTitle}>Личное дело фракции: {selectedFaction.name}</div>
          {!selectedPerson ? (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div style={{ color: C.textDim, fontSize: T.meta }}>Нажмите на сотрудника, чтобы открыть досье.</div>
              <div>
                <select style={{ ...S.select, maxWidth: 240, fontSize: T.meta }} value={dossierTypeFilter} onChange={e => setDossierTypeFilter(e.target.value)}>
                  <option value="">Все типы событий</option>
                  {(activitySettings?.eventTypes || DEFAULT_ACTIVITY_EVENT_TYPES).map(item => <option key={item.id} value={item.id}>{item.icon} {item.label}</option>)}
                </select>
              </div>
              {factionDossierPeople.length === 0 && factionDossierVisits.length === 0 ? <div style={{ color: C.textMuted, fontSize: T.body }}>По этой фракции нет записей.</div> : (
                <>
                  {factionDossierPeople.length > 0 && (() => {
                    const sortIcon = (col) => dossierSort.key === col ? (dossierSort.dir === "asc" ? " ▲" : " ▼") : "";
                    const toggleSort = (col) => setDossierSort(prev => prev.key === col ? { key: col, dir: prev.dir === "asc" ? "desc" : "asc" } : { key: col, dir: col === "count" ? "desc" : "asc" });
                    const thSortable = { ...S.th, cursor: "pointer", userSelect: "none", whiteSpace: "nowrap", fontSize: T.meta };
                    const noWrap = { ...S.td, whiteSpace: "nowrap" };
                    const truncCell = { ...S.td, maxWidth: 120, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" };
                    return (
                      <div className="responsive-table-wrap" style={{ overflowX: "auto" }}>
                      <table style={{ ...S.table, minWidth: 700 }}>
                        <thead><tr>
                          <th style={thSortable} onClick={() => toggleSort("fullName")}>ФИО{sortIcon("fullName")}</th>
                          <th style={{ ...S.th, fontSize: T.meta }}>ID</th>
                          <th style={thSortable} onClick={() => toggleSort("position")}>Зв./Долж.{sortIcon("position")}</th>
                          <th style={thSortable} onClick={() => toggleSort("type")}>Тип{sortIcon("type")}</th>
                          <th style={thSortable} onClick={() => toggleSort("count")}>#️{sortIcon("count")}</th>
                          <th style={{ ...S.th, fontSize: T.meta }}>Причина</th>
                          <th style={thSortable} onClick={() => toggleSort("authorName")}>Автор{sortIcon("authorName")}</th>
                        </tr></thead>
                        <tbody>{factionDossierPeople.map(person => <tr key={`${person.targetId}-${person.fullName}`} className="row-hover" onClick={() => setSelectedPerson(person)} style={{ cursor: "pointer" }}><td data-label="ФИО" style={{ ...noWrap, color: C.text }}>{person.fullName}</td><td data-label="ID" style={noWrap}>{person.targetId || "—"}</td><td data-label="Зв./Долж." style={truncCell} title={person.position}>{person.position}</td><td data-label="Тип" style={truncCell} title={person.mainTypeLabel}>{person.mainTypeIcon} {person.mainTypeShortLabel}</td><td data-label="Кол-во" style={noWrap}>{person.count}</td><td data-label="Причина" style={truncCell} title={person.lastReason}>{person.lastReason || "—"}</td><td data-label="Автор" style={truncCell} title={person.authorName}>{person.authorName}</td></tr>)}</tbody>
                      </table>
                      </div>
                    );
                  })()}
                  {factionDossierVisits.length > 0 && (
                    <div>
                      <div style={{ fontSize: T.body, color: C.gold, fontWeight: 700, marginBottom: 8 }}>Визиты ({factionDossierVisits.length})</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                        {factionDossierVisits.map(event => {
                          const summary = getActivityEventSummary(event, factions, users, activitySettings);
                          const author = users.find(item => item.id === event.authorUserId);
                          const reasonShort = (summary.reason || "").length > 80 ? summary.reason.slice(0, 80) + "…" : (summary.reason || "—");
                          return (
                            <div key={event.id} className="row-hover" onClick={() => setSelectedEvidenceEvent(event)} style={{ padding: "8px 12px", background: C.bgInput, borderRadius: 8, border: `1px solid ${C.border}`, cursor: "pointer" }}>
                              <div style={{ display: "flex", justifyContent: "space-between", gap: 8, alignItems: "center" }}>
                                <div style={{ color: C.text, fontSize: T.body, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{event?.visitRecord?.topic || "Без темы"}</div>
                                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                  <div style={{ color: C.textMuted, fontSize: T.meta, whiteSpace: "nowrap" }}>{formatDateTime(getActivityEventDate(event))}</div>
                                  {canDeleteEvents && <button className="btn-hover" style={{ ...btn("danger"), fontSize: T.meta, padding: "2px 8px" }} onClick={e => { e.stopPropagation(); deleteAnalyticsEvent(event); }}>Удалить</button>}
                                </div>
                              </div>
                              <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                {author ? getUserFullName(author) : "—"} • {reasonShort}
                              </div>
                            </div>
                          );
                        })}
                      </div>

                {personDossierEvents.length === 0 ? <div style={{ color: C.textMuted, fontSize: T.body }}>По выбранным фильтрам записей нет.</div> : personDossierEvents.map(event => {

        {dossierEditEvent && dossierEditForm && (

            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {isPersonActivityEvent(dossierEditEvent, activitySettings) && (
                <>

                  <div><label style={S.label}>ID</label><input style={S.input} value={dossierEditForm.targetId} onChange={e => setDossierEditForm(prev => ({ ...prev, targetId: formatTargetIdInput(e.target.value) }))} placeholder="000-000" maxLength={7} />{dossierEditForm.targetId && !isValidTargetId(dossierEditForm.targetId) && <div style={{ color: C.warning, fontSize: T.meta, marginTop: 4 }}>Формат: 000-000 или 00-000</div>}</div>
                  <div><label style={S.label}>Звание / Должность</label><input style={S.input} value={dossierEditForm.targetPosition} onChange={e => setDossierEditForm(prev => ({ ...prev, targetPosition: e.target.value }))} /></div>
                  <div><label style={S.label}>Причина</label><textarea style={S.textarea} value={dossierEditForm.reason} onChange={e => setDossierEditForm(prev => ({ ...prev, reason: e.target.value }))} /></div>
                  {(() => { const dup = findDuplicatePersonInFaction(activityEvents, dossierEditForm.factionId, dossierEditForm.targetId, dossierEditForm.targetFullName, dossierEditEvent.id, activitySettings); return dup ? <div style={{ padding: "10px 14px", background: C.warning + "18", border: `1px solid ${C.warning}44`, borderRadius: 8, color: C.warning, fontSize: T.meta }}>{dup.type === "id_match" ? `Уже есть лицо с ID ${dup.existingId} под именем «${dup.existingName}». Если ФИО изменилось — подтвердите.` : `Уже есть «${dup.existingName}» с ID ${dup.existingId}. Если ID изменился — подтвердите.`}</div> : null; })()}
                </>

const MONTH_NAMES_SHORT = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];

function PageAnalytics({ user, users, reports, bonuses, activityEvents, setActivityEvents, factions, activitySettings, addAudit, casesMeta }) {
  if (canViewPilotAnalytics(user, activitySettings)) {
    return <PagePilotAnalytics user={user} users={users} reports={reports} bonuses={bonuses} activityEvents={activityEvents} setActivityEvents={setActivityEvents} factions={factions} activitySettings={activitySettings} addAudit={addAudit} />;
  }
  const isFederalView = getUserPermissionLevel(user) >= 2;
  const relevantUsers = isFederalView ? users.filter(u => !u.blocked) : users.filter(u => u.subject === user.subject && !u.blocked);
  const relevantReports = reports.filter(r => isOperationalReport(r) && relevantUsers.find(u => u.id === r.userId));
  const relevantApprovedBonuses = filterBonusesActiveUsers(bonuses, users).filter(b => b.status === "approved" && (isFederalView ? true : b.subject === user.subject));
  const subjectScope = isFederalView ? SUBJECTS : [user.subject];
  const bySubject = subjectScope.map(sub => {
    const su = relevantUsers.filter(u => u.subject === sub);
    const sr = relevantReports.filter(r => su.find(u => u.id === r.userId));
    const totalBonus = relevantApprovedBonuses.filter(b => b.subject === sub).reduce((s, b) => s + b.amount, 0);
    const reportsPerUser = su.length > 0 ? (sr.length / su.length).toFixed(1) : "0.0";
    return { name: sub, users: su.length, reports: sr.length, reportsPerUser, totalBonus };
  });
  const maxReports = Math.max(...bySubject.map(s => s.reports), 1);

  // Cases analytics from API
  const [casesAnalytics, setCasesAnalytics] = useState(null);
  useEffect(() => {
    apiRequest("cases.analytics", {}).then(r => { if (r.ok) setCasesAnalytics(r.data); }).catch(() => {});
  }, []);

  // Chart 1: Reports per subject (bar)
  const reportsBarData = useMemo(() => ({
    labels: bySubject.map(s => s.name),
    datasets: [{
      label: "Отчётов",
      data: bySubject.map(s => s.reports),
      backgroundColor: CHART_THEME.subjectColors.slice(0, bySubject.length),
      borderRadius: 6,
      barThickness: 28,
    }],
  }), [bySubject]);

  // Chart 2: Cases by status (doughnut)
  const statusDoughnutData = useMemo(() => {
    if (!casesAnalytics?.byStatus) return null;
    const entries = Object.entries(casesAnalytics.byStatus).filter(([, v]) => v > 0);
    if (entries.length === 0) return null;
    return {
      labels: entries.map(([k]) => (ANALYTICS_STATUS_META[k]?.label || k)),
      datasets: [{
        data: entries.map(([, v]) => v),
        backgroundColor: entries.map(([k]) => ANALYTICS_STATUS_META[k]?.color || "#8ea5c7"),
        borderWidth: 0,
        hoverOffset: 6,
      }],
    };
  }, [casesAnalytics]);

  // Chart 3: Monthly reports trend (line, 6 months)
  const reportsTrendData = useMemo(() => {
    const now = new Date();
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`, label: MONTH_NAMES_SHORT[d.getMonth()] + " " + d.getFullYear() });
    }
    const datasets = subjectScope.map((sub, idx) => {
      const subUsers = relevantUsers.filter(u => u.subject === sub);
      const subReports = relevantReports.filter(r => subUsers.find(u => u.id === r.userId));
      return {
        label: sub,
        data: months.map(m => subReports.filter(r => (r.date || "").slice(0, 7) === m.key).length),
        borderColor: CHART_THEME.subjectColors[idx % CHART_THEME.subjectColors.length],
        backgroundColor: CHART_THEME.subjectColors[idx % CHART_THEME.subjectColors.length] + "33",
        tension: 0.3,
        fill: false,
        pointRadius: 4,
      };
    });
    return { labels: months.map(m => m.label), datasets };
  }, [relevantReports, relevantUsers, subjectScope]);

  // Chart 4: Monthly bonuses trend (line, 6 months)
  const bonusesTrendData = useMemo(() => {
    const now = new Date();
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`, label: MONTH_NAMES_SHORT[d.getMonth()] + " " + d.getFullYear() });
    }
    return {
      labels: months.map(m => m.label),
      datasets: [{
        label: "Сумма премий (₽)",
        data: months.map(m => relevantApprovedBonuses.filter(b => (b.date || "").slice(0, 7) === m.key).reduce((s, b) => s + (b.amount || 0), 0)),
        borderColor: "#2f9e8f",
        backgroundColor: "#2f9e8f33",
        tension: 0.3,
        fill: true,
        pointRadius: 4,
      }],
    };
  }, [relevantApprovedBonuses]);

  // Chart 5: Cases by subject (grouped bar)
  const casesSubjectData = useMemo(() => {
    if (!casesAnalytics?.bySubject) return null;
    const subs = subjectScope.filter(s => casesAnalytics.bySubject[s]);
    if (subs.length === 0) return null;
    return {
      labels: subs,
      datasets: [
        { label: "Всего", data: subs.map(s => casesAnalytics.bySubject[s].total), backgroundColor: "#5bc0eb", borderRadius: 4 },
        { label: "Активных", data: subs.map(s => casesAnalytics.bySubject[s].active), backgroundColor: "#d69a2d", borderRadius: 4 },
        { label: "Просрочено", data: subs.map(s => casesAnalytics.bySubject[s].overdue), backgroundColor: "#b34739", borderRadius: 4 },
      ],
    };
  }, [casesAnalytics, subjectScope]);

  // Chart 6: Staff workload (horizontal bar, top 10)
  const staffLoadData = useMemo(() => {
    if (!casesAnalytics?.byStaff || casesAnalytics.byStaff.length === 0) return null;
    const sorted = [...casesAnalytics.byStaff].sort((a, b) => b.assigned - a.assigned).slice(0, 10);
    return {
      labels: sorted.map(s => s.name),
      datasets: [
        { label: "Назначено", data: sorted.map(s => s.assigned), backgroundColor: "#63a4ff", borderRadius: 4 },
        { label: "Завершено", data: sorted.map(s => s.completed), backgroundColor: "#2f9e8f", borderRadius: 4 },
        { label: "Просрочено", data: sorted.map(s => s.overdue), backgroundColor: "#b34739", borderRadius: 4 },
      ],
    };
  }, [casesAnalytics]);

  const chartCardStyle = { ...S.card, flex: "1 1 480px", minWidth: 0 };
  const doughnutOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "right", labels: { color: CHART_THEME.textColor, padding: 10, font: { size: 11 }, boxWidth: 14 } } } };
  const horizontalBarOpts = { ...CHART_BASE_OPTIONS, indexAxis: "y" };

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Аналитика</h1>
      <p style={S.pageSubtitle}>Сводные показатели по {isFederalView ? "всем субъектам" : user.subject}</p>
      <div className="stat-row" style={{...S.row,marginBottom:16}}>
        <StatBox value={relevantUsers.length} label="Сотрудников" />
        <StatBox value={relevantReports.length} label="Отчётов" color={C.blue} />
        <StatBox value={relevantApprovedBonuses.reduce((s,b)=>s+b.amount,0).toLocaleString()+"₽"} label="Выплачено премий" color={C.success} />
        {casesAnalytics && <StatBox value={casesAnalytics.total} label="Жалоб" color={C.gold} />}
        {casesAnalytics && <StatBox value={casesAnalytics.overdue} label="Просрочено" color={C.danger} />}
      </div>

      {/* Row 1: Reports bar + Cases doughnut */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 18, marginBottom: 18 }}>
        <div className="resp-card" style={chartCardStyle}>
          <div style={S.cardTitle}>Отчёты по субъектам</div>
          <ChartCanvas type="bar" data={reportsBarData} options={{ ...CHART_BASE_OPTIONS, plugins: { ...CHART_BASE_OPTIONS.plugins, legend: { display: false } } }} height={300} />
        </div>
        <div className="resp-card" style={chartCardStyle}>
          <div style={S.cardTitle}>Жалобы по статусам</div>
          {statusDoughnutData ? <ChartCanvas type="doughnut" data={statusDoughnutData} options={doughnutOpts} height={300} /> : <div style={{ color: C.textMuted, padding: 20 }}>Загрузка данных...</div>}
        </div>
      </div>

      {/* Row 2: Reports trend + Bonuses trend */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 18, marginBottom: 18 }}>
        <div className="resp-card" style={chartCardStyle}>
          <div style={S.cardTitle}>Динамика отчётов (6 мес.)</div>
          <ChartCanvas type="line" data={reportsTrendData} options={CHART_BASE_OPTIONS} height={300} />
        </div>
        <div className="resp-card" style={chartCardStyle}>
          <div style={S.cardTitle}>Динамика премий (6 мес.)</div>
          <ChartCanvas type="line" data={bonusesTrendData} options={{ ...CHART_BASE_OPTIONS, plugins: { ...CHART_BASE_OPTIONS.plugins, legend: { display: false } } }} height={300} />
        </div>
      </div>

      {/* Row 3: Cases by subject + Staff workload */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 18, marginBottom: 18 }}>
        <div className="resp-card" style={chartCardStyle}>
          <div style={S.cardTitle}>Жалобы по субъектам</div>
          {casesSubjectData ? <ChartCanvas type="bar" data={casesSubjectData} options={CHART_BASE_OPTIONS} height={300} /> : <div style={{ color: C.textMuted, padding: 20 }}>Загрузка данных...</div>}
        </div>
        <div className="resp-card" style={chartCardStyle}>
          <div style={S.cardTitle}>Нагрузка на сотрудников (топ-10)</div>
          {staffLoadData ? <ChartCanvas type="bar" data={staffLoadData} options={horizontalBarOpts} height={300} /> : <div style={{ color: C.textMuted, padding: 20 }}>Загрузка данных...</div>}
        </div>
      </div>

      {/* Existing subject breakdown table */}
      <div className="resp-card" style={S.card}><div style={S.cardTitle}>{isFederalView ? "Показатели по субъектам" : `Показатели по округу ${user.subject}`}</div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>{bySubject.map(sub=>(
          <div key={sub.name} style={{padding:16,background:C.bgInput,borderRadius:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,gap:12}}><span style={{color:C.gold,fontWeight:700,fontSize:T.bodyStrong}}>{sub.name}</span><span style={{color:C.textMuted,fontSize:T.meta}}>{sub.users} сотр. • {sub.reports} отч.</span></div>
            <div><div style={{display:"flex",justifyContent:"space-between",fontSize:T.meta,color:C.textDim}}><span>Отчётов</span><span>{sub.reports}</span></div><ProgressBar value={sub.reports} max={maxReports} color={C.blue}/></div>
            <div style={{fontSize:T.meta,color:C.textMuted,marginTop:8}}>В среднем на сотрудника: {sub.reportsPerUser} отч.</div>
            <div style={{fontSize:T.meta,color:C.textMuted,marginTop:6}}>Премий выплачено: {sub.totalBonus.toLocaleString()}₽</div>
          </div>
        ))}</div>
      </div>
    </div>
  );
}

/* ═══════════════ PAGE: USERS ═══════════════ */
function PageUsers({ currentUser, users, registrationRequests, setUsers, positions, classRanks, medals, reports, bonuses, setReports, setBonuses, addAudit, embedded = false }) {
  const assignableRoles = getAssignableRoles(currentUser);
  const assignableSubjects = getAssignableSubjects(currentUser);
  const permissionLevel = getUserPermissionLevel(currentUser);
  const canGrantSystemAdmin = hasSystemAdminAccess(currentUser);
  const canGrantTesterFlag = hasSystemAdminAccess(currentUser);
  const canCreate = permissionLevel >= 1;
  const canEdit = permissionLevel >= 2;
  const canManageBlocks = canEdit || currentUser.role === "BOSS";
  const buildInitialAddForm = () => ({ login:"", subject: assignableSubjects[0] || SUBJECTS[0], positionId:"", classRankId:"", medalIds:[], isSystemAdmin:false, isTester:false });
  const [editUser, setEditUser] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState(buildInitialAddForm);
  const [addError, setAddError] = useState("");
  const [addSuccess, setAddSuccess] = useState("");
  const [revealedPassword, setRevealedPassword] = useState("");
  const [passwordBusy, setPasswordBusy] = useState(false);
  const [passwordError, setPasswordError] = useState("");
  const addUserPositions = Object.entries(positions || {}).flatMap(([role, items]) =>
    assignableRoles.includes(role) ? (items || []).map(item => ({ id: item.id, role, title: item.title })) : []
  );
  const [searchText, setSearchText] = useState("");
  const [filterSubject, setFilterSubject] = useState("");
  const baseUsers = permissionLevel >= 2 ? users : users.filter(u => u.subject === currentUser.subject);
  const visibleUsers = useMemo(() => {
    let list = baseUsers;
    if (filterSubject) list = list.filter(u => u.subject === filterSubject);
    if (searchText.trim()) {
      const q = searchText.trim().toLowerCase();
      list = list.filter(u => {
        const fio = `${u.surname || ""} ${u.name || ""}`.toLowerCase();
        return fio.includes(q);
      });
    }
    // Сортировка по иерархии ролей (ADMIN > FEDERAL > BOSS > STAFF), затем по должности
    const posOrder = {};
    let posIdx = 0;
    for (const role of ["ADMIN", "FEDERAL", "BOSS", "STAFF"]) {
      for (const p of (positions[role] || [])) { posOrder[p.id] = posIdx++; }
    }
    list.sort((a, b) => {
      const ra = ROLE_HIERARCHY[a.role] ?? -1, rb = ROLE_HIERARCHY[b.role] ?? -1;
      if (rb !== ra) return rb - ra;
      const pa = posOrder[a.positionId] ?? 999, pb = posOrder[b.positionId] ?? 999;
      if (pa !== pb) return pa - pb;
      return (a.surname || "").localeCompare(b.surname || "", "ru");
    });
    return list;
  }, [baseUsers, searchText, filterSubject, positions]);
  const allSubjects = useMemo(() => [...new Set(baseUsers.map(u => u.subject).filter(Boolean))].sort(), [baseUsers]);
  const usersPg = usePagination(visibleUsers, 30);
  const exportUsers = () => exportToCsv("users.csv", ["ФИО", "Логин", "Роль", "Субъект", "Статус"], visibleUsers.map(u => [`${u.surname || ""} ${u.name || ""}`.trim(), u.login, u.role, u.subject, u.blocked ? "Заблокирован" : "Активен"]));
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const toggleFormMedal = (medalId) => setForm(prev => ({
    ...prev,
    medalIds: prev.medalIds.includes(medalId)
      ? prev.medalIds.filter(id => id !== medalId)
      : [...prev.medalIds, medalId],
  }));
  const toggleEditMedal = (medalId) => setEditUser(prev => prev ? ({
    ...prev,
    medalIds: (prev.medalIds || []).includes(medalId)
      ? prev.medalIds.filter(id => id !== medalId)
      : [...(prev.medalIds || []), medalId],
  }) : prev);
  const canToggleUserBlock = (targetUser) => {
    if (!targetUser || !canManageBlocks) return false;
    if (targetUser.id === currentUser.id) return false;
    if (targetUser.isSystemAdmin && !canGrantSystemAdmin) return false;
    if (canEdit) return true;
    return targetUser.subject === currentUser.subject && ["STAFF", "SENIOR_STAFF", "USP", "BOSS"].includes(targetUser.role);
  };
  const canEditUserRecord = (targetUser) => {
