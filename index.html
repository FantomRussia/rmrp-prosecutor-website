    if (!targetUser) return false;
    if (targetUser.isSystemAdmin && !canGrantSystemAdmin) return false;
    if (canEdit) return true;
    // BOSS может редактировать STAFF и BOSS своего субъекта (включая себя)
    if (currentUser.role === "BOSS" && targetUser.subject === currentUser.subject && ["STAFF", "SENIOR_STAFF", "USP", "BOSS"].includes(targetUser.role)) return true;
    return false;
  };

  const addUser = () => {
    const fullName = form.login.trim();
    if(!fullName || !form.subject || !form.positionId) { setAddError("Заполните все обязательные поля"); return; }
    const fioParts = fullName.split(/\s+/).filter(Boolean);
    if(fioParts.length < 2) { setAddError("Укажите Фамилию Имя Отчество одной строкой"); return; }
    if(isLoginBusy(users, registrationRequests, fullName)) { setAddError("Логин уже используется в системе или в заявках"); return; }
    const positionMeta = getPositionMetaById(positions, form.positionId);
    if(!positionMeta || !assignableRoles.includes(positionMeta.role)) { setAddError("Выберите должность из списка"); return; }
    const parsedName = splitFullName(fullName);
    const generatedPassword = generateShortPassword();
    const resolvedSubject = positionMeta.role === "FEDERAL" ? GENERAL_SUBJECT : (currentUser.role === "BOSS" && !hasSystemAdminAccess(currentUser) ? currentUser.subject : form.subject);
    const nu = {
      id: generateId(),
      login: fullName,
      password: generatedPassword,
      name: parsedName.name,
      surname: parsedName.surname,
      subject: resolvedSubject,
      role: positionMeta.role,
      isSystemAdmin: Boolean(canGrantSystemAdmin && form.isSystemAdmin),
      isTester: Boolean(canGrantTesterFlag && form.isTester),
      positionId: form.positionId,
      classRankId: form.classRankId || "",
      medalIds: form.medalIds || [],
      blocked: false,
      createdAt: new Date().toISOString(),
    };
    setUsers([...users, nu]);
    setAddError("");
    setAddSuccess(`Пользователь создан. Пароль: ${generatedPassword}`);
    setForm(buildInitialAddForm());
  };

  const toggleBlock=(uid)=>{
    const targetUser = users.find(u => u.id === uid);
    if (!canToggleUserBlock(targetUser)) return;
    setUsers(users.map(u=>u.id===uid?{...u,blocked:!u.blocked}:u));
  };
  const saveEdit=()=>{
    if(!editUser)return;
    const originalUser = users.find(u => u.id === editUser.id);
    // BOSS может менять роль в пределах STAFF/SENIOR_STAFF/BOSS, но не субъект и системные флаги
    const isBossEditor = currentUser.role === "BOSS";
    const bossAllowedRoles = ["STAFF", "SENIOR_STAFF", "BOSS"];
    const safedEdit = !canEdit ? {
      ...editUser,
      role: isBossEditor && bossAllowedRoles.includes(editUser.role) ? editUser.role : originalUser?.role,
      subject: originalUser?.subject,
      isSystemAdmin: originalUser?.isSystemAdmin,
      isTester: originalUser?.isTester,
    } : editUser;
    const normalizedUser = normalizeUserRecord({
      ...safedEdit,
      isSystemAdmin: canGrantSystemAdmin ? Boolean(safedEdit.isSystemAdmin) : Boolean(originalUser?.isSystemAdmin),
      isTester: canGrantTesterFlag ? Boolean(safedEdit.isTester) : Boolean(originalUser?.isTester),
    });
    setUsers(users.map(u=>u.id===editUser.id?normalizedUser:u));
    setEditUser(null);
  };

  const [deleteConfirmUser, setDeleteConfirmUser] = useState(null);
  const canDeleteUser = (targetUser) => {
    if (hasSystemAdminAccess(currentUser)) return true;
    if (currentUser?.role === "BOSS" && targetUser && targetUser.subject === currentUser.subject && targetUser.role !== "FEDERAL" && targetUser.id !== currentUser.id && !targetUser.isSystemAdmin) return true;
    return false;
  };
  const deleteUser = () => {
    if (!deleteConfirmUser || !canDeleteUser(deleteConfirmUser)) return;
    const targetId = deleteConfirmUser.id;
    const fullName = getUserFullName(deleteConfirmUser);
    const removedReports = (reports || []).filter(r => r.userId === targetId).length;
    const removedBonuses = (bonuses || []).filter(b => b.userId === targetId).length;
    setUsers(users.filter(u => u.id !== targetId));
    if (typeof setReports === "function") setReports((reports || []).filter(r => r.userId !== targetId));
    if (typeof setBonuses === "function") setBonuses((bonuses || []).filter(b => b.userId !== targetId));
    if (typeof addAudit === "function") addAudit(`Пользователь удалён: ${fullName}. Удалено отчётов: ${removedReports}, премий: ${removedBonuses}.`, currentUser?.id || null);
    setDeleteConfirmUser(null);
    if (editUser?.id === targetId) setEditUser(null);
  };

  const getPosition=(u)=>{if(!u.positionId)return"—";const all=Object.values(positions).flat();const p=all.find(pp=>pp.id===u.positionId);return p?p.title:"—";};
  const getClassRank=(u)=>getDirectoryItemTitleById(classRanks, u.classRankId, "");
  const openAddModal = () => {
    setForm(buildInitialAddForm());
    setAddError("");
    setAddSuccess("");
    setShowAdd(true);
  };
  const closeAddModal = () => {
    setShowAdd(false);
    setForm(buildInitialAddForm());
    setAddError("");
    setAddSuccess("");
  };

  useEffect(() => {
    setRevealedPassword("");
    setPasswordBusy(false);
    setPasswordError("");
  }, [editUser?.id]);

  useEffect(() => {
    if (editUser?.isSystemAdmin && !canGrantSystemAdmin) {
      setEditUser(null);
    }
  }, [editUser?.id, editUser?.isSystemAdmin, canGrantSystemAdmin]);

  const resetPassword = async () => {
    if (!editUser?.id) return;
    if (!confirm(`Сбросить пароль для ${editUser.surname} ${editUser.name}? Будет сгенерирован новый пароль.`)) return;
    setPasswordBusy(true);
    setPasswordError("");
    setRevealedPassword("");
    try {
      const response = await apiRequest("user-reset-password", { userId: editUser.id });
      setRevealedPassword(response.newPassword || "");
    } catch (e) {
      setPasswordError(e.message || "Не удалось сбросить пароль");
    } finally {
      setPasswordBusy(false);
    }
  };

  return (
    <div className={embedded ? "" : "fade-in"}>
      {!embedded && (
        <>
          <h1 className="resp-page-title" style={S.pageTitle}>Пользователи</h1>
          <p style={S.pageSubtitle}>Управление учётными записями</p>
        </>
      )}
      <div className="btn-row" style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        {canCreate && <button className="btn-hover" style={btn("gold")} onClick={openAddModal}>+ Добавить пользователя</button>}
        <button className="btn-hover" style={{ ...btn("ghost"), padding: "6px 14px", fontSize: T.meta, minHeight: 36 }} onClick={exportUsers}>Экспорт CSV</button>
      </div>
      <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
        <input style={{ ...S.input, flex: "1 1 220px", minWidth: 180 }} placeholder="Поиск по ФИО..." value={searchText} onChange={e => { setSearchText(e.target.value); usersPg.setPage(1); }} />
        <select style={{ ...S.select, flex: "0 1 200px", minWidth: 140 }} value={filterSubject} onChange={e => { setFilterSubject(e.target.value); usersPg.setPage(1); }}>
          <option value="">Все субъекты</option>
          {allSubjects.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        {(searchText || filterSubject) && <button className="btn-hover" style={{ ...btn("ghost"), padding: "6px 12px", fontSize: T.meta }} onClick={() => { setSearchText(""); setFilterSubject(""); usersPg.setPage(1); }}>Сбросить</button>}
        <span style={{ fontSize: T.meta, color: C.textMuted }}>{visibleUsers.length} из {baseUsers.length}</span>
      </div>
      <div className="responsive-table-wrap">
      <div className="resp-card" style={S.card}><table style={S.table}>
        <thead><tr><th style={S.th}>ФИО</th><th style={S.th}>Должность</th><th style={S.th}>Роль</th><th style={S.th}>Субъект</th><th style={S.th}>Статус</th>{canManageBlocks&&<th style={S.th}>Действия</th>}</tr></thead>
        <tbody>{usersPg.paged.map(u=>(
          <tr key={u.id} className="row-hover"><td data-label="ФИО" style={{...S.td,color:C.text}}>{u.surname} {u.name}</td><td data-label="Должность" style={S.td}>{getPosition(u)}</td><td data-label="Роль" style={S.td}><div style={{display:"flex",gap:6,flexWrap:"wrap"}}><RoleBadge role={u.role}/>{u.isSystemAdmin&&<span style={S.tag}>Системный администратор</span>}{u.isTester&&<span style={S.tag}>Тестер</span>}</div></td><td data-label="Субъект" style={S.td}>{u.subject}</td><td data-label="Статус" style={S.td}><span style={badge(u.blocked?C.danger:C.success)}>{u.blocked?"Заблокирован":"Активен"}</span></td>
          {canManageBlocks&&(<td data-label="Действия" style={S.td}><div style={{display:"flex",gap:6}}>{canEditUserRecord(u)&&<button className="btn-hover" style={btn("ghost")} onClick={()=>setEditUser(normalizeUserRecord(u))}>✏️</button>}{canToggleUserBlock(u)&&<button className="btn-hover" style={btn(u.blocked?"success":"danger")} onClick={()=>toggleBlock(u.id)}>{u.blocked?"🔓":"🔒"}</button>}{canDeleteUser(u)&&<button className="btn-hover" style={btn("danger")} onClick={()=>setDeleteConfirmUser(u)} title="Удалить аккаунт">🗑️</button>}</div></td>)}</tr>
        ))}</tbody></table>
        <Pagination page={usersPg.page} totalPages={usersPg.totalPages} onChange={usersPg.setPage} total={usersPg.total} />
      </div>
        </div>

      {showAdd&&(<Modal onClose={closeAddModal}><div style={S.cardTitle}>Новый пользователь</div><div style={{display:"flex",flexDirection:"column",gap:14,marginTop:12}}>
        {addSuccess && <div style={{ padding: "10px 14px", background: C.success + "22", border: `1px solid ${C.success}44`, borderRadius: 8, color: C.success, fontSize: T.body }}>{addSuccess}</div>}
        {addError && <div style={{ padding: "10px 14px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body }}>{addError}</div>}
        <div><label style={S.label}>Фамилия Имя Отчество *</label><input style={S.input} value={form.login} onChange={e=>set("login",e.target.value)} placeholder="Иванов Иван Иванович" /></div>
        <div style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 8, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: T.body, color: C.text }}>Пароль будет сгенерирован автоматически</div>
          <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>После создания пользователя система выдаст 4 случайные цифры, например 1735.</div>
        </div>
        <div><label style={S.label}>Субъект</label><select style={S.select} value={form.subject} onChange={e=>set("subject",e.target.value)} disabled={assignableSubjects.length === 1}>{assignableSubjects.map(sub=><option key={sub} value={sub}>{sub}</option>)}</select></div>
        <div><label style={S.label}>Должность</label><select style={S.select} value={form.positionId} onChange={e=>{const pid=e.target.value;const meta=addUserPositions.find(p=>p.id===pid);setForm(p=>({...p,positionId:pid,...(meta&&meta.role==="FEDERAL"?{subject:GENERAL_SUBJECT}:{})}));}}>
          <option value="">Выберите должность</option>
          {addUserPositions.map(position => <option key={position.id} value={position.id}>[{ROLE_LABELS[position.role]}] {position.title}</option>)}
        </select></div>
        {canGrantSystemAdmin && <label style={{ display:"flex", alignItems:"center", gap:10, fontSize:T.body, color:C.text }}>
          <input type="checkbox" checked={!!form.isSystemAdmin} onChange={e=>set("isSystemAdmin",e.target.checked)} />
          Системный администратор
        </label>}
        {canGrantTesterFlag && <label style={{ display:"flex", alignItems:"center", gap:10, fontSize:T.body, color:C.text }}>
          <input type="checkbox" checked={!!form.isTester} onChange={e=>set("isTester",e.target.checked)} />
          Тестер
        </label>}
        <div><label style={S.label}>Классный чин</label><select style={S.select} value={form.classRankId} onChange={e=>set("classRankId",e.target.value)}><option value="">Не присвоен</option>{(classRanks||[]).map(rank=><option key={rank.id} value={rank.id}>{rank.title}</option>)}</select></div>
        <div><label style={S.label}>Медали</label>{(medals||[]).length ? <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{medals.map(medal=>{const active=form.medalIds.includes(medal.id);return <button key={medal.id} type="button" className="btn-hover" style={{...btn(active?"gold":"ghost"),padding:"8px 12px"}} onClick={()=>toggleFormMedal(medal.id)}>{medal.title}</button>;})}</div> : <div style={{fontSize:T.body,color:C.textMuted}}>Список медалей пока пуст.</div>}</div>
        <div style={S.row}><button className="btn-hover btn-row" style={btn("gold")} onClick={addUser}>Создать</button></div>
      </div></Modal>)}

      {editUser&&(<Modal onClose={()=>setEditUser(null)}><div style={S.cardTitle}>Редактирование — {editUser.surname} {editUser.name}</div><div style={{display:"flex",flexDirection:"column",gap:12,marginTop:12}}>
        <div style={S.row}><div style={{flex:1}}><label style={S.label}>Имя</label><input style={S.input} value={editUser.name} onChange={e=>setEditUser(p=>({...p,name:e.target.value}))}/></div><div style={{flex:1}}><label style={S.label}>Фамилия</label><input style={S.input} value={editUser.surname} onChange={e=>setEditUser(p=>({...p,surname:e.target.value}))}/></div></div>
        {(hasSystemAdminAccess(currentUser) || (currentUser.role === "BOSS" && editUser.subject === currentUser.subject && ["STAFF", "SENIOR_STAFF", "BOSS"].includes(editUser.role))) && <div>
          <label style={S.label}>Пароль</label>
          {revealedPassword ? <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
            <input style={{...S.input,flex:1,fontFamily:F.mono,letterSpacing:2,fontSize:"18px",fontWeight:700}} value={revealedPassword} readOnly />
            <button className="btn-hover" style={btn("ghost")} onClick={()=>{navigator.clipboard?.writeText(revealedPassword);}} title="Копировать">📋</button>
            <button className="btn-hover" style={btn("ghost")} onClick={()=>setRevealedPassword("")}>Скрыть</button>
          </div> : <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
            <div style={{flex:1,fontSize:T.meta,color:C.textMuted,display:"flex",alignItems:"center"}}>Пароли хранятся в зашифрованном виде</div>
            <button className="btn-hover" style={btn("danger")} onClick={resetPassword} disabled={passwordBusy}>
              {passwordBusy ? "..." : "Сбросить пароль"}
            </button>
          </div>}
          {passwordError && <div style={{fontSize:T.meta,color:C.dangerLight,marginTop:6}}>{passwordError}</div>}
        </div>}
        <div><label style={S.label}>Субъект</label><select style={S.select} value={editUser.subject} onChange={e=>setEditUser(p=>({...p,subject:e.target.value}))} disabled={!canEdit}>{canEdit ? <>{SUBJECTS.map(sub=><option key={sub}>{sub}</option>)}<option value={GENERAL_SUBJECT}>{GENERAL_SUBJECT}</option></> : <option value={editUser.subject}>{editUser.subject}</option>}</select></div>
        <div><label style={S.label}>Роль</label><select style={S.select} value={editUser.role} onChange={e=>setEditUser(p=>({...p,role:e.target.value}))} disabled={!canEdit && currentUser.role !== "BOSS"}>{canEdit ? <><option value="STAFF">STAFF</option><option value="SENIOR_STAFF">SENIOR_STAFF</option><option value="USP">USP</option><option value="BOSS">BOSS</option><option value="FEDERAL">FEDERAL</option>{currentUser.role==="ADMIN"&&<option value="ADMIN">ADMIN</option>}</> : currentUser.role === "BOSS" ? <><option value="STAFF">STAFF</option><option value="SENIOR_STAFF">SENIOR_STAFF</option><option value="BOSS">BOSS</option></> : <option value={editUser.role}>{editUser.role}</option>}</select></div>
        {canGrantSystemAdmin && <label style={{ display:"flex", alignItems:"center", gap:10, fontSize:T.body, color:C.text }}>
          <input type="checkbox" checked={!!editUser.isSystemAdmin} onChange={e=>setEditUser(p=>({...p,isSystemAdmin:e.target.checked}))} />
          Системный администратор
        </label>}
        {canGrantTesterFlag && <label style={{ display:"flex", alignItems:"center", gap:10, fontSize:T.body, color:C.text }}>
          <input type="checkbox" checked={!!editUser.isTester} onChange={e=>setEditUser(p=>({...p,isTester:e.target.checked}))} />
          Тестер
        </label>}
        <div><label style={S.label}>Должность</label><select style={S.select} value={editUser.positionId||""} onChange={e=>{const pid=e.target.value;const meta=getPositionMetaById(positions,pid);setEditUser(p=>({...p,positionId:pid,...(meta?{role:meta.role,...(meta.role==="FEDERAL"?{subject:GENERAL_SUBJECT}:{})}:{})}));}}><option value="">Не назначена</option>{Object.entries(positions||{}).filter(([role])=>canEdit||assignableRoles.includes(role)).map(([role,posArr])=>posArr.map(p=><option key={p.id} value={p.id}>[{ROLE_LABELS[role]||role}] {p.title}</option>))}</select></div>
        <div><label style={S.label}>Классный чин</label><select style={S.select} value={editUser.classRankId||""} onChange={e=>setEditUser(p=>({...p,classRankId:e.target.value}))}><option value="">Не присвоен</option>{(classRanks||[]).map(rank=><option key={rank.id} value={rank.id}>{rank.title}</option>)}</select></div>
        <div><label style={S.label}>Медали</label>{(medals||[]).length ? <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{medals.map(medal=>{const active=(editUser.medalIds||[]).includes(medal.id);return <button key={medal.id} type="button" className="btn-hover" style={{...btn(active?"gold":"ghost"),padding:"8px 12px"}} onClick={()=>toggleEditMedal(medal.id)}>{medal.title}</button>;})}</div> : <div style={{fontSize:T.body,color:C.textMuted}}>Список медалей пока пуст.</div>}</div>
        <div><label style={S.label}>ID сотрудника</label><input style={S.input} value={editUser.employeeId||""} onChange={e=>setEditUser(p=>({...p,employeeId:e.target.value.trim()}))} placeholder="Например: 12345" /><div style={{fontSize:T.meta,color:C.textMuted,marginTop:4}}>Уникальный идентификатор сотрудника в системе</div></div>
        <div><label style={S.label}>Discord ID (для пингов)</label><input style={S.input} value={editUser.discordId||""} onChange={e=>setEditUser(p=>({...p,discordId:e.target.value.trim()}))} placeholder="Например: 123456789012345678" /><div style={{fontSize:T.meta,color:C.textMuted,marginTop:4}}>Числовой ID пользователя Discord. ПКМ по профилю → «Копировать ID пользователя»</div></div>
        <div style={S.row}><button className="btn-hover btn-row" style={btn("gold")} onClick={saveEdit}>Сохранить</button></div>
      </div></Modal>)}

      {deleteConfirmUser&&(<Modal onClose={()=>setDeleteConfirmUser(null)}><div style={S.cardTitle}>Удаление аккаунта</div><div style={{display:"flex",flexDirection:"column",gap:14,marginTop:12}}>
        <div style={{padding:"14px 16px",background:C.danger+"15",border:`1px solid ${C.danger}44`,borderRadius:10,color:C.dangerLight,fontSize:T.body}}>
          Вы уверены, что хотите безвозвратно удалить аккаунт <strong style={{color:C.text}}>{getUserFullName(deleteConfirmUser)}</strong>?<br/>Все связанные данные (отчёты, премии) будут также удалены.
        </div>
        <div style={S.row}><button className="btn-hover btn-row" style={btn("danger")} onClick={deleteUser}>Удалить</button></div>
      </div></Modal>)}
    </div>
  );
}

/* ═══════════════ PAGE: REGISTRATION REQUESTS ═══════════════ */
function PageRegistrationRequests({ currentUser, users, registrationRequests, setRegistrationRequests, setUsers, positions, addAudit, embedded = false }) {
  const [selectedRequest, setSelectedRequest] = useState(null);
  const [reviewForm, setReviewForm] = useState(null);
  const [modalError, setModalError] = useState("");

  const assignableRoles = getAssignableRoles(currentUser);
  const assignableSubjects = getAssignableSubjects(currentUser);
  const totalPending = registrationRequests.filter(r => r.status === "pending").length;
  const visiblePending = registrationRequests
    .filter(r => canReviewRequest(currentUser, r, users))
    .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
  const hiddenPending = Math.max(0, totalPending - visiblePending.length);
  const reviewedByMe = registrationRequests
    .filter(r => r.status !== "pending" && r.reviewedBy === currentUser.id)
    .sort((a, b) => new Date(b.reviewedAt || b.createdAt) - new Date(a.reviewedAt || a.createdAt))
    .slice(0, 8);

  const openReview = (request) => {
    const initialRole = assignableRoles.includes(request.requestedRole) ? request.requestedRole : assignableRoles[0];
    const initialSubject = currentUser.role === "BOSS" && !hasSystemAdminAccess(currentUser) ? currentUser.subject : request.requestedSubject;
    const initialPosition = (positions[initialRole] || []).some(p => p.id === request.requestedPositionId) ? request.requestedPositionId || "" : "";
    setSelectedRequest(request);
    setReviewForm({
      role: initialRole,
      subject: ["FEDERAL", "ADMIN"].includes(initialRole) ? GENERAL_SUBJECT : initialSubject,
      positionId: initialPosition,
      rejectionReason: "",
    });
    setModalError("");
  };

  const closeReview = () => {
    setSelectedRequest(null);
    setReviewForm(null);
    setModalError("");
  };

  const updateReviewForm = (field, value) => {
    setReviewForm(prev => {
      if (!prev) return prev;
      const next = { ...prev, [field]: value };
      if (field === "role") {
        if (currentUser.role === "BOSS" && !hasSystemAdminAccess(currentUser)) next.subject = currentUser.subject;
        if (["FEDERAL", "ADMIN"].includes(value)) next.subject = GENERAL_SUBJECT;
        if (!(positions[value] || []).some(p => p.id === next.positionId)) next.positionId = "";
      }
      if (field === "subject" && currentUser.role === "BOSS" && !hasSystemAdminAccess(currentUser)) next.subject = currentUser.subject;
      return next;
    });
  };

  const approveRequest = () => {
    if (!selectedRequest || !reviewForm) return;
    if (isLoginBusy(users, registrationRequests, selectedRequest.login, selectedRequest.id)) {
      setModalError("Этот логин уже занят активным пользователем или другой заявкой.");
      return;
    }

    const approvedRole = reviewForm.role;
    const approvedSubject = currentUser.role === "BOSS" && !hasSystemAdminAccess(currentUser) ? currentUser.subject : reviewForm.subject;
    const approvedPositionId = reviewForm.positionId || null;
    const reviewedAt = new Date().toISOString();
    const newUser = {
      id: generateId(),
      login: selectedRequest.login,
      password: selectedRequest.password,
      name: selectedRequest.name,
      surname: selectedRequest.surname,
      subject: approvedSubject,
      role: approvedRole,
      positionId: approvedPositionId,
      classRankId: "",
      medalIds: [],
      blocked: false,
      createdAt: reviewedAt,
    };

    setUsers([...users, newUser]);
    setRegistrationRequests(registrationRequests.map(r => r.id === selectedRequest.id ? {
      ...r,
      status: "approved",
      reviewedAt,
      reviewedBy: currentUser.id,
      rejectionReason: "",
      resolvedRole: approvedRole,
      resolvedSubject: approvedSubject,
      resolvedPositionId: approvedPositionId,
    } : r));
    addAudit(`Заявка на регистрацию одобрена: ${selectedRequest.surname} ${selectedRequest.name} (${ROLE_LABELS[approvedRole]})`, currentUser.id);
    addAudit(`Пользователь создан из заявки: ${selectedRequest.surname} ${selectedRequest.name}`, currentUser.id);
    closeReview();
  };

  const rejectRequest = () => {
    if (!selectedRequest || !reviewForm) return;
    const reviewedAt = new Date().toISOString();
    const reason = reviewForm.rejectionReason.trim();
    setRegistrationRequests(registrationRequests.map(r => r.id === selectedRequest.id ? {
      ...r,
      status: "rejected",
      reviewedAt,
      reviewedBy: currentUser.id,
      rejectionReason: reason,
    } : r));
    addAudit(`Заявка на регистрацию отклонена: ${selectedRequest.surname} ${selectedRequest.name}${reason ? ` — ${reason}` : ""}`, currentUser.id);
    closeReview();
  };

  return (
    <div className={embedded ? "" : "fade-in"}>
      {!embedded && (
        <>
          <h1 className="resp-page-title" style={S.pageTitle}>Заявки на регистрацию</h1>
          <p style={S.pageSubtitle}>Рассмотрение новых запросов на доступ в ЕИАС «Фемида»</p>
        </>
      )}
      <div className="stat-row" style={{ ...S.row, marginBottom: 16 }}>
        <StatBox value={visiblePending.length} label="Доступно к рассмотрению" />
        <StatBox value={registrationRequests.filter(r => r.status === "pending").length} label="Всего в очереди" color={C.blue} />
        <StatBox value={reviewedByMe.length} label="Рассмотрено мной" color={C.success} />
      </div>

      <div className="resp-card" style={S.card}>
        <div style={S.cardTitle}>Очередь заявок</div>
        {visiblePending.length === 0 && hiddenPending > 0 && (
          <div style={{ color: C.textMuted, fontSize: T.meta, marginBottom: 12 }}>
            В системе ещё {hiddenPending} {hiddenPending === 1 ? "заявка" : hiddenPending >= 2 && hiddenPending <= 4 ? "заявки" : "заявок"}, но она направлена по другому маршруту согласования.
          </div>
        )}
        {visiblePending.length === 0 ? (
          <div style={{ color: C.textMuted, fontSize: T.body }}>Нет заявок, доступных для рассмотрения.</div>
        ) : (
          <div className="responsive-table-wrap">
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>Заявитель</th>
                <th style={S.th}>Логин</th>
                <th style={S.th}>Запрос</th>
                <th style={S.th}>Маршрут</th>
                <th style={S.th}>Комментарий</th>
                <th style={S.th}>Дата</th>
                <th style={S.th}>Действие</th>
              </tr>
            </thead>
            <tbody>
              {visiblePending.map(request => {
                const route = getRequestRoutingInfo(request, users);
                const requestedPosition = getPositionMetaById(positions, request.requestedPositionId);
                return (
                  <tr key={request.id} className="row-hover">
                    <td data-label="Заявитель" style={{ ...S.td, color: C.text }}>{request.surname} {request.name}</td>
                    <td data-label="Логин" style={S.td}>{request.login}</td>
                    <td data-label="Запрос" style={S.td}>{requestedPosition ? `${requestedPosition.title} • ${request.requestedSubject}` : `${ROLE_LABELS[request.requestedRole]} • ${request.requestedSubject}`}</td>
                    <td data-label="Маршрут" style={S.td}><span style={badge(route.type === "boss" ? C.gold : C.blue)}>{getRouteLabel(route)}</span></td>
                    <td data-label="Комментарий" style={S.td}>{request.comment || "—"}</td>
                    <td data-label="Дата" style={S.td}>{formatDate(request.createdAt)}</td>
                    <td data-label="Действие" style={S.td}><button className="btn-hover" style={btn("gold")} onClick={() => openReview(request)}>Рассмотреть</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          </div>
        )}
      </div>

      {reviewedByMe.length > 0 && (
        <div className="resp-card" style={S.card}>
          <div style={S.cardTitle}>Последние решения</div>
          <div className="responsive-table-wrap">
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>Заявитель</th>
                <th style={S.th}>Статус</th>
                <th style={S.th}>Итог</th>
                <th style={S.th}>Дата</th>
              </tr>
            </thead>
            <tbody>
              {reviewedByMe.map(request => {
                const status = REQUEST_STATUS[request.status] || REQUEST_STATUS.pending;
                const finalRole = request.resolvedRole || request.requestedRole;
                const finalSubject = request.resolvedSubject || request.requestedSubject;
                const finalPosition = getPositionMetaById(positions, request.resolvedPositionId || request.requestedPositionId);
                return (
                  <tr key={request.id} className="row-hover">
                    <td data-label="Заявитель" style={{ ...S.td, color: C.text }}>{request.surname} {request.name}</td>
                    <td data-label="Статус" style={S.td}><span style={badge(status.color)}>{status.label}</span></td>
                    <td data-label="Итог" style={S.td}>{request.status === "approved" ? `${finalPosition ? finalPosition.title : ROLE_LABELS[finalRole]} • ${finalSubject}` : (request.rejectionReason || "Отклонено без комментария")}</td>
                    <td data-label="Дата" style={S.td}>{formatDate(request.reviewedAt || request.createdAt)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          </div>
        </div>
      )}

      {selectedRequest && reviewForm && (
        <Modal onClose={closeReview}>
          <div style={S.cardTitle}>Рассмотрение заявки</div>
          {modalError && <div style={{ padding: "10px 14px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body, marginBottom: 16 }}>{modalError}</div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 14, marginTop: 10 }}>
            <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
              <div style={{ fontSize: T.bodyStrong, color: C.text, marginBottom: 8 }}>{selectedRequest.surname} {selectedRequest.name}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted }}>Логин: {selectedRequest.login}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>Исходный запрос: {getPositionMetaById(positions, selectedRequest.requestedPositionId)?.title || ROLE_LABELS[selectedRequest.requestedRole]} • {selectedRequest.requestedSubject}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>Маршрут: {getRouteLabel(getRequestRoutingInfo(selectedRequest, users))}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>Комментарий: {selectedRequest.comment || "—"}</div>
            </div>

            <div>
              <label style={S.label}>Итоговая роль</label>
              <select style={S.select} value={reviewForm.role} onChange={e => updateReviewForm("role", e.target.value)}>
                {assignableRoles.map(role => <option key={role} value={role}>{ROLE_LABELS[role]}</option>)}
              </select>
            </div>

            <div>
              <label style={S.label}>Итоговый субъект</label>
              <select style={S.select} value={reviewForm.subject} onChange={e => updateReviewForm("subject", e.target.value)} disabled={(currentUser.role === "BOSS" && !hasSystemAdminAccess(currentUser)) || ["FEDERAL", "ADMIN"].includes(reviewForm.role)}>
                {assignableSubjects.map(subject => <option key={subject} value={subject}>{subject}</option>)}
              </select>
            </div>

            <div>
              <label style={S.label}>Должность</label>
              <select style={S.select} value={reviewForm.positionId} onChange={e => updateReviewForm("positionId", e.target.value)}>
                <option value="">Назначить позже</option>
                {(positions[reviewForm.role] || []).map(position => <option key={position.id} value={position.id}>{position.title}</option>)}
              </select>
            </div>

            <div>
              <label style={S.label}>Причина отклонения</label>
              <textarea style={S.textarea} value={reviewForm.rejectionReason} onChange={e => updateReviewForm("rejectionReason", e.target.value)} placeholder="Укажите причину, если отклоняете заявку" />
            </div>

            <div className="btn-row" style={S.row}>
              <button className="btn-hover" style={btn("success")} onClick={approveRequest}>Одобрить и создать аккаунт</button>
              <button className="btn-hover" style={btn("danger")} onClick={rejectRequest}>Отклонить</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ═══════════════ PAGE: BONUS APPROVAL ═══════════════ */
function PagePilotBonusApprovalSection({ user, users, bonuses, setBonuses, activityEvents, performanceReviews, setPerformanceReviews, factions, activitySettings, addAudit, positions }) {
  const periodKey = getReportPeriodKey(new Date());
  const pilotScopeLabel = getPilotSubjectsLabel(activitySettings?.pilotSubjects);
  const queue = useMemo(() => getPilotReviewQueueItems({ users, activityEvents, performanceReviews, factions, activitySettings, periodKey, subjectScope: activitySettings?.pilotSubjects }), [users, activityEvents, performanceReviews, factions, activitySettings, periodKey]);
  const [selectedItem, setSelectedItem] = useState(null);
  const [reviewForm, setReviewForm] = useState({ coefficient: "0", extraAmount: "0", comment: "", returnComment: "" });
  const [modalError, setModalError] = useState("");

  const openReview = (item) => {
    const source = item.review?.federalReview || item.review?.bossReview || {};
    setSelectedItem(item);
    setReviewForm({
      coefficient: String(source.coefficient ?? item.review?.bossReview?.coefficient ?? 0),
      extraAmount: String(source.extraAmount ?? item.review?.bossReview?.extraAmount ?? 0),
      comment: source.comment || item.review?.bossReview?.comment || "",
      returnComment: "",
    });
    setModalError("");
  };

  const closeReview = () => {
    setSelectedItem(null);
    setReviewForm({ coefficient: "0", extraAmount: "0", comment: "", returnComment: "" });
    setModalError("");
  };

  const approveItem = () => {
    if (!selectedItem) return;
    const now = new Date().toISOString();
    const proposal = normalizeReportDraft(reviewForm, getReportBaseAmount(selectedItem.user.role));
    const review = normalizePerformanceReview({
      ...selectedItem.review,
      id: selectedItem.review?.id || generateId(),
      userId: selectedItem.user.id,
      subject: selectedItem.user.subject,
      periodKey,
      source: "activity_events",
      metricsSnapshot: selectedItem.metricsSnapshot,
      baseAmount: getReportBaseAmount(selectedItem.user.role),
      status: "approved",
      bossReview: selectedItem.review?.bossReview || null,
      federalReview: { ...proposal, reviewedAt: now, reviewedBy: user.id, decision: "approved" },
      approvedBonusId: selectedItem.review?.approvedBonusId || generateId(),
      returnComment: "",
      returnedAt: null,
      returnedBy: null,
      approvedAt: now,
      approvedBy: user.id,
      updatedAt: now,
      createdAt: selectedItem.review?.createdAt || now,
    });
    const nextBonus = {
      id: review.approvedBonusId,
      reviewId: review.id,
      userId: selectedItem.user.id,
      amount: proposal.totalAmount,
      status: "approved",
      date: now,
      comment: proposal.comment,
      subject: selectedItem.user.subject,
      coefficient: proposal.coefficient,
      extraAmount: proposal.extraAmount,
      baseAmount: review.baseAmount,
      approvedBy: user.id,
      authorRole: selectedItem.user.role,
      source: "activity_review",
      payoutTracking: requiresSubjectPayoutTrackingForUser(selectedItem.user, positions),
      payoutStatus: requiresSubjectPayoutTrackingForUser(selectedItem.user, positions) ? "awaiting_subject_dispatch" : "not_required",
      payoutReportedAt: null,
      payoutReportedBy: null,
      payoutProofUrl: "",
      payoutProofName: "",
      payoutComment: "",
    };
    setPerformanceReviews(prev => upsertPerformanceReview(prev, review));
    setBonuses(prev => upsertItemById(prev, nextBonus));
    addAudit(`${selectedItem.user.subject}: премия утверждена ${getUserFullName(selectedItem.user)} • ${formatCurrency(proposal.totalAmount)}`, user.id);
    closeReview();
  };

  const returnItem = () => {
    if (!selectedItem) return;
    const reason = reviewForm.returnComment.trim();
    if (!reason) {
      setModalError("Укажите комментарий для возврата на доработку.");
      return;
    }
    const now = new Date().toISOString();
    const proposal = normalizeReportDraft(reviewForm, getReportBaseAmount(selectedItem.user.role));
    const review = normalizePerformanceReview({
      ...selectedItem.review,
      id: selectedItem.review?.id || generateId(),
      userId: selectedItem.user.id,
      subject: selectedItem.user.subject,
      periodKey,
      source: "activity_events",
      metricsSnapshot: selectedItem.metricsSnapshot,
      baseAmount: getReportBaseAmount(selectedItem.user.role),
      status: "returned_boss",
      bossReview: selectedItem.review?.bossReview || null,
      federalReview: { ...proposal, reviewedAt: now, reviewedBy: user.id, decision: "returned", returnComment: reason },
      returnComment: reason,
      returnedAt: now,
      returnedBy: user.id,
      updatedAt: now,
      createdAt: selectedItem.review?.createdAt || now,
    });
    setPerformanceReviews(prev => upsertPerformanceReview(prev, review));
    addAudit(`${selectedItem.user.subject}: премия возвращена ${getUserFullName(selectedItem.user)} • ${reason}`, user.id);
    closeReview();
  };

  return (
    <div className="resp-card" style={{ ...S.card, marginBottom: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "flex-start", flexWrap: "wrap", marginBottom: 14 }}>
        <div>
          <div style={S.cardTitle}>{pilotScopeLabel} • очередь премирования</div>
          <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 6 }}>Здесь находятся коэффициенты сотрудников STAFF и прямые решения по BOSS на основе событийной статистики месяца.</div>
        </div>
        <span style={badge(queue.length ? C.warning : C.success)}>{queue.length} в очереди</span>
      </div>
      {queue.length === 0 ? (
        <div style={{ color: C.textMuted, fontSize: T.body }}>По {pilotScopeLabel} сейчас нет материалов на финальное утверждение.</div>
      ) : (
        <div className="responsive-table-wrap">
        <table style={S.table}>
          <thead><tr><th style={S.th}>Сотрудник</th><th style={S.th}>Роль</th><th style={S.th}>Вынесено решений</th><th style={S.th}>Событий</th><th style={S.th}>Черновой коэффициент</th><th style={S.th}>Решение</th></tr></thead>
          <tbody>
            {queue.map(item => (
              <tr key={item.id} className="row-hover">
                <td data-label="Сотрудник" style={{ ...S.td, color: C.text }}>{getUserFullName(item.user)}</td>
                <td data-label="Роль" style={S.td}><RoleBadge role={item.user.role} /></td>
                <td data-label="Вынесено решений" style={{ ...S.td, color: C.success, fontWeight: 700 }}>{item.metricsSnapshot.closedCases || 0}</td>
                <td data-label="Событий" style={S.td}>{item.metricsSnapshot.totalEvents || 0}</td>
                <td data-label="Черновой коэффициент" style={S.td}>{item.review?.bossReview ? formatCoefficient(item.review.bossReview.coefficient) : "Прямое решение ГП"}</td>
                <td data-label="Решение" style={S.td}><button className="btn-hover" style={btn("ghost")} onClick={() => openReview(item)}>Рассмотреть</button></td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
      )}

      {selectedItem && (
        <Modal onClose={closeReview} maxWidth={820}>
          <div style={S.cardTitle}>Финальное решение</div>
          {modalError && <div style={{ padding: "12px 16px", background: C.danger + "22", border: `1px solid ${C.danger}44`, borderRadius: 8, color: C.dangerLight, fontSize: T.body, marginBottom: 16 }}>{modalError}</div>}
          <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
            <div style={{ color: C.text, fontSize: T.bodyStrong, fontWeight: 700 }}>{getUserFullName(selectedItem.user)}</div>
            <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 6 }}>Базовая ставка: {formatCurrency(getReportBaseAmount(selectedItem.user.role))}</div>
            <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 4 }}>Событий: {selectedItem.metricsSnapshot.totalEvents || 0} • Вынесено решений: {selectedItem.metricsSnapshot.closedCases || 0} • Лиц в производстве: {selectedItem.metricsSnapshot.uniquePersons || 0}</div>
            {selectedItem.review?.bossReview && <div style={{ color: C.textMuted, fontSize: T.meta, marginTop: 4 }}>Предложение BOSS: {formatCoefficient(selectedItem.review.bossReview.coefficient)} • {formatCurrency(calculateReportBonusAmount(getReportBaseAmount(selectedItem.user.role), selectedItem.review.bossReview.coefficient, selectedItem.review.bossReview.extraAmount))}</div>}
          </div>
          {(() => {
            const pilotMetrics = selectedItem.metricsSnapshot || {};
            const pilotEventTypes = activitySettings?.eventTypes || DEFAULT_ACTIVITY_EVENT_TYPES;
            if (!pilotMetrics.totalEvents) return null;
            return (
              <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}`, marginTop: 16 }}>
                <div style={{ fontSize: T.bodyStrong, color: C.gold, marginBottom: 12 }}>Активность сотрудника за период</div>
                <div className="stat-row" style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
                  <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                    <div style={{ fontSize: T.title, fontWeight: 700, color: C.blue }}>{pilotMetrics.totalEvents}</div>
                    <div style={{ fontSize: T.meta, color: C.textMuted }}>Событий</div>
                  </div>
                  <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                    <div style={{ fontSize: T.title, fontWeight: 700, color: C.success }}>{pilotMetrics.closedCases || 0}</div>
                    <div style={{ fontSize: T.meta, color: C.textMuted }}>Вынесено решений</div>
                  </div>
                  <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                    <div style={{ fontSize: T.title, fontWeight: 700, color: C.gold }}>{pilotMetrics.uniquePersons || 0}</div>
                    <div style={{ fontSize: T.meta, color: C.textMuted }}>Лиц в производстве</div>
                  </div>
                  {(pilotMetrics.visitsCount || 0) > 0 && (
                    <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                      <div style={{ fontSize: T.title, fontWeight: 700, color: C.blueLight || C.blue }}>{pilotMetrics.visitsCount}</div>
                      <div style={{ fontSize: T.meta, color: C.textMuted }}>Визитов</div>
                    </div>
                  )}
                </div>
                {Object.keys(pilotMetrics.typeCounts || {}).length > 0 && (
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 8 }}>Детализация по типам</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {Object.entries(pilotMetrics.typeCounts).sort((a, b) => b[1] - a[1]).map(([typeId, count]) => {
                        const typeMeta = pilotEventTypes.find(item => item.id === typeId) || { label: typeId, icon: "📌" };
                        return <div key={typeId} style={{ fontSize: T.body, color: C.text }}>{typeMeta.icon} {typeMeta.label} — <span style={{ fontWeight: 700 }}>{count}</span></div>;
                      })}
                    </div>
                  </div>
                )}
                {(pilotMetrics.recentEvents || []).length > 0 && (
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 8 }}>Последние события</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {pilotMetrics.recentEvents.map(event => (
                        <div key={event.id} style={{ fontSize: T.body, color: C.text }}>{formatDate(event.date)} — {event.title}{event.factionName ? ` (${event.factionName})` : ""}</div>
                      ))}
                    </div>
                  </div>
                )}
                {(pilotMetrics.topReasons || []).length > 0 && (
                  <div>
                    <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 8 }}>Топ оснований</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {pilotMetrics.topReasons.map((item, index) => (
                        <div key={item.reason} style={{ fontSize: T.body, color: C.text }}>{index + 1}. {item.reason} — <span style={{ fontWeight: 700 }}>{item.count}</span></div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })()}
          <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14, marginTop: 16 }}>
            <div><label style={S.label}>Коэффициент</label><select style={S.select} value={reviewForm.coefficient} onChange={e => setReviewForm(prev => ({ ...prev, coefficient: e.target.value }))}>{REPORT_COEFFICIENT_OPTIONS.map(value => <option key={value} value={value}>{formatCoefficient(value)}</option>)}</select></div>
            <div><label style={S.label}>Доп. премия (₽)</label><input style={S.input} type="number" min="0" step="1" value={reviewForm.extraAmount} onChange={e => setReviewForm(prev => ({ ...prev, extraAmount: e.target.value }))} /></div>
          </div>
          <div style={{ marginTop: 16 }}><label style={S.label}>Комментарий к премии</label><textarea style={S.textarea} value={reviewForm.comment} onChange={e => setReviewForm(prev => ({ ...prev, comment: e.target.value }))} placeholder="Комментарий к итоговому решению" /></div>
          <div style={{ marginTop: 16 }}><label style={S.label}>Комментарий при возврате</label><textarea style={S.textarea} value={reviewForm.returnComment} onChange={e => setReviewForm(prev => ({ ...prev, returnComment: e.target.value }))} placeholder="Что нужно доработать руководителю субъекта" /></div>
          <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}`, marginTop: 16 }}>
            <div style={{ fontSize: T.meta, color: C.textMuted }}>Итоговая сумма</div>
            <div style={{ fontSize: T.heading, color: C.gold, fontWeight: 700, marginTop: 6 }}>{formatCurrency(calculateReportBonusAmount(getReportBaseAmount(selectedItem.user.role), reviewForm.coefficient, reviewForm.extraAmount))}</div>
          </div>
          <div className="btn-row" style={{ ...S.row, marginTop: 18 }}>
            <button className="btn-hover" style={btn("success")} onClick={approveItem}>Утвердить премию</button>
            <button className="btn-hover" style={btn("danger")} onClick={returnItem}>Вернуть на доработку</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function SubjectPayoutOversightCard({ user, bonuses, users, positions, setBonuses, addAudit }) {
  const trackedBonuses = useMemo(
    () => (bonuses || [])
      .filter(bonus => bonus?.status === "approved")
      .filter(bonus => isBonusPayoutTracked(bonus, users, positions))
      .sort((left, right) => new Date(right.date || 0) - new Date(left.date || 0)),
    [bonuses, users, positions]
  );
  const awaitingDispatchBonuses = trackedBonuses.filter(bonus => isBonusAwaitingSubjectDispatch(bonus, users, positions));
  const pendingBonuses = trackedBonuses.filter(bonus => bonus?.payoutStatus === "pending_subject_payout");
  const reportedBonuses = trackedBonuses.filter(bonus => isBonusPayoutReported(bonus, users, positions));
  const subjectDispatchGroups = SUBJECTS.map(subject => {
    const subjectBonuses = trackedBonuses.filter(bonus => bonus.subject === subject);
    const subjectAwaitingDispatch = awaitingDispatchBonuses.filter(bonus => bonus.subject === subject);
    const subjectPending = pendingBonuses.filter(bonus => bonus.subject === subject);
    const subjectReported = reportedBonuses.filter(bonus => bonus.subject === subject);
    return {
      subject,
      totalAmount: subjectBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0),
      awaitingDispatchAmount: subjectAwaitingDispatch.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0),
      awaitingDispatchCount: subjectAwaitingDispatch.length,
      pendingAmount: subjectPending.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0),
      pendingCount: subjectPending.length,
      reportedAmount: subjectReported.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0),
      reportedCount: subjectReported.length,
    };
  }).filter(item => item.totalAmount > 0);
  const getPositionTitle = (targetUser) => getPositionMetaById(positions, targetUser?.positionId)?.title || "—";

  const sendBonusToSubject = (bonus) => {
    sendSubjectBonusesToSubject(bonus.subject);
    return;
    const targetUser = users.find(item => item.id === bonus.userId);
    setBonuses(prev => prev.map(item => item.id === bonus.id ? { ...item, payoutTracking: true, payoutStatus: "pending_subject_payout" } : item));
    addAudit(`Премия направлена в субъект для выплаты: ${targetUser ? getUserFullName(targetUser) : bonus.userId} • ${bonus.subject}`, user?.id || null);
  };

  const sendSubjectBonusesToSubject = (subject) => {
    const subjectBonuses = awaitingDispatchBonuses.filter(item => item.subject === subject);
    if (subjectBonuses.length === 0) return;
    const totalAmount = subjectBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0);
    const now = new Date().toISOString();
    setBonuses(prev => prev.map(item => item.subject === subject && isBonusAwaitingSubjectDispatch(item, users, positions)
      ? { ...item, payoutTracking: true, payoutStatus: "pending_subject_payout", payoutDispatchedAt: now, payoutDispatchedBy: user?.id || null }
      : item));
    addAudit(`Пакет премий направлен в субъект для выплаты: ${subject} • ${subjectBonuses.length} • ${formatCurrency(totalAmount)}`, user?.id || null);
  };

  if (trackedBonuses.length === 0) return null;

  return (
    <div className="resp-card" style={{ ...S.card, marginBottom: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "flex-start", flexWrap: "wrap", marginBottom: 14 }}>
        <div>
          <div style={S.cardTitle}>Отчёты субъектов о выплате премий</div>
          <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 6 }}>
            Сначала Генеральная прокуратура направляет утверждённую премию в субъект, затем прокуроры субъектов загружают скриншоты перевода по каждому сотруднику отдельно.
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
          <span style={badge(awaitingDispatchBonuses.length ? C.blue : C.success)}>{awaitingDispatchBonuses.length} ждут направления</span>
          <span style={badge(pendingBonuses.length ? C.warning : C.success)}>{pendingBonuses.length} ждут отчёт</span>
          <span style={badge(C.blue)}>{reportedBonuses.length} подтверждены</span>
        </div>
      </div>

      <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12, marginBottom: 16 }}>
        <div style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: T.meta, color: C.textMuted }}>Всего под контролем</div>
          <div style={{ fontSize: T.title, color: C.gold, fontWeight: 700, marginTop: 6 }}>{formatCurrency(trackedBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0))}</div>
        </div>
        <div style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: T.meta, color: C.textMuted }}>Ждут направления в субъект</div>
          <div style={{ fontSize: T.title, color: C.blue, fontWeight: 700, marginTop: 6 }}>{formatCurrency(awaitingDispatchBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0))}</div>
        </div>
        <div style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: T.meta, color: C.textMuted }}>Не подтверждено субъектами</div>
          <div style={{ fontSize: T.title, color: C.warning, fontWeight: 700, marginTop: 6 }}>{formatCurrency(pendingBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0))}</div>
        </div>
        <div style={{ padding: "12px 14px", background: C.bgInput, borderRadius: 10, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: T.meta, color: C.textMuted }}>Подтверждено скриншотами</div>
          <div style={{ fontSize: T.title, color: C.success, fontWeight: 700, marginTop: 6 }}>{formatCurrency(reportedBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0))}</div>
        </div>
      </div>

      <div className="resp-card" style={{ ...S.card, marginBottom: 16, background: C.bgInput }}>
        <div style={{ fontSize: T.bodyStrong, color: C.text, marginBottom: 10 }}>Направление премий по субъектам</div>
        <div style={{ fontSize: T.meta, color: C.textMuted, marginBottom: 14 }}>
          Генеральная прокуратура направляет премии пакетно по субъекту. После этого прокурор субъекта отчитывается скриншотами переводов по каждому сотруднику отдельно.
        </div>
        <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 12 }}>
          {subjectDispatchGroups.map(item => (
            <div key={`dispatch-${item.subject}`} style={{ padding: "14px 16px", borderRadius: 10, background: C.bgCard, border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: T.bodyStrong, color: C.text }}>{item.subject}</div>
              <div style={{ fontSize: T.title, color: C.gold, fontWeight: 700, marginTop: 8 }}>{formatCurrency(item.totalAmount)}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 6 }}>
                Ждут направления: {formatCurrency(item.awaitingDispatchAmount)} • {item.awaitingDispatchCount}
              </div>
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>
                Ждут отчёт: {formatCurrency(item.pendingAmount)} • {item.pendingCount}
              </div>
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>
                Подтверждено: {formatCurrency(item.reportedAmount)} • {item.reportedCount}
              </div>
              <div style={{ marginTop: 12 }}>
                {item.awaitingDispatchCount > 0 ? (
                  <button className="btn-hover" style={btn("ghost")} onClick={() => sendSubjectBonusesToSubject(item.subject)}>
                    Направить в субъект
                  </button>
                ) : (
                  <span style={badge(item.pendingCount > 0 ? C.warning : C.success)}>
                    {item.pendingCount > 0 ? "Уже направлено" : "Нет пакета к отправке"}
                  </span>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="responsive-table-wrap">
      <table style={S.table}>
        <thead>
          <tr>
            <th style={S.th}>Субъект</th>
            <th style={S.th}>Сотрудник</th>
            <th style={S.th}>Должность</th>
            <th style={S.th}>Сумма</th>
            <th style={S.th}>Статус</th>
            <th style={S.th}>Кто отчитался</th>
            <th style={S.th}>Скриншот</th>
            <th style={S.th}>Действие</th>
          </tr>
        </thead>
        <tbody>
          {trackedBonuses.map(bonus => {
            const targetUser = users.find(item => item.id === bonus.userId);
            const reporter = users.find(item => item.id === bonus.payoutReportedBy);
            const payoutStatus = getBonusPayoutStatusMeta(bonus, users, positions);
            return (
              <tr key={bonus.id} className="row-hover">
                <td data-label="Субъект" style={S.td}>{bonus.subject}</td>
                <td data-label="Сотрудник" style={{ ...S.td, color: C.text }}>{targetUser ? getUserFullName(targetUser) : "Пользователь удалён"}</td>
                <td data-label="Должность" style={S.td}>{getPositionTitle(targetUser)}</td>
                <td data-label="Сумма" style={{ ...S.td, color: C.gold, fontWeight: 700 }}>{formatCurrency(bonus.amount)}</td>
                <td data-label="Статус" style={S.td}><span style={badge(payoutStatus.color)}>{payoutStatus.label}</span></td>
                <td data-label="Кто отчитался" style={S.td}>{reporter ? `${getUserFullName(reporter)} • ${formatDateTime(bonus.payoutReportedAt)}` : "—"}</td>
                <td data-label="Скриншот" style={S.td}>
                  {isBonusPayoutReported(bonus, users, positions) && bonus.payoutProofUrl
                    ? <a href={bonus.payoutProofUrl} target="_blank" rel="noreferrer" style={{ color: C.blueLight || C.blue, textDecoration: "none" }}>Открыть</a>
                    : "—"}
                </td>
                <td data-label="Действие" style={S.td}>
                  {isBonusAwaitingSubjectDispatch(bonus, users, positions)
                    ? <button className="btn-hover" style={btn("ghost")} onClick={() => sendBonusToSubject(bonus)}>Направить в субъект</button>
                    : "—"}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      </div>
    </div>
  );
}

function PageBonusApproval({ user, reports, setReports, bonuses, setBonuses, users, positions, addAudit, activityEvents, performanceReviews, setPerformanceReviews, factions, activitySettings }) {
  const queue = reports.filter(report => canFederalReviewReport(report, user)).sort((a, b) => new Date(a.date) - new Date(b.date));
  const approvedBonuses = filterBonusesActiveUsers(bonuses, users).filter(bonus => bonus.status === "approved");
  const approvedFederalBonuses = approvedBonuses.filter(bonus => bonus.source === "federal_request" || (bonus.authorRole === "FEDERAL" && SUBJECTS.includes(bonus.subject)));
  const approvedTrackedBonuses = approvedBonuses.filter(bonus => isBonusPayoutTracked(bonus, users, positions));
  const approvedAwaitingDispatchBonuses = approvedTrackedBonuses.filter(bonus => isBonusAwaitingSubjectDispatch(bonus, users, positions));
  const approvedBySubject = SUBJECTS.map(subject => {
    const subjectBonuses = approvedBonuses.filter(bonus => bonus.subject === subject);
    return {
      subject,
      count: subjectBonuses.length,
      totalAmount: subjectBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0),
    };
  });
  const approvedFederalBySubject = SUBJECTS.map(subject => {
    const subjectBonuses = approvedFederalBonuses.filter(bonus => bonus.subject === subject);
    return {
      subject,
      count: subjectBonuses.length,
      totalAmount: subjectBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0),
    };
  });
  const subjectBonusOverview = approvedBySubject.map(item => ({
    ...item,
    federal: approvedFederalBySubject.find(federalItem => federalItem.subject === item.subject) || { subject: item.subject, count: 0, totalAmount: 0 },
    awaitingDispatch: {
      count: approvedAwaitingDispatchBonuses.filter(bonus => bonus.subject === item.subject).length,
      totalAmount: approvedAwaitingDispatchBonuses.filter(bonus => bonus.subject === item.subject).reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0),
    },
  }));
  const approvedBySubjectTotal = approvedBySubject.reduce((sum, item) => sum + item.totalAmount, 0);
  const approvedFederalBySubjectTotal = approvedFederalBySubject.reduce((sum, item) => sum + item.totalAmount, 0);
  const [selectedReport, setSelectedReport] = useState(null);
  const [reviewForm, setReviewForm] = useState({ coefficient: "0", extraAmount: "0", comment: "", returnComment: "" });
  const [modalError, setModalError] = useState("");
  const pilotApprovalSection = (
    <PagePilotBonusApprovalSection
      user={user}
      users={users}
      bonuses={bonuses}
      setBonuses={setBonuses}
      activityEvents={activityEvents}
      performanceReviews={performanceReviews}
      setPerformanceReviews={setPerformanceReviews}
      factions={factions}
      activitySettings={activitySettings}
      addAudit={addAudit}
      positions={positions}
    />
  );

  const sendApprovedBonusesToSubject = (subject) => {
    const subjectBonuses = approvedAwaitingDispatchBonuses.filter(item => item.subject === subject);
    if (subjectBonuses.length === 0) return;
    const totalAmount = subjectBonuses.reduce((sum, bonus) => sum + Number(bonus.amount || 0), 0);
    const now = new Date().toISOString();
    setBonuses(prev => prev.map(item => item.subject === subject && isBonusAwaitingSubjectDispatch(item, users, positions)
      ? { ...item, payoutTracking: true, payoutStatus: "pending_subject_payout", payoutDispatchedAt: now, payoutDispatchedBy: user?.id || null }
      : item));
    addAudit(`Пакет утверждённых премий направлен в субъект: ${subject} • ${subjectBonuses.length} • ${formatCurrency(totalAmount)}`, user?.id || null);
  };

  const openReview = (report) => {
    const draft = getReportBonusDraft(report);
    setSelectedReport(report);
    setModalError("");
    setReviewForm({
      coefficient: String(draft.coefficient),
      extraAmount: String(draft.extraAmount || 0),
      comment: draft.comment || "",
      returnComment: "",
    });
  };

  const closeReview = () => {
    setSelectedReport(null);
    setModalError("");
    setReviewForm({ coefficient: "0", extraAmount: "0", comment: "", returnComment: "" });
  };

  const approveReport = () => {
    if (!selectedReport) return;
    const isFederalRequest = isFederalBonusRequest(selectedReport);
    const reportUser = users.find(item => item.id === selectedReport.userId) || null;
    const targetBonusSubject = String((selectedReport.bonusTargetSubject || selectedReport.subject || "")).trim();
    const requiresPayoutTracking = isFederalRequest
      ? Boolean(targetBonusSubject) && targetBonusSubject !== GENERAL_SUBJECT
      : requiresSubjectPayoutTrackingForUser(reportUser, positions);
    const now = new Date().toISOString();
    const proposal = normalizeReportDraft(reviewForm, selectedReport.baseAmount || getReportBaseAmount(selectedReport));
    const bonusId = selectedReport.approvedBonusId || generateId();
    const nextReport = {
      ...selectedReport,
      status: "approved",
      bonusDraft: { ...proposal, updatedAt: now, updatedBy: user.id },
      federalReview: { ...proposal, reviewedAt: now, reviewedBy: user.id, decision: "approved" },
      returnComment: "",
      returnedAt: null,
      returnedBy: null,
      approvedAt: now,
      approvedBy: user.id,
      approvedBonusId: bonusId,
    };
    const nextBonus = {
      id: bonusId,
      reportId: selectedReport.id,
      userId: selectedReport.userId,
      amount: proposal.totalAmount,
      status: "approved",
      date: now,
      comment: proposal.comment,
      subject: isFederalRequest ? (selectedReport.bonusTargetSubject || selectedReport.subject) : selectedReport.subject,
      coefficient: proposal.coefficient,
      extraAmount: proposal.extraAmount,
      baseAmount: selectedReport.baseAmount || getReportBaseAmount(selectedReport),
      approvedBy: user.id,
      authorRole: selectedReport.authorRole,
      source: isFederalRequest ? "federal_request" : "report",
      bonusTargetSubject: selectedReport.bonusTargetSubject || null,
      payoutTracking: requiresPayoutTracking,
      payoutStatus: requiresPayoutTracking ? "awaiting_subject_dispatch" : "not_required",
      payoutReportedAt: null,
      payoutReportedBy: null,
      payoutProofUrl: "",
      payoutProofName: "",
      payoutComment: "",
    };
    setReports(reports.map(report => report.id === nextReport.id ? nextReport : report));
    setBonuses(prev => upsertItemById(prev, nextBonus));
    addAudit(
      isFederalRequest
        ? `Федеральная премия утверждена Генеральным прокурором: ${getUserFullName(users.find(item => item.id === selectedReport.userId))} • ${selectedReport.bonusTargetSubject || "Без субъекта"} • ${formatCurrency(proposal.totalAmount)}`
        : `Премия утверждена Генпрокуратурой: ${getUserFullName(users.find(item => item.id === selectedReport.userId))} • ${formatCurrency(proposal.totalAmount)}`,
      user.id
    );
    closeReview();
  };

  const returnForRevision = () => {
    if (!selectedReport) return;
    const isFederalRequest = isFederalBonusRequest(selectedReport);
    const reason = reviewForm.returnComment.trim();
    if (!reason) {
      setModalError(isFederalRequest ? "Укажите комментарий, чтобы вернуть заявку на доработку." : "Укажите комментарий, чтобы вернуть отчёт на доработку.");
      return;
    }
    const now = new Date().toISOString();
    const proposal = normalizeReportDraft(reviewForm, selectedReport.baseAmount || getReportBaseAmount(selectedReport));
    const nextStatus = getFederalReturnStatus(selectedReport);
    const nextReport = {
      ...selectedReport,
      status: nextStatus,
      bonusDraft: { ...proposal, updatedAt: now, updatedBy: user.id },
      federalReview: { ...proposal, reviewedAt: now, reviewedBy: user.id, decision: "returned", returnComment: reason },
      returnComment: reason,
      returnedAt: now,
      returnedBy: user.id,
    };
    setReports(reports.map(report => report.id === nextReport.id ? nextReport : report));
    addAudit(
      isFederalRequest
        ? `Федеральная заявка на премию возвращена: ${getUserFullName(users.find(item => item.id === selectedReport.userId))} • ${reason}`
        : `Отчёт возвращён на доработку: ${getUserFullName(users.find(item => item.id === selectedReport.userId))} • ${reason}`,
      user.id
    );
    closeReview();
  };

  return (
    <div className="fade-in">
      <h1 className="resp-page-title" style={S.pageTitle}>Утверждение премий</h1>
      <p style={S.pageSubtitle}>Финальное рассмотрение отчётов и федеральных заявок на премию в Генеральной прокуратуре</p>
      {pilotApprovalSection}
      <SubjectPayoutOversightCard user={user} bonuses={bonuses} users={users} positions={positions} setBonuses={setBonuses} addAudit={addAudit} />
      <div className="stat-row" style={{ ...S.row, marginBottom: 16 }}>
        <StatBox value={queue.length} label="Ожидают решения" color={C.warning} />
        <StatBox value={approvedBonuses.length} label="Утверждено выплат" color={C.success} />
        <StatBox value={reports.filter(report => ["returned_boss", "returned_author"].includes(getReportStatusValue(report))).length} label="Возвращено" color={C.danger} />
      </div>
      <div className="resp-card" style={S.card}>
        <div style={S.cardTitle}>Очередь Генпрокуратуры</div>
        {queue.length === 0 ? <div style={{ color: C.textMuted, fontSize: T.body }}>Нет отчётов или федеральных заявок, ожидающих решения</div> : (
          <div className="responsive-table-wrap">
          <table style={S.table}>
            <thead><tr><th style={S.th}>Сотрудник</th><th style={S.th}>Роль</th><th style={S.th}>Субъект премии</th><th style={S.th}>База</th><th style={S.th}>Текущая сумма</th><th style={S.th}>Дата</th><th style={S.th}>Решение</th></tr></thead>
            <tbody>{queue.map(report => {
              const reportUser = users.find(item => item.id === report.userId);
              const draft = getReportBonusDraft(report);
              const targetSubject = isFederalBonusRequest(report) ? (report.bonusTargetSubject || "—") : report.subject;
              return (
                <tr key={report.id} className="row-hover">
                  <td data-label="Сотрудник" style={{ ...S.td, color: C.text }}>{getUserFullName(reportUser)}</td>
                  <td data-label="Роль" style={S.td}><RoleBadge role={report.authorRole || reportUser?.role} /></td>
                  <td data-label="Субъект премии" style={S.td}>{targetSubject}</td>
                  <td data-label="База" style={S.td}>{formatCurrency(report.baseAmount || getReportBaseAmount(report))}</td>
                  <td data-label="Текущая сумма" style={{ ...S.td, color: C.gold, fontWeight: 700 }}>{draft.totalAmount > 0 ? formatCurrency(draft.totalAmount) : "—"}</td>
                  <td data-label="Дата" style={S.td}>{formatDate(report.date)}</td>
                  <td data-label="Решение" style={S.td}><button className="btn-hover" style={btn("ghost")} onClick={() => openReview(report)}>Рассмотреть</button></td>
                </tr>
              );
            })}</tbody>
          </table>
          </div>
        )}
      </div>

      <div className="resp-card" style={S.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16, marginBottom: 14, flexWrap: "wrap" }}>
          <div>
            <div style={S.cardTitle}>Премии по субъектам</div>
            <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 6 }}>
              Общая сумма показывает все утверждённые выплаты по субъекту. Федеральная часть показывает только премии сотрудников Генеральной прокуратуры после выбора субъекта премирования. Сотрудники Генеральной прокуратуры не подают отчёт: они отправляют федеральную заявку через раздел «Моя премия», и она попадает сюда на утверждение.
            </div>
          </div>
          <div style={{ display: "flex", gap: 18, flexWrap: "wrap", justifyContent: "flex-end" }}>
            <div style={{ textAlign: "right", minWidth: 220 }}>
              <div style={{ fontSize: T.meta, color: C.textMuted }}>Общая сумма по субъектам</div>
              <div style={{ fontSize: T.title, color: C.gold, fontWeight: 700, marginTop: 4 }}>{formatCurrency(approvedBySubjectTotal)}</div>
            </div>
            <div style={{ textAlign: "right", minWidth: 220 }}>
              <div style={{ fontSize: T.meta, color: C.textMuted }}>Из них федеральные премии</div>
              <div style={{ fontSize: T.title, color: C.blueLight || C.blue, fontWeight: 700, marginTop: 4 }}>{formatCurrency(approvedFederalBySubjectTotal)}</div>
            </div>
          </div>
        </div>
        <div className="resp-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12 }}>
          {subjectBonusOverview.map(item => (
            <div key={item.subject} style={{ padding: "14px 16px", borderRadius: 10, background: C.bgInput, border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: T.bodyStrong, color: C.text }}>{item.subject}</div>
              <div style={{ fontSize: T.title, color: C.success, fontWeight: 700, marginTop: 8 }}>{formatCurrency(item.totalAmount)}</div>
              <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 6 }}>
                {item.count} {item.count === 1 ? "утверждённая выплата" : item.count >= 2 && item.count <= 4 ? "утверждённые выплаты" : "утверждённых выплат"}
              </div>
              <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}` }}>
                <div style={{ fontSize: T.meta, color: C.textMuted }}>Федеральная часть</div>

            <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>

              <div style={{ fontSize: T.meta, color: C.textMuted }}>Роль: {ROLE_LABELS[selectedReport.authorRole] || selectedReport.authorRole}</div>

            </div>

            {selectedReport.bossReview && !isFederalBonusRequest(selectedReport) && (
              <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
                <div style={{ fontSize: T.bodyStrong, color: C.gold, marginBottom: 8 }}>Предложение BOSS</div>
                <div style={{ fontSize: T.meta, color: C.textMuted }}>Коэффициент: {formatCoefficient(selectedReport.bossReview.coefficient)}</div>
                <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>Доп. премия: {formatCurrency(selectedReport.bossReview.extraAmount)}</div>
                <div style={{ fontSize: T.meta, color: C.textMuted, marginTop: 4 }}>Комментарий: {selectedReport.bossReview.comment || "—"}</div>
              </div>
            )}

            {isFederalBonusRequest(selectedReport) ? (
              <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
                <div style={{ fontSize: T.bodyStrong, color: C.gold, marginBottom: 10 }}>Федеральная заявка</div>
                <div style={{ fontSize: T.body, color: C.text }}>Отчёт не требуется. Сотрудник Генеральной прокуратуры направил прямую заявку на премию по выбранному субъекту.</div>
              </div>
            ) : (
              <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
                <div style={{ fontSize: T.bodyStrong, color: C.gold, marginBottom: 10 }}>Содержание отчёта</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {getReportEntries(selectedReport).map(entry => <ReportEntryView key={`${selectedReport.id}-${entry.criteriaId}`} entry={entry} reportId={selectedReport.id} />)}
                </div>
              </div>
            )}

            {!isFederalBonusRequest(selectedReport) && (() => {
              const reviewReportUser = users.find(item => item.id === selectedReport.userId);
              const reviewPeriodKey = selectedReport.periodKey || getReportPeriodKey(selectedReport.date);
              const reviewMetrics = buildPilotMetricsSnapshot(reviewReportUser, activityEvents, factions, reviewPeriodKey, activitySettings);
              const eventTypes = activitySettings?.eventTypes || DEFAULT_ACTIVITY_EVENT_TYPES;
              if (reviewMetrics.totalEvents === 0) return null;
              return (
                <div style={{ padding: "14px 16px", background: C.bgInput, borderRadius: 8 }}>
                  <div style={{ fontSize: T.bodyStrong, color: C.gold, marginBottom: 12 }}>Активность сотрудника за период</div>
                  <div className="stat-row" style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
                    <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                      <div style={{ fontSize: T.title, fontWeight: 700, color: C.blue }}>{reviewMetrics.totalEvents}</div>
                      <div style={{ fontSize: T.meta, color: C.textMuted }}>Событий</div>
                    </div>
                    <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                      <div style={{ fontSize: T.title, fontWeight: 700, color: C.success }}>{reviewMetrics.closedCases}</div>
                      <div style={{ fontSize: T.meta, color: C.textMuted }}>Вынесено решений</div>
                    </div>
                    <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                      <div style={{ fontSize: T.title, fontWeight: 700, color: C.gold }}>{reviewMetrics.uniquePersons}</div>
                      <div style={{ fontSize: T.meta, color: C.textMuted }}>Лиц в производстве</div>
                    </div>
                    {reviewMetrics.visitsCount > 0 && (
                      <div style={{ padding: "8px 14px", background: C.bgCard, borderRadius: 8, border: `1px solid ${C.border}`, minWidth: 100, textAlign: "center" }}>
                        <div style={{ fontSize: T.title, fontWeight: 700, color: C.blueLight || C.blue }}>{reviewMetrics.visitsCount}</div>
                        <div style={{ fontSize: T.meta, color: C.textMuted }}>Визитов</div>
